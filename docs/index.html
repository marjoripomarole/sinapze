o sangue se difundem pela membrana porosa artificial para o dialisado, enquanto moléculas necessárias ao organismo são mantidas no sangue pela ausência de gradiente.\n\nA difusão facilitada permite que substâncias polares ou carregadas (aminoácidos, açúcares, íons) cruzem a membrana passivamente com o auxílio de proteínas de canal ou proteínas carreadoras. Não há gasto de energia; o transporte ocorre a favor do gradiente de concentração. Um exemplo central é o transportador de glicose (GLUT): a glicose se liga a um sítio específico da proteína, que muda de conformação e libera a glicose do outro lado. Existem mais de 14 isoformas de GLUT com especificidade tecidual — GLUT-1 em eritrócitos e barreira hematoencefálica, GLUT-2 em fígado, rins e células beta pancreáticas, GLUT-3 em neurônios, e GLUT-4 em tecidos muscular e adiposo, cuja atividade é aumentada pela insulina. Na diabetes tipo 1, a ausência de insulina impede o aumento dos transportadores GLUT-4 ativos, explicando por que a ingestão de glicose não é suficiente sem a aplicação de insulina.\n\nA osmose é um tipo especial de difusão passiva da água: a água se move espontaneamente por uma membrana semipermeável de soluções de baixa concentração de soluto para regiões de alta concentração de soluto. As moléculas de água podem se difundir diretamente pela bicamada lipídica (lentamente) ou por proteínas canais especializadas chamadas aquaporinas. O volume celular é determinado pelo balanço osmótico: soluções hipotônicas causam turgescência (aumento do volume) e soluções hipertônicas causam murchez ou crenação. O soro fisiológico (NaCl 0,9%) é isotônico — projetado para ser semelhante à concentração de uma célula do corpo humano — e por isso é o correto para reposição endovenosa, e não água pura.\n\n### Pontos-chave\n\n- Difusão simples: sem energia, a favor do gradiente, apenas para gases (O₂, CO₂), ureia, etanol e amônia.\n- Difusão facilitada: sem energia, a favor do gradiente, mas requer proteína de canal ou carreadora específica para cada soluto.\n- A difusão de cada soluto em uma solução é independente da difusão dos outros.\n- GLUT-4 é abundante nos tecidos muscular e adiposo e seu número de transportadores ativos é aumentado pela insulina.\n- Na diabetes tipo 1, a falta de insulina impede a ativação do GLUT-4, comprometendo a entrada de glicose nas células musculares e adiposas.\n- Osmose: movimento passivo da água do lado de menor concentração de soluto para o lado de maior concentração de soluto.\n- Aquaporinas são proteínas canais especializadas que facilitam muito o fluxo de água.\n- Soro fisiológico (NaCl 0,9%) é isotônico; água pura administrada IV causaria turgescência e lise celular (hemólise).\n- Na estomatocitose hereditária, a entrada excessiva de Na⁺ aumenta a osmolaridade intracelular, promovendo influxo de água por osmose e alteração do volume das hemácias.\n- Na fibrose cística, a disfunção do canal CFTR compromete o transporte de cloreto, levando à reabsorção excessiva de sódio e água e secreções espessas.\n\n### Comparação\n\n| Característica | Difusão Simples | Difusão Facilitada | Osmose |\n|---|---|---|---|\n| Gasto de energia | Não | Não | Não |\n| Direção | Favor do gradiente | Favor do gradiente | Favor do gradiente (água) |\n| Proteína necessária | Não | Sim (canal ou carreadora) | Não (ou aquaporina) |\n| Substâncias | O₂, CO₂, ureia, etanol | Glicose, aminoácidos, íons | Água |\n| Exemplo clínico | Troca gasosa alveolar; hemodiálise | GLUT-4 e insulina no diabetes | Soro fisiológico vs. água pura IV |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Substância precisa cruzar a membrana] --> B{Tem gradiente favorável?}\n B -- Não --> C[Transporte Ativo - requer ATP]\n B -- Sim --> D{É lipofílica/pequena/sem carga?}\n D -- Sim --> E[Difusão Simples\\nO₂, CO₂, ureia, etanol]\n D -- Não --> F{É água?}\n F -- Sim --> G[Osmose\\ndireta ou via aquaporinas]\n F -- Não --> H[Difusão Facilitada\\nvia proteína de canal ou carreadora\\nex: GLUT para glicose]\n```\n\n> **Mnemônico:** GANA: Glicose usa GLUT, Aminoácidos precisam de carreador, Não gasta energia, A favor do gradiente (difusão facilitada)\n\n<sub>Fontes: 139867c0a9741b7a:0, 033b895850746451:0, 7c2d0b06e2a9c34b:0, b8b39ff7e75b4553:0, 1e6f4ea5a7396515:0, 909d23662b0db981:0, 36f2ff3a2cd3fb54:0, a2cd71f14864394a:0, f03ea052805d8e63:2, f03ea052805d8e63:5</sub>\n\n---\n\n## Transporte Ativo: Bombas Proteicas e Aplicações Clínicas\n\nO transporte ativo é o movimento de solutos contra seu gradiente eletroquímico, exigindo gasto de energia na forma de ATP. As células dependem de bombas transmembrânicas (ATPases) para manter a composição iônica intracelular apropriada. A bomba de sódio-potássio (Na⁺/K⁺-ATPase) é provavelmente a proteína de transporte mais importante em células animais: para cada molécula de ATP hidrolisada, ela exporta 3 íons Na⁺ e importa 2 íons K⁺, mantendo as concentrações fisiológicas (intracelular: 140 mEq/L de K⁺ e 4 mEq/L de Na⁺; extracelular: 140 mEq/L de Na⁺ e 4 mEq/L de K⁺). Em algumas células, essa bomba consome até 30% de todo o ATP produzido. O desequilíbrio dessas concentrações causa problemas graves na manutenção do potencial de repouso e na propagação do potencial de ação. A Na⁺/K⁺-ATPase é classificada como antiporte, pois as moléculas cotransportadas migram para lados opostos.\n\nOutras bombas importantes incluem a bomba de cálcio, que mantém a concentração intracelular de Ca²⁺ cerca de 10.000 vezes menor do que no líquido extracelular, e a bomba de H⁺ (prótons). Nas glândulas gástricas, as células parietais possuem o mecanismo mais potente para transportar íons hidrogênio, aumentando sua concentração até um milhão de vezes no estômago para auxiliar na digestão. O omeprazol atua inibindo essa bomba de prótons gástrica, reduzindo a acidez e aliviando condições como a úlcera péptica. Os lisossomos também possuem uma bomba de prótons que mantém seu pH interno ácido (aproximadamente 5), necessário para a atividade das hidrolases ácidas lisossomais — proteção dupla, pois essas enzimas seriam inativas no pH neutro do citosol caso a membrana lisossomal se rompesse.\n\nOs glicosídeos cardíacos (como a digoxina, derivada da Digitalis spp.) inibem a Na⁺/K⁺-ATPase. Com a bomba inibida, o Na⁺ se acumula no interior da célula, reduzindo o gradiente que normalmente impulsiona a saída de Ca²⁺ pelo trocador Na⁺/Ca²⁺. O resultado é o aumento da concentração citoplasmática de cálcio, que intensifica a contração do músculo cardíaco — aumentando o volume sistólico e o débito cardíaco na insuficiência cardíaca congestiva. O Farxiga (dapagliflozina) é outro exemplo de fármaco que atua no transporte de membrana: bloqueia o cotransportador sódio-glicose 2 (SGLT2) no rim, levando à eliminação do excesso de glicose na urina e melhorando o controle do diabetes mellitus tipo 2.\n\n### Pontos-chave\n\n- Transporte ativo: contra o gradiente eletroquímico, com gasto de ATP; as ATPases hidrolisam ATP em ADP + Pi.\n- Na⁺/K⁺-ATPase: exporta 3 Na⁺ e importa 2 K⁺ por ATP; é antiporte; presente em todas as células animais; é glicoproteína integral de membrana.\n- Concentrações fisiológicas: intracelular = 140 mEq/L K⁺ e 4 mEq/L Na⁺; extracelular = 140 mEq/L Na⁺ e 4 mEq/L K⁺.\n- Bomba de cálcio: mantém Ca²⁺ intracelular cerca de 10.000 vezes menor que o extracelular.\n- Bomba de H⁺ gástrica (células parietais): aumenta concentração de H⁺ até um milhão de vezes; omeprazol inibe essa bomba.\n- Bomba de prótons lisossomal: mantém pH ≈ 5 no lisossomo, necessário para atividade das hidrolases ácidas.\n- Digoxina inibe a Na⁺/K⁺-ATPase → acúmulo de Na⁺ intracelular → aumento de Ca²⁺ intracelular → maior força de contração cardíaca.\n- Dapagliflozina (Farxiga) bloqueia o cotransportador SGLT2 no rim → eliminação de glicose na urina → melhora do diabetes tipo 2.\n- Simporte: moléculas cotransportadas migram na mesma direção (ex: cotransportador Na⁺-glicose no intestino). Antiporte: direções opostas (ex: Na⁺/K⁺-ATPase).\n- Injeção letal de cloreto de potássio causa morte por hipercalemia aguda, que desequilibra o gradiente iônico e impede a propagação do potencial de ação cardíaco.\n\n### Comparação\n\n| Bomba | Íons Transportados | Direção | Proporção/ATP | Relevância Clínica |\n|---|---|---|---|---|\n| Na⁺/K⁺-ATPase | Na⁺ e K⁺ | Na⁺ para fora; K⁺ para dentro | 3 Na⁺ : 2 K⁺ por ATP | Potencial de ação; alvo da digoxina |\n| Bomba de Ca²⁺ | Ca²⁺ | Para fora da célula | — | Mantém Ca²⁺ intracelular ~10.000× menor |\n| Bomba de H⁺ gástrica | H⁺ | Para o lúmen gástrico | — | Digestão; alvo do omeprazol (úlcera péptica) |\n| Bomba de H⁺ lisossomal | H⁺ | Para o interior do lisossomo | — | Mantém pH ≈ 5 para hidrolases ácidas |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Digoxina administrada] --> B[Inibe Na⁺/K⁺-ATPase]\n B --> C[Acúmulo de Na⁺ intracelular]\n C --> D[Redução do gradiente de Na⁺]\n D --> E[Menor atividade do trocador Na⁺/Ca²⁺]\n E --> F[Aumento de Ca²⁺ intracelular]\n F --> G[Maior força de contração cardíaca]\n G --> H[Aumento do volume sistólico e débito cardíaco]\n```\n\n> **Mnemônico:** 3 Na⁺ SAI, 2 K⁺ ENTRA — 'Três Saem, Dois Entram' (Na⁺/K⁺-ATPase por ATP)\n\n<sub>Fontes: e7d00a882df6c4ba:0, f6db3b24bb4839ae:0, 64f242de981408e9:0, 64f242de981408e9:1, 36f2ff3a2cd3fb54:0, 36f2ff3a2cd3fb54:1, a2cd71f14864394a:0, a2cd71f14864394a:1, f03ea052805d8e63:0, 74babbc365e5ae23:0</sub>\n\n---\n\n## Membrana Plasmática: Estrutura, Função e Transporte\n\nA membrana plasmática é a estrutura responsável pela separação entre os meios intracelular e extracelular, sendo crucial para a existência da célula. Com espessura de aproximadamente 5 nm, ela só pode ser observada por microscopia eletrônica, mas sua existência já era inferida experimentalmente pela constatação de que o volume celular se altera dependendo das concentrações das soluções ao seu redor. Além de separar compartimentos, a membrana contém proteínas especializadas que atuam como receptores de sinais externos, reconhecendo ligantes específicos como hormônios e desencadeando respostas intracelulares variadas.\n\nAs células eucarióticas possuem um elaborado sistema de membranas intracelulares que cria ambientes com características bioquímicas próprias (pH, concentração de solutos e tipos de proteínas), como mitocôndrias, lisossomos, retículo endoplasmático e complexo de Golgi. A manutenção desses ambientes depende de proteínas especializadas que regulam a passagem seletiva de solutos, sendo essencial para a síntese de ATP e a transmissão de sinais elétricos em células nervosas e musculares. A composição da membrana plasmática facilita a entrada de moléculas lipofílicas, enquanto moléculas hidrofílicas dependem de proteínas transportadoras específicas.\n\nO transporte através da membrana pode ocorrer de forma passiva (a favor do gradiente de concentração, sem gasto energético) ou ativa (contra o gradiente, com gasto de ATP). As diferenças de concentração de sódio e potássio entre os meios intra e extracelular são mantidas à custa de gasto energético, principalmente pela bomba Na⁺/K⁺-ATPase. O transporte de água ocorre por osmose, através de canais específicos chamados aquaporinas, sem gasto de energia, em direção ao compartimento de maior osmolaridade.\n\n### Pontos-chave\n\n- A membrana plasmática tem espessura de aproximadamente 5 nm e só pode ser observada por microscopia eletrônica.\n- Células eucarióticas possuem sistema elaborado de membranas intracelulares criando ambientes com características bioquímicas específicas.\n- Proteínas de membrana atuam como receptores de sinais externos, reconhecendo ligantes específicos como hormônios.\n- As diferenças de concentração de sódio e potássio entre os meios intra e extracelular são mantidas à custa de gasto energético.\n- A composição da membrana plasmática facilita a entrada de moléculas lipofílicas para dentro da célula.\n- O transporte de água por aquaporinas não depende de gasto de energia.\n- A insulina, o receptor de insulina e o GLUT são proteínas; a glicose é um carboidrato.\n- Elementos osmoticamente ativos no plasma humano incluem Na⁺, glicose, cloro, proteínas e potássio.\n\n### Comparação\n\n| Tipo de Transporte | Gasto de Energia | Direção | Exemplos |\n|---|---|---|---|\n| Difusão simples | Não | A favor do gradiente | Moléculas lipofílicas, O₂, CO₂ |\n| Difusão facilitada | Não | A favor do gradiente | Glicose via GLUT |\n| Transporte ativo | Sim (ATP) | Contra o gradiente | Bomba Na⁺/K⁺-ATPase |\n| Osmose (aquaporinas) | Não | A favor do gradiente osmótico | Água |\n| Cotransporte (simporte) | Indireta | A favor do gradiente iônico | Na⁺-glicose intestinal |\n\n<sub>Fontes: 515b543e17a8338f:0, 882963e84d359832:0, 515b543e17a8338f:3, 882963e84d359832:3</sub>\n\n---\n\n## Osmose, Tonicidade e Fragilidade Eritrocitária\n\nA osmose é o processo de transporte passivo de água através de membranas semipermeáveis, sempre em direção ao compartimento de maior osmolaridade. Quando células animais são colocadas em solução hipotônica, sofrem intumescimento devido à pressão osmótica; se essa pressão for muito grande, o acentuado aumento do volume celular leva ao rompimento da membrana plasmática e ao extravasamento do conteúdo celular, processo chamado de lise celular. Quando a lise ocorre em hemácias, denomina-se hemólise. Em solução hipertônica, as células perdem água e diminuem de volume, processo chamado de crenação. Em soluções isotônicas (como NaCl a 0,9%), o volume e a forma celular não se alteram.\n\nO teste de fragilidade eritrocitária (ou teste de fragilidade osmótica) visa identificar hemácias com distúrbios na membrana celular. Eritrócitos com defeitos na constituição proteica da membrana — associados a deficiências qualitativas ou quantitativas de proteínas de ligação entre a membrana celular e o citoesqueleto — comportam-se com mais fragilidade osmótica em relação aos eritrócitos normais. Na esferocitose hereditária, por exemplo, esses eritrócitos mais frágeis hemolisam intensamente em soluções de NaCl com concentrações mais baixas do que o normal. A curva de fragilidade osmótica quantifica o grau de hemólise em diferentes concentrações de NaCl.\n\nA relevância clínica desse conhecimento é ampla: uma amostra hemolisada em laboratório apresentará concentração elevada de potássio, pois o potássio é predominantemente intracelular e, com a lise das hemácias, é liberado para o meio extracelular. Além disso, o controle rigoroso da tonicidade dos meios é vital para o organismo, sendo que o excesso de sal na dieta aumenta a osmolaridade plasmática, favorecendo retenção hídrica e hipertensão arterial.\n\n### Pontos-chave\n\n- Solução isotônica de NaCl a 0,9% apresenta osmolaridade muito próxima à encontrada no interior das células.\n- Em solução hipotônica, células animais incham; se a pressão osmótica for muito grande, ocorre lise celular (hemólise nas hemácias).\n- Em solução hipertônica, as células perdem água e ficam crenadas.\n- O teste de fragilidade eritrocitária identifica hemácias com defeitos proteicos na membrana, como na esferocitose hereditária.\n- Eritrócitos com esferocitose hereditária hemolisam intensamente em soluções de NaCl com concentrações mais baixas.\n- Amostra hemolisada apresentará concentração elevada de potássio, pois o K⁺ é predominantemente intracelular.\n- O movimento do sal (soluto) da região de maior para menor concentração ocorre por difusão simples, a favor do gradiente de concentração.\n- O organismo deve ter controle rigoroso para manter os meios isotônicos.\n\n### Comparação\n\n| Tipo de Solução | Concentração Relativa | Efeito na Hemácia | Denominação |\n|---|---|---|---|\n| Hipotônica | Menor que intracelular | Inchamento → ruptura da membrana | Hemólise |\n| Isotônica | Igual à intracelular (NaCl 0,9%) | Sem alteração de volume | Normal |\n| Hipertônica | Maior que intracelular (NaCl 1,5%) | Perda de água → encolhimento | Crenação |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Hemácia em solução] --> B{Tonicidade do meio}\n B -->|Hipotônico| C[Entrada de água por osmose]\n C --> D[Intumescimento celular]\n D --> E[Ruptura da membrana: HEMÓLISE]\n B -->|Isotônico NaCl 0,9%| F[Sem alteração de volume]\n B -->|Hipertônico| G[Saída de água por osmose]\n G --> H[Diminuição do volume: CRENAÇÃO]\n```\n\n> **Mnemônico:** \"HI-ISO-HI\": HIpotônico = Incha; ISOtônico = Igual; HIpertônico = Murcha (crenação)\n\n<sub>Fontes: 515b543e17a8338f:1, 882963e84d359832:1, 35f1f458491d5fee:0, 77565403cc4fd474:0, 35f1f458491d5fee:1, 77565403cc4fd474:1</sub>\n\n---\n\n## Toxicidade de Fármacos com Ação na Membrana: Insulina, Digoxina e Cloreto de Potássio\n\nInsulina, digoxina e cloreto de potássio são substâncias rotineiramente utilizadas clinicamente, mas cujos mecanismos de ação estão ligados ao funcionamento da membrana plasmática. O uso em quantidades ou concentrações inadequadas pode causar graves malefícios e até a morte. O caso do auxiliar de enfermagem Edson Izidoro Guimarães, que utilizava injeções letais de cloreto de potássio para matar pacientes no Hospital Municipal Salgado Filho (Rio de Janeiro, 1999), ilustra de forma dramática como substâncias de uso clínico corriqueiro podem ser fatais quando administradas de forma incorreta. O cloreto de potássio, segundo o secretário municipal de Saúde Ronaldo Gazolla, é muito usado em hospitais para hidratar doentes; se ministrado corretamente, não causa mal algum, mas injetado diretamente na veia e em grande quantidade, é letal.\n\nDe forma análoga, o enfermeiro norte-americano Charles Cullen, ao longo de 16 anos, adicionava às bolsas de soro fisiológico medicações como insulina e digoxina, fármacos que, quando administrados sem prescrição, se tornavam fatais. A insulina atua promovendo a captação de glicose pelas células (via GLUT), e em excesso causa hipoglicemia grave, privando o sistema nervoso central de seu principal substrato energético. A digoxina inibe a Na⁺/K⁺-ATPase, levando ao acúmulo intracelular de sódio e, secundariamente, de cálcio, o que pode causar arritmias cardíacas fatais em doses tóxicas.\n\nEsses casos reforçam a importância do entendimento dos mecanismos de ação dos fármacos ligados à membrana plasmática. A questão norteadora da aula propõe que o estudante compreenda por que cada uma dessas substâncias pode ser letal: a insulina por hipoglicemia grave, a digoxina por toxicidade cardíaca via inibição da bomba Na⁺/K⁺-ATPase, e o cloreto de potássio por hipercalemia aguda, que altera o potencial de membrana das células cardíacas e pode causar parada cardíaca.\n\n### Pontos-chave\n\n- Insulina, digoxina e cloreto de potássio têm mecanismos de ação ligados ao funcionamento da membrana plasmática.\n- O cloreto de potássio, injetado diretamente na veia em grande quantidade, é letal.\n- Charles Cullen adicionava insulina e digoxina às bolsas de soro fisiológico; esses fármacos, sem prescrição, tornavam-se fatais.\n- A insulina promove captação de glicose pelas células via GLUT; em excesso, causa hipoglicemia grave.\n- A digoxina inibe a Na⁺/K⁺-ATPase, levando ao acúmulo intracelular de sódio e cálcio, podendo causar arritmias fatais.\n- O cloreto de potássio em excesso causa hipercalemia aguda, alterando o potencial de membrana das células cardíacas.\n- Edson Izidoro Guimarães foi preso em 7 de maio de 1999, acusado de homicídio triplamente qualificado.\n- O segundo método de Izidoro era desligar os aparelhos de respiração artificial; sem oxigênio, o paciente morria rapidamente.\n\n### Comparação\n\n| Substância | Mecanismo de Ação Normal | Efeito do Excesso/Uso Indevido | Mecanismo da Letalidade |\n|---|---|---|---|\n| Insulina | Promove captação de glicose via GLUT | Hipoglicemia grave | Privação de glicose ao SNC |\n| Digoxina | Inibe Na⁺/K⁺-ATPase (uso terapêutico em IC) | Toxicidade cardíaca | Acúmulo de Na⁺ e Ca²⁺ intracelular → arritmias fatais |\n| Cloreto de Potássio | Reposição eletrolítica (hidratação) | Hipercalemia aguda | Alteração do potencial de membrana cardíaca → parada cardíaca |\n\n> **Mnemônico:** \"IDK é letal em excesso\": Insulina → hipoglicemia; Digoxina → arritmia; KCl → parada cardíaca\n\n<sub>Fontes: d25fd9d504a793a6:0, d25fd9d504a793a6:1, 74babbc365e5ae23:1, 515b543e17a8338f:2, 882963e84d359832:2</sub>\n\n---\n\n## Reconhecimento Celular, MHC e Transplantes\n\nAs proteínas da membrana plasmática desempenham papel central no reconhecimento celular e na resposta imune. Como acontece com as macromoléculas em geral, as proteínas da membrana são imunogênicas, promovendo resposta imune quando penetram em um organismo estranho. O mecanismo para distinguir o que é próprio do organismo (self) daquilo que é estranho (non-self) depende de um grupo de moléculas glicoproteicas da membrana plasmática denominadas complexo principal de histocompatibilidade (MHC, do inglês major histocompatibility complex). Há duas classes: MHC I, presente em todas as células do organismo, e MHC II, presente em algumas células específicas do sistema imune.\n\nOs dois MHCs são glicoproteínas cujas sequências peptídicas têm uma região constante e uma variável. A sequência de aminoácidos da região variável difere muito a cada pessoa, de tal maneira que não existe a possibilidade de serem produzidos conjuntos de proteínas de MHC idênticos entre diferentes indivíduos. A única exceção são os gêmeos univitelinos (ou idênticos), por serem geneticamente iguais. Para minimizar a resposta imune e a consequente rejeição de transplantes, procuram-se doadores cujos complexos MHC sejam o mais semelhante possível aos do receptor.\n\nA histocompatibilidade é um dos principais fatores a serem considerados quando se trata do sucesso de qualquer transplante, visto que a presença de antígenos de histocompatibilidade incompatíveis entre o doador e o receptor costuma levar a respostas imunes indesejadas, em especial a doença do enxerto contra o hospedeiro (DECH), e assim ao fracasso do transplante. A estrutura responsável pelo reconhecimento celular em transplantes é, portanto, a glicoproteína de membrana (MHC), e não os fosfolipídeos, o colesterol ou proteínas plasmáticas.\n\n### Pontos-chave\n\n- O mecanismo self/non-self depende de glicoproteínas da membrana plasmática denominadas MHC.\n- MHC I está presente em todas as células do organismo; MHC II está presente em algumas células específicas do sistema imune.\n- A região variável do MHC difere muito entre indivíduos; gêmeos univitelinos são a única exceção com MHC idênticos.\n- Para transplantes, busca-se o doador com MHC mais semelhante possível ao do receptor.\n- A incompatibilidade de MHC pode levar à doença do enxerto contra o hospedeiro (DECH) e ao fracasso do transplante.\n- A estrutura responsável pelo reconhecimento celular em transplantes é a glicoproteína (MHC), não fosfolipídeos ou colesterol.\n- Proteínas de membrana são imunogênicas, promovendo resposta imune quando penetram em organismo estranho.\n\n### Comparação\n\n| Característica | MHC I | MHC II |\n|---|---|---|\n| Distribuição | Todas as células do organismo | Células específicas do sistema imune |\n| Tipo de molécula | Glicoproteína | Glicoproteína |\n| Região constante | Sim | Sim |\n| Região variável | Sim (difere entre indivíduos) | Sim (difere entre indivíduos) |\n| Papel em transplantes | Reconhecimento self/non-self | Reconhecimento self/non-self |\n\n> **Mnemônico:** \"MHC: 1 para Todos, 2 para o Sistema Imune\" — MHC I em todas as células; MHC II só em células imunes específicas\n\n<sub>Fontes: 515b543e17a8338f:1, 882963e84d359832:1</sub>\n\n---\n\n## Sistemas Tampão e Princípio Isoídrico\n\nOs sistemas tampão dos líquidos corporais constituem a primeira linha de defesa contra distúrbios acidobásicos. Aproximadamente 60% a 70% do tamponamento químico total dos líquidos corporais se dá no interior das células, sendo as proteínas intracelulares os principais agentes tamponantes. Nas hemácias, a hemoglobina desempenha papel especialmente relevante, reagindo com H⁺ segundo a equação H⁺ + Hb ⇌ HHb. A eficácia dos tampões intracelulares é limitada pela lentidão com que H⁺ e HCO₃⁻ atravessam as membranas celulares, podendo levar horas para atingirem capacidade máxima — exceto no caso das hemácias.\n\nO princípio isoídrico estabelece que todos os sistemas tampão de uma solução comum estão em equilíbrio com a mesma concentração de H⁺. Isso significa que qualquer condição que altere o balanço de um dos sistemas tampão também altera o balanço de todos os outros, porque os sistemas tampão, na verdade, tamponam uns aos outros ao trocar H⁺ entre si. Portanto, ao analisar um distúrbio acidobásico, a alteração em um sistema (p.ex., bicarbonato) reflete-se obrigatoriamente em todos os demais sistemas tampão simultaneamente.\n\n### Pontos-chave\n\n- 60% a 70% do tamponamento químico total dos líquidos corporais se dá no interior das células, grande parte resultante das proteínas intracelulares.\n- A hemoglobina nas hemácias é tampão importante: H⁺ + Hb ⇌ HHb.\n- Proteínas intracelulares (exceto hemoglobina) levam horas para tamponar ao máximo, pois H⁺ e HCO₃⁻ atravessam lentamente as membranas celulares.\n- O pK de muitos sistemas de proteínas intracelulares é próximo ao pH intracelular, aumentando seu poder tamponante.\n- Princípio isoídrico: todos os tampões em uma solução comum estão em balanço com a mesma concentração de H⁺ — alterar um sistema altera todos os outros simultaneamente.\n- Os sistemas tampão tamponam uns aos outros ao trocar H⁺ entre si.\n\n<sub>Fontes: 51723ae60ff2d9cb:9, 51723ae60ff2d9cb:13</sub>\n\n---\n\n## Regulação Respiratória e Renal do Equilíbrio Acidobásico\n\nA regulação respiratória constitui a segunda linha de defesa contra distúrbios acidobásicos. O aumento da ventilação alveolar elimina CO₂ do líquido extracelular, reduzindo a concentração de H⁺ e elevando o pH; a redução da ventilação tem efeito oposto. Quantitativamente, duplicar a ventilação alveolar aumenta o pH em cerca de 0,23, enquanto reduzi-la a um quarto do normal diminui o pH em 0,45. A PCO₂ normal nos líquidos extracelulares é de 40 mmHg, correspondendo a aproximadamente 1,2 mol/L de CO₂ dissolvido.\n\nOs rins representam a terceira e mais potente linha de defesa, atuando de forma mais lenta, porém com maior capacidade de correção definitiva. O mecanismo central é a secreção tubular de H⁺ acoplada à reabsorção de HCO₃⁻. Nas células tubulares, o CO₂ (sob ação da anidrase carbônica) combina-se com H₂O para formar H₂CO₃, que se dissocia em H⁺ e HCO₃⁻. O H⁺ é secretado para o lúmen tubular via contratransporte Na⁺-H⁺, enquanto o HCO₃⁻ retorna ao sangue pela membrana basolateral. Sob condições normais, a secreção tubular de H⁺ é de cerca de 4.400 mEq/L/dia e a filtração de HCO₃⁻ é de cerca de 4.320 mEq/L/dia — quantidades que se 'titulam' nos túbulos. Na acidose, o excesso de H⁺ é tamponado nos túbulos por fosfato e amônia e excretado como sal; na alcalose metabólica, o excesso de HCO₃⁻ não reabsorvido é excretado na urina.\n\n### Pontos-chave\n\n- Aumento da ventilação alveolar → ↓PCO₂ → ↓H⁺ → ↑pH; redução da ventilação → ↑PCO₂ → ↑H⁺ → ↓pH.\n- Duplicar a ventilação alveolar aumenta o pH em cerca de 0,23; reduzi-la a 1/4 do normal reduz o pH em 0,45.\n- PCO₂ normal = 40 mmHg; CO₂ dissolvido normal ≈ 1,2 mol/L nos líquidos extracelulares.\n- Nos túbulos renais, a anidrase carbônica catalisa: CO₂ + H₂O → H₂CO₃ → H⁺ + HCO₃⁻.\n- H⁺ é secretado para o lúmen via contratransporte Na⁺-H⁺; o gradiente de Na⁺ fornece a energia para o transporte de H⁺ contragradiente.\n- HCO₃⁻ retorna ao sangue pela membrana basolateral via cotransporte Na⁺-HCO₃⁻ (túbulo proximal) ou troca Cl⁻-HCO₃⁻ (outros segmentos).\n- Secreção tubular de H⁺ ≈ 4.400 mEq/L/dia; filtração de HCO₃⁻ ≈ 4.320 mEq/L/dia — eles se 'titulam' nos túbulos.\n- O excesso de H⁺ urinário (≈ 80 mEq/L/dia) é tamponado por fosfato e amônia, não excretado como H⁺ livre.\n- Na acidose: reabsorção completa de HCO₃⁻ + excreção de H⁺ em excesso. Na alcalose metabólica: excesso de HCO₃⁻ é excretado na urina.\n- A compensação respiratória da alcalose metabólica é limitada, pois a hipoventilação profunda compromete a oxigenação.\n\n### Comparação\n\n| Mecanismo | Velocidade de Ação | Capacidade | Componente Principal |\n|---|---|---|---|\n| Tampões químicos | Imediata (segundos) | Limitada | HCO₃⁻, proteínas, Hb, fosfato |\n| Regulação respiratória | Minutos | Moderada | PCO₂ (ventilação alveolar) |\n| Regulação renal | Horas a dias | Alta (definitiva) | Secreção de H⁺ / reabsorção de HCO₃⁻ |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[CO₂ produzido pelo metabolismo] --> B[Difunde para o sangue]\n B --> C[Transportado aos pulmões]\n C --> D{Ventilação alveolar}\n D -->|Aumentada| E[↓PCO₂ → ↓H⁺ → ↑pH]\n D -->|Diminuída| F[↑PCO₂ → ↑H⁺ → ↓pH]\n G[Células tubulares renais] --> H[CO₂ + H₂O → H₂CO₃ via anidrase carbônica]\n H --> I[H₂CO₃ → H⁺ + HCO₃⁻]\n I --> J[H⁺ secretado no lúmen via Na⁺-H⁺]\n I --> K[HCO₃⁻ retorna ao sangue pela membrana basolateral]\n J --> L{pH urinário}\n L -->|Acidose: excesso H⁺| M[H⁺ tamponado por fosfato/amônia → excretado como sal]\n L -->|Alcalose: excesso HCO₃⁻| N[HCO₃⁻ excretado na urina]\n```\n\n<sub>Fontes: 51723ae60ff2d9cb:9, 51723ae60ff2d9cb:11, 51723ae60ff2d9cb:13, 51723ae60ff2d9cb:15</sub>\n\n---\n\n## Interpretação da Gasometria e Distúrbios Acidobásicos\n\nA gasometria arterial é o exame fundamental para avaliação do equilíbrio acidobásico. Os valores de referência para sangue arterial são: pH 7,35–7,45; pO₂ 80–100 mmHg; pCO₂ 35–45 mmHg; HCO₃⁻ 22–26 mEq/L. A interpretação sistemática segue uma sequência lógica: (1) o exame está normal? (2) qual o nome do distúrbio? (3) qual o distúrbio primário? (4) a compensação está adequada? O distúrbio primário é identificado pelo parâmetro que se move na mesma direção do pH — na acidose metabólica, pH ↓ e HCO₃⁻ ↓; na alcalose metabólica, pH ↑ e HCO₃⁻ ↑; na acidose respiratória, pH ↓ e pCO₂ ↑; na alcalose respiratória, pH ↑ e pCO₂ ↓.\n\nA avaliação da compensação é essencial para identificar distúrbios mistos. Para a acidose metabólica, a pCO₂ esperada = (1,5 × [HCO₃⁻]) + 8 ± 2 (fórmula de Winter). Para a alcalose metabólica, a pCO₂ esperada = 0,7 × [HCO₃⁻] + 20 mmHg ± 5. Para a acidose respiratória crônica, o HCO₃⁻ esperado = 24 + 4 × (0,1 × ΔpCO₂). Para a alcalose respiratória, agudamente ΔHCO₃⁻ = 3 a 5 mEq/L; cronicamente, ΔpaCO₂ de 1 mmHg corresponde a ΔHCO₃⁻ de 0,2 mEq/L. Se a compensação calculada não corresponder ao valor observado, há um distúrbio misto. Um pH normal com alterações em pCO₂ e HCO₃⁻ pode indicar dois distúrbios opostos se anulando mutuamente.\n\n### Pontos-chave\n\n- Valores de referência arteriais: pH 7,35–7,45; pO₂ 80–100 mmHg; pCO₂ 35–45 mmHg; HCO₃⁻ 22–26 mEq/L.\n- Distúrbio primário: o parâmetro (pCO₂ ou HCO₃⁻) que se move na mesma direção do pH identifica a origem do distúrbio.\n- Acidose metabólica: pH ↓, HCO₃⁻ ↓, pCO₂ ↓ (compensação respiratória por hiperventilação).\n- Alcalose metabólica: pH ↑, HCO₃⁻ ↑, pCO₂ ↑ (compensação por hipoventilação — limitada pela necessidade de oxigenação).\n- Acidose respiratória: pH ↓, pCO₂ ↑, HCO₃⁻ ↑ (compensação renal retenção de HCO₃⁻).\n- Alcalose respiratória: pH ↑, pCO₂ ↓, HCO₃⁻ ↓ (compensação renal excreção de HCO₃⁻).\n- Fórmula de Winter (acidose metabólica): pCO₂ esperada = (1,5 × [HCO₃⁻]) + 8 ± 2.\n- Alcalose metabólica: pCO₂ esperada = 0,7 × [HCO₃⁻] + 20 mmHg ± 5.\n- Acidose respiratória crônica: HCO₃⁻ esperado = 24 + 4 × (0,1 × ΔpCO₂).\n- pH normal com pCO₂ e HCO₃⁻ alterados em direções opostas sugere distúrbio misto com efeitos que se anulam.\n\n### Comparação\n\n| Distúrbio | pH | pCO₂ | HCO₃⁻ | Compensação Esperada |\n|---|---|---|---|---|\n| Acidose Metabólica | ↓ | ↓ | ↓ | pCO₂ = (1,5 × HCO₃⁻) + 8 ± 2 |\n| Alcalose Metabólica | ↑ | ↑ | ↑ | pCO₂ = 0,7 × HCO₃⁻ + 20 ± 5 |\n| Acidose Respiratória | ↓ | ↑ | ↑ | HCO₃⁻ = 24 + 4 × (0,1 × ΔpCO₂) |\n| Alcalose Respiratória | ↑ | ↓ | ↓ | ΔHCO₃⁻ = 0,2 mEq/L por 1 mmHg ΔpCO₂ (crônica) |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Gasometria arterial] --> B{pH normal 7,35-7,45?}\n B -->|Sim| C{pCO₂ e HCO₃⁻ normais?}\n C -->|Sim| D[Gasometria normal]\n C -->|Não| E[Distúrbio misto com compensação completa]\n B -->|Não| F{pH < 7,35?}\n F -->|Sim - Acidose| G{HCO₃⁻ baixo?}\n G -->|Sim| H[Acidose Metabólica]\n H --> I[Calcular pCO₂ esperada: 1,5×HCO₃⁻+8±2]\n G -->|Não - pCO₂ alto| J[Acidose Respiratória]\n J --> K[Calcular HCO₃⁻ esperado: 24+4×0,1×ΔpCO₂]\n F -->|Não - Alcalose| L{HCO₃⁻ alto?}\n L -->|Sim| M[Alcalose Metabólica]\n M --> N[Calcular pCO₂ esperada: 0,7×HCO₃⁻+20±5]\n L -->|Não - pCO₂ baixo| O[Alcalose Respiratória]\n O --> P[ΔHCO₃⁻=0,2 mEq/L por 1mmHg ΔpCO₂ crônica]\n I --> Q{pCO₂ real = esperada?}\n Q -->|Sim| R[Distúrbio simples compensado]\n Q -->|Não| S[Distúrbio misto]\n```\n\n> **Mnemônico:** PRIMA: Primário = mesmo lado do pH\n- P: pH define a direção\n- R: Respiratório → pCO₂ é o culpado\n- I: Identifique o parâmetro primário\n- M: Metabólico → HCO₃⁻ é o culpado\n- A: Avalie a compensação com a fórmula\n\n<sub>Fontes: 51723ae60ff2d9cb:16, 51723ae60ff2d9cb:17, 51723ae60ff2d9cb:18, 51723ae60ff2d9cb:19, 51723ae60ff2d9cb:20, 51723ae60ff2d9cb:21</sub>\n\n---\n\n## Proteostase: Síntese, Dobramento, Modificações Pós-Translacionais e Degradação de Proteínas\n\nA proteostase (homeostase proteica) refere-se à rede dinâmica de processos celulares que mantém a saúde e o equilíbrio do proteoma, regulando a síntese, o dobramento, o transporte e a degradação de proteínas. Uma única célula humana expressa aproximadamente 10.000 a 13.000 proteínas diferentes, cada uma devendo ser dobrada com precisão, entregue corretamente ao seu destino e mantida em estado funcional. A síntese proteica pelos ribossomos citoplasmáticos ocorre a uma taxa média de cinco a seis aminoácidos por segundo, gerando mais de um bilhão de moléculas de proteína por célula humana. No entanto, a tradução é inerentemente propensa a erros, com uma taxa de incorporação incorreta de aproximadamente um em cada 10.000 aminoácidos, tornando necessário um Controle de Qualidade Associado ao Ribossomo (RQC). Quando esse mecanismo não é suficiente, a célula pode reduzir a taxa geral de síntese proteica por meio da fosforilação do fator de iniciação da tradução eIF2α, mediada pela quinase PERK.\n\nAs chaperonas são proteínas fundamentais no dobramento correto das cadeias polipeptídicas. Elas se ligam e estabilizam polipeptídeos não dobrados ou parcialmente dobrados, prevenindo o dobramento incorreto ou a agregação em complexos insolúveis. Após o dobramento, as proteínas podem sofrer modificações pós-translacionais (clivagem, glicosilação, miristoilação, fosforilação) que modulam sua função, localização e estabilidade. A degradação de proteínas mal dobradas, danificadas ou desnecessárias é realizada por dois sistemas principais: o Sistema Ubiquitina-Proteassoma (UPS), responsável por aproximadamente 80% de toda a renovação de proteínas, e a Via Autofagia-Lisossoma (ALP), que remove proteínas de longa duração, agregados proteicos e organelas danificadas. A ruptura da proteostase leva ao acúmulo de proteínas mal dobradas e está implicada em doenças neurodegenerativas (Alzheimer, Parkinson, Huntington), doenças cardíacas, câncer e distúrbios metabólicos.\n\n### Pontos-chave\n\n- A proteostase regula síntese, dobramento, transporte e degradação de proteínas; uma célula humana expressa aproximadamente 10.000 a 13.000 proteínas diferentes.\n- A síntese proteica ocorre a uma taxa média de cinco a seis aminoácidos por segundo, gerando mais de um bilhão de moléculas de proteína por célula humana.\n- Taxa de erro da tradução: aproximadamente um em cada 10.000 aminoácidos — exige Controle de Qualidade Associado ao Ribossomo (RQC).\n- A PERK fosforila eIF2α para reduzir a taxa geral de síntese proteica durante estresse do retículo endoplasmático (Resposta de Proteína Desdobrada).\n- Chaperonas ligam-se a polipeptídeos não dobrados ou parcialmente dobrados, impedindo dobramento incorreto ou agregação.\n- Principais famílias de chaperonas: Hsp60 (chaperoninas — ambiente isolado para dobramento), Hsp70/Hsp40 (dependentes de ATP, ligam regiões hidrofóbicas), Hsp90 (maturação final de proteínas clientes como receptores de hormônios esteroides e cinases), sHSPs (holdases independentes de ATP), Hsp100 (desagregadores).\n- Modificações pós-translacionais mais comuns: clivagem, glicosilação, miristoilação (adição de ácido mirístico de 14 carbonos) e fosforilação.\n- UPS: principal via de degradação seletiva, responsável por aproximadamente 80% de toda a renovação de proteínas; a ubiquitina (76 resíduos) marca proteínas para degradação pelo proteassoma 26S.\n- Enzimas desubiquitinantes (DUBs) removem cadeias de ubiquitina, prevenindo degradação inadequada de proteínas.\n- Via Autofagia-Lisossoma (ALP): macroautofagia envolve formação do fagóforo → autofagossomo → fusão com lisossomo → autolisossomo → degradação e reciclagem.\n- Ruptura da proteostase → acúmulo de proteínas mal dobradas → doenças de Alzheimer, Parkinson e Huntington, entre outras.\n\n### Comparação\n\n| Família de Chaperona | Dependência de ATP | Mecanismo Principal | Exemplos de Substratos/Função |\n|---|---|---|---|\n| Hsp60 (Chaperoninas) | Sim | Formam anéis duplos que isolam o ambiente de dobramento | Proteínas nascentes no citosol e mitocôndria |\n| Hsp70 / Hsp40 | Sim (Hsp70) | Ligam regiões hidrofóbicas expostas; Hsp40 regula ciclo ATPase | Proteínas desdobradas em geral; prevenção de agregação |\n| Hsp90 | Sim | Maturação final e estabilização de proteínas 'clientes' | Receptores de hormônios esteroides, cinases de sinalização |\n| sHSPs (Small HSPs) | Não | 'Holdases': mantêm proteínas não nativas competentes para redobramento | Proteínas sob estresse; entregam substrato a chaperonas ATP-dependentes |\n| Hsp100 | Sim | 'Desagregadores': revertam agregados a monômeros solúveis | Agregados proteicos aberrantes |\n\n| Sistema de Degradação | Alvo Principal | Mecanismo | Proporção da Renovação |\n|---|---|---|---|\n| UPS (Ubiquitina-Proteassoma) | Proteínas regulatórias de vida curta, proteínas mal dobradas | Ubiquitinação → proteassoma 26S | ~80% |\n| ALP (Autofagia-Lisossoma) | Proteínas de longa duração, agregados, organelas danificadas | Fagóforo → autofagossomo → autolisossomo | Restante |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Síntese Proteica no Ribossomo\n5-6 aa/segundo] --> B{Erro de incorporação?\n~1:10.000 aa}\n B -->|Não| C[Cadeia polipeptídica nascente]\n B -->|Sim| D[RQC: Controle de Qualidade\nAssociado ao Ribossomo]\n D -->|Estresse severo| E[PERK → fosforila eIF2α\n→ ↓ síntese proteica global]\n C --> F[Chaperonas se ligam ao polipeptídeo\n(Hsp70, Hsp40, Hsp60)]\n F --> G{Dobramento correto?}\n G -->|Sim| H[Modificações Pós-Translacionais\nClivagem / Glicosilação /\nMiristoilação / Fosforilação]\n H --> I[Proteína funcional no destino correto]\n G -->|Não - misfolding| J{Redobramento possível?}\n J -->|Sim| F\n J -->|Não| K{Via de degradação}\n K --> L[UPS: Ubiquitinação\n→ Proteassoma 26S\n~80% da renovação]\n K --> M[ALP: Autofagia\nFagóforo → Autofagossomo\n→ Autolisossomo]\n L --> N[Aminoácidos reciclados]\n M --> N\n I -->|Envelhecimento/dano| K\n```\n\n> **Mnemônico:** SCDMD — 'Sempre Cuidar Do Meu Destino':\n- S: Síntese (ribossomo, 5-6 aa/s)\n- C: Chaperonas (dobramento correto)\n- D: Degradação (UPS ~80% + ALP)\n- M: Modificações pós-translacionais (clivagem, glicosilação, miristoilação, fosforilação)\n- D: Doenças (Alzheimer, Parkinson, Huntington) quando a proteostase falha\n\n<sub>Fontes: b678350d1f36470c:0, b678350d1f36470c:1, b678350d1f36470c:7, b678350d1f36470c:8, b678350d1f36470c:9, b678350d1f36470c:10</sub>\n\n---\n\n## Proteostase: Conceito e Rede de Proteostase\n\nA proteostase (homeostase proteica) refere-se à rede dinâmica de processos celulares que mantém a saúde e o equilíbrio do proteoma, regulando a síntese, o dobramento, o transporte e a degradação de proteínas. Uma célula humana expressa aproximadamente 10.000 a 13.000 proteínas diferentes, cada uma devendo ser dobrada com precisão, entregue corretamente ao seu destino e mantida em estado funcional. A Rede de Proteostase (RP) compreende mais de 2.000 componentes moleculares que, coletivamente, garantem que todas as proteínas dentro de uma célula viva permaneçam corretamente dobradas, localizadas e funcionais.\n\nO dobramento proteico intracelular depende criticamente das chaperonas moleculares. Proteínas chamadas chaperonas se ligam a essas cadeias prevenindo um dobramento inadequado ou a agregação de aminoácidos terminais antes que a síntese da cadeia esteja completa. Na ausência das chaperonas, as cadeias polipeptídicas não dobradas ou parcialmente dobradas seriam instáveis dentro da célula, frequentemente dobrando-se de forma incorreta ou agregando-se em complexos insolúveis. A síntese proteica ocorre a uma taxa média de cinco a seis aminoácidos por segundo, gerando mais de um bilhão de moléculas de proteína por célula humana, com uma taxa de incorporação incorreta de aproximadamente um em cada 10.000 aminoácidos — justificando a necessidade de um robusto Controle de Qualidade Associado ao Ribossomo (RQC).\n\nQuando a RP falha, ocorre acúmulo de proteínas mal dobradas propensas a formar agregados tóxicos. A falha da RP é uma característica patogênica central de um amplo espectro de doenças humanas, principalmente distúrbios neurodegenerativos relacionados à idade, como as doenças de Alzheimer, Parkinson e Huntington, além de doenças cardíacas, câncer e distúrbios metabólicos.\n\n### Pontos-chave\n\n- A proteostase regula síntese, dobramento, transporte e degradação de proteínas em uma única rede integrada.\n- Existem aproximadamente 10.000 a 13.000 proteínas diferentes expressas em uma única célula humana, cada uma devendo ser dobrada com precisão.\n- A Rede de Proteostase (RP) compreende mais de 2.000 componentes moleculares.\n- A taxa de síntese proteica é de cinco a seis aminoácidos por segundo, com taxa de erro de ~1 em 10.000 aminoácidos.\n- Chaperonas estabilizam polipeptídeos não dobrados, impedindo dobramento incorreto ou agregação.\n- A translocação das cadeias polipeptídicas para dentro do retículo endoplasmático é o primeiro passo no processo de ajuste da conformação em células eucarióticas.\n- A falha da RP está associada a doenças neurodegenerativas (Alzheimer, Parkinson, Huntington), doenças cardíacas, câncer e distúrbios metabólicos.\n- O Controle de Qualidade Associado ao Ribossomo (RQC) é necessário dado o número elevado de proteínas sintetizadas e a taxa de erro inerente à tradução.\n\n### Comparação\n\n| Família de Chaperona | Características Principais | Dependência de ATP |\n|---|---|---|\n| Hsp60 (Chaperoninas) | Formam grandes estruturas de anel duplo; fornecem ambiente isolado para dobramento | Sim |\n| Hsp70 / Hsp40 | Hsp70 liga-se a regiões hidrofóbicas expostas; Hsp40 atua como co-chaperona regulando o ciclo ATPase | Sim |\n| Hsp90 | Homodimérica; maturação final de proteínas 'clientes' como receptores de hormônios esteroides e cinases | Sim |\n| Small HSPs (sHSPs) | Formam grandes oligômeros; atuam como 'holdases' evitando agregação irreversível | Não |\n| Hsp100 | Funcionam como 'desagregadores'; revertem agregados proteicos aberrantes a monômeros solúveis | Sim |\n\n<sub>Fontes: 99aef871eede0526:1, 99aef871eede0526:7, 99aef871eede0526:8</sub>\n\n---\n\n## Sistemas de Degradação Proteica: UPS e Via Autofagia-Lisossoma\n\nA remoção de proteínas mal dobradas, danificadas ou desnecessárias é tão crítica quanto sua síntese e dobramento. A Rede de Proteostase emprega dois sistemas principais de degradação responsáveis pela grande maioria da renovação de proteínas celulares: o Sistema Ubiquitina-Proteassoma (UPS) e a Via Autofagia-Lisossoma (ALP). O UPS é a principal via de degradação seletiva, responsável por aproximadamente 80% de toda a renovação de proteínas, tendo como alvo principal proteínas reguladoras de vida curta e proteínas mal dobradas de todos os compartimentos celulares.\n\nNo UPS, a ubiquitina — uma pequena proteína reguladora de 76 resíduos expressa universalmente em organismos eucarióticos — é ligada covalentemente à proteína-alvo em um processo de modificação pós-translacional chamado ubiquitinação, marcando-a para degradação pelo proteassoma 26S. O proteassoma 26S é um grande complexo proteolítico com múltiplas subunidades que reconhece e degrada a proteína ubiquitinada, liberando os monômeros de ubiquitina para reciclagem. Enzimas desubiquitinantes (DUBs) podem remover cadeias de ubiquitina, fornecendo um mecanismo de regulação e prevenindo a degradação inadequada de proteínas.\n\nA Via Autofagia-Lisossoma (ALP), especificamente a macroautofagia, é responsável pela remoção em massa de proteínas de longa duração, agregados proteicos e organelas danificadas inteiras. O processo envolve três etapas sequenciais: (1) sequestro — formação do fagóforo, uma estrutura envolvente de dupla membrana que captura constituintes citoplasmáticos; (2) formação do autofagossomo — o fagóforo se alonga e se fecha formando um autofagossomo maduro; (3) fusão e degradação — o autofagossomo se funde com um lisossomo para formar um autolisossomo, onde enzimas hidrolíticas degradam o conteúdo, e as macromoléculas resultantes são liberadas de volta no citosol para reciclagem.\n\n### Pontos-chave\n\n- O UPS é responsável por aproximadamente 80% de toda a renovação de proteínas celulares.\n- A ubiquitina é uma pequena proteína de 76 resíduos expressa universalmente em eucarióticos.\n- A ubiquitinação marca proteínas para degradação pelo proteassoma 26S.\n- Os monômeros de ubiquitina são liberados e reciclados após a degradação proteossômica.\n- Enzimas desubiquitinantes (DUBs) removem cadeias de ubiquitina, prevenindo degradação inadequada.\n- A macroautofagia remove proteínas de longa duração, agregados proteicos e organelas danificadas inteiras.\n- As três etapas da macroautofagia são: sequestro (fagóforo) → formação do autofagossomo → fusão com lisossomo e degradação.\n- O comprometimento do UPS e da via autofágica-lisossomal cria um ciclo vicioso: mais proteínas mal dobradas → mais estresse do RE → exaustão da UPR → mais agregação.\n\n### Comparação\n\n| Característica | Sistema Ubiquitina-Proteassoma (UPS) | Via Autofagia-Lisossoma (ALP) |\n|---|---|---|\n| Principal substrato | Proteínas de vida curta e proteínas mal dobradas | Proteínas de longa duração, agregados e organelas danificadas |\n| Proporção da renovação proteica | ~80% | Complementar ao UPS |\n| Mecanismo de marcação | Ubiquitinação (modificação pós-translacional) | Sequestro por fagóforo/autofagossomo |\n| Compartimento de degradação | Proteassoma 26S (citosol/núcleo) | Autolisossomo (fusão autofagossomo + lisossomo) |\n| Regulação reversa | Enzimas desubiquitinantes (DUBs) | Não descrita no texto |\n| Reciclagem | Monômeros de ubiquitina reciclados | Macromoléculas liberadas no citosol |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Proteína mal dobrada / danificada] --> B{Via de degradação}\n B --> C[Sistema Ubiquitina-Proteassoma - UPS]\n B --> D[Via Autofagia-Lisossoma - ALP]\n C --> E[Ubiquitinação da proteína-alvo]\n E --> F[Reconhecimento pelo Proteassoma 26S]\n F --> G[Degradação proteolítica]\n G --> H[Ubiquitina reciclada]\n D --> I[Formação do Fagóforo - dupla membrana]\n I --> J[Formação do Autofagossomo]\n J --> K[Fusão com Lisossomo → Autolisossomo]\n K --> L[Degradação por enzimas hidrolíticas]\n L --> M[Macromoléculas liberadas no citosol para reciclagem]\n```\n\n<sub>Fontes: 99aef871eede0526:8, 99aef871eede0526:9</sub>\n\n---\n\n## Respostas ao Estresse Celular: HSR, UPR e ISR\n\nQuando a capacidade da Rede de Proteostase é sobrecarregada pelo estresse celular — como choque térmico, estresse oxidativo ou acúmulo de proteínas mal dobradas — as células ativam vias de sinalização conservadas. Essas respostas ao estresse visam restaurar a homeostase atenuando a síntese de proteínas e, simultaneamente, aumentando a expressão de chaperonas e da maquinaria de degradação. Se o dano for muito grave, essas mesmas vias podem mudar de direção para iniciar a morte celular programada. As três principais respostas são: a Resposta de Choque Térmico (HSR), a Resposta a Proteínas Mal Enoveladas (UPR) e a Resposta Integrada ao Estresse (ISR).\n\nA HSR é um programa transcricional antigo e altamente conservado que resulta na síntese imediata de genes citoprotetores na presença de estresse térmico e outros estresses ambientais. O sensor central é o Fator de Choque Térmico 1 (HSF1), que, liberado de seu complexo inibitório com chaperonas, trimeriza e regula positivamente a transcrição das Proteínas de Choque Térmico (HSPs). A UPR é ativada pelo acúmulo de proteínas mal enoveladas no Retículo Endoplasmático (RE), sendo regulada pela chaperona mestra BiP/GRP78 e seus três sensores: IRE1α, PERK e ATF6. A resposta tríplice da UPR inclui: (1) atenuação geral da tradução, (2) regulação positiva de chaperonas do RE e componentes do ERAD, e (3) aumento da biogênese do RE. Se o estresse do RE for prolongado e a homeostase não puder ser restaurada, a UPR ativa a morte celular programada.\n\nA ISR é uma via celular que mantém a homeostase, reduzindo a síntese proteica geral e aumentando a expressão de proteínas específicas em resposta a diversos estresses. Trata-se de um mecanismo conservado que envolve quatro quinases sensoriais de estresse (PERK, GCN2, PKR e HRI) que convergem para fosforilar um único sítio no fator de iniciação eucariótico 2 (eIF2α), o que reprime a síntese proteica e altera a expressão gênica. A fosforilação do eIF2α resulta em inibição global da síntese proteica, mas permite a tradução seletiva de mRNAs de resposta ao estresse.\n\n### Pontos-chave\n\n- Três respostas ao estresse principais: HSR (citosol), UPR (retículo endoplasmático) e ISR (múltiplos compartimentos).\n- Na HSR, o HSF1 é liberado de seu complexo inibitório com chaperonas, trimeriza e ativa a transcrição de HSPs.\n- A UPR é ativada pelo acúmulo de proteínas mal enoveladas no RE; a chaperona mestra BiP/GRP78 regula os três sensores: IRE1α, PERK e ATF6.\n- A UPR tem resposta tríplice: (1) atenuação da tradução, (2) aumento de chaperonas/ERAD, (3) expansão da biogênese do RE.\n- Se o estresse do RE for prolongado e a homeostase não puder ser restaurada, a UPR ativa a morte celular programada.\n- A ISR envolve quatro quinases (PERK, GCN2, PKR, HRI) que convergem na fosforilação do eIF2α.\n- A fosforilação do eIF2α causa inibição global da síntese proteica, mas permite tradução seletiva de mRNAs de resposta ao estresse.\n- A PERK é uma quinase-chave ativada durante a UPR que fosforila o eIF2α, conectando a UPR à ISR.\n- Estresses que ativam a ISR incluem: estresse do RE, privação de aminoácidos, infecção viral e deficiência de heme.\n\n### Comparação\n\n| Característica | HSR | UPR | ISR |\n|---|---|---|---|\n| Estímulo desencadeante | Enovelamento incorreto de proteínas citosólicas (ex.: estresse térmico) | Acúmulo de proteínas mal enoveladas no RE | Variedade de estresses: RE, privação de aminoácidos, infecção viral, deficiência de heme |\n| Sensores/Mediadores principais | HSF1, HSP70, HSP90 | IRE1α, PERK, ATF6 (regulados por BiP/GRP78) | PERK, GCN2, PKR, HRI |\n| Ponto de convergência | Trimerização do HSF1 → transcrição de HSPs | Ativação tríplice: tradução ↓, chaperonas ↑, biogênese RE ↑ | Fosforilação do eIF2α |\n| Desfecho adaptativo | Aumento da capacidade de enovelamento (HSPs) | Restauração da homeostase do RE | Inibição global da síntese + tradução seletiva de mRNAs de estresse |\n| Desfecho maladaptativo | Não descrito no texto | Apoptose se estresse persistir | Não descrito no texto |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Estresse Celular] --> B{Tipo de estresse}\n B -->|Proteínas citosólicas mal dobradas| C[HSR]\n B -->|Proteínas mal dobradas no RE| D[UPR]\n B -->|RE / privação AA / vírus / heme| E[ISR]\n C --> F[HSF1 liberado de chaperonas]\n F --> G[HSF1 trimeriza]\n G --> H[Transcrição de HSPs ↑]\n D --> I[BiP/GRP78 libera IRE1α, PERK, ATF6]\n I --> J1[Atenuação da tradução]\n I --> J2[Chaperonas RE e ERAD ↑]\n I --> J3[Biogênese do RE ↑]\n J1 & J2 & J3 --> K{Homeostase restaurada?}\n K -->|Sim| L[Sobrevivência celular]\n K -->|Não - estresse prolongado| M[Apoptose]\n E --> N[PERK / GCN2 / PKR / HRI ativadas]\n N --> O[Fosforilação do eIF2α]\n O --> P[Inibição global da síntese proteica]\n O --> Q[Tradução seletiva de mRNAs de estresse]\n```\n\n> **Mnemônico:** Para lembrar as 4 quinases da ISR: **'P-G-P-H'** → **P**ERK, **G**CN2, **P**KR, **H**RI — 'Proteínas Geram Problemas Horríveis'\n\n<sub>Fontes: b678350d1f36470c:11, 99aef871eede0526:10, 99aef871eede0526:11, 99aef871eede0526:7</sub>\n\n---\n\n## Falha da Proteostase e Doenças Neurodegenerativas\n\nApesar da atividade da UPR e dos demais sistemas de proteostase, pode haver acúmulo de proteínas mal formadas quando a carga de proteínas mal dobradas excede a capacidade da UPR, quando ocorre ativação crônica e maladaptativa da UPR, quando há comprometimento dos sistemas UPS e autofágico-lisossomal, quando o envelhecimento reduz a eficiência da RP, ou quando se instala um ciclo de inflamação e estresse oxidativo. A toxicidade dos agregados decorre de dois mecanismos principais: (1) ruptura da membrana — intermediários oligoméricos solúveis podem formar estruturas semelhantes a poros nas membranas celulares, interrompendo a homeostase iônica e a integridade celular; e (2) interações aberrantes — agregados podem sequestrar proteínas celulares essenciais, incluindo chaperonas, fatores de transcrição e componentes do UPS e da maquinaria de transporte nucleocitoplasmático, criando um 'ciclo vicioso de retroalimentação positiva' que acelera o colapso da proteostase e leva à morte celular.\n\nA Doença de Alzheimer (DA) é o tipo predominante de distúrbio neurodegenerativo e é caracterizada pelo acúmulo extracelular de placas de β-amiloide (Aβ) e pela agregação intracelular de emaranhados neurofibrilares (NFTs), compostos por tau hiperfosforilada, além de perda de sinapses e neurônios e gliose. A APP (Proteína Precursora de Amiloide) é normalmente clivada pela alfa-secretase em pedaços solúveis e inofensivos; porém, na DA, a clivagem pelas enzimas beta e gama-secretase libera o fragmento Aβ no espaço extracelular. Inicialmente, pequenos grupos de Aβ se unem para formar oligômeros — agregados solúveis já considerados tóxicos para os neurônios — que com o tempo formam as placas amiloides insolúveis. A proteína tau, em neurônios saudáveis, estabiliza os microtúbulos do citoesqueleto; na DA, sofre hiperfosforilação excessiva, se desprende dos microtúbulos, torna-se 'pegajosa' e forma os emaranhados neurofibrilares intracelulares, bloqueando o transporte axonal e levando à morte neuronal.\n\nOutras doenças neurodegenerativas seguem padrão semelhante de falha da proteostase com proteínas agregadas específicas: α-sinucleína nos Corpos de Lewy da Doença de Parkinson; huntingtina mutante (mHtt) com trato de poliglutamina expandido na Doença de Huntington; TDP-43 ou SOD1 na ELA; e a proteína príon PrPSc nas doenças priônicas, onde a forma infecciosa serve de molde para o dobramento incorreto da PrPC normal.\n\n### Pontos-chave\n\n- Cinco mecanismos de falha da proteostase: sobrecarga de proteínas mal dobradas, UPR crônica maladaptativa, comprometimento do UPS/ALP, declínio da eficiência com envelhecimento e ciclo inflamação/estresse oxidativo.\n- Dois mecanismos de toxicidade dos agregados: ruptura de membrana (formação de poros por oligômeros) e interações aberrantes (sequestro de chaperonas, fatores de transcrição, UPS).\n- O sequestro de componentes da RP por agregados cria um 'ciclo vicioso de retroalimentação positiva' que acelera o colapso da proteostase.\n- Na DA: APP é clivada por beta e gama-secretase → fragmento Aβ → oligômeros tóxicos → placas amiloides extracelulares.\n- Na DA: tau hiperfosforilada se desprende dos microtúbulos → emaranhados neurofibrilares intracelulares → bloqueio do transporte axonal → morte neuronal.\n- O envelhecimento reduz a produção de chaperonas, a eficiência da ERAD e a sensibilidade da sinalização da UPR.\n- A presença de Aβ e tau ativa micróglia e astrócitos, aumentando a produção de citocinas inflamatórias e espécies reativas de oxigênio (ROS).\n- Oligômeros solúveis (tamanho aproximado de 20–60 moléculas) têm capacidade de romper a integridade de estruturas de membrana formando estruturas semelhantes a poros.\n\n### Comparação\n\n| Doença | Proteína Agregada | Achados Patológicos |\n|---|---|---|\n| Doença de Alzheimer (DA) | Amyloid-β (Aβ) e Tau | Placas extracelulares de Aβ e emaranhados neurofibrilares intracelulares de Tau hiperfosforilado |\n| Doença de Parkinson (DP) | α-Sinucleína | Corpos de Lewy intraneuronais |\n| Doença de Huntington (DH) | Huntingtin mutante (mHtt) | Corpos de inclusão nucleares e citoplasmáticos contendo mHtt com trato de poliglutamina expandido |\n| Esclerose Lateral Amiotrófica (ELA) | TDP-43 ou SOD1 | Agregados insolúveis em neurônios motores e células da glia |\n| Doenças Priônicas | Proteína Príon (PrP) | Agregados da forma infecciosa PrPSc, que serve de molde para dobramento incorreto da PrPC normal |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[APP - Proteína Precursora de Amiloide] --> B{Clivagem por secretase}\n B -->|Alfa-secretase - via normal| C[Fragmentos solúveis e inofensivos]\n B -->|Beta + Gama-secretase - via amiloidogênica| D[Fragmento Aβ liberado no espaço extracelular]\n D --> E[Oligômeros de Aβ - solúveis e tóxicos]\n E --> F[Placas amiloides insolúveis - extracelulares]\n G[Tau normal - estabiliza microtúbulos] --> H[Hiperfosforilação excessiva na DA]\n H --> I[Tau se desprende dos microtúbulos]\n I --> J[Microtúbulos se desintegram]\n I --> K[Tau hiperfosforilada forma oligômeros]\n K --> L[Emaranhados neurofibrilares intracelulares]\n L --> M[Bloqueio do transporte axonal]\n M --> N[Disfunção e morte neuronal]\n```\n\n> **Mnemônico:** Para lembrar as doenças e suas proteínas agregadas: **'A-PHAT'** → **A**lzheimer (Aβ+Tau), **P**arkinson (α-sinucleína), **H**untington (Htt mutante), **A**LS/ELA (TDP-43/SOD1), **T**ransmissíveis/Priônicas (PrPSc)\n\n<sub>Fontes: b678350d1f36470c:12, b678350d1f36470c:13, b678350d1f36470c:14, b678350d1f36470c:15, b678350d1f36470c:16, 99aef871eede0526:12, 99aef871eede0526:13, 99aef871eede0526:14, 99aef871eede0526:15, 99aef871eede0526:16</sub>\n\n---\n\n## Descoberta da Rapamicina e Identificação do mTOR\n\nA rapamicina foi isolada em 1972 pelo Dr. Surendra Sehgal a partir dos metabólitos da bactéria Streptomyces hygroscopicus, coletada em amostras de solo da Ilha de Páscoa (Rapa Nui). Inicialmente identificada por seus efeitos anti-inflamatórios e inibidores de tumores sólidos, a droga só teve seu desenvolvimento retomado na década de 1980, quando foi reconhecida como um potente inibidor da imunidade, com aprovação pelo FDA em 1999. O nome mTOR — mammalian Target Of Rapamycin — deriva diretamente da descoberta de que essa proteína quinase é o alvo intracelular do complexo FKBP12-rapamicina.\n\nA identificação do alvo molecular da rapamicina foi um marco científico de 1994. Dois grupos independentes — Brown et al. (Nature, 1994) e Sabatini et al. (Cell, 1994) — isolaram a proteína alvo, denominada respectivamente FRAP e RAFT1. O RAFT1 foi descrito como uma proteína de 269 kDa (2549 aminoácidos), 43% idêntica ao TOR2 e 39% idêntica ao TOR1 de Saccharomyces cerevisiae. Os genes TOR1 e TOR2 de levedura haviam sido identificados por mutações que conferiam resistência à rapamicina, e seus produtos apresentam homologia com o domínio catalítico da subunidade p110 da PI-3 quinase.\n\nA rapamicina e o FK506 ligam-se à mesma imunofilina intracelular, a FKBP12. Contudo, os complexos resultantes atuam em vias de sinalização distintas: o complexo FKBP12-FK506 inibe a calcineurina (fosfatase ativada por Ca²⁺), bloqueando a ativação inicial do linfócito T dependente de cálcio; já o complexo FKBP12-rapamicina bloqueia uma etapa posterior, Ca²⁺-independente, inibindo a transição G1→S do ciclo celular estimulada por IL-2, por meio da inibição do mTOR.\n\n### Pontos-chave\n\n- A rapamicina foi isolada de Streptomyces hygroscopicus coletado em Rapa Nui em 1972 por Surendra Sehgal.\n- O FDA aprovou o uso da rapamicina em 1999.\n- Rapamicina e FK506 ligam-se à mesma imunofilina, a FKBP12, mas formam complexos que inibem alvos distintos.\n- O complexo FKBP12-FK506 inibe a calcineurina (etapa Ca²⁺-dependente); o complexo FKBP12-rapamicina inibe o mTOR (etapa Ca²⁺-independente).\n- RAFT1/FRAP foi identificado em 1994 como o alvo direto do complexo FKBP12-rapamicina em mamíferos.\n- O RAFT1 codifica uma proteína de 269 kDa (2549 aminoácidos), homóloga aos produtos dos genes TOR1 e TOR2 de levedura.\n- Os genes TOR1 e TOR2 foram identificados em S. cerevisiae por mutações que conferem resistência à rapamicina.\n- A rapamicina inibe a transição G1→S do ciclo celular estimulada por IL-2 em linfócitos T.\n- Tanto ciclofilia quanto FKBP12 possuem atividade rotamase (peptidil-prolil cis-trans isomerase), mas essa atividade não explica os efeitos imunossupressores.\n\n### Comparação\n\n| Droga | Imunofilina | Alvo do Complexo | Mecanismo Principal | Etapa do Ciclo Celular |\n|---|---|---|---|---|\n| Ciclosporina A | Ciclofilia A | Calcineurina | Inibe fosfatase Ca²⁺-ativada | G1 (inicial, Ca²⁺-dependente) |\n| FK506 | FKBP12 | Calcineurina | Inibe fosfatase Ca²⁺-ativada | G1 (inicial, Ca²⁺-dependente) |\n| Rapamicina | FKBP12 | mTOR (FRAP/RAFT1) | Inibe quinase serina-treonina | G1→S (tardio, Ca²⁺-independente) |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Antígeno ativa Linfócito T] --> B[Sinalização via TCR]\n B --> C[Aumento de Ca²⁺ intracelular]\n C --> D[Ativação da Calcineurina]\n D --> E[Ativação de fatores de transcrição - NFAT]\n E --> F[Produção de IL-2]\n F --> G[Receptor de IL-2 sinaliza]\n G --> H[Ativação do mTOR]\n H --> I[Transição G1 → S do ciclo celular]\n I --> J[Proliferação de Linfócitos T]\n FK506:::drug -->|Inibe| D\n CsA:::drug -->|Inibe| D\n Rapamicina:::drug -->|Inibe via FKBP12| H\n classDef drug fill:#f96,stroke:#333\n```\n\n> **Mnemônico:** \"Rapa Nui Faz Bloqueio Tardio\": Rapamicina → FKBP12 → Bloqueia mTOR → Tardio (G1→S, Ca²⁺-independente)\n\n<sub>Fontes: 11da662c6545940f:0, 11da662c6545940f:1, 11da662c6545940f:2, 11da662c6545940f:3, 11da662c6545940f:4, 11da662c6545940f:5, 3a7a538a2984b6e2:2, 3a7a538a2984b6e2:3, 3a7a538a2984b6e2:4, 3a7a538a2984b6e2:5</sub>\n\n---\n\n## Quinases, Fosforilação Proteica e a mTOR como Enzima\n\nQuinases são enzimas que catalisam reações de fosforilação, transferindo um grupo fosfato (geralmente do ATP) para resíduos específicos de proteínas-alvo. A fosforilação ocorre predominantemente em resíduos de serina, treonina ou tirosina. O mTOR é classificado como uma quinase serina-treonina: fosforila outras proteínas especificamente nesses resíduos. Nas células, o mTOR não existe de forma livre, mas organizado em dois complexos funcionalmente distintos: mTORC1 e mTORC2.\n\nA fosforilação proteica é um mecanismo central de regulação celular por quatro razões principais: (1) pode ativar ou inativar a atividade catalítica de uma proteína, funcionando como um 'interruptor molecular'; (2) cria ou destrói sítios de ligação para outras proteínas que contêm fosfomotivos específicos, modulando a formação de complexos proteicos e cascatas de sinalização; (3) influencia a localização subcelular de proteínas, direcionando-as para organelas ou membranas específicas; e (4) afeta a estabilidade proteica, tornando-a mais ou menos suscetível à degradação.\n\nO mTORC1 fosforila substratos-chave que regulam o equilíbrio entre anabolismo e catabolismo celular. Entre seus substratos estão: S6K1 (fosforilada em Thr389, ativando a tradução de mRNAs via proteína ribossomal S6), ULK1 (fosforilada em Ser757, inibindo a autofagia ao bloquear a interação de ULK1 com AMPK) e TFEB (fosforilada em Ser211, inibindo sua translocação nuclear). Assim, quando o mTORC1 está ativo, a célula favorece crescimento e síntese macromolecular enquanto suprime a autofagia.\n\n### Pontos-chave\n\n- mTOR são quinases serina-treonina encontradas nas células nos complexos mTORC1 e mTORC2.\n- Quinases catalisam a transferência de fosfato para resíduos de serina, treonina ou tirosina.\n- A fosforilação muda a conformação proteica, funcionando como 'interruptor' de atividade (ativação ou inativação).\n- A fosforilação pode criar fosfomotivos que recrutam outras proteínas, amplificando cascatas de sinalização.\n- A fosforilação pode direcionar proteínas para compartimentos celulares específicos (localização celular).\n- A fosforilação pode aumentar ou diminuir a estabilidade/tempo de vida de uma proteína.\n- mTORC1 fosforila S6K1 (Thr389) → ativa tradução de mRNAs.\n- mTORC1 fosforila ULK1 (Ser757) → inibe autofagia.\n- mTORC1 fosforila TFEB (Ser211) → inibe translocação nuclear do TFEB.\n- O mTORC1 controla o equilíbrio entre anabolismo e catabolismo em resposta às condições ambientais.\n\n### Comparação\n\n| Substrato do mTORC1 | Resíduo Fosforilado | Efeito Funcional |\n|---|---|---|\n| S6K1 (Ribosomal S6 Kinase 1) | Thr389 | Ativa tradução de mRNAs via proteína ribossomal S6 |\n| ULK1 (Autophagy Activating Kinase 1) | Ser757 | Inibe autofagia (bloqueia interação ULK1-AMPK) |\n| TFEB (Transcription Factor EB) | Ser211 | Inibe translocação nuclear do TFEB |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Sinal extracelular - nutrientes, fatores de crescimento] --> B[Ativação do mTORC1]\n B --> C[Fosforila S6K1 em Thr389]\n B --> D[Fosforila ULK1 em Ser757]\n B --> E[Fosforila TFEB em Ser211]\n C --> F[Ativa tradução de mRNAs - síntese proteica]\n D --> G[Inibe autofagia]\n E --> H[Inibe translocação nuclear do TFEB]\n F --> I[Anabolismo / Proliferação Celular]\n G --> I\n H --> I\n```\n\n> **Mnemônico:** \"SUT Fosforila\": S6K1 (Thr389) → síntese; ULK1 (Ser757) → suprime autofagia; TFEB (Ser211) → trava nuclear\n\n<sub>Fontes: 11da662c6545940f:7, 11da662c6545940f:8, 11da662c6545940f:9, 3a7a538a2984b6e2:7, 3a7a538a2984b6e2:8, 3a7a538a2984b6e2:9</sub>\n\n---\n\n## mTOR, Metabolismo Celular e Aplicação Farmacológica da Rapamicina\n\nO mTORC1 desempenha papel central na regulação do metabolismo celular, coordenando processos anabólicos essenciais para o crescimento e a proliferação. Além de estimular a síntese proteica via S6K1, o mTORC1 promove a síntese de lipídeos por meio da ativação de SREBP (via mecanismo dependente de S6K1 e via fosforilação da Lipina1) e estimula a síntese de nucleotídeos: aumenta a expressão de MTHFD2 (componente do ciclo tetrahidrofolato mitocondrial, fornecendo unidades de carbono para síntese de purinas) e ativa a CAD (carbamoil-fosfato sintetase, componente crítico da via de síntese de novo de pirimidinas) por meio da S6K1. O mTORC1 também favorece o metabolismo glicolítico em detrimento da fosforilação oxidativa, aumentando a tradução do fator de transcrição HIF1α, que induz enzimas glicolíticas como a fosfofrutoquinase (PFK).\n\nAlém dos processos anabólicos, o mTORC1 suprime o catabolismo proteico, notadamente a autofagia. A ativação de ULK1 é uma etapa inicial crítica da autofagia; em condições de nutrição adequada, o mTORC1 fosforila ULK1 (Ser757), impedindo sua ativação pela AMPK e, consequentemente, bloqueando a formação do autofagossomo. Assim, o mTORC1 integra sinais ambientais para equilibrar anabolismo e catabolismo.\n\nA capacidade da rapamicina de inibir o mTOR torna-a um potencial agente terapêutico para condições em que a proliferação celular excessiva é problemática. No contexto cardiovascular, a aterosclerose é caracterizada pela formação de placa nas artérias, e sua complicação aguda — a ruptura da placa com trombose — leva ao infarto agudo do miocárdio. A angioplastia coronariana é o tratamento de revascularização, mas apresenta como limitação a reestenose, causada principalmente pela hiperplasia neointimal (proliferação de células musculares lisas) nos meses seguintes ao implante do stent. Como o mTOR controla a proliferação celular, a rapamicina (e seus análogos) foi incorporada em stents farmacológicos para inibir localmente essa proliferação e reduzir a reestenose.\n\n### Pontos-chave\n\n- mTORC1 controla o equilíbrio entre anabolismo e catabolismo em resposta às condições ambientais.\n- mTORC1 ativa SREBP (síntese de lipídeos/colesterol) via S6K1 e via fosforilação da Lipina1.\n- mTORC1 promove síntese de purinas (via MTHFD2/ATF4) e pirimidinas (via S6K1/CAD).\n- mTORC1 favorece glicólise sobre fosforilação oxidativa ao aumentar a tradução de HIF1α.\n- mTORC1 suprime autofagia fosforilando ULK1 em Ser757, impedindo sua ativação pela AMPK.\n- Rapamicina inibe mTOR e pode ser útil para regular processos de proliferação celular.\n- A reestenose após angioplastia é causada principalmente pela hiperplasia neointimal (proliferação de células musculares lisas).\n- A taxa de reestenose com balão sem stent é de 30–50%; com stent convencional (BMS), de 20–30%.\n- Stents farmacológicos com rapamicina (ou análogos) foram desenvolvidos para inibir a proliferação neointimal e reduzir a reestenose.\n- A ruptura da placa aterosclerótica com trombo oclusivo é o mecanismo do infarto agudo do miocárdio tipo 1.\n\n### Comparação\n\n| Técnica de Angioplastia | Taxa de Reestenose | Mecanismo Principal da Reestenose |\n|---|---|---|\n| Balão sem stent | 30–50% | Recolhimento elástico da artéria e remodelação negativa |\n| Stent convencional (BMS - metal puro) | 20–30% | Proliferação excessiva de tecido cicatricial (hiperplasia neointimal) |\n| Stent farmacológico (com rapamicina/análogos) | Reduzida | Inibição da proliferação de células musculares lisas via bloqueio do mTOR |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[mTORC1 Ativo] --> B[Síntese Proteica]\n A --> C[Síntese de Lipídeos - SREBP]\n A --> D[Síntese de Nucleotídeos]\n A --> E[Glicólise - HIF1α]\n A --> F[Inibição da Autofagia - fosforila ULK1]\n B & C & D & E --> G[Anabolismo / Crescimento Celular]\n F --> G\n H[Rapamicina] -->|Inibe via FKBP12| A\n H -->|Aplicação clínica| I[Stent Farmacológico]\n I --> J[Inibe Hiperplasia Neointimal]\n J --> K[Reduz Reestenose]\n```\n\n> **Mnemônico:** \"PLGNA\": Proteínas, Lipídeos, Glicólise, Nucleotídeos, Autofagia (suprimida) — os 5 processos regulados pelo mTORC1\n\n<sub>Fontes: 11da662c6545940f:8, 11da662c6545940f:9, 11da662c6545940f:10, 11da662c6545940f:11, 3a7a538a2984b6e2:8, 3a7a538a2984b6e2:9, 3a7a538a2984b6e2:10, 3a7a538a2984b6e2:11, 3a7a538a2984b6e2:12, 3a7a538a2984b6e2:14, 3a7a538a2984b6e2:15</sub>\n\n---\n\n## Transportadores de Glicose (GLUTs) e Papel da Insulina no Metabolismo\n\nA glicose é hidrofílica e não consegue atravessar a membrana plasmática composta por fosfolipídeos sem o auxílio de transportadores proteicos denominados GLUTs. Diferentes tecidos expressam diferentes isoformas de GLUT, cada uma com características cinéticas distintas que refletem as necessidades metabólicas do tecido. O GLUT2, presente principalmente no fígado e no pâncreas, possui alto Km (≈15-20 mM) e baixa afinidade, funcionando como um verdadeiro sensor de glicose: só 'entra em ação' quando há muita glicose circulante, como após refeições, ajudando as células β pancreáticas a ajustar a secreção de insulina. Já o GLUT3, presente nos neurônios, possui Km ≈ 1 mM e alta afinidade, garantindo captação eficiente mesmo quando a glicemia cai. O GLUT4, por sua vez, é sensível à insulina e ao exercício, presente no músculo esquelético e no tecido adiposo, e transloca-se para a superfície da célula para aumentar a captação de glicose em resposta a esses estímulos.\n\nA insulina, secretada pelas células β do pâncreas em resposta à elevação da glicemia, atua como uma 'chave' que destranca as células para que elas absorvam a glicose da corrente sanguínea. Suas ações metabólicas são amplas e coordenadas: no metabolismo de carboidratos, estimula a captação de glicose via GLUT4, promove a glicogênese (síntese de glicogênio no fígado e músculo) e inibe a gliconeogênese e a glicogenólise hepáticas. No metabolismo lipídico, estimula a lipogênese (conversão do excesso de glicose em ácidos graxos) e inibe a lipólise ao inibir a enzima lipase. No metabolismo proteico, aumenta a captação de aminoácidos e a síntese proteica, ao mesmo tempo que inibe a proteólise, preservando a massa muscular.\n\nA via de sinalização intracelular da insulina envolve a ativação do receptor de insulina (IR), fosforilação do substrato IRS-1, ativação da PI3K, geração de PIP3 e, em última instância, translocação do GLUT4 para a membrana plasmática. A ruptura em qualquer ponto dessa cascata — seja por fosforilação anômala de IRS-1 e IRS-2, redução da translocação de GLUT-4, inflamação crônica, lipotoxicidade, disfunção mitocondrial ou resistência hepática — resulta em resistência à insulina, mecanismo central do Diabetes Mellitus tipo 2.\n\n### Pontos-chave\n\n- GLUT2 (fígado/pâncreas): alto Km (~15-20 mM), baixa afinidade, independente de insulina, atua como sensor de glicose para as células β pancreáticas ajustarem a secreção de insulina.\n- GLUT3 (neurônios): baixo Km (~1 mM), alta afinidade, independente de insulina — garante suprimento cerebral mesmo com glicemia baixa.\n- GLUT4 (músculo esquelético e tecido adiposo): dependente de insulina e exercício; transloca-se para a superfície celular em resposta a esses estímulos.\n- A insulina inibe simultaneamente a gliconeogênese e a glicogenólise hepáticas, impedindo que o fígado libere mais glicose quando ela já está alta.\n- A insulina inibe a lipase, garantindo que o corpo armazene gordura em vez de liberá-la para uso como energia.\n- A via IR → IRS-1 → PI3K → PIP3 → GLUT4 é o eixo central da sinalização insulínica para captação de glicose.\n- Resistência à insulina envolve 8 mecanismos listados na fonte: alterações no receptor, defeitos nas vias de sinalização (IRS-1/2, GLUT-4), inflamação crônica, lipotoxicidade, disfunção mitocondrial, adipocinas, resistência hepática e alterações na microbiota.\n- O excesso de glicose não armazenado como glicogênio é convertido em ácidos graxos no fígado via lipogênese, formando triglicerídeos armazenados no tecido adiposo.\n\n### Comparação\n\n| Transportador | Tecido Principal | Km | Afinidade | Dependência de Insulina | Função Chave |\n|---|---|---|---|---|---|\n| GLUT2 | Fígado, Pâncreas | ~15-20 mM | Baixa | Independente | Sensor de glicose; transporte bidirecional |\n| GLUT3 | Cérebro (neurônios) | ~1 mM | Alta | Independente | Garantir captação neuronal mesmo com glicemia baixa |\n| GLUT4 | Músculo esquelético, Tecido adiposo | Baixo | Alta | Dependente | Captação de glicose estimulada por insulina e exercício |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Elevação da Glicemia] --> B[Células β do Pâncreas detectam via GLUT2]\n B --> C[Secreção de Insulina]\n C --> D[Insulina circula e se liga ao Receptor IR]\n D --> E[Fosforilação de IRS-1]\n E --> F[Ativação de PI3K → PIP3]\n F --> G[Translocação de GLUT4 para membrana]\n G --> H[Captação de Glicose: Músculo e Tecido Adiposo]\n D --> I[Fígado: Estímulo à Glicogênese]\n D --> J[Fígado: Inibição de Gliconeogênese e Glicogenólise]\n D --> K[Tecido Adiposo: Inibição da Lipólise]\n D --> L[Fígado: Estímulo à Lipogênese]\n D --> M[Músculo: Estímulo à Síntese Proteica]\n```\n\n> **Mnemônico:** Para lembrar as funções anabólicas da insulina — 'GLIP': Glicogênese (estimula), Lipogênese (estimula), Inibição da lipólise/glicogenólise/gliconeogênese, Proteossíntese (estimula)\n\n<sub>Fontes: ef24d71727f6543e:1, ef24d71727f6543e:2, 4c4bd25329b0e827:1, 4c4bd25329b0e827:2</sub>\n\n---\n\n## Diabetes Mellitus: Definição, Classificação, Diagnóstico e Fisiopatologia\n\nA Sociedade Brasileira de Diabetes (SBD) define diabetes mellitus como um conjunto de distúrbios metabólicos caracterizados pela hiperglicemia devido à produção inadequada de insulina pelo pâncreas ou à resistência à sua ação, resultando em problemas no metabolismo de carboidratos, gorduras e proteínas. O DM tipo 1 é uma condição autoimune em que o sistema imunológico ataca as células do pâncreas que produzem insulina, resultando na sua pouca ou nenhuma produção. Os fatores de risco incluem história familiar de autoimunidade, fatores genéticos (HLA-DR3, DR4) e infecções virais (ex.: coxsackie), com início geralmente antes dos 30 anos (pico entre 5-15 anos). O paciente é sempre dependente de insulina desde o diagnóstico. O DM tipo 2, por sua vez, é uma doença metabólica crônica caracterizada pela resistência à insulina ou por uma secreção insuficiente de insulina pelas células pancreáticas; os principais fatores de risco incluem excesso de peso, sedentarismo, maus hábitos alimentares e história familiar, com início geralmente após os 40 anos, embora cada vez mais comum em adolescentes e adultos jovens.\n\nO diagnóstico laboratorial do DM baseia-se em três critérios principais: glicemia de jejum >126 mg/dL (normal <100), glicemia ao acaso >200 mg/dL na presença de sintomas, ou hemoglobina glicada >6,5% (normal <5,7%). Os sinais e sintomas típicos de hiperglicemia incluem poliúria, polidipsia, polifagia, perda de peso involuntária e desidratação. Sintomas sugestivos incluem noctúria, visão turva, cansaço, infecções recorrentes (candidíase, periodontite), má cicatrização de feridas e albuminúria transitória.\n\nA fisiopatologia da resistência à insulina no DM tipo 2 é multifatorial e envolve oito mecanismos principais: alterações no receptor de insulina, defeitos nas vias de sinalização intracelular (fosforilação anômala de IRS-1 e IRS-2, redução da translocação de GLUT-4), inflamação crônica e citocinas pró-inflamatórias, lipotoxicidade e acúmulo de ácidos graxos livres, disfunção mitocondrial, adipocinas e desequilíbrio hormonal, resistência hepática à insulina e alterações na microbiota e barreira intestinal. A relação entre obesidade e DM tipo 2 é mediada em grande parte pela inflamação crônica do tecido adiposo expandido.\n\n### Pontos-chave\n\n- DM tipo 1: destruição autoimune das células beta → ausência de produção de insulina; sempre dependente de insulina desde o diagnóstico.\n- DM tipo 2: resistência periférica à insulina + disfunção progressiva das células beta; inicialmente não dependente de insulina.\n- Critério diagnóstico: glicemia de jejum >126 mg/dL OU glicemia ao acaso >200 mg/dL + sintomas OU HbA1c >6,5%.\n- Sintomas típicos ('4 Ps'): Poliúria, Polidipsia, Polifagia, Perda de peso involuntária.\n- Cetoacidose Diabética (CAD): complicação aguda grave do DM tipo 1, causada pela falta absoluta de insulina.\n- A resistência à insulina envolve fosforilação anômala de IRS-1 e IRS-2 e redução da translocação de GLUT-4.\n- Obesidade contribui para DM tipo 2 via inflamação crônica do tecido adiposo e liberação de citocinas pró-inflamatórias.\n- Fatores genéticos do DM tipo 1: HLA-DR3 e DR4 são os principais marcadores de suscetibilidade.\n\n### Comparação\n\n| Característica | DM Tipo 1 | DM Tipo 2 |\n|---|---|---|\n| Fisiopatologia | Destruição autoimune das células beta → ausência de produção de insulina | Resistência periférica à insulina + disfunção progressiva das células beta |\n| Idade de Início | Geralmente <30 anos, pico entre 5-15 anos | Geralmente >40 anos, mas cada vez mais comum em adolescentes e adultos jovens |\n| Fatores de Risco | História familiar de autoimunidade, HLA-DR3/DR4, infecções virais (ex.: coxsackie) | Obesidade, sedentarismo, síndrome metabólica, história familiar positiva |\n| Dependência de Insulina | Sempre dependente desde o diagnóstico | Inicialmente não dependente, mas pode precisar com evolução da doença |\n\n> **Mnemônico:** Sintomas típicos de hiperglicemia — '4P + D': Poliúria, Polidipsia,
