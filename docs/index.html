: "7589d7ff239bbacd"}, {"front": "A enzima {{c1::acetil-CoA carboxilase}} converte acetil-CoA em malonil-CoA usando CO₂ e ATP.", "back": "", "type": "cloze", "tags": ["bioquímica::síntese_de_ácidos_graxos", "exam::n1", "high_yield", "exam::n1"], "source_span": "CH3COC0A + C02+ ATP ^ (Acetil-CoA carboxilase) Malonil-CoA", "source_chunk_id": "8405ad39f361404f:7", "explanation": "Esta é a etapa regulatória comprometida da síntese de ácidos graxos.", "mnemonic": null, "verified": true, "card_id": "c3eea388cd228b80"}, {"front": "A enzima {{c1::anidrase carbônica}} catalisa a combinação de CO2 com H2O para formar H2CO3 nas células tubulares renais.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acido_basico::renal", "exam::n1", "high_yield", "exam::n1"], "source_span": "Sob a ação da enzima anidrase carbônica, o CO2 combina-se com H2O para formar H2CO3", "source_chunk_id": "51723ae60ff2d9cb:4", "explanation": null, "mnemonic": null, "verified": true, "card_id": "9b0def319028e2b1"}, {"front": "A enzima {{c1::anidrase carbônica}} catalisa a combinação de CO2 com H2O para formar H2CO3 nas células tubulares.", "back": "", "type": "cloze", "tags": ["bioquimica::acido_base::anidrase_carbonica", "exam::n1", "high_yield", "exam::n1"], "source_span": "Sob a ação da enzima anidrase carbônica, o CO2 combina-se com H2O para formar H2CO3", "source_chunk_id": "49ed06ff34adc89d:15", "explanation": null, "mnemonic": "AC = Ácido Carbônico (anidrase carbônica faz H2CO3)", "verified": false, "card_id": "b45cd45bbeb0735d"}], "has_guide": true, "has_cards": true, "card_count": 400, "apkg_url": "N1.apkg"}]};</script>
<script>
// Static data injected by build_static.py — null when running via FastAPI server
const __STATIC__ = window.__STATIC__ || null;
function _staticExam(name) { return __STATIC__?.exams?.find(e => e.name === name) || null; }

marked.setOptions({ breaks: true, gfm: true });

function slugify(text) {
  // Matches the LLM anchor format: non-(unicode-letter/digit/space/hyphen) → hyphen, spaces → hyphens, lowercase
  return text.toLowerCase()
    .replace(/[^\p{L}\p{N}\s-]/gu, '-')
    .replace(/\s+/g, '-');
}

function fixGuideAnchors() {
  const prose = document.querySelector('.prose');
  if (!prose) return;
  // Reassign heading IDs using the same slug algorithm as the LLM's TOC links
  prose.querySelectorAll('h1,h2,h3,h4,h5,h6').forEach(h => {
    h.id = slugify(h.textContent.trim());
  });
  // Smooth-scroll anchor clicks instead of jumping or doing nothing
  prose.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener('click', e => {
      const id = decodeURIComponent(a.getAttribute('href').slice(1));
      const target = document.getElementById(id) || document.getElementById(slugify(id));
      if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    });
  });
}

function initMermaid(light) {
  mermaid.initialize({
    startOnLoad: false,
    theme: light ? 'default' : 'dark',
    themeVariables: light
      ? { primaryColor: '#e0f2fe', primaryTextColor: '#0c4a6e', primaryBorderColor: '#7dd3fc',
          lineColor: '#0284c7', background: '#ffffff', mainBkg: '#f0f9ff' }
      : { primaryColor: '#1e3a5f', primaryTextColor: '#e2e8f0', primaryBorderColor: '#38bdf8',
          lineColor: '#38bdf8', background: '#0f172a', mainBkg: '#1e293b' },
    flowchart: { curve: 'basis', padding: 20 },
  });
}

function renderKaTeX() {
  document.querySelectorAll('.prose').forEach(el => {
    renderMathInElement(el, {
      delimiters: [
        { left: '$$', right: '$$', display: true  },
        { left: '$',  right: '$',  display: false },
      ],
      throwOnError: false,
      errorColor: '#ef4444',
    });
  });
}

async function renderMermaid() {
  await new Promise(r => setTimeout(r, 50)); // let Alpine flush x-html
  const blocks = document.querySelectorAll('pre code.language-mermaid');
  if (!blocks.length) return;
  blocks.forEach(code => {
    const pre = code.parentElement;
    const src = code.textContent;
    const wrap = document.createElement('div');
    wrap.className = 'mermaid-wrap';
    const diag = document.createElement('div');
    diag.className = 'mermaid';
    diag.textContent = src;
    const lbl = document.createElement('div');
    lbl.className = 'mermaid-label';
    lbl.textContent = 'diagrama gerado automaticamente';
    wrap.appendChild(diag);
    wrap.appendChild(lbl);
    pre.replaceWith(wrap);
  });
  await mermaid.run({ querySelector: '.mermaid' });
}

function app() {
  return {
    exams: [], exam: null, currentExam: '',
    activeTab: 'guide',
    light: localStorage.getItem('theme') === 'light',
    tabs: [
      { id: 'guide', label: 'Guia de Estudos' },
      { id: 'cards', label: 'Cartões' },
    ],
    guideHtml: '', guideLoading: true, guideError: '',
    cards: [], cardIndex: 0, cardFlipped: false, cardSearch: '',
    cardProgress: {}, statusMsg: '', apkgUrl: '#',

    get currentCard() { return this.filteredCards[this.cardIndex] || null; },
    get filteredCards() {
      if (!this.cardSearch) return this.cards;
      const q = this.cardSearch.toLowerCase();
      return this.cards.filter(c =>
        c.front.toLowerCase().includes(q) ||
        (c.back||'').toLowerCase().includes(q) ||
        c.tags.some(t => t.toLowerCase().includes(q))
      );
    },
    get sessionProgress() {
      const done = Object.values(this.cardProgress).filter(Boolean).length;
      return this.cards.length ? done / this.cards.length : 0;
    },

    toggleTheme() {
      this.light = !this.light;
      localStorage.setItem('theme', this.light ? 'light' : 'dark');
      initMermaid(this.light);
      renderMermaid();
      renderKaTeX();
    },

    async init() {
      initMermaid(this.light);
      if (__STATIC__) {
        this.exams = __STATIC__.exams.map(({ name, has_guide, has_plan, has_cards, card_count }) =>
          ({ name, has_guide, has_plan, has_cards, card_count }));
      } else {
        this.exams = await fetch('/api/exams').then(r => r.json());
      }
      if (this.exams.length) { this.currentExam = this.exams[0].name; await this.switchExam(); }
    },

    async switchExam() {
      this.exam = this.exams.find(e => e.name === this.currentExam) || null;
      this.guideLoading = true; this.guideError = '';
      this.planLoading  = true; this.planError  = '';
      this.cards = []; this.cardIndex = 0;
      this.cardProgress = JSON.parse(localStorage.getItem('cardProgress_' + this.currentExam) || '{}');
      const sd = _staticExam(this.currentExam);
      this.apkgUrl = sd?.apkg_url ?? '/api/exam/' + this.currentExam + '/apkg';
      await this.loadGuide();
      if (this.exam?.has_cards) await this.loadCards();
    },

    async loadGuide() {
      try {
        const sd = _staticExam(this.currentExam);
        const content = sd?.guide ?? await fetch('/api/exam/' + this.currentExam + '/guide')
          .then(r => { if (!r.ok) throw r; return r.json(); }).then(j => j.content);
        if (!content) { this.guideError = 'Guia ainda não gerado.'; return; }
        this.guideHtml = marked.parse(content);
        this.statusMsg = 'Guia carregado';
        this.$nextTick(() => { renderMermaid(); renderKaTeX(); fixGuideAnchors(); });
      } catch { this.guideError = 'Guia ainda não gerado.'; }
      finally { this.guideLoading = false; }
    },


    async loadCards() {
      try {
        const sd = _staticExam(this.currentExam);
        this.cards = sd?.cards ?? await fetch('/api/exam/' + this.currentExam + '/cards')
          .then(r => r.ok ? r.json() : { cards: [] }).then(j => j.cards || []);
      } catch { /* not available yet */ }
    },

    nextCard() { this.cardFlipped = false; this.cardIndex = Math.min(this.cardIndex + 1, this.filteredCards.length - 1); },
    prevCard()  { this.cardFlipped = false; this.cardIndex = Math.max(this.cardIndex - 1, 0); },

    markCard(rating) {
      if (!this.currentCard) return;
      this.cardProgress[this.currentCard.card_id] = rating;
      localStorage.setItem('cardProgress_' + this.currentExam, JSON.stringify(this.cardProgress));
      this.nextCard();
    },

    renderCardBack(card) {
      if (card.back) return card.back;
      // cloze: reveal all {{cN::answer::hint}} answers highlighted in context
      return card.front
        .replace(/\{\{c\d+::([^:}]+)(?:::[^}]*)?\}\}/g,
          '<span style="color:var(--accent);font-weight:700;border-bottom:2px solid var(--accent)">$1</span>');
    },

    shuffleCards()   { this.cards = [...this.cards].sort(() => Math.random() - .5); this.cardIndex = 0; this.cardFlipped = false; },
    resetProgress()  { this.cardProgress = {}; localStorage.removeItem('cardProgress_' + this.currentExam); },
  };
}

</script>
</body>
