pelos ácidos graxos saturados de cadeia longa: ácido mirístico (14:0) e ácido palmítico (16:0).\n- O ácido láurico é quimicamente um AGCM, mas biologicamente é absorvido e transportado por quilomícrons, como os ácidos graxos de cadeia longa.\n- Os AGCMs verdadeiros (caprílico 8:0 e cáprico 10:0) constituem apenas ~7% e ~5% do óleo de coco, respectivamente.\n- A beta-oxidação preferencial dos AGCMs não se aplica ao ácido láurico, invalidando o argumento metabólico favorável ao óleo de coco.\n- Ácido láurico, mirístico e palmítico juntos constituem cerca de 70% do óleo de coco e todos aumentam o LDL-colesterol significativamente em comparação com carboidratos.\n\n### Comparação\n\n| Ácido Graxo | Nomenclatura | Tipo | % no Óleo de Coco | Transporte Principal | Efeito no LDL |\n|---|---|---|---|---|---|\n| Ácido láurico | 12:0 | AGCM (comportamento de cadeia longa) | ~50% | Quilomícrons | Aumenta |\n| Ácido mirístico | 14:0 | Cadeia longa | ~parte dos 25% | Quilomícrons | Aumenta |\n| Ácido palmítico | 16:0 | Cadeia longa | ~parte dos 25% | Quilomícrons | Aumenta |\n| Ácido caprílico | 8:0 | AGCM verdadeiro | ~7% | Veia porta | Menor efeito |\n| Ácido cáprico | 10:0 | AGCM verdadeiro | ~5% | Veia porta | Menor efeito |\n\n> **Mnemônico:** \"Láurico Mente ser Médio\" — o ácido Láurico é classificado como de cadeia Média, mas Mente: age como cadeia longa (quilomícrons, síntese de colesterol).\n\n<sub>Fontes: 12c4b88e66b74748:1, 6dcde3af313878d0:11, 12c4b88e66b74748:7</sub>\n\n---\n\n## Efeitos do Óleo de Coco sobre Lipoproteínas e Risco Cardiovascular\n\nA meta-análise de Neelakantan et al. (Circulation, 2020), que incluiu 16 ensaios clínicos com 730 participantes, demonstrou que o consumo de óleo de coco aumenta significativamente o colesterol total em 14,69 mg/dL, o LDL-colesterol em 10,47 mg/dL e o HDL-colesterol em 4,00 mg/dL em comparação com óleos vegetais não tropicais. O efeito hipercolesterolêmico é atribuído ao alto teor de gordura saturada do óleo de coco: ácido láurico, mirístico e palmítico — que juntos constituem cerca de 70% do óleo — todos aumentam o LDL-colesterol significativamente. O aumento de 10,47 mg/dL no LDL-colesterol pode se traduzir em um aumento de 6% no risco de eventos vasculares maiores e de 5,4% no risco de mortalidade por doença coronariana.\n\nEmbora o óleo de coco também eleve o HDL-colesterol, esse aumento não implica necessariamente redução do risco cardiovascular. Estudos de randomização mendeliana demonstraram que HDL-colesterol mais elevado geneticamente não se associou à redução do risco de infarto do miocárdio. Além disso, tratamentos farmacológicos que elevam o HDL-colesterol, como niacina e fibratos, não reduziram o risco de mortalidade por doença coronariana, infarto ou AVC. Em contraste, o papel do LDL na promoção de DCV aterosclerótica foi consistentemente demonstrado por estudos de randomização mendeliana e diferentes tratamentos redutores de LDL.\n\nComparado ao óleo de palma (outro óleo tropical com ~50% de gordura saturada versus ~90% no óleo de coco), o óleo de coco aumentou o LDL-colesterol em 20,50 mg/dL adicionais. Não houve evidência de benefício do óleo de coco sobre óleos vegetais não tropicais para adiposidade, glicemia ou marcadores inflamatórios (PCR, glicose de jejum, peso corporal, circunferência abdominal e percentual de gordura corporal não foram significativamente alterados).\n\n### Pontos-chave\n\n- Óleo de coco aumenta LDL-colesterol em 10,47 mg/dL (IC 95%: 3,01–17,94) comparado a óleos vegetais não tropicais — aumento de ~8,6%.\n- Óleo de coco aumenta HDL-colesterol em 4,00 mg/dL (IC 95%: 2,26–5,73) — aumento de ~7,8%.\n- O aumento do HDL pelo óleo de coco NÃO se traduz em redução de risco cardiovascular: estudos de randomização mendeliana e ensaios farmacológicos (niacina, fibratos) não confirmam causalidade do HDL na proteção cardiovascular.\n- O papel causal do LDL na DCV aterosclerótica é consistentemente demonstrado por randomização mendeliana e tratamentos redutores de LDL.\n- Comparado ao óleo de palma, o óleo de coco aumenta adicionalmente o LDL em 20,50 mg/dL.\n- Não há evidência de benefício do óleo de coco sobre marcadores de inflamação (PCR), glicemia de jejum ou adiposidade.\n- O óleo de coco não deve ser considerado um óleo saudável para redução do risco de DCV; sua restrição é justificada pelo alto teor de gordura saturada.\n- Substituir 5% da energia de gordura saturada por gordura poli-insaturada associa-se a 13% e 10% de menor risco de doença coronariana em estudos epidemiológicos e ensaios clínicos, respectivamente.\n\n### Comparação\n\n| Desfecho | Óleo de Coco vs. Óleos Não Tropicais | Óleo de Coco vs. Óleo de Palma | Significância |\n|---|---|---|---|\n| Colesterol total | +14,69 mg/dL | +25,57 mg/dL | Significativo |\n| LDL-colesterol | +10,47 mg/dL | +20,50 mg/dL | Significativo |\n| HDL-colesterol | +4,00 mg/dL | +2,83 mg/dL | Significativo |\n| Triglicerídeos | +2,39 mg/dL (NS) | +3,99 mg/dL (NS) | Não significativo |\n| Peso corporal | -0,23 kg (NS) | — | Não significativo |\n| PCR | -0,001 mg/L (NS) | — | Não significativo |\n| Glicose de jejum | +0,12 mmol/L (NS) | — | Não significativo |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[\"Óleo de Coco (~90% gordura saturada)\"] --> B[\"↑ Ácido Láurico + Mirístico + Palmítico (~70% do óleo)\"]\n B --> C[\"↑ LDL-colesterol (+10,47 mg/dL)\"]\n B --> D[\"↑ HDL-colesterol (+4,00 mg/dL)\"]\n C --> E[\"↑ Risco de eventos vasculares maiores (~6%)\"]\n C --> F[\"↑ Risco de mortalidade por DAC (~5,4%)\"]\n D --> G[\"HDL elevado NÃO reduz risco cardiovascular\\n(randomização mendeliana + ensaios farmacológicos)\"]\n A --> H[\"Sem efeito significativo em:\\nPCR / Glicemia / Peso / Gordura corporal\"]\n```\n\n> **Mnemônico:** \"LDL Lesa, HDL Hesita\" — o LDL elevado pelo óleo de coco Lesa o sistema cardiovascular (causalidade comprovada), enquanto o HDL elevado Hesita em proteger (causalidade não comprovada).\n\n<sub>Fontes: 12c4b88e66b74748:0, 12c4b88e66b74748:1, 12c4b88e66b74748:5, 12c4b88e66b74748:7, 12c4b88e66b74748:9, 6dcde3af313878d0:11</sub>\n\n---\n\n## Metodologia da Meta-Análise: Revisão Sistemática e Qualidade dos Ensaios\n\nA revisão sistemática e meta-análise de Neelakantan et al. seguiu as diretrizes PRISMA (Preferred Reporting Items for Systematic Reviews and Meta-Analyses) e foi registrada no PROSPERO. Foram pesquisadas quatro bases de dados eletrônicas (PubMed, SCOPUS, Cochrane Central e Web of Science) até junho de 2019, sem restrição de idioma. De 873 artigos potencialmente relevantes, 16 artigos (17 ensaios, 730 participantes) preencheram os critérios de elegibilidade. Os estudos deveriam ser ensaios clínicos controlados com duração mínima de 2 semanas — período necessário para estabilização das concentrações lipídicas sanguíneas — comparando óleo de coco com outros óleos vegetais ou gorduras animais.\n\nA qualidade metodológica foi avaliada pela escala de Jadad (0 a 5 pontos), que pontua randomização, descrição válida da randomização, duplo-cegamento, descrição válida do duplo-cegamento e manejo de retiradas e abandonos. Cerca de metade dos ensaios incluídos (N=10) apresentou qualidade média a alta (escore Jadad 3–4). Os efeitos foram calculados como diferenças médias com IC 95%, utilizando modelos de efeitos aleatórios de DerSimonian e Laird, adequados à heterogeneidade metodológica esperada entre os estudos. A heterogeneidade foi quantificada pelo I², com valores de 25%, 50% e 75% indicando graus baixo, moderado e alto, respectivamente.\n\nLimitações importantes incluem: qualidade variável dos ensaios, heterogeneidade elevada nos resultados (I² até 91% para colesterol total), foco em desfechos intermediários (fatores de risco) e não em eventos cardiovasculares clínicos, ausência de estudos prospectivos avaliando incidência de DCV com óleo de coco, e possível viés de publicação para o efeito sobre HDL-colesterol (teste de Egger P=0,002). Análises de sensibilidade excluindo ensaios não randomizados ou de perda de peso não alteraram substancialmente os resultados principais.\n\n### Pontos-chave\n\n- Revisão seguiu diretrizes PRISMA; protocolo registrado no PROSPERO (CRD42018108499).\n- Critério mínimo de duração: 2 semanas, para permitir estabilização das concentrações lipídicas sanguíneas.\n- Escala de Jadad avalia: randomização, descrição da randomização, duplo-cegamento, descrição do cegamento e manejo de abandonos (0–5 pontos).\n- Modelo de efeitos aleatórios (DerSimonian e Laird) foi utilizado devido à heterogeneidade metodológica esperada entre os estudos.\n- I² de 25%, 50% e 75% indicam heterogeneidade baixa, moderada e alta, respectivamente.\n- Heterogeneidade foi elevada: I²=91% para colesterol total, I²=84% para LDL, I²=72% para HDL.\n- Possível viés de publicação identificado para HDL-colesterol (Egger P=0,002), mas não para LDL, colesterol total ou triglicerídeos.\n- Nenhum estudo prospectivo ou ensaio clínico avaliou o consumo de óleo de coco em relação à incidência de DCV.\n- Análises de sensibilidade (excluindo ensaios não randomizados e de intervenção para perda de peso) não alteraram substancialmente os resultados.\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[\"873 artigos identificados\"] --> B[\"Triagem por título e resumo\"]\n B --> C[\"Avaliação do texto completo\"]\n C --> D[\"16 artigos incluídos\\n(17 ensaios, 730 participantes)\"]\n D --> E[\"Critérios de elegibilidade:\\n- Ensaio clínico controlado\\n- Duração ≥ 2 semanas\\n- Comparador: óleo vegetal ou gordura animal\\n- Desfechos: lipídios, adiposidade, inflamação, glicemia\"]\n D --> F[\"Avaliação de qualidade: Escala de Jadad (0–5)\"]\n F --> G[\"Meta-análise: modelo de efeitos aleatórios\\n(DerSimonian e Laird)\"]\n G --> H[\"Heterogeneidade: Cochran Q + I²\"]\n G --> I[\"Viés de publicação: funnel plot + teste de Egger\"]\n```\n\n> **Mnemônico:** \"PRISMA-JAD\" — PRISMA (diretrizes da revisão) + JAD (escala de Jadad para qualidade dos ensaios): os dois pilares metodológicos da meta-análise.\n\n<sub>Fontes: 12c4b88e66b74748:0, 12c4b88e66b74748:1, 12c4b88e66b74748:2, 12c4b88e66b74748:3, 6dcde3af313878d0:11</sub>\n\n---\n\n## Enzimas: Estrutura, Cinética e Inibição\n\nAs enzimas são catalisadores biológicos que reduzem a energia de ativação das reações, permitindo que processos metabólicos ocorram em velocidade compatível com a vida. A especificidade enzimática resulta do arranjo tridimensional de resíduos de aminoácidos no sítio ativo, que reconhece o substrato pelo modelo 'chave-fechadura' — quando o substrato se encaixa, ocorre uma mudança conformacional que envelopa o substrato e o transforma em produto. Nem toda enzima funciona sozinha: cofatores (íons metálicos como Fe²⁺, Zn²⁺, Mg²⁺) e coenzimas (moléculas orgânicas derivadas de vitaminas) são essenciais para a atividade catalítica de muitas enzimas, e o grupo prostético é uma porção não proteica covalentemente ligada à proteína, como o grupo heme na hemoglobina.\n\nA velocidade de uma reação enzimática é influenciada por três fatores principais: temperatura (ótima entre 35–40°C, com desnaturação em temperaturas mais altas), pH (cada enzima tem um pH ótimo, e valores extremos causam desnaturação) e concentração do substrato (a velocidade aumenta proporcionalmente até atingir um platô — Vmáx — quando todos os sítios ativos estão ocupados). O parâmetro Km representa a concentração de substrato na qual a velocidade é igual à Vmáx/2; quanto menor o Km, maior a afinidade da enzima pelo substrato. Enzimas alostéricas são reguladas por efetores positivos ou negativos que se ligam fora do sítio ativo, funcionando como mecanismos de feedback metabólico.\n\nOs inibidores enzimáticos são fundamentais na farmacologia. Os inibidores competitivos disputam o sítio ativo com o substrato (ex.: inibidores da ECA na hipertensão; etanol competindo com metanol na álcool desidrogenase). Os não competitivos ligam-se a outro sítio, sem competir com o substrato. Os acompetitivos só se ligam após o substrato já estar no sítio ativo. Os inibidores irreversíveis formam ligações covalentes e destroem permanentemente a enzima — o exemplo clássico é o ácido acetilsalicílico (AAS/Aspirina), que inibe irreversivelmente a ciclooxigenase.\n\n### Pontos-chave\n\n- Enzimas possuem especificidade estrutural para seus substratos, determinada pelo arranjo tridimensional do sítio ativo.\n- Cofatores são íons metálicos (Fe²⁺, Zn²⁺, Mg²⁺, Ca²⁺, Cu¹⁺/²⁺); coenzimas são moléculas orgânicas derivadas de vitaminas — ambos essenciais para muitas enzimas.\n- Grupo prostético é uma porção não proteica covalentemente ligada à proteína (ex.: grupo heme na hemoglobina); proteínas com grupo prostético são chamadas proteínas conjugadas.\n- Km = concentração de substrato em que a velocidade = Vmáx/2; menor Km indica maior afinidade enzima-substrato.\n- Enzimas alostéricas são reguladas por efetores (positivos ou negativos) que se ligam fora do sítio ativo, funcionando como mecanismos de feedback.\n- AAS inibe a ciclooxigenase de forma irreversível (ligação covalente), destruindo a enzima permanentemente.\n- Inibição competitiva é reversível e vencida pelo aumento da concentração do substrato; inibição irreversível não é revertida.\n- Lipase é mais específica para pancreatite aguda que a amilase (amilase também está presente na glândula salivar); lipase permanece elevada por mais tempo.\n- Ribozimas são moléculas de RNA com atividade catalítica — exceção à regra de que enzimas são proteínas.\n- Fosforilação e desfosforilação (por quinases e fosfatases) são mecanismos centrais de regulação enzimática e do tráfego de informação celular.\n\n### Comparação\n\n| Tipo de Inibição | Reversível? | Local de Ligação | Efeito no Km | Efeito na Vmáx | Exemplo Clínico |\n|---|---|---|---|---|---|\n| Competitiva | Sim | Sítio ativo | Aumenta | Inalterada | Inibidores da ECA, etanol vs. metanol |\n| Não competitiva | Sim | Sítio alostérico (≠ sítio ativo) | Inalterado | Diminui | Regulação alostérica |\n| Acompetitiva | Sim | Sítio alostérico (só após substrato ligar) | Diminui | Diminui | Lítio (parcialmente) |\n| Irreversível | Não | Sítio ativo (ligação covalente) | — | Diminui permanentemente | AAS → ciclooxigenase |\n\n> **Mnemônico:** CANI — Competitiva, Alostérica (não competitiva), acompetitiva (N de 'não entra sem substrato'), Irreversível\n\n<sub>Fontes: c4ba34e1626d7685:0, c4ba34e1626d7685:1, c4ba34e1626d7685:2, c4ba34e1626d7685:3, 5fb85c2e0ca8d9fb:3, 5fb85c2e0ca8d9fb:1, 56d0a30d83e5310f:3</sub>\n\n---\n\n## mTOR, Rapamicina e Sinalização Celular\n\nA mTOR (mechanistic Target of Rapamycin) é uma quinase — enzima que fosforila outras proteínas em resíduos de serina e treonina — que funciona como o grande ponto de controle energético da célula. Ela não age isoladamente: forma complexos quaternários com outras proteínas, originando mTORC1 e mTORC2. O mTORC1 é o principal alvo da rapamicina e regula três processos fundamentais: (1) ativa a tradução de mRNAs por meio da fosforilação de S6K1 (Thr389), estimulando a síntese proteica; (2) inibe a autofagia ao fosforilar ULK1 (Ser757), bloqueando sua interação com AMPK; e (3) inibe a translocação nuclear do fator de transcrição TFEB (Ser211), suprimindo a biogênese lisossômica. Quando há nutrientes e energia disponíveis, mTORC1 está ativa — promovendo crescimento; quando há privação, mTORC1 é inibida e a autofagia é ativada.\n\nA rapamicina foi isolada de metabólitos da bactéria Streptomyces hygroscopicus, encontrada no solo da Ilha Rapa Nui (Ilha de Páscoa). Aprovada pelo FDA em 1999 como imunossupressor para transplantados, ela inibe mTORC1, reduzindo a síntese proteica e a proliferação de linfócitos T — mecanismo que explica sua eficácia em transplantes renais e hepáticos. Clinicamente, a rapamicina também é usada em stents farmacológicos para prevenir reestenose após angioplastia, pois inibe a proliferação de células musculares lisas que causam o fechamento do vaso. O dilema do endotélio surge porque a mesma droga que impede a reestenose também retarda a reendotelização, aumentando o risco de trombose.\n\nA via PI3K/AKT/mTORC1 é ativada por insulina e fatores de crescimento. Mutações que ativam constitutivamente essa via levam à hiperativação da síntese proteica, estimulam angiogênese e favorecem crescimento tumoral. A rapamicina, ao inibir mTORC1, bloqueia esses efeitos — sendo estudada como agente antineoplásico. Quinases e fosfatases são os grandes controladores do tráfego intracelular: ativam e desativam proteínas por fosforilação/desfosforilação, controlando localização celular, estabilidade proteica e interações proteína-proteína.\n\n### Pontos-chave\n\n- mTOR é uma quinase serina/treonina que forma complexos quaternários: mTORC1 (alvo da rapamicina) e mTORC2.\n- mTORC1 ativa síntese proteica (via S6K1-Thr389), inibe autofagia (via ULK1-Ser757) e inibe biogênese lisossômica (via TFEB-Ser211).\n- Rapamicina inibe mTORC1 → reduz proliferação de linfócitos T → usada como imunossupressor em transplantes.\n- Rapamicina em stents previne reestenose ao inibir proliferação de células musculares lisas, mas retarda reendotelização (dilema do endotélio).\n- Via PI3K/AKT/mTORC1 hiperativada por mutação → aumento de síntese proteica, angiogênese e crescimento tumoral.\n- Quinases fosforilam proteínas em serina, treonina ou tirosina; fosfatases removem o fosfato — juntas controlam ativação/inativação, localização e estabilidade proteica.\n- mTOR é o sensor energético central: ativa quando há nutrientes (promove crescimento), inativa quando há privação (ativa autofagia).\n- Inibição crônica de mTOR pode causar atrofia muscular e redução da adipogênese — efeito colateral relevante clinicamente.\n\n### Comparação\n\n| Substrato de mTORC1 | Resíduo Fosforilado | Efeito Funcional |\n|---|---|---|\n| S6K1 (ribosomal S6 kinase 1) | Thr389 | Ativa tradução de mRNAs → ↑ síntese proteica |\n| ULK1 (autofagia kinase) | Ser757 | Bloqueia interação ULK1-AMPK → inibe autofagia |\n| TFEB (fator de transcrição) | Ser211 | Inibe translocação nuclear → inibe biogênese lisossômica |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Nutrientes / Insulina / Fatores de Crescimento] --> B[PI3K → AKT]\n B --> C[mTORC1 ATIVA]\n C --> D[S6K1 fosforilada Thr389]\n C --> E[ULK1 fosforilada Ser757]\n C --> F[TFEB fosforilada Ser211]\n D --> G[↑ Síntese Proteica / Crescimento Celular]\n E --> H[Autofagia INIBIDA]\n F --> I[Biogênese Lisossômica INIBIDA]\n J[Rapamicina] -->|inibe| C\n K[Privação de Nutrientes / AMPK] -->|inibe| C\n```\n\n> **Mnemônico:** SUT — S6K1 (Síntese), ULK1 (aUtofagia inibida), TFEB (Translocação inibida) — os três alvos de mTORC1\n\n<sub>Fontes: b75f185a5756c146:0, b75f185a5756c146:1, 5fb85c2e0ca8d9fb:1, 5fb85c2e0ca8d9fb:3, 5fb85c2e0ca8d9fb:5</sub>\n\n---\n\n## Lipoproteínas, Aterosclerose e Disfunção Endotelial\n\nAs lipoproteínas são partículas que transportam lipídeos no sangue, classificadas por densidade crescente: quilomícron > VLDL > IDL > LDL > HDL (ou seja, maior partícula = menor densidade). Os quilomícrons são sintetizados nos enterócitos e transportam triglicérides da dieta para os tecidos periféricos; após receberem ApoC-II e ApoE do HDL, são hidrolisados pela lipase lipoproteica (LPL) — ancorada no endotélio de tecidos adiposo e muscular — liberando ácidos graxos para captação. O VLDL é sintetizado nos hepatócitos e também transporta triglicérides para os tecidos periféricos, sendo progressivamente hidrolisado até formar LDL, cuja principal função é o transporte de colesterol para os tecidos. O HDL realiza o transporte reverso de colesterol (dos tecidos de volta ao fígado), exerce função antiaterogênica e fornece apoproteínas para outras partículas — mas não transporta triglicérides para tecidos periféricos.\n\nA aterosclerose inicia-se com a disfunção endotelial. O endotélio saudável produz óxido nítrico (NO), que impede agregação plaquetária, adesão de leucócitos e promove vasodilatação ao ativar a guanilato ciclase solúvel nas células musculares lisas. Quando lesado (por inflamação, LDL elevado, tabagismo), o endotélio perde essa função protetora: aumenta a permeabilidade, facilitando a entrada de partículas de LDL na íntima arterial. O LDL retido é oxidado por radicais livres (LDL oxidado), desencadeando resposta inflamatória — monócitos aderem ao endotélio, migram para o espaço subendotelial, diferenciam-se em macrófagos e fagocitam o LDL oxidado, tornando-se células espumosas. A redução da biodisponibilidade de NO na aterosclerose está frequentemente associada à sua reação com ânion superóxido, formando peroxinitrito.\n\nCom a progressão da placa, células musculares lisas migram para a íntima e produzem matriz extracelular e a capa fibrosa. A placa diminui a luz do vaso, causando isquemia (angina ao esforço). Quando a placa rompe, forma-se um coágulo intravascular que pode ocluir completamente o vaso — causando infarto agudo do miocárdio. Após angioplastia, a reestenose (fechamento por tecido fibroso em 30–50% dos casos) é combatida com stents farmacológicos impregnados de rapamicina, que inibe a proliferação de células musculares lisas.\n\n### Pontos-chave\n\n- Ordem crescente de densidade das lipoproteínas: Quilomícron < VLDL < IDL < LDL < HDL (inverso do tamanho).\n- Quilomícrons: sintetizados nos enterócitos, transportam triglicérides dietéticos; apolipoproteína estrutural característica: ApoB-48.\n- VLDL: sintetizado nos hepatócitos, transporta triglicérides endógenos; sofre hidrólise nos tecidos adiposo e muscular pela LPL.\n- LDL: principal transportador de colesterol para tecidos periféricos; principal partícula aterogênica.\n- HDL: transporte reverso de colesterol, função antiaterogênica, fornece ApoC-II e ApoE para quilomícrons e VLDL — NÃO transporta triglicérides para tecidos periféricos.\n- Lipase lipoproteica (LPL): secretada por adipócitos e células musculares, ancorada no endotélio; hidrolisa triglicérides de quilomícrons e VLDL.\n- Óxido nítrico endotelial: produzido por shear stress, impede agregação plaquetária e adesão leucocitária; atua ativando a guanilato ciclase solúvel nas células musculares lisas.\n- Células espumosas derivam principalmente de macrófagos carregados de LDL oxidado — base da placa aterosclerótica.\n- Células musculares lisas contribuem para a progressão da placa produzindo matriz extracelular e a capa fibrosa.\n- Espécies reativas de oxigênio (EROs): papel duplo — participam de sinalização celular e defesa imune, mas em excesso causam dano e reduzem biodisponibilidade de NO (formando peroxinitrito).\n\n### Comparação\n\n| Lipoproteína | Origem | Carga Principal | Apolipoproteína Estrutural | Função Principal |\n|---|---|---|---|---|\n| Quilomícron | Enterócitos | Triglicérides dietéticos | ApoB-48 | Transporte de TG da dieta aos tecidos |\n| VLDL | Hepatócitos | Triglicérides endógenos | ApoB-100 | Transporte de TG hepáticos aos tecidos |\n| LDL | Derivado do VLDL | Colesterol | ApoB-100 | Transporte de colesterol aos tecidos periféricos |\n| HDL | Fígado e intestino | Colesterol (reverso) | ApoA-I | Transporte reverso de colesterol; antiaterogênico |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Dieta: gorduras] --> B[Enterócito sintetiza Quilomícron + ApoB-48]\n B --> C[Linfa → Circulação]\n C --> D[Recebe ApoC-II e ApoE do HDL]\n D --> E[LPL no endotélio hidrolisa TG]\n E --> F[Ácidos graxos → Tecido adiposo e muscular]\n E --> G[Remanescente de Quilomícron → Fígado]\n H[Fígado sintetiza VLDL + ApoB-100] --> I[LPL hidrolisa TG do VLDL]\n I --> J[IDL → LDL]\n J --> K[LDL entrega colesterol aos tecidos]\n K --> L{Disfunção endotelial?}\n L -->|Sim| M[LDL entra na íntima → oxidação → LDL-ox]\n M --> N[Macrófago fagocita LDL-ox → Célula Espumosa]\n N --> O[Placa aterosclerótica]\n P[HDL] -->|Transporte reverso| Q[Colesterol → Fígado]\n```\n\n> **Mnemônico:** Q-V-L-H (Quanto Vai Levando para o HDL): Quilomícron → VLDL → LDL → HDL capta o colesterol de volta — densidade crescente, tamanho decrescente\n\n<sub>Fontes: 5fb85c2e0ca8d9fb:5, 5fb85c2e0ca8d9fb:6, 5fb85c2e0ca8d9fb:7, 5fb85c2e0ca8d9fb:8, b75f185a5756c146:0, b75f185a5756c146:1</sub>\n\n---\n\n## Carboidratos, Glicemia, Insulina e Diabetes\n\nOs carboidratos são as macromoléculas mais abundantes na alimentação e a principal fonte energética celular. A glicose é o substrato energético mais importante da biologia — ao entrar na célula, é imediatamente fosforilada pela glicoquinase (impedindo sua saída) e pode ser oxidada via glicólise ou armazenada como glicogênio. O glicogênio é sintetizado (glicogênese) no estado alimentado e degradado (glicogenólise) no jejum ou exercício: o glicogênio muscular é usado exclusivamente pelo músculo, enquanto o hepático é quebrado e exportado para a corrente sanguínea para manutenção da glicemia. Em jejum prolongado, a gliconeogênese utiliza gordura e proteína para sintetizar glicose. Os transportadores GLUT mediam a entrada de glicose nas células: GLUT2 é de alta capacidade e baixa afinidade, presente no fígado e pâncreas (sensor de glicemia); GLUT4 é insulino-dependente, presente no músculo esquelético e tecido adiposo, e é translocado para a membrana em resposta à insulina.\n\nA insulina é o hormônio da abundância, secretada pelas células beta das ilhotas de Langerhans quando a glicose entra via GLUT2, gera ATP, que fecha canais de K⁺ e despolariza a célula, abrindo canais de Ca²⁺ e liberando insulina pré-armazenada em grânulos. A insulina ativa a glicogênio sintase (por desfosforilação), promovendo glicogênese; inibe a lipólise nos adipócitos; e estimula a translocação de GLUT4 para a membrana via via PI3K-AKT. No diabetes mellitus tipo 2, a resistência insulínica ocorre principalmente no fígado, músculo e tecido adiposo — com receptor de insulina disfuncional, a fosforilação de IRS-1 e a ativação da via PI3K-AKT são reduzidas, diminuindo a captação de glicose e aumentando a gliconeogênese hepática.\n\nA deficiência de lactase exemplifica como a ausência de uma enzima digestiva leva à má absorção: a lactose não hidrolisada chega ao cólon, onde é fermentada pela microbiota, causando diarreia osmótica e gases. Analogamente, a deficiência de enzimas pancreáticas (ex.: na pancreatite crônica) reduz a quebra de macronutrientes alimentares. A pancreatite aguda ocorre quando o bloqueio da saída do suco pancreático (ex.: por cálculo biliar) leva à autodigestão do pâncreas — com elevação de amilase e lipase no sangue em três ou mais vezes o limite normal, sendo a lipase mais específica.\n\n### Pontos-chave\n\n- GLUT2: alta capacidade, baixa afinidade, insulino-independente — presente no fígado e pâncreas (sensor de glicemia).\n- GLUT4: insulino-dependente, presente no músculo esquelético e tecido adiposo — translocado para a membrana pela via PI3K-AKT após estímulo insulínico.\n- Insulina promove desfosforilação (ativação) da glicogênio sintase → glicogênese; inibe lipólise nos adipócitos.\n- Glicogênio hepático: exportado para manutenção da glicemia sistêmica. Glicogênio muscular: uso exclusivo do músculo.\n- Gliconeogênese: ativa no jejum, usa gordura e proteína para sintetizar glicose — via oposta à glicólise.\n- Resistência insulínica no DM2: ocorre principalmente no fígado, músculo e tecido adiposo — receptor disfuncional → ↓ captação de glicose.\n- Glucagon: hormônio do jejum, secretado pelas células alfa; age mais rapidamente que cortisol para restaurar normoglicemia na hipoglicemia aguda.\n- Deficiência de lactase → lactose não hidrolisada → fermentação intestinal → diarreia osmótica e gases (não hipersecreção de insulina).\n- Pancreatite aguda: diagnóstico requer elevação de amilase e/ou lipase ≥3× o limite normal; lipase é mais específica e permanece elevada por mais tempo.\n- Amido: homopolissacarídeo de reserva energética vegetal. Glicogênio: homopolissacarídeo de reserva energética animal. Ambos compostos por glicose.\n\n### Comparação\n\n| Transportador | Afinidade | Capacidade | Dependência de Insulina | Localização Principal | Função |\n|---|---|---|---|---|---|\n| GLUT1 | Alta | Baixa | Não | Eritrócitos, barreira hematoencefálica | Captação basal de glicose |\n| GLUT2 | Baixa | Alta | Não | Fígado, pâncreas (células beta) | Sensor de glicemia |\n| GLUT4 | Alta | Alta | Sim | Músculo esquelético, tecido adiposo | Captação estimulada por insulina/exercício |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Refeição rica em carboidratos] --> B[↑ Glicemia]\n B --> C[Glicose entra na célula beta via GLUT2]\n C --> D[↑ ATP → fecha canal K⁺ → despolarização]\n D --> E[Abre canal Ca²⁺ → exocitose de insulina]\n E --> F[Insulina na circulação]\n F --> G[Liga ao receptor de insulina]\n G --> H[Fosforilação IRS-1 → PI3K → AKT]\n H --> I[Translocação GLUT4 para membrana]\n H --> J[Ativação glicogênio sintase → Glicogênese]\n H --> K[Inibição lipólise nos adipócitos]\n I --> L[↑ Captação de glicose no músculo e tecido adiposo]\n M[Jejum / Hipoglicemia] --> N[↑ Glucagon pelas células alfa]\n N --> O[Glicogenólise hepática + Gliconeogênese]\n O --> P[↑ Glicemia]\n```\n\n> **Mnemônico:** GLUT-2 é o SENSOR (baixa afinidade, alta capacidade, no pâncreas e fígado); GLUT-4 é o RESPONDEDOR (insulino-dependente, músculo e adiposo) — '2 Sente, 4 Responde'\n\n<sub>Fontes: fb01bdcfbb144d4f:1, fb01bdcfbb144d4f:2, 6fd1d674b1cd9e09:0, 5fb85c2e0ca8d9fb:2, 5fb85c2e0ca8d9fb:4, 56d0a30d83e5310f:3, 56d0a30d83e5310f:4</sub>\n\n---\n", "cards": [{"front": "1 miliosmol por litro equivale a {{c1::19,3}} mmHg de pressão osmótica.", "back": "", "type": "cloze", "tags": ["bioquimica::pressao_osmotica", "exam::n1", "high_yield", "exam::n1"], "source_span": "a concentração de 1 miliosmol por litro é equivalente a 19,3 mmHg de pressão osmótica", "source_chunk_id": "ca1d03681e38ff3b:9", "explanation": null, "mnemonic": null, "verified": true, "card_id": "a8293da5a16cb931"}, {"front": "1 osmol por litro a 37°C causa pressão osmótica de {{c1::19.300}} mmHg.", "back": "", "type": "cloze", "tags": ["bioquimica::pressao_osmotica", "exam::n1", "high_yield", "exam::n1"], "source_span": "a concentração de 1 osmol por litro vai causar 19.300 mmHg de pressão osmótica da solução", "source_chunk_id": "ca1d03681e38ff3b:9", "explanation": null, "mnemonic": null, "verified": true, "card_id": "aaac721a3d0ac6e4"}, {"front": "1 µg/kg de glucagon eleva a glicose sanguínea em torno de {{c1::20 mg/100 mL}} (aumento de 25%) em aproximadamente {{c2::20 minutos}}.", "back": "", "type": "cloze", "tags": ["bioquimica::glucagon::efeitos", "exam::n1", "high_yield", "exam::n1"], "source_span": "Apenas 1 jLig/kg de glucagon é capaz de elevar a glicose sanguínea por em torno de 20 mg/100 mL de sangue (aumento de 25%) em aproximadamente 20 minutos", "source_chunk_id": "76cae3be4bc84980:9", "explanation": null, "mnemonic": null, "verified": true, "card_id": "5b51d07d72a1fbfe"}, {"front": "A 1 osmolal solution of an undissociated solute freezes at {{c1::−1.86°C}}.", "back": "", "type": "cloze", "tags": ["subject::biochem::osmolality_measurement", "exam::n1", "high_yield", "exam::n1"], "source_span": "a 1 osmolal solution of an undissociated solute (i.e. containing 1 osmol of the solute per kg of water) freezes at −1.86°C", "source_chunk_id": "0630654247dedf11:2", "explanation": "Freezing-point depression is the basis for osmometry used to measure plasma osmolality.", "mnemonic": null, "verified": false, "card_id": "bb850ead1ddb68fa"}, {"front": "A 10-year-old presents with periorbital puffiness, proteinuria, and hypoalbuminaemia. What is the mechanism of oedema?", "back": "Urinary loss of albumin lowers oncotic pressure, expanding interstitial volume.", "type": "basic", "tags": ["bioquimica::nephrotic_syndrome", "exam::n1", "high_yield", "clinical_vignette", "exam::n1"], "source_span": "nephrotic syndrome (where oedema is a consequence of the urinary loss of albumin in plasma)", "source_chunk_id": "0630654247dedf11:3", "explanation": null, "mnemonic": null, "verified": false, "card_id": "ca70de660de76a79"}, {"front": "A 35-year-old transplant patient receives rapamycin. The drug binds FKBP12 and the complex inhibits which mammalian protein to block T-cell proliferation?", "back": "FRAP / RAFT1 (mTOR)", "type": "basic", "tags": ["bioquimica::mtor::clinica", "exam::n1", "high_yield", "exam::n1"], "source_span": "RAFT1 is the direct target of FKBPlS-rapamycin and a mammalian homolog of the TOR proteins", "source_chunk_id": "3a7a538a2984b6e2:3", "explanation": "Rapamycin-FKBP12 inhibits mTOR (FRAP/RAFT1), blocking G1 progression and T-cell activation.", "mnemonic": null, "verified": true, "card_id": "cbcfd56183c5fcba"}, {"front": "A 55-year-old with chronic liver disease develops abdominal distension and bilateral leg oedema. The reduced plasma oncotic pressure is due to impaired hepatic {{c1::plasma protein synthesis}}.", "back": "", "type": "cloze", "tags": ["subject::bioquimica_biologia_celular::fluidos_corporais", "topic::liver_cirrhosis", "exam::n1", "high_yield", "exam::n1"], "source_span": "synthesis of plasma protein in the liver occurs in liver cirrhosis", "source_chunk_id": "18cb7c924174c944:4", "explanation": null, "mnemonic": null, "verified": false, "card_id": "58f988fba402565a"}, {"front": "A 55-year-old with chronic liver disease develops ascites and peripheral oedema. The most likely underlying biochemical mechanism is impaired synthesis of {{c1::plasma proteins::protein type}}.", "back": "", "type": "cloze", "tags": ["bioquimica::liver_cirrhosis", "exam::n1", "high_yield", "exam::n1"], "source_span": "synthesis of plasma protein in the liver occurs in liver cirrhosis", "source_chunk_id": "0630654247dedf11:4", "explanation": null, "mnemonic": null, "verified": false, "card_id": "baf29d913cb6c601"}, {"front": "A 60-year-old with known heart failure develops acute breathlessness and bilateral crackles. Which ventricle's failure most directly causes pulmonary oedema?", "back": "Left ventricular failure", "type": "basic", "tags": ["bioquimica::pulmonary_oedema", "exam::n1", "high_yield", "clinical_vignette", "exam::n1"], "source_span": "The pulmonary oedema associated with left ventricular failure occurs if capillary pressure rises to a level that exceeds oncotic pressure.", "source_chunk_id": "0630654247dedf11:3", "explanation": null, "mnemonic": null, "verified": false, "card_id": "ea287d4e6e033426"}, {"front": "A 70-kg female has {{c1::36 l}} of total body water ({{c2::51%}} of body weight).", "back": "", "type": "cloze", "tags": ["subject::biochem::body_water", "exam::n1", "high_yield", "exam::n1"], "source_span": "a 70-kg female, who has only 36 l of water (51% of body weight)", "source_chunk_id": "0630654247dedf11:2", "explanation": null, "mnemonic": null, "verified": false, "card_id": "22badb09e843b3cc"}, {"front": "A 70-kg male of average build has approximately {{c1::45 l}} of total body water ({{c2::64%}} of body weight).", "back": "", "type": "cloze", "tags": ["subject::biochem::body_water", "exam::n1", "high_yield", "exam::n1"], "source_span": "water content of a 70-kg male of average build, which is about 45 l (64% of body weight)", "source_chunk_id": "0630654247dedf11:2", "explanation": null, "mnemonic": null, "verified": false, "card_id": "a1a5831c597fd18a"}, {"front": "A ACAT hepática induz a {{c1::esterificação}} do colesterol.", "back": "", "type": "cloze", "tags": ["bioquímica::lipídeos::ácidos_graxos_saturados::mecanismo", "exam::n1", "high_yield", "exam::n1"], "source_span": "induzindo a esterificação de colesterol.", "source_chunk_id": "bcb3049bb00b1bb2:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "17918a24b4762a51"}, {"front": "A CMT afeta proteínas da membrana plasmática de células nervosas, especialmente as {{c1::células de Schwann}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::neuropatia::cmt::fisiopatologia", "exam::n1", "high_yield", "exam::n1"], "source_span": "doença genética que afeta proteínas da m em brana plasm ática de células nervosas, com o as células de Schw ann", "source_chunk_id": "a7bb4c335d161809:0", "explanation": null, "mnemonic": null, "verified": false, "card_id": "3d1ab71ab071842a"}, {"front": "A CMT é causada por mutações em genes localizados nas {{c1::células de Schwann}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::cmt::fisiopatologia", "exam::n1", "high_yield", "exam::n1"], "source_span": "causada por m utações em genes localizados nas células de Schw ann, que produzem proteínas im portantes para os nervos", "source_chunk_id": "a7bb4c335d161809:0", "explanation": null, "mnemonic": null, "verified": false, "card_id": "2bda7892857f299c"}, {"front": "A DM tipo 1 ocorre devido à {{c1::deficiência de insulina}}.", "back": "", "type": "cloze", "tags": ["bioquimica::diabetes_mellitus::tipo1", "exam::n1", "high_yield", "exam::n1"], "source_span": "A DM tipo 1 ocorre devido à deficiência de insulina", "source_chunk_id": "37b6ac2cc6a820d8:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "493bae940a69d1ca"}, {"front": "A DM tipo 2 é caracterizada por {{c1::resistência à insulina}}.", "back": "", "type": "cloze", "tags": ["bioquimica::diabetes_mellitus::tipo2", "exam::n1", "high_yield", "exam::n1"], "source_span": "no DM tipo 2 há resistência à insulina", "source_chunk_id": "37b6ac2cc6a820d8:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "51bf1d8e64a5f94e"}, {"front": "A DM é uma doença crônica caracterizada por altos níveis de {{c1::glicemia em jejum}}.", "back": "", "type": "cloze", "tags": ["bioquimica::diabetes_mellitus", "exam::n1", "high_yield", "exam::n1"], "source_span": "A DM é uma doença crônica caracterizada por altos níveis de glicemia em jejum", "source_chunk_id": "37b6ac2cc6a820d8:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "c81adebca051d627"}, {"front": "A DNA polimerase alfa é essencial para o {{c1::início da síntese do DNA}}, pois produz os primers em RNA.", "back": "", "type": "cloze", "tags": ["bioquimica::replicacao_dna", "exam::n1", "high_yield", "exam::n1"], "source_span": "Essencial para o início da síntese do DNA, pois é responsável por produzir os primers", "source_chunk_id": "c45346871801c1b5:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "54eec8b8c5c88506"}, {"front": "A DNA polimerase alfa é responsável por produzir os {{c1::primers em RNA}} em ambas as fitas da replicação.", "back": "", "type": "cloze", "tags": ["bioquimica::replicacao_dna", "exam::n1", "high_yield", "exam::n1"], "source_span": "responsável por produzir os primers (iniciadores) em RNA em ambas as fitas da replicação", "source_chunk_id": "c45346871801c1b5:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "e108ea6094db454c"}, {"front": "A DNMT metila bases com o objetivo de {{c1::diminuir}} a transcrição de genes pró-inflamatórios.", "back": "", "type": "cloze", "tags": ["bioquimica::epigenetica::dnmt", "exam::n1", "high_yield", "exam::n1"], "source_span": "Essa enzima metila bases com o objetivo de: Diminuir a transcrição de genes pró-inflamatórios.", "source_chunk_id": "c45346871801c1b5:1", "explanation": "Metilação do DNA por DNMT condensa a cromatina, reduzindo o acesso de fatores de transcrição a genes pró-inflamatórios.", "mnemonic": null, "verified": true, "card_id": "6da05d766baeb4f3"}, {"front": "A ECA converte {{c1::angiotensina I}} em {{c2::angiotensina II}}.", "back": "", "type": "cloze", "tags": ["bioquimica::sistema_renina_angiotensina", "exam::n1", "high_yield", "exam::n1"], "source_span": "angiotensina I, que é convertida, por sua vez, em angiotensina II na presença da enzima conversora de angiotensina (ECA).", "source_chunk_id": "4c87c63efb158cd1:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "40cebc9563c23c21"}, {"front": "A EPS (eletroforese de proteínas séricas) é o teste de {{c1::triagem}} mais utilizado para investigar anormalidades proteicas no sangue.", "back": "", "type": "cloze", "tags": ["bioquímica::eletroforese", "exam::n1", "high_yield", "exam::n1"], "source_span": "Trata-se do teste de triagem mais utilizado para investigação de anormalidades protéicas presentes no sangue.", "source_chunk_id": "607be99c1c035ac3:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "c341ceaa39ff534d"}, {"front": "A EPS pode monitorar pacientes com {{c1::mieloma múltiplo}}, síndrome nefrótica e cirrose.", "back": "", "type": "cloze", "tags": ["bioquimica::eps::aplicacao_clinica", "exam::n1", "high_yield", "exam::n1"], "source_span": "a EPS pode ser uma ferramenta importante para monitorar pacientes por longos períodos, quando existem alterações específicas nos níveis de determinadas proteínas, como no mieloma múltiplo, síndrome nefrótica e cirrose", "source_chunk_id": "607be99c1c035ac3:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "539a8e00d3d595c4"}, {"front": "A EPS separa as proteínas do soro em {{c1::cinco}} bandas principais ao aplicar potencial elétrico.", "back": "", "type": "cloze", "tags": ["bioquímica::eletroforese", "exam::n1", "high_yield", "exam::n1"], "source_span": "formando bandas denominadas: albumina, alfa-1-globulina, alfa-2-globulina, betaglobulina e gamaglobulina", "source_chunk_id": "607be99c1c035ac3:0", "explanation": null, "mnemonic": "A-A1-A2-B-G: 'Albumina Alfa1 Alfa2 Beta Gama'", "verified": true, "card_id": "bb81feab9ddaa871"}, {"front": "A FC pode causar deficiência de crescimento em crianças por promover falha {{c1::pancreática exócrina}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::fibrose_cistica::complicacoes", "exam::n1", "high_yield", "exam::n1"], "source_span": "A FC pode ocasionar deficiência no crescimento da criança, uma vez que promove falha pancreática exócrina.", "source_chunk_id": "6cbe56609278c25d:2", "explanation": "Sem enzimas pancreáticas exócrinas, a digestão e absorção de nutrientes ficam comprometidas.", "mnemonic": null, "verified": true, "card_id": "e5409d56dedbbeb1"}, {"front": "A FC promove falha {{c1::pancreática exócrina}}, causando diarreia e fezes com odor fétido.", "back": "", "type": "cloze", "tags": ["bioquimica::fibrose_cistica", "exam::n1", "high_yield", "exam::n1"], "source_span": "promove falha pancreática exócrina. O paciente pode apresentar diarreias frequentes e fezes odor fétido contendo partículas de alimentos não digeridos", "source_chunk_id": "83fc1bb52ed5efaa:3", "explanation": "Secreções espessas bloqueiam ductos pancreáticos, impedindo liberação de enzimas digestivas.", "mnemonic": null, "verified": true, "card_id": "c984d40cd3ab8e0f"}, {"front": "A FC promove falha {{c1::pancreática exócrina}}, causando diarreia frequente e fezes com odor fétido.", "back": "", "type": "cloze", "tags": ["bioquimica_biologia_celular::fibrose_cistica::complicacoes", "exam::n1", "high_yield", "exam::n1"], "source_span": "promove falha pancreática exócrina. O paciente pode apresentar diarreias frequentes e fezes odor fétido contendo partículas de alimentos não digeridos", "source_chunk_id": "a25f2908e3e2dcc2:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "b094f39745ba73f6"}, {"front": "A Fibrose Cística é herdada por caráter autossômico {{c1::recessivo}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::fibrose_cistica::genetica", "exam::n1", "high_yield", "exam::n1"], "source_span": "herdada por caráter autossômico recessivo (7q31 - F508del) e potencialmente letal.", "source_chunk_id": "6cbe56609278c25d:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "b4e68ccd687efe00"}, {"front": "A Fibrose Cística é herdada por caráter {{c1::autossômico recessivo}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::genetica::fibrose_cistica", "exam::n1", "high_yield", "exam::n1"], "source_span": "doença crônica generalizada das glândulas exócrinas herdada por caráter autossômico recessivo (7q31 - F508del)", "source_chunk_id": "83fc1bb52ed5efaa:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "1b64dfd7dabd5954"}, {"front": "A Fibrose Cística é herdada por caráter {{c1::autossômico recessivo}}.", "back": "", "type": "cloze", "tags": ["bioquimica_biologia_celular::fibrose_cistica::genetica", "exam::n1", "high_yield", "exam::n1"], "source_span": "doença crônica generalizada das glândulas exócrinas herdada por caráter autossômico recessivo (7q31 - F508del)", "source_chunk_id": "a25f2908e3e2dcc2:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "1b64dfd7dabd5954"}, {"front": "A Fibrose Cística é uma doença crônica das glândulas {{c1::exócrinas}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::fibrose_cistica", "exam::n1", "high_yield", "exam::n1"], "source_span": "A Fibrose Cística (FC) é uma doença crônica generalizada das glândulas exócrinas", "source_chunk_id": "6cbe56609278c25d:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "44101e5e6bc716d9"}, {"front": "A Frequência Cardíaca registrada no caso é de {{c1::110}} bpm.", "back": "", "type": "cloze", "tags": ["subject::semiologia::sinais_vitais", "exam::n1", "high_yield", "exam::n1"], "source_span": "Frequência Cardíaca (FC): 110 bpm", "source_chunk_id": "56d0a30d83e5310f:2", "explanation": null, "mnemonic": null, "verified": false, "card_id": "14a4cff065525b3c"}, {"front": "A Fórmula de Winter para compensação da acidose metabólica é: pCO2 esperada = {{c1::(1,5 × [HCO3-]) + 8 ± 2}}.", "back": "", "type": "cloze", "tags": ["bioquimica::acido_base::compensacao_acidose_metabolica", "exam::n1", "high_yield", "exam::n1"], "source_span": "pCO2esperada = (1,5 x[HCO3-]) + 8 ±2", "source_chunk_id": "51723ae60ff2d9cb:16", "explanation": "Se a pCO2 real for maior que a esperada, há acidose respiratória associada; se menor, alcalose respiratória associada.", "mnemonic": "Winter: 1,5 × HCO3 + 8 ± 2", "verified": true, "card_id": "df2138cd33d3f3cb"}, {"front": "A HMG-CoA redutase é responsável pela etapa {{c1::inicial}} da síntese de colesterol.", "back": "", "type": "cloze", "tags": ["bioquimica::inibicao_enzimatica::lovastatina", "exam::n1", "high_yield", "exam::n1"], "source_span": "que é a responsável pela etapa inicial da síntese de colesterol", "source_chunk_id": "a0d536f9d4d5391f:4", "explanation": null, "mnemonic": null, "verified": true, "card_id": "8c61c9ea9ca74268"}, {"front": "A HSR é desencadeada pelo enovelamento incorreto de proteínas {{c1::citosólicas}} (por exemplo, devido ao estresse térmico).", "back": "", "type": "cloze", "tags": ["bioquimica::HSR", "exam::N1", "high_yield", "exam::n1"], "source_span": "Enovelamento incorreto de proteínas citosólicas (por exemplo, devido ao estresse térmico).", "source_chunk_id": "b678350d1f36470c:11", "explanation": "Distingue a HSR da UPR: a HSR responde a proteínas citosólicas mal enoveladas; a UPR responde a proteínas mal enoveladas no RE.", "mnemonic": null, "verified": true, "card_id": "1bba324a25a39b5d"}, {"front": "A HbA1c mede a porcentagem de hemoglobina que sofreu {{c1::glicação}} pela glicose circulante no sangue.", "back": "", "type": "cloze", "tags": ["bioquimica::hemoglobina_glicada::hba1c", "exam::n1", "high_yield", "exam::n1"], "source_span": "a hemoglobina glicada (HbA1c) é um exame que mede a porcentagem de hemoglobina que sofreu glicação pela glicose circulante no sangue", "source_chunk_id": "e07c53735f89e95b:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "6888a670a69ccd33"}, {"front": "A HbA1c pode estar falsamente alterada em condições que mudam a vida média das hemácias, como {{c1::hemólise}} e {{c2::transfusão}}.", "back": "", "type": "cloze", "tags": ["bioquimica::hemoglobina_glicada::limitacoes", "exam::n1", "high_yield", "exam::n1"], "source_span": "HbA1c: pode estar alterada em condições que mudam a vida média das hemácias, como anemias, hemólise, transfusão e hemodiálise", "source_chunk_id": "e07c53735f89e95b:3", "explanation": "Hemácias com vida média reduzida acumulam menos glicação, subestimando a glicemia real.", "mnemonic": null, "verified": true, "card_id": "3d8c24126e938218"}, {"front": "A HbA1c reflete a média da glicemia dos últimos {{c1::2 a 3 meses}}.", "back": "", "type": "cloze", "tags": ["bioquimica::hemoglobina_glicada::hba1c", "exam::n1", "high_yield", "exam::n1"], "source_span": "esse exame reflete a média da glicemia dos últimos 2 a 3 meses", "source_chunk_id": "e07c53735f89e95b:3", "explanation": null, "mnemonic": "HbA1c = 3 meses (vida da hemácia ~120 dias)", "verified": true, "card_id": "da128f78b5a095ac"}, {"front": "A HbA1c é usada tanto no {{c1::diagnóstico}} quanto no {{c2::acompanhamento}} do controle glicêmico do diabetes.", "back": "", "type": "cloze", "tags": ["bioquimica::hemoglobina_glicada::utilidade_clinica", "exam::n1", "high_yield", "exam::n1"], "source_span": "é muito usado tanto no diagnóstico quanto no acompanhamento do controle glicêmico do diabetes", "source_chunk_id": "e07c53735f89e95b:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "181bd74891fc951f"}, {"front": "A Hipótese do Mundo de RNA propõe que o {{c1::RNA}} surgiu antes do {{c2::DNA}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::hipótese_mundo_rna", "exam::n1", "high_yield", "exam::n1"], "source_span": "A Hipótese do Mundo de RNA sugere que o RNA surgiu antes do DNA.", "source_chunk_id": "5cddb7aac00de0f5:0", "explanation": null, "mnemonic": null, "verified": false, "card_id": "b43f5ec6316e51e9"}, {"front": "A Hipótese do Mundo de RNA sugere que o RNA surgiu {{c1::antes do DNA}}.", "back": "", "type": "cloze", "tags": ["bioquímica::origem_da_vida::mundo_de_rna", "exam::n1", "high_yield", "exam::n1"], "source_span": "A Hipótese do Mundo de RNA sugere que o RNA surgiu antes do DNA.", "source_chunk_id": "d90a50a5a5347d06:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "98210f258bc0fdd7"}, {"front": "A Hsp100 funciona como '{{c1::desagregador}}', revertendo agregados proteicos aberrantes a monômeros solúveis.", "back": "", "type": "cloze", "tags": ["bioquimica::chaperonas::hsp100", "exam::n1", "high_yield", "exam::n1"], "source_span": "Funcionam como 'desagregadores' que podem interagir com agregados proteicos aberrantes e revertê-los de volta a monômeros solúveis", "source_chunk_id": "b678350d1f36470c:8", "explanation": null, "mnemonic": null, "verified": true, "card_id": "71fb5bfbf214ee7e"}, {"front": "A Hsp70 se liga a regiões {{c1::hidrofóbicas}} expostas de proteínas desdobradas para evitar a agregação.", "back": "", "type": "cloze", "tags": ["bioquimica::chaperonas::hsp70", "exam::n1", "high_yield", "exam::n1"], "source_span": "A Hsp70 se liga a regiões hidrofóbicas expostas de proteínas desdobradas para evitar a agregação e facilitar o dobramento", "source_chunk_id": "b678350d1f36470c:8", "explanation": null, "mnemonic": null, "verified": true, "card_id": "37052d6ae7389b0c"}, {"front": "A Hsp90 é uma chaperona {{c1::homodimérica}} envolvida na maturação final de proteínas clientes.", "back": "", "type": "cloze", "tags": ["bioquimica::chaperonas::hsp90", "exam::n1", "high_yield", "exam::n1"], "source_span": "Uma chaperona homodimérica envolvida na maturação final e estabilização de um conjunto específico de proteínas 'clientes'", "source_chunk_id": "b678350d1f36470c:8", "explanation": null, "mnemonic": null, "verified": true, "card_id": "1f7fcb8cd18277be"}, {"front": "A IDL é uma partícula intermediária na conversão de {{c1::VLDL}} em {{c2::LDL}}.", "back": "", "type": "cloze", "tags": ["bioquimica::lipoproteinas::idl", "exam::n1", "high_yield", "exam::n1"], "source_span": "IDL Partículas intermediárias na conversão de VLDL em LDL.", "source_chunk_id": "349053d639a3f6a1:4", "explanation": null, "mnemonic": null, "verified": true, "card_id": "e0b61ac48f3a23fd"}, {"front": "A ISR inibe globalmente a síntese proteica, mas permite a tradução seletiva de {{c1::mRNAs de resposta ao estresse}}.", "back": "", "type": "cloze", "tags": ["bioquimica::ISR::traducao_seletiva", "exam::N1", "high_yield", "exam::n1"], "source_span": "Inibição global da síntese proteica, mas tradução seletiva de mRNAs de resposta ao estresse", "source_chunk_id": "b678350d1f36470c:11", "explanation": null, "mnemonic": null, "verified": true, "card_id": "6a56792d1c8c3d46"}, {"front": "A ISR é ativada por quatro estresses: estresse do RE, privação de aminoácidos, infecção viral e {{c1::deficiência de heme}}.", "back": "", "type": "cloze", "tags": ["bioquimica::ISR::ativadores", "exam::N1", "high_yield", "exam::n1"], "source_span": "estresse do retículo endoplasmático, privação de aminoácidos, infecção viral e deficiência de heme.", "source_chunk_id": "b678350d1f36470c:11", "explanation": null, "mnemonic": "RE-AA-Vírus-Heme: quatro gatilhos da ISR.", "verified": true, "card_id": "1ef80b412e2a2b39"}, {"front": "A IgA representa {{c1::19%}} das imunoglobulinas normais.", "back": "", "type": "cloze", "tags": ["bioquimica::proteinas_sericas::imunoglobulinas", "exam::n1", "high_yield", "exam::n1"], "source_span": "Representa 19% das Igs normais", "source_chunk_id": "607be99c1c035ac3:4", "explanation": null, "mnemonic": null, "verified": true, "card_id": "c80478981e11023a"}, {"front": "A IgG representa {{c1::73%}} das imunoglobulinas normais.", "back": "", "type": "cloze", "tags": ["bioquimica::proteinas_sericas::imunoglobulinas", "exam::n1", "high_yield", "exam::n1"], "source_span": "Representa 73% das Igs normais", "source_chunk_id": "607be99c1c035ac3:4", "explanation": null, "mnemonic": null, "verified": true, "card_id": "64313dc8f9bde01e"}, {"front": "A IgM representa {{c1::5%}} das imunoglobulinas normais.", "back": "", "type": "cloze", "tags": ["bioquimica::proteinas_sericas::imunoglobulinas", "exam::n1", "high_yield", "exam::n1"], "source_span": "Representa 5% das Igs normais", "source_chunk_id": "607be99c1c035ac3:4", "explanation": null, "mnemonic": null, "verified": true, "card_id": "b9df4dc8e56a858d"}, {"front": "A Lipase Lipoproteica (LpL) é sintetizada em células musculares esqueléticas, {{c1::adipócitos}} e {{c2::miócitos cardíacos}}.", "back": "", "type": "cloze", "tags": ["bioquímica::lipídeos::lpl", "exam::n1", "high_yield", "exam::n1"], "source_span": "sintetizada em•células musculares esqueléticas•adipócitos•miócitos cardíacos", "source_chunk_id": "349053d639a3f6a1:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "84bda47d1f62b494"}, {"front": "A LpL hidrolisa triglicerídeos em ácidos graxos e glicerol absorvidos por músculo ({{c1::energia}}) ou tecido adiposo ({{c2::armazenamento}}).", "back": "", "type": "cloze", "tags": ["bioquímica::lipídeos::lpl::metabolismo", "exam::n1", "high_yield", "exam::n1"], "source_span": "LpL tecidual hidrolisa os triglicerídeos em ácidos graxos e glycerol, que são então absorvidos e utilizados por músculo (energia) ou tecido adiposo (armazenamento)", "source_chunk_id": "349053d639a3f6a1:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "21738401a59e7a9e"}, {"front": "A NOS desacoplada gera {{c1::superóxido (O₂•–)}} em vez de NO quando há deficiência de {{c2::BH₄}}.", "back": "", "type": "cloze", "tags": ["bioquimica::ros::nos_desacoplada", "exam::n1", "high_yield", "exam::n1"], "source_span": "Quando há deficiência de cofatores (ex.: BH₄), gera O₂•– em vez de NO•", "source_chunk_id": "349053d639a3f6a1:6", "explanation": null, "mnemonic": null, "verified": true, "card_id": "5343497f49c3318d"}, {"front": "A NOX-2 transfere elétrons de {{c1::NADPH}} para O₂, gerando ânion superóxido.", "back": "", "type": "cloze", "tags": ["bioquimica::ros::nadph_oxidase", "exam::n1", "high_yield", "exam::n1"], "source_span": "Transferência de elétrons de NADPH para O₂ → O₂•–", "source_chunk_id": "349053d639a3f6a1:6", "explanation": null, "mnemonic": null, "verified": true, "card_id": "4115f1ca521eefb0"}, {"front": "A Na+-K+-ATPase é classificada como um {{c1::antiporte}}.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte_membrana::bomba_na_k", "exam::n1", "high_yield", "exam::n1"], "source_span": "A Na+-K+-ATPase é considerada um antiporte", "source_chunk_id": "584ea7e1df69fa89:0", "explanation": "Na+ e K+ são transportados em direções opostas através da membrana.", "mnemonic": null, "verified": true, "card_id": "069f1dbc63c1fae5"}, {"front": "A Na+/K+-ATPase usa {{c1::ATP}} para bombear sódio para {{c2::fora}} e potássio para {{c3::dentro}} da célula.", "back": "", "type": "cloze", "tags": ["biologia_celular::transporte_membrana::bomba_na_k", "exam::n1", "high_yield", "exam::n1"], "source_span": "Na+/K+-ATPase, que usa ATP para bombear sódio para fora e potássio para dentro da célula", "source_chunk_id": "8d967ded073fd283:0", "explanation": null, "mnemonic": "3 Na+ saem, 2 K+ entram — gasta ATP", "verified": false, "card_id": "350f56317d0774a3"}, {"front": "A Na⁺/K⁺-ATPase hidrolisa {{c1::uma}} molécula de ATP por ciclo de transporte.", "back": "", "type": "cloze", "tags": ["bioquimica::bomba_na_k_atpase", "exam::n1", "high_yield", "exam::n1"], "source_span": "Ela quebra uma molécula de ATP e usa a energia liberada para trazer dois K+ para o interior da célula", "source_chunk_id": "e7d00a882df6c4ba:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "028a45945617d538"}, {"front": "A Na⁺/K⁺-ATPase é uma {{c1::glicoproteína integral de membrana}} presente em todas as células {{c2::animais}}.", "back": "", "type": "cloze", "tags": ["bioquimica::bomba_na_k_atpase", "exam::n1", "high_yield", "exam::n1"], "source_span": "bomba de sódio-potássio (Na+/K+-ATPase) é encontrada em todas as células animais. A bomba é uma glicoproteína integral de membrana", "source_chunk_id": "e7d00a882df6c4ba:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "f96d0e9aeae75a25"}, {"front": "A OMS define anemia como o conteúdo de {{c1::hemoglobina}} no sangue abaixo do normal.", "back": "", "type": "cloze", "tags": ["bioquímica::anemia", "exam::n1", "high_yield", "exam::n1"], "source_span": "Anemia é definida pela Organização Mundial de Saúde (OMS) como a condição na qual o conteúdo de hemoglobina no sangue está abaixo do normal", "source_chunk_id": "30a0c307d98d50fe:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "f949effda52d6cf2"}, {"front": "A PCO2 no líquido extracelular é controlada pela {{c1::intensidade respiratória}}.", "back": "", "type": "cloze", "tags": ["bioquímica_e_biologia_celular::regulação_acidobásica", "exam::n1", "high_yield", "exam::n1"], "source_span": "a Pco2 no líquido extracelular é controlada pela intensidade respiratória", "source_chunk_id": "f8d97a9f5383249e:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "286a73697b43cfdc"}, {"front": "A PCO2 no líquido extracelular é controlada pela {{c1::intensidade respiratória}}.", "back": "", "type": "cloze", "tags": ["bioquímica::regulação_acidobásica", "exam::n1", "high_yield", "exam::n1"], "source_span": "a Pco2 no líquido extracelular é controlada pela intensidade respiratória", "source_chunk_id": "1505b4589c5c5c15:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "286a73697b43cfdc"}, {"front": "A PCO2 normal de 40 mmHg corresponde a cerca de {{c1::1,2 mol/L}} de CO2 dissolvido nos líquidos extracelulares.", "back": "", "type": "cloze", "tags": ["bioquímica::equilíbrio_acidobásico::pco2", "exam::n1", "high_yield", "exam::n1"], "source_span": "Cerca de 1,2 mol/L de CO2 dissolvido é, normalmente, encontrado nos líquidos extracelulares, correspondendo à Pco2 de 40 mmHg", "source_chunk_id": "51723ae60ff2d9cb:9", "explanation": null, "mnemonic": null, "verified": true, "card_id": "71550768192f7571"}, {"front": "A PCO2 normal de 40 mmHg corresponde a cerca de {{c1::1,2 mol/L}} de CO2 dissolvido nos líquidos extracelulares.", "back": "", "type": "cloze", "tags": ["subject::bioquimica::equilibrio_acido_basico", "topic::pco2_normal", "exam::
