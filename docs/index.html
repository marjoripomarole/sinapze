 Diabetes Mellitus: Tipos, Fisiopatologia e Complicações\n\nO diabetes mellitus é definido como 'síndrome do metabolismo defeituoso de carboidratos, lipídios e proteínas, causado tanto pela ausência de secreção de insulina como pela diminuição da sensibilidade dos tecidos à insulina.' O Tipo I (DMID, ~5–10% dos casos) resulta da destruição autoimune ou viral das células beta, com início geralmente na adolescência (diabetes mellitus juvenil), levando à ausência absoluta de insulina. O Tipo II (DMNID, ~90–95% dos casos) é causado por resistência à insulina nos tecidos-alvo, associada inicialmente à hiperinsulinemia compensatória; o início é gradual, geralmente após os 30 anos, fortemente associado à obesidade — especialmente à adiposidade visceral. Nos estágios avançados do Tipo II, as células beta se 'exaurem' e a produção de insulina torna-se insuficiente.\n\nAs consequências fisiopatológicas da deficiência/resistência à insulina incluem: (1) hiperglicemia (300–1.200 mg/100 mL no Tipo I grave), com glicosúria quando a glicemia supera ~180 mg/100 mL (limiar renal); (2) diurese osmótica → poliúria, desidratação intracelular e extracelular, polidipsia; (3) aumento da lipólise e cetogênese → cetose → acidose metabólica grave (pH < 7,0 → coma diabético e morte); (4) catabolismo proteico → polifagia com perda de peso e astenia. A síndrome metabólica, frequentemente precursora do DM2, inclui obesidade abdominal, resistência à insulina, hiperglicemia de jejum, dislipidemia (↑TG, ↓HDL) e hipertensão.\n\nAs complicações crônicas da hiperglicemia persistente envolvem lesão vascular (macro e microangiopatia), levando a infarto do miocárdio, acidente vascular cerebral, doença renal terminal, retinopatia e cegueira, além de neuropatia periférica e disfunção autonômica. A aterosclerose é amplificada pelo metabolismo anormal dos lipídios (↑colesterol circulante por uso excessivo de lipídios no fígado) e pela hipertensão secundária à lesão renal. O tratamento do DM2 nos estágios iniciais pode incluir exercícios, restrição calórica e redução de peso, sem necessidade de insulina exógena.\n\n### Pontos-chave\n\n- DM Tipo I: ausência de insulina por destruição das células beta (autoimune/viral/hereditária); ~5–10% dos casos; início abrupto.\n- DM Tipo II: resistência à insulina + hiperinsulinemia compensatória; ~90–95% dos casos; início gradual; associado à obesidade visceral.\n- Limiar renal para glicosúria: ~180 mg/100 mL; no DM grave não tratado, podem ser perdidos >100 g de glicose/dia na urina.\n- Tríade clássica do DM: poliúria, polidipsia e polifagia (com perda de peso).\n- Cetoacidose diabética: ausência de insulina → lipólise → corpos cetônicos → acidose metabólica → pH < 7,0 → coma e morte.\n- Respiração de Kussmaul (rápida e profunda) é compensação fisiológica da acidose metabólica diabética.\n- Síndrome metabólica: obesidade abdominal + resistência à insulina + hiperglicemia de jejum + dislipidemia (↑TG, ↓HDL) + hipertensão.\n- Complicações crônicas: retinopatia, nefropatia, neuropatia periférica, disfunção autonômica, aterosclerose acelerada.\n- PCOS: resistência à insulina e hiperinsulinemia em ~80% das mulheres afetadas; risco aumentado de DM2.\n- Causas de resistência à insulina incluem: obesidade visceral, síndrome de Cushing, acromegalia, PCOS, lipodistrofia, autoanticorpos ao receptor de insulina.\n\n### Comparação\n\n| Característica | DM Tipo I | DM Tipo II |\n|---|---|---|\n| Mecanismo | Ausência de secreção de insulina | Resistência à insulina |\n| Proporção dos casos | ~5–10% | ~90–95% |\n| Insulina plasmática | Baixa/ausente | Elevada (hiperinsulinemia compensatória) inicialmente |\n| Início típico | Abrupto (dias/semanas); adolescência | Gradual; >30 anos (frequentemente 50–60 anos) |\n| Associação com obesidade | Não predominante | Sim (principal fator de risco) |\n| Cetoacidose | Frequente e grave | Menos comum |\n| Tratamento inicial | Insulina exógena obrigatória | Exercício, dieta, redução de peso; fármacos sensibilizadores |\n| Denominação antiga | Diabetes juvenil / DMID | Diabetes do adulto / DMNID |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Ausência/Resistência à Insulina] --> B[↓ Captação celular de glicose]\n B --> C[Hiperglicemia: 300-1200 mg/100mL]\n C --> D1[Glicosúria - limiar ~180 mg/100mL]\n D1 --> E1[Diurese osmótica → Poliúria]\n E1 --> F1[Desidratação intracelular e extracelular → Polidipsia]\n A --> D2[↑ Lipólise → ↑ Ácidos graxos livres]\n D2 --> E2[↑ Cetogênese hepática → Corpos cetônicos]\n E2 --> F2[Cetose → Acidose metabólica]\n F2 --> G2[pH < 7,0 → Coma diabético → Morte]\n A --> D3[↑ Catabolismo proteico → ↑ Aminoácidos plasmáticos]\n D3 --> E3[Gliconeogênese aumentada + Excreção de ureia]\n E3 --> F3[Depleção proteica → Fraqueza extrema / Polifagia com perda de peso]\n```\n\n> **Mnemônico:** 3P + CETO + LESÃO: Poliúria + Polidipsia + Polifagia → CETOacidose → LESÃO vascular crônica (retina, rim, nervo, coração)\n\n<sub>Fontes: 76cae3be4bc84980:12, 76cae3be4bc84980:13, 76cae3be4bc84980:14, 76cae3be4bc84980:15, 76cae3be4bc84980:16</sub>\n\n---\n\n## Síntese e Armazenamento de Lipídios: Ácidos Graxos, Triglicerídeos e Regulação Hormonal\n\nA síntese de ácidos graxos a partir da acetil-CoA ocorre em duas etapas principais: primeiro, a acetil-CoA carboxilase converte acetil-CoA em malonil-CoA (etapa limitante), utilizando CO₂ e ATP; em seguida, 1 acetil-CoA + malonil-CoA + 16 NADPH formam ácido esteárico. Essa via não é simplesmente a reversão da beta-oxidação, pois utiliza malonil-CoA e NADPH como intermediários principais. As cadeias de ácidos graxos sintetizadas (14–18 carbonos) se combinam com o α-glicerofosfato — derivado da glicólise — para formar triglicerídeos, processo que depende criticamente da disponibilidade de glicose e insulina.\n\nA regulação do balanço entre síntese e mobilização de gorduras é finamente controlada por hormônios e pela disponibilidade de carboidratos. Quando há excesso de carboidratos, o α-glicerofosfato abundante desvia o equilíbrio para triglicerídeos armazenados, reduzindo ácidos graxos livres disponíveis como fonte de energia. Além disso, intermediários do ciclo do ácido cítrico ativam a acetil-CoA carboxilase, acelerando a lipogênese. Na ausência de insulina (como no diabetes melito grave), a glicose não entra adequadamente nos adipócitos e células hepáticas, limitando tanto a acetil-CoA/NADPH quanto o α-glicerofosfato, o que praticamente impede a síntese de gorduras.\n\nNa mobilização de gorduras, epinefrina e norepinefrina (liberadas durante exercício) ativam a lipase triglicerídeo sensível a hormônio, podendo elevar os ácidos graxos livres no sangue em até oito vezes o normal. Corticotropina, glicocorticoides e hormônio do crescimento também ativam essa lipase, com potencial efeito cetogênico. O hormônio tireoidiano mobiliza gorduras indiretamente, ao aumentar o metabolismo energético global. A eficiência da conversão de carboidrato em gordura é alta: apenas cerca de 15% da energia original da glicose se perde como calor, e 85% são transferidos para os triglicerídeos armazenados.\n\n### Pontos-chave\n\n- A etapa limitante da síntese de ácidos graxos é a carboxilação da acetil-CoA para malonil-CoA, catalisada pela acetil-CoA carboxilase, ativada por intermediários do ciclo do ácido cítrico.\n- O α-glicerofosfato, derivado da glicólise, é essencial para a formação de triglicerídeos; sua escassez (ausência de insulina/glicose) bloqueia a lipogênese.\n- A pessoa média armazena quase 150 vezes mais energia sob a forma de gorduras do que sob a forma de carboidratos.\n- Cada grama de gordura contém quase duas vezes e meia mais calorias do que cada grama de glicogênio.\n- No diabetes melito grave, a síntese de gorduras é mínima ou ausente por falta de glicose nos adipócitos e células hepáticas.\n- Epinefrina e norepinefrina são os principais hormônios mobilizadores de gordura durante exercício, ativando a lipase triglicerídeo sensível a hormônio.\n- Corticotropina e glicocorticoides em excesso prolongado podem causar cetose (efeito cetogênico).\n- Aminoácidos em excesso podem ser convertidos em acetil-CoA e, posteriormente, em triglicerídeos armazenados.\n\n### Comparação\n\n| Hormônio | Efeito sobre Lipólise | Mecanismo Principal | Observação Clínica |\n|---|---|---|---|\n| Epinefrina/Norepinefrina | ↑↑ (mobilização rápida) | Ativa lipase triglicerídeo sensível a hormônio | Ácidos graxos livres até 8× o normal no exercício |\n| Corticotropina (ACTH) | ↑↑ | Ativa lipase sensível a hormônio | Efeito cetogênico em excesso prolongado (Síndrome de Cushing) |\n| Glicocorticoides | ↑↑ | Ativa lipase sensível a hormônio | Cetose em hipersecreção crônica |\n| Hormônio do Crescimento | ↑ (fraco) | Ativa lipase sensível a hormônio | Leve efeito cetogênico |\n| Hormônio Tireoidiano | ↑ (indireto) | Aumenta metabolismo energético global, reduz intermediários | Mobilização indireta |\n| Insulina | ↓ (poupador de gordura) | Favorece entrada de glicose; aumenta α-glicerofosfato → triglicerídeos | Ausência → mobilização de gordura |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Acetil-CoA] -->|Acetil-CoA carboxilase + CO₂ + ATP| B[Malonil-CoA]\n B -->|+ NADPH + H⁺| C[Ácidos Graxos C14-C18]\n D[Glicose via Glicólise] --> E[α-Glicerofosfato]\n C --> F[Triglicerídeos]\n E --> F\n F -->|Lipase sensível a hormônio\\nEpinefrina/ACTH/Glicocorticoides| G[Ácidos Graxos Livres + Glicerol]\n G --> H[Energia / Beta-oxidação]\n I[Insulina presente] -->|↑ α-glicerofosfato| F\n J[Ausência de insulina] -->|↓ glicose nos adipócitos\\n↓ α-glicerofosfato| K[Bloqueio da lipogênese]\n```\n\n> **Mnemônico:** Para lembrar os hormônios que mobilizam gordura: 'E-CA-GT' → Epinefrina, Corticotropina, ACTH (glicocorticoides), GH (crescimento), Tireoidiano\n\n<sub>Fontes: 8405ad39f361404f:7, 8405ad39f361404f:8, 8405ad39f361404f:9</sub>\n\n---\n\n## Fosfolipídios e Colesterol: Síntese, Funções e Controle por Feedback\n\nOs fosfolipídios (lecitinas, cefalinas e esfingomielina) são sintetizados em praticamente todas as células, mas cerca de 90% são formados no fígado. Todos contêm uma ou mais moléculas de ácidos graxos, um radical de ácido fosfórico e, geralmente, uma base nitrogenada. Apesar da variabilidade estrutural, compartilham propriedades físicas similares: são lipossolúveis, transportados por lipoproteínas e utilizados em estruturas membranares. A colina é necessária para a síntese de lecitina, e o inositol é necessário para algumas cefalinas. Suas funções incluem: componentes essenciais das lipoproteínas plasmáticas, formação da tromboplastina (cefalina), isolamento elétrico da bainha de mielina (esfingomielina) e, principalmente, a formação de membranas celulares e intracelulares.\n\nO colesterol é sintetizado a partir de múltiplas moléculas de acetil-CoA (núcleo esterol), principalmente no fígado, mas também em todas as outras células. Cerca de 70% do colesterol plasmático está na forma de ésteres de colesterol. Até 80% do colesterol hepático é convertido em ácido cólico, base dos sais biliares. O controle da síntese endógena é feito por feedback negativo: o aumento do colesterol ingerido inibe a 3-hidroxi-3-metilglutaril CoA redutase (HMG-CoA redutase), enzima limitante da síntese. Esse mecanismo limita a variação da colesterolemia a ±15% com mudanças na dieta, embora a resposta individual varie.\n\nA concentração plasmática de colesterol é influenciada por múltiplos fatores: dieta rica em gorduras saturadas eleva o colesterol em 15–25% (aumenta acetil-CoA hepática); gorduras insaturadas reduzem moderadamente; ausência de insulina ou hormônio tireoidiano eleva o colesterol; excesso de hormônio tireoidiano reduz. Distúrbios genéticos, como mutações no receptor de LDL (hipercolesterolemia familiar), impedem a remoção hepática de LDL, descontrolando a síntese endógena e podendo elevar o colesterol a 600–1.000 mg/dL, com infarto do miocárdio antes dos 20 anos.\n\n### Pontos-chave\n\n- Cerca de 90% dos fosfolipídios são formados nas células hepáticas; quantidades substanciais também são formadas pelas células epiteliais intestinais durante absorção de lipídios.\n- A esfingomielina age como isolante elétrico na bainha de mielina em torno das fibras nervosas.\n- A cefalina é o principal componente da tromboplastina, necessária para iniciar a coagulação.\n- O colesterol endógeno é sintetizado inteiramente a partir de acetil-CoA; a HMG-CoA redutase é a enzima limitante e alvo das estatinas.\n- Até 80% do colesterol é convertido em ácido cólico no fígado, base dos sais biliares para digestão de gorduras.\n- A proporção entre colesterol e fosfolipídios na membrana é especialmente importante na determinação da fluidez das membranas celulares.\n- Na hipercolesterolemia familiar homozigótica (1:1.000.000 nascimentos), o colesterol pode atingir 600–1.000 mg/dL com morte cardiovascular antes dos 20 anos.\n- Dieta rica em gorduras saturadas eleva o colesterol plasmático em 15–25%, sendo tão ou mais importante controlar gorduras saturadas quanto o colesterol dietético.\n\n### Comparação\n\n| Fosfolipídio | Base Nitrogenada | Função Principal Específica |\n|---|---|---|\n| Lecitina | Colina | Componente de lipoproteínas; estrutura de membranas |\n| Cefalina | Etanolamina / Inositol | Formação da tromboplastina (coagulação) |\n| Esfingomielina | Colina (esfingosina) | Isolante elétrico da bainha de mielina |\n\n| Fator | Efeito sobre Colesterol Plasmático |\n|---|---|\n| Gorduras saturadas na dieta | ↑ 15–25% |\n| Gorduras insaturadas na dieta | ↓ leve a moderado |\n| Colesterol dietético | ↑ leve (±15%, limitado por feedback) |\n| Ausência de insulina | ↑ |\n| Ausência de hormônio tireoidiano | ↑ |\n| Excesso de hormônio tireoidiano | ↓ |\n| Mutação receptor LDL (hipercolesterolemia familiar) | ↑↑↑ (600–1.000 mg/dL) |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Acetil-CoA] -->|HMG-CoA redutase\\n— ETAPA LIMITANTE —| B[Núcleo Esterol]\n B --> C[Colesterol]\n C -->|80%| D[Ácido Cólico → Sais Biliares]\n C -->|pequena fração| E[Hormônios Esteroides\\nAdrenocorticais, Estrogênio,\\nProgesterona, Testosterona]\n C --> F[Membranas Celulares]\n C --> G[Camada córnea da pele\\nbarreira hídrica]\n H[↑ Colesterol ingerido] -->|Feedback negativo| I[Inibe HMG-CoA redutase]\n J[Estatinas] -->|Inibição competitiva| I\n I --> K[↓ Síntese endógena de colesterol]\n```\n\n> **Mnemônico:** Funções do colesterol: 'BHEM' → Bile (ácidos biliares), Hormônios esteroides, Estrutura de membranas, Membrana cutânea (barreira hídrica)\n\n<sub>Fontes: 8405ad39f361404f:9, 8405ad39f361404f:10, 8405ad39f361404f:11</sub>\n\n---\n\n## Aterosclerose: Patogênese, Fatores de Risco e Prevenção\n\nA aterosclerose é uma doença das artérias de médio e grande calibre caracterizada pelo desenvolvimento de placas ateromatosas nas paredes arteriais. O evento inicial é a lesão do endotélio vascular, que aumenta a expressão de moléculas de adesão e reduz a liberação de óxido nítrico. Isso permite o acúmulo de monócitos e LDL oxidada na camada íntima: os monócitos se diferenciam em macrófagos que fagocitam lipoproteínas oxidadas, tornando-se células espumosas (macrófagos espumosos), que formam as estrias de gordura visíveis. Com o tempo, as estrias coalescem, há proliferação de músculo liso e tecido fibroso, formando placas progressivamente maiores que podem ocluir o lúmen, calcificar e romper, levando à trombose.\n\nO principal fator etiológico é a elevada concentração plasmática de LDL. Gorduras saturadas, obesidade e inatividade física aumentam os níveis de LDL. A hipercolesterolemia familiar (mutação no gene do receptor de LDL) impede a remoção hepática de LDL, descontrolando a síntese endógena. As HDL exercem papel protetor, possivelmente absorvendo cristais de colesterol das paredes arteriais; proporção elevada de HDL/LDL reduz o risco de aterosclerose. Outros fatores de risco incluem inatividade física, obesidade, diabetes melito, hipertensão, hiperlipidemia e tabagismo. A combinação de hipertensão + diabetes + hiperlipidemia aumenta o risco de doença coronariana em quase 20 vezes de forma sinérgica.\n\nA prevenção envolve manutenção de peso saudável, atividade física, dieta com gorduras insaturadas e baixo colesterol, controle da pressão arterial, controle glicêmico e cessação do tabagismo. Farmacologicamente, as estatinas inibem competitivamente a HMG-CoA redutase, reduzindo a síntese de colesterol e aumentando os receptores de LDL hepáticos, com redução de 25–50% nos níveis plasmáticos de LDL. Cada redução de 1 mg/dL de LDL corresponde a cerca de 2% de redução na mortalidade por doença cardíaca aterosclerótica. Resinas de troca e farelo de aveia também reduzem o colesterol ao impedir a reabsorção de ácidos biliares no íleo.\n\n### Pontos-chave\n\n- A lesão endotelial é o evento inicial da aterosclerose, aumentando moléculas de adesão e reduzindo a liberação de óxido nítrico.\n- Macrófagos espumosos (monócitos que fagocitaram LDL oxidada) formam as estrias de gordura, precursoras das placas ateromatosas.\n- Quase metade de todas as mortes nos EUA e Europa é causada por doença vascular; cerca de dois terços dessas mortes são por trombose de artérias coronárias.\n- Hipertensão + diabetes melito + hiperlipidemia concomitantes aumentam o risco de doença coronariana em quase 20 vezes (efeito sinérgico).\n- HDL protege contra aterosclerose; proporção elevada de HDL/LDL reduz significativamente o risco.\n- Estatinas inibem competitivamente a HMG-CoA redutase, reduzindo LDL plasmático em 25–50% e aumentando receptores de LDL hepáticos.\n- Cada redução de 1 mg/dL de LDL plasmático corresponde a cerca de 2% de redução na mortalidade cardiovascular.\n- A hipercolesterolemia familiar heterozigótica ocorre em aproximadamente 1:500 pessoas; a homozigótica em 1:1.000.000.\n\n### Comparação\n\n| Fator de Risco | Mecanismo Principal | Magnitude do Risco |\n|---|---|---|\n| LDL elevado | Acúmulo de LDL oxidada na íntima; macrófagos espumosos | Principal fator etiológico |\n| Hipertensão | Lesão endotelial direta | ↑ 2× risco coronariano |\n| Diabetes melito | ↑ LDL; lesão vascular | ↑ 2× risco coronariano |\n| Hipertensão + Diabetes | Sinérgico | ↑ 8× risco coronariano |\n| Hipertensão + Diabetes + Hiperlipidemia | Sinérgico | ↑ ~20× risco coronariano |\n| Tabagismo | Lesão endotelial; oxidação de LDL | Fator de risco independente |\n| Inatividade física / Obesidade | ↑ LDL; ↓ HDL; favorece diabetes e HAS | Fator de risco múltiplo |\n| HDL elevado | Remoção de colesterol das paredes arteriais | Protetor |\n| Lipoproteína(a) | Mecanismo aterogênico não totalmente estabelecido | Quase duplica incidência |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Lesão Endotelial] --> B[↑ Moléculas de Adesão\\n↓ Óxido Nítrico]\n B --> C[Acúmulo de Monócitos e LDL na Íntima]\n C --> D[Monócitos → Macrófagos]\n D --> E[Macrófagos Fagocitam LDL Oxidada]\n E --> F[Células Espumosas]\n F --> G[Estria de Gordura]\n G --> H[Proliferação de Músculo Liso e Tecido Fibroso]\n H --> I[Placa Ateromatosa]\n I --> J{Progressão}\n J -->|Calcificação| K[Endurecimento Arterial]\n J -->|Oclusão do Lúmen| L[Isquemia / Infarto]\n J -->|Ruptura da Placa| M[Trombose / Embolia]\n```\n\n> **Mnemônico:** Fatores de risco para aterosclerose: 'DOHIT' → Diabetes, Obesidade/inatividade, Hipertensão, Hiperlipidemia, Tabagismo\n\n<sub>Fontes: 8405ad39f361404f:12, 8405ad39f361404f:13, 8405ad39f361404f:14, 8405ad39f361404f:15, 8405ad39f361404f:16</sub>\n\n---\n\n## Transporte através da Membrana Plasmática: Difusão, Transporte Ativo e Osmose\n\nA membrana plasmática é formada por uma bicamada lipídica com proteínas integrais, constituindo barreira seletiva para substâncias hidrossolúveis. O transporte ocorre por dois mecanismos fundamentais: difusão (movimento molecular aleatório a favor do gradiente, sem gasto de energia adicional) e transporte ativo (movimento contra o gradiente eletroquímico, com gasto de energia). A difusão simples ocorre diretamente pela bicamada lipídica (substâncias lipossolúveis como O₂, CO₂, N₂, álcool) ou por canais proteicos aquosos (substâncias hidrossolúveis pequenas, água via aquaporinas). A difusão facilitada requer proteína transportadora específica, apresenta cinética de saturação (Vmáx) e é o mecanismo de entrada de glicose e aminoácidos nas células; a GLUT4 é ativada pela insulina, aumentando em 10–20 vezes a velocidade de difusão facilitada da glicose nos tecidos sensíveis.\n\nOs canais proteicos são altamente seletivos, determinados pelo diâmetro, forma e cargas elétricas internas. Os canais de potássio permitem a passagem de K⁺ aproximadamente 1.000 vezes mais facilmente que Na⁺, graças ao filtro de seletividade com oxigênios carbonílicos que interagem com K⁺ desidratado. Os canais de sódio têm superfície interna com forte carga negativa que atrai Na⁺ desidratado. As comportas dos canais são controladas por voltagem (canais dependentes de voltagem, base do potencial de ação) ou por ligantes químicos (como a acetilcolina no canal nicotínico). O transporte ativo primário utiliza ATP diretamente (ex.: bomba Na⁺-K⁺ ATPase); o secundário usa o gradiente iônico gerado pelo transporte primário.\n\nA osmose é o movimento efetivo de água através de membrana semipermeável, do lado de menor concentração de soluto para o de maior concentração. A pressão osmótica é determinada pelo número de partículas por unidade de volume (concentração molar/osmolalidade), não pela massa. A osmolalidade normal dos líquidos corporais é de cerca de 300 miliosmois/kg de água, correspondendo a aproximadamente 5.500 mmHg de pressão osmótica. A bomba Na⁺-K⁺ é responsável pela manutenção dos gradientes iônicos transmembrana (alto K⁺ intracelular, alto Na⁺ extracelular) e pelo potencial elétrico negativo intracelular, sendo fundamental para a função nervosa e muscular.\n\n### Pontos-chave\n\n- Substâncias lipossolúveis (O₂, CO₂, álcool) atravessam a bicamada lipídica por difusão simples; a velocidade é diretamente proporcional à lipossolubilidade.\n- Aquaporinas são canais proteicos específicos para água, com poro estreito que permite difusão em fila única e exclui íons hidratados; existem pelo menos 13 tipos no corpo humano.\n- A difusão facilitada apresenta Vmáx (velocidade máxima de saturação), diferenciando-a da difusão simples que aumenta proporcionalmente à concentração.\n- A GLUT4 é ativada pela insulina, aumentando em 10–20 vezes a velocidade de difusão facilitada da glicose nos tecidos sensíveis — principal mecanismo de controle glicêmico pela insulina.\n- O filtro de seletividade dos canais de K⁺ possui oxigênios carbonílicos que interagem com K⁺ desidratado, excluindo Na⁺ (menor, mas não interage adequadamente com os oxigênios carbonílicos).\n- Canais dependentes de voltagem são a base do potencial de ação nervoso; canais dependentes de ligantes (ex.: canal de acetilcolina) são essenciais para transmissão sináptica e junção neuromuscular.\n- A pressão osmótica é determinada pelo número de partículas osmoticamente ativas (osmolalidade), não pela massa; 1 osmol/L gera 19.300 mmHg a 37°C.\n- A bomba Na⁺-K⁺ ATPase bombeia 3 Na⁺ para fora e 2 K⁺ para dentro por ciclo, mantendo o potencial de repouso e os gradientes iônicos essenciais para a excitabilidade celular.\n\n### Comparação\n\n| Mecanismo | Direção do Gradiente | Proteína Necessária | Gasto de ATP | Exemplos |\n|---|---|---|---|---|\n| Difusão simples (bicamada) | A favor | Não | Não | O₂, CO₂, álcool, N₂ |\n| Difusão simples (canal) | A favor | Canal proteico | Não | Água (aquaporinas), ureia, íons |\n| Difusão facilitada | A favor | Transportador específico | Não | Glicose (GLUT), aminoácidos |\n| Transporte ativo primário | Contra | Transportador + ATPase | Sim (direto) | Bomba Na⁺-K⁺, Ca²⁺-ATPase |\n| Transporte ativo secundário | Contra (soluto) | Cotransportador | Não (indireto) | Cotransporte Na⁺-glicose (SGLT) |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Substância a ser transportada] --> B{Lipossolúvel?}\n B -->|Sim| C[Difusão Simples\\npela Bicamada Lipídica\\nO₂, CO₂, álcool]\n B -->|Não| D{Pequena e\\nhidrossolúvel?}\n D -->|Sim - canal aberto| E[Difusão Simples\\npor Canal Proteico\\nágua, ureia, íons]\n D -->|Glicose/Aminoácidos| F[Difusão Facilitada\\nproteína transportadora\\nVmáx - saturável]\n D -->|Contra gradiente| G{Fonte de energia}\n G -->|ATP direto| H[Transporte Ativo Primário\\nBomba Na⁺-K⁺ ATPase]\n G -->|Gradiente iônico| I[Transporte Ativo Secundário\\ncotransporte Na⁺-glicose]\n F -->|Insulina ativa GLUT4| J[↑ 10-20× captação de glicose]\n```\n\n> **Mnemônico:** Para lembrar os tipos de transporte: 'DDFTA' → Difusão simples Direta (bicamada), Difusão simples por canal (Filtro/aquaporina), Difusão facilitada (Transportador), Transporte Ativo primário (ATP), transporte ativo secundário (gradiente)\n\n<sub>Fontes: ca1d03681e38ff3b:0, ca1d03681e38ff3b:1, ca1d03681e38ff3b:2, ca1d03681e38ff3b:3, ca1d03681e38ff3b:4, ca1d03681e38ff3b:5, ca1d03681e38ff3b:6, ca1d03681e38ff3b:7, ca1d03681e38ff3b:8, ca1d03681e38ff3b:9</sub>\n\n---\n\n## Bomba de Sódio-Potássio (Na⁺-K⁺-ATPase): Mecanismo, Funções e Relevância Clínica\n\nA bomba de Na⁺-K⁺-ATPase é uma proteína transportadora transmembrana que utiliza energia do ATP para mover ativamente três íons sódio para fora da célula e dois íons potássio para dentro, a cada ciclo. O mecanismo envolve a ligação simultânea de 2 K⁺ no lado extracelular e 3 Na⁺ no lado intracelular, ativando a função ATPase intrínseca da proteína, que cliva o ATP em ADP e fosfato inorgânico. A energia liberada promove mudança conformacional que extrudita os íons Na⁺ e internaliza os K⁺. Notavelmente, a bomba pode funcionar de forma reversa, sintetizando ATP a partir de ADP e fosfato quando os gradientes eletroquímicos são suficientemente elevados.\n\nA bomba desempenha três funções essenciais: (1) controle do volume celular — ao bombear mais íons para fora do que para dentro, cria déficit osmótico que impede o inchaço celular; (2) manutenção dos gradientes iônicos transmembrana, que são a base energética para o transporte ativo secundário de glicose e aminoácidos; e (3) geração de potencial elétrico transmembrana (natureza eletrogênica), pois transfere uma carga positiva líquida para o exterior a cada ciclo, criando eletronegatividade intracelular essencial para a excitabilidade de neurônios e células musculares.\n\nDo ponto de vista energético, a demanda da bomba pode ser enorme: em células nervosas eletricamente ativas, 60% a 70% das necessidades de energia das células talvez sejam direcionados para bombear o Na⁺ para fora da célula e o K⁺ para dentro. A inibição da bomba (por isquemia, por exemplo) leva ao acúmulo intracelular de Na⁺, osmose de água para a célula e edema intracelular, que pode ser prelúdio da morte tecidual.\n\n### Pontos-chave\n\n- A cada ciclo: 3 Na⁺ saem e 2 K⁺ entram, com hidrólise de 1 ATP — razão 3:2:1.\n- A atividade ATPase só é ativada quando ambos os sítios (2 K⁺ extracelular e 3 Na⁺ intracelular) estão ocupados simultaneamente.\n- A bomba é eletrogênica: transfere 1 carga positiva líquida para fora por ciclo, contribuindo para o potencial de repouso da membrana.\n- Função de controle de volume: o Na⁺ bombeado para fora tende a permanecer no extracelular (baixa permeabilidade da membrana ao Na⁺), criando saída osmótica de água.\n- A bomba pode funcionar de forma reversa e sintetizar ATP se os gradientes eletroquímicos forem experimentalmente aumentados o suficiente.\n- Células tubulares renais e glandulares podem gastar até 90% de sua energia apenas para transporte ativo contra gradiente.\n- A inibição da bomba por isquemia ou inflamação leva a edema intracelular, podendo aumentar o volume celular em 2 a 3 vezes o tamanho normal.\n\n### Comparação\n\n| Característica | Bomba Na⁺-K⁺-ATPase | Bomba de Ca²⁺ | Bomba de H⁺ (gástrica) |\n|---|---|---|---|\n| Tipo de transporte | Ativo primário | Ativo primário | Ativo primário |\n| Íons transportados | 3 Na⁺ (saída) / 2 K⁺ (entrada) | Ca²⁺ (saída ou para organelas) | H⁺ (saída para lúmen gástrico) |\n| Fonte de energia | Hidrólise de ATP (ATPase) | Hidrólise de ATP (ATPase) | Hidrólise de ATP (ATPase) |\n| Localização | Membrana plasmática de todas as células | Membrana plasmática e retículo sarcoplasmático/mitocôndrias | Células parietais do estômago; células intercaladas dos túbulos renais |\n| Gradiente gerado | Até 10–30× (Na⁺ fora; K⁺ dentro) | ~10.000× (Ca²⁺ intracelular muito baixo) | Até 1.000.000× (H⁺) no estômago; ~900× nos túbulos renais |\n| Relevância clínica | Volume celular, potencial de membrana, transporte secundário | Contração muscular, sinalização celular | Secreção de HCl; acidificação urinária |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[\"2 K⁺ ligam-se ao sítio extracelular da proteína\"] --> B[\"3 Na⁺ ligam-se ao sítio intracelular da proteína\"]\n B --> C[\"Ativação da função ATPase intrínseca\"]\n C --> D[\"Hidrólise de ATP → ADP + Pi + energia\"]\n D --> E[\"Mudança conformacional da proteína transportadora\"]\n E --> F[\"3 Na⁺ extrudados para o extracelular\"]\n E --> G[\"2 K⁺ internalizados para o intracelular\"]\n F --> H[\"Gradiente de Na⁺ → base para transporte ativo secundário\"]\n F --> I[\"Déficit osmótico → saída de água → controle do volume celular\"]\n F --> J[\"Carga positiva líquida sai → potencial eletrogênico transmembrana\"]\n```\n\n> **Mnemônico:** \"3 Na Saem, 2 K Entram, 1 ATP Gasta\" — 3-2-1 da bomba: Três sódios Saem, dois potássios Entram, um ATP é gasto por ciclo.\n\n<sub>Fontes: ca1d03681e38ff3b:10, ca1d03681e38ff3b:11, ca1d03681e38ff3b:13</sub>\n\n---\n\n## Transporte Ativo Secundário: Cotransporte e Contratransporte Dependentes de Sódio\n\nO transporte ativo secundário não utiliza ATP diretamente; em vez disso, aproveita o gradiente eletroquímico de Na⁺ gerado pela bomba Na⁺-K⁺-ATPase como reservatório de energia. No cotransporte (simporte), o Na⁺ e outra substância (glicose, aminoácidos, Cl⁻, I⁻, Fe²⁺, urato) se ligam simultaneamente a uma proteína transportadora no lado extracelular; a energia da difusão do Na⁺ para dentro da célula arrasta a substância cotransportada na mesma direção. Uma propriedade especial do cotransportador de sódio-glicose é que a mudança conformacional só ocorre quando ambos — Na⁺ e glicose — estão ligados, garantindo acoplamento obrigatório. Esse mecanismo é especialmente importante na absorção de glicose e aminoácidos no epitélio intestinal e na reabsorção tubular renal.\n\nNo contratransporte (antiporte), o Na⁺ entra pela face extracelular da proteína enquanto a substância a ser transportada (Ca²⁺ ou H⁺) está ligada à face intracelular; a energia da entrada do Na⁺ impulsiona a saída da outra substância. O contratransporte Na⁺-Ca²⁺ ocorre em quase todas as membranas celulares, complementando o transporte ativo primário de Ca²⁺. O contratransporte Na⁺-H⁺ é especialmente importante nos túbulos proximais renais, onde grandes volumes de H⁺ são secretados para o lúmen tubular, sendo etapa relevante no controle do equilíbrio acidobásico dos líquidos corporais.\n\nA distinção entre cotransporte e contratransporte reside na direção do movimento da substância secundária em relação ao Na⁺: no cotransporte ambos movem-se na mesma direção; no contratransporte movem-se em direções opostas. Em ambos os casos, a energia provém indiretamente do ATP, pois é a bomba Na⁺-K⁺-ATPase que mantém o gradiente de Na⁺ que torna possível o transporte secundário.\n\n### Pontos-chave\n\n- O gradiente de Na⁺ criado pela bomba Na⁺-K⁺-ATPase é o 'reservatório de energia' que impulsiona o transporte ativo secundário.\n- Cotransporte (simporte): Na⁺ e substância movem-se na mesma direção (ambos entram na célula).\n- Contratransporte (antiporte): Na⁺ entra enquanto a substância secundária sai da célula.\n- O cotransportador Na⁺-glicose exige ligação simultânea de Na⁺ e glicose para que ocorra a mudança conformacional — acoplamento obrigatório.\n- Cinco proteínas transportadoras de aminoácidos já foram identificadas, cada uma responsável por subgrupo de aminoácidos com características moleculares específicas.\n- O contratransporte Na⁺-H⁺ nos túbulos proximais renais transporta grande quantidade de H⁺, sendo etapa importante no controle dos íons hidrogênio nos líquidos corporais.\n- O contratransporte Na⁺-Ca²⁺ complementa o transporte ativo primário de Ca²⁺ em quase todas as membranas celulares.\n- Outros íons cotransportados com Na⁺: Cl⁻, I⁻, Fe²⁺ e urato.\n\n### Comparação\n\n| Tipo | Direção do Na⁺ | Direção da substância secundária | Exemplos clínicos/fisiológicos |\n|---|---|---|---|\n| Cotransporte (simporte) | Entra na célula | Entra na célula (mesma direção) | Absorção de glicose e aminoácidos no intestino e túbulo renal; cotransporte de Cl⁻, I⁻, Fe²⁺, urato |\n| Contratransporte (antiporte) | Entra na célula | Sai da célula (direção oposta) | Na⁺-Ca²⁺ (todas as membranas); Na⁺-H⁺ (túbulo proximal renal) |\n| Transporte ativo primário (referência) | Sai da célula (bomba) | K⁺ entra (acoplado) | Bomba Na⁺-K⁺-ATPase; bomba de Ca²⁺; bomba de H⁺ gástrica |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[\"Bomba Na⁺-K⁺-ATPase (ATP)\"] --> B[\"Gradiente de Na⁺: alta [Na⁺] extracelular, baixa [Na⁺] intracelular\"]\n B --> C{\"Tipo de transporte secundário\"}\n C -->|\"Cotransporte\"| D[\"Na⁺ + Glicose/Aminoácido ligam-se à proteína (face extracelular)\"]\n D --> E[\"Mudança conformacional → ambos entram na célula\"]\n E --> F[\"Absorção intestinal e reabsorção tubular renal\"]\n C -->|\"Contratransporte\"| G[\"Na⁺ liga-se (face extracelular); Ca²⁺ ou H⁺ liga-se (face intracelular)\"]\n G --> H[\"Mudança conformacional → Na⁺ entra; Ca²⁺/H⁺ sai\"]\n H --> I[\"Regulação do Ca²⁺ intracelular e do pH corporal\"]\n```\n\n> **Mnemônico:** \"Co = Companheiros (mesma direção); Contra = Contrários (direções opostas)\" — cotransporte: Na⁺ e substância entram juntos; contratransporte: Na⁺ entra, substância sai.\n\n<sub>Fontes: ca1d03681e38ff3b:11, ca1d03681e38ff3b:12</sub>\n\n---\n\n## Compartimentos dos Líquidos Corporais: Composição, Volumes e Medição\n\nO líquido corporal total corresponde a aproximadamente 60% do peso corporal em homens adultos (≈42 litros em 70 kg), distribuído em dois grandes compartimentos: o líquido intracelular (LIC), que representa cerca de 40% do peso corporal (≈28 litros), e o líquido extracelular (LEC), que representa cerca de 20% do peso corporal (≈14 litros). O LEC subdivide-se em líquido intersticial (mais de três quartos do LEC, ≈11 litros) e plasma (quase um quarto, ≈3 litros). Existe ainda um compartimento menor, o líquido transcelular (1–2 litros), que inclui líquido sinovial, peritoneal, pericárdico, intraocular e cefalorraquidiano. O percentual de água corporal varia com idade, sexo e gordura corporal: mulheres têm em média 50%, recém-nascidos 70–75%, e o envelhecimento reduz progressivamente esse percentual pelo aumento do tecido adiposo.\n\nA composição iônica dos compartimentos é marcadamente diferente. O LEC (plasma e interstício) é rico em Na⁺ e Cl⁻, enquanto o LIC é rico em K⁺, fosfato, Mg²⁺ e proteínas. Quase 80% da osmolaridade do líquido intersticial e do plasma são devidos aos íons sódio e cloreto, enquanto para o líquido intracelular quase a metade da osmolaridade é devida aos íons potássio. A osmolaridade total dos três compartimentos é praticamente igual (≈300 mOsm/L), com o plasma ligeiramente maior (≈1 mOsm/L) devido às proteínas plasmáticas — diferença responsável pela pressão coloidosmótica capilar de ≈20 mmHg. O efeito Donnan explica por que cátions são discretamente mais concentrados no plasma (≈2%) e ânions são ligeiramente mais concentrados no interstício.\n\nA medição dos volumes compartimentais utiliza o princípio indicador-diluição: Volume = Massa do indicador injetado / Concentração final. A água corporal total é medida com trítio (³H₂O), deutério (²H₂O) ou antipirina; o LEC com ²²Na, inulina ou iotalamato radioativo; o volume plasmático com ¹²⁵I-albumina ou azul de Evans; o volume sanguíneo com eritrócitos marcados com ⁵¹Cr ou calculado como Volume plasmático / (1 − Hematócrito). O LIC e o líquido intersticial são calculados indiretamente por subtração.\n\n### Pontos-chave\n\n- Distribuição: LIC ≈ 40% do peso corporal; LEC ≈ 20% (interstício ≈ 15%, plasma ≈ 5%); líquido transcelular ≈ 1–2 L.\n- LEC: rico em Na⁺ (142 mEq/L no plasma) e Cl⁻; LIC: rico em K⁺ (140 mOsm/L), fosfato, Mg²⁺ e proteínas (≈4× mais que no plasma).\n- Osmolaridade dos três compartimentos ≈ 300 mOsm/L; equilíbrio osmótico é atingido em segundos a minutos na membrana celular, mas ≈30 minutos para todo o corpo.\n- Efeito Donnan: proteínas plasmáticas com carga negativa retêm cátions no plasma e repelem ânions para o interstício.\n- Hematócrito normal: ≈0,40 em homens; ≈0,36 em mulheres; pode cair a 0,10 na anemia grave ou subir a 0,65 na policitemia.\n- Volume sanguíneo total ≈ 7% do peso corporal (≈5 litros); 60% plasma, 40% hemácias.\n- O LIC não pode ser medido diretamente: LIC = Água corporal total − Volume do LEC.\n- Líquido intersticial também é calculado indiretamente: Volume intersticial = Volume LEC − Volume plasmático.\n\n### Comparação\n\n| Compartimento | Volume (70 kg) | % Peso Corporal | Íons Predominantes | Indicador de Medição |\n|---|---|---|---|---|\n| Água corporal total | ≈42 L | 60% | — | ³H₂O, ²H₂O, antipirina |\n| Líquido intracelular (LIC) | ≈28 L | 40% | K⁺, HPO₄²⁻, Mg²⁺, proteínas | Calculado (ACT − LEC) |\n| Líquido extracelular (LEC) | ≈14 L | 20% | Na⁺, Cl⁻, HCO₃⁻ | ²²Na, inulina, iotalamato |\n| Líquido intersticial | ≈11 L | ~15% | Na⁺, Cl⁻ (sem proteínas) | Calculado (LEC − plasma) |\n| Plasma | ≈3 L | ~5% | Na⁺, Cl⁻, proteínas | ¹²⁵I-albumina, azul de Evans |\n| Volume sanguíneo | ≈5 L | ~7% | — | ⁵¹Cr-hemácias ou plasma/(1−Ht) |\n| Líquido transcelular | 1–2 L | ~1–2% | Variável | — |\n\n> **Mnemônico:** \"PIPE\" para os compartimentos do LEC em ordem decrescente de volume: **P**lasma (3L) → **I**nterstício (11L) → **P**eritoneal/transcelular (1–2L) → **E**xtracelular total (14L). Para lembrar a fórmula de medição indireta: \"**LIC = ACT menos LEC**; **Interstício = LEC menos Plasma**\".\n\n<sub>Fontes: 7045a5149a0b780c:1, 7045a5149a0b780c:2, 7045a5149a0b780c:3, 7045a5149a0b780c:4, 7045a5149a0b780c:5, 7045a5149a0b780c:7</sub>\n\n---\n\n## Osmose, Tonicidade e Distúrbios Clínicos: Hiponatremia, Hipernatremia e Edema\n\nA osmose é a difusão efetiva de água através de membrana seletivamente permeável, de região de maior concentração de água para outra região de menor concentração. As membranas celulares são muito permeáveis à água, mas relativamente impermeáveis a íons como Na⁺ e Cl⁻; por isso, qualquer desequilíbrio osmótico entre LIC e LEC é corrigido em segundos pelo movimento de água, não de solutos. A tonicidade de uma solução depende exclusivamente da concentração de solutos impermeantes: soluções isotônicas (NaCl 0,9% ou glicose 5%) não alteram o volume celular; soluções hipotônicas causam inchaço celular; soluções hipertônicas causam murchamento celular. Já os termos isosmótico/hiperosmótico/hipo-osmótico referem-se à osmolaridade total, independentemente da permeabilidade do soluto.\n\nA hiponatremia (Na⁺ plasmático < 142 mEq/L) é o distúrbio eletrolítico mais comum na prática clínica, ocorrendo em 15–25% dos pacientes hospitalizados. Pode resultar de perda de NaCl (diarreia, vômitos, diuréticos, doença de Addison) ou de retenção excessiva de água (SIADH, tumor broncogênico). Clinicamente, causa edema celular, especialmente cerebral: queda rápida do Na⁺ abaixo de 115–120 mmol/L pode levar a convulsões, coma e morte. Na hiponatremia crônica, o cérebro adapta-se exportando solutos (Na⁺, K⁺, glutamato), o que atenua o edema, mas torna a correção rápida perigosa — pode causar desmielinização osmótica. A correção deve ser limitada a menos de 10–12 mmol/L em 24 horas e menos de 18 mmol/L em 48 horas.\n\nA hipernatremia (Na⁺ elevado) é menos comum e geralmente resulta de perda de água livre (diabetes insípido, sudorese excessiva) ou excesso de Na⁺ (aldosteronismo primário, síndrome de Cushing). Causa murchamento celular e sintomas graves quando o Na⁺ sobe rapidamente acima de 158–160 mmol/L. O edema extracelular ocorre por filtração capilar excessiva (aumento da pressão hidrostática capilar, redução da pressão coloidosmótica do plasma, aumento do coeficiente de filtração) ou por falência linfática (linfedema). O edema intracelular ocorre por hiponatremia, depressão metabólica ou isquemia que compromete as bombas iônicas.\n\n### Pontos-chave\n\n- Isotônico = não altera volume celular (NaCl 0,9% ou glicose 5%); hipotônico = célula incha; hipertônico = célula murcha.\n- Tonicidade depende de solutos impermeantes; osmolaridade inclui todos os solutos (permeantes e impermeantes).\n- Hiponatremia é o distúrbio eletrolítico mais comum: 15–25% dos pacientes hospitalizados.\n- Na⁺ plasmático < 115–120 mmol/L com queda rápida → risco de convulsões, coma e morte por edema cerebral.\n- Correção da hiponatremia crônica deve ser lenta: < 10–12 mmol/L/24h e < 18 mmol/L/48h para evitar desmielinização osmótica.\n- Hipernatremia: sintomas graves geralmente apenas com Na⁺ > 158–160 mmol/L de forma rápida; sede intensa é mecanismo protetor.\n- Edema extracelular: filtração capilar excessiva (↑Pc, ↓πc, ↑Kf) ou linfedema (ex.: filariose por Wuchereria bancrofti, mastectomia).\n- Edema intracelular: isquemia → falência das bombas iônicas → acúmulo de Na⁺ intracelular → osmose → pode aumentar volume celular 2–3×.\n- Infusão de 2 L de NaCl 3% em paciente de 70 kg aumenta o LEC em > 5 litros e reduz o LIC em > 3 litros após equilíbrio osmótico.\n\n### Comparação\n\n| Distúrbio | Causa Principal | [Na⁺] Plasmático | Volume LEC | Volume LIC | Consequência Celular |\n|---|---|---|---|---|---|\n| Desidratação hiposmótica | Insuficiência adrenal, diuréticos abusivos | ↓ | ↓ | ↑ | Edema celular |\n| Hiperidratação hiposmótica | SIADH, tumor broncogênico | ↓ | ↑ | ↑ | Edema celular |\n| Desidratação hiperosmótica | Diabetes insípido, sudorese excessiva | ↑ | ↓ | ↓ | Murchamento celular |\n| Hiperidratação hiperosmótica | Síndrome de Cushing, aldosteronismo primário | ↑ | ↑ | ↓ | Murchamento celular |\n| Infusão isotônica (NaCl 0,9%) | Reposição volêmica | = | ↑ | = | Nenhuma |\n| Infusão hipotônica | Hiperidratação iatrogênica | ↓ | ↑ (menor) | ↑ (maior) | Edema celular |\n| Infusão hipertônica (NaCl 3%) | Correção de hiponatremia grave | ↑ | ↑↑ | ↓ | Murchamento celular |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[\"Alteração da osmolaridade do LEC\"] --> B{\"Direção do desequilíbrio\"}\n B -->|\"LEC hipotônico (↓Na⁺)\"| C[\"Água entra na célula por osmose\"]\n C --> D[\"Edema celular (especialmente cerebral)\"]\n D --> E{\"Velocidade de instalação\"}\n E -->|\"Aguda\"| F[\"Convulsões, coma, morte (Na⁺ < 115–120 mmol/L)\"]\n E -->|\"Crônica\"| G[\"Adaptação: exportação de solutos do cérebro\"]\n G --> H[\"Correção rápida → desmielinização osmótica\"]\n G --> I[\"Correção lenta: < 10–12 mmol/L/24h\"]\n B -->|\"LEC hipertônico (↑Na⁺)\"| J[\"Água sai da célula por osmose\"]\n J --> K[\"Murchamento celular\"]\n K --> L[\"Sintomas graves: Na⁺ > 158–160 mmol/L (rápido)\"]\n K --> M[\"Sede intensa: mecanismo protetor\"]\n```\n\n> **Mnemônico:** \"HIPO = Hincha (célula incha); HIPER = Hurta água (célula murcha)\" — Hiponatremia/hipotônico → célula incha; Hipernatremia/hipertônico → célula murcha. Para causas de hiponatremia: **DAVID** — **D**iarreia/vômito, **A**ddison, **V**olume excessivo de água (SIADH), **I**ngestão excessiva de água, **D**iuréticos.\n\n<sub>Fontes: 7045a5149a0b780c:5, 7045a5149a0b780c:6, 7045a5149a0b780c:7, 7045a5149a0b780c:8, 7045a5149a0b780c:9, 7045a5149a0b780c:10, 7045a5149a0b780c:11, 7045a5149a0b780c:12, 7045a5149a0b780c:13</sub>\n\n---\n\n## Edema Extracelular: Causas e Mecanismos\n\nO edema extracelular resulta do acúmulo anormal de líquido nos espaços intersticiais, podendo ser causado por dois grandes mecanismos: vazamento excessivo de líquido dos capilares ou incapacidade dos linfáticos de retornar o líquido ao compartimento vascular. As causas incluem aumento da pressão capilar (por retenção renal de sal e água, pressão venosa elevada ou redução da resistência arteriolar), redução das proteínas plasmáticas (síndrome nefrótica, cirrose, desnutrição), aumento da permeabilidade capilar (reações imunes, toxinas, infecções) e bloqueio do retorno linfático (câncer, filariose, cirurgia).\n\nNa insuficiência cardíaca, o coração 'bombeia o sangue das veias para as artérias de modo deficiente', elevando a pressão venosa e capilar. Adicionalmente, a queda da pressão arterial reduz a filtração renal, ativando o eixo renina-angiotensina-aldosterona, que promove retenção adicional de sal e água. Na insuficiência cardíaca esquerda isolada, o sangue se acumula na circulação pulmonar, causando edema pulmonar grave e potencialmente fatal em poucas horas.\n\nA redução das proteínas plasmáticas diminui a pressão coloidosmótica do plasma, favorecendo a filtração capilar. Na síndrome nefrótica, as membranas glomerulares tornam-se permeáveis às proteínas, que são perdidas na urina; quando a concentração proteica cai abaixo de 2,5 g/100 mL de plasma, instala-se edema generalizado grave. Na cirrose hepática, além da síntese proteica insuficiente, a compressão do sistema porta eleva a pressão hidrostática capilar gastrointestinal, resultando em ascite.\n\n### Pontos-chave\n\n- Quatro grandes categorias de causas: aumento da pressão capilar, redução das proteínas plasmáticas, aumento da permeabilidade capilar e bloqueio linfático.\n- Na insuficiência cardíaca, a ativação do eixo renina-angiotensina-aldosterona agrava o edema por retenção adicional de sal e água pelos rins.\n- Na insuficiência cardíaca esquerda, o edema pulmonar pode progredir rapidamente para óbito em poucas horas.\n- Edema por síndrome nefrótica: perda urinária de proteínas leva à queda da pressão coloidosmótica; edema grave ocorre quando proteína plasmática cai abaixo de 2,5 g/100 mL.\n- Cirrose hepática causa edema por dois mecanismos simultâneos: síntese proteica insuficiente e hipertensão portal com aumento da pressão hidrostática capilar gastrointestinal.\n- Ascite é a efusão na cavidade peritoneal, podendo acumular 20 litros ou mais de líquido.\n- Glomerulonefrite aguda em crianças causa edema extracelular generalizado associado a hipertensão grave.\n- Filariose linfática (nematódeo da filária) é causa infecciosa clássica de bloqueio do retorno linfático.\n\n### Comparação\n\n| Causa de Edema | Mecanismo Principal | Exemplo Clínico | Localização Típica |\n|---|---|---|---|\n| Insuficiência cardíaca direita | ↑ pressão venosa sistêmica → ↑ pressão capilar | ICC descompensada | Membros inferiores, anasarca |\n| Insuficiência cardíaca esquerda | ↑ pressão capilar pulmonar | ICC esquerda | Pulmões (edema pulmonar) |\n| Síndrome nefrótica | ↓ proteínas plasmáticas → ↓ pressão coloidosmótica | Glomerulopatias | Generalizado |\n| Cirrose hepática | ↓ síntese proteica + hipertensão portal | Cirrose alcoólica | Ascite + edema periférico |\n| Bloqueio linfático | Incapacidade de retorno linfático | Filariose, câncer | Regional (linfedema) |\n| Aumento da permeabilidade capilar | Vazamento de proteínas para interstício | Reações alérgicas, queimaduras | Local ou generalizado |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Insuficiência Cardíaca] --> B[↓ Débito cardíaco]\n B --> C[↑ Pressão venosa e capilar]\n B --> D[↓ Pressão arterial]\n D --> E[↓ Filtração renal]\n E --> F[↑ Secreção de renina]\n F --> G[↑ Angiotensina II + Aldosterona]\n G --> H[Retenção de sal e água]\n C --> I[↑ Filtração capilar]\n H --> I\n I --> J[EDEMA EXTRACELULAR]\n```\n\n> **Mnemônico:** PPAL-B para as causas de edema: Pressão capilar aumentada, Proteínas plasmáticas reduzidas, Aumento da permeabilidade capilar, Linfáticos bloqueados\n\n<sub>Fontes: 7045a5149a0b780c:14, 7045a5149a0b780c:15</sub>\n\n---\n\n## Fatores de Segurança Contra o Edema e Espaços em Potencial\n\nO organismo possui três fatores de segurança que normalmente previnem o desenvolvimento de edema clinicamente significativo, mesmo diante de perturbações moderadas das forças de Starling. O primeiro é a baixa complacência do interstício em valores negativos de pressão: como a pressão hidrostática intersticial normal é de aproximadamente -3 mmHg, pequenos aumentos de volume causam grandes elevações de pressão, que se opõem à filtração capilar. Esse fator contribui com cerca de 3 mmHg de proteção. O segundo fator é o aumento do fluxo linfático, que pode crescer 'por 10 a 50 vezes quando ocorre acúmulo de líquido nos tecidos', removendo proteínas e líquido do interstício; esse fator contribui com aproximadamente 7 mmHg. O terceiro é a 'lavagem' das proteínas intersticiais pelo aumento do fluxo linfático, que reduz a pressão coloidosmótica intersticial e, portanto, diminui a força efetiva de filtração capilar; esse fator também contribui com cerca de 7 mmHg. O fator de segurança total é de aproximadamente 17 mmHg.\n\nO gel intersticial, formado por filamentos proteoglicanos, desempenha papel fundamental: em pressões negativas, praticamente todo o líquido intersticial está na forma de gel, impedindo o fluxo livre. Quando a pressão intersticial torna-se positiva, a complacência aumenta expressivamente, o líquido livre se acumula e o edema torna-se 'depressível' (cacifo). O edema não depressível ocorre quando as células incham ou quando o líquido intersticial é coagulado pelo fibrinogênio.\n\nOs espaços em potencial (pleural, pericárdico, peritoneal, sinovial) normalmente contêm pressão negativa e fina camada de líquido lubrificante. Quando ocorre edema no tecido adjacente, o líquido também se acumula nesses espaços, sendo chamado de efusão. A drenagem linfática é essencial para remover proteínas desses espaços; seu bloqueio por ferimento, infecção ou câncer causa efusão isolada na cavidade afetada.\n\n### Pontos-chave\n\n- Fator de segurança total contra edema: ~17 mmHg (3 + 7 + 7 mmHg).\n- Pressão hidrostática intersticial normal: aproximadamente -3 mmHg; deve aumentar ~3 mmHg antes que grandes quantidades de líquido se acumulem.\n- Fluxo linfático pode aumentar 10 a 50 vezes como resposta ao acúmulo de líquido intersticial.\n- A 'lavagem' de proteínas pelo aumento do fluxo linfático reduz a pressão coloidosmótica intersticial, diminuindo a força de filtração capilar.\n- Em pressão intersticial positiva, a complacência tecidual aumenta muito, o fator de segurança é perdido e o edema depressível (cacifo) se instala.\n- Edema depressível: líquido livre no interstício, pode ser deslocado pela pressão digital. Edema não depressível: células edemaciadas ou líquido coagulado por fibrinogênio.\n- Filamentos proteoglicanos atuam como 'espaçadores' celulares e impedem fluxo rápido de líquido, mas permitem difusão de nutrientes e resíduos.\n- Pressão normal nos espaços em potencial: pleural -7 a -8 mmHg; articulações -3 a -5 mmHg; pericárdio -5 a -6 mmHg.\n- Ascite grave pode acumular 20 litros ou mais de líquido na cavidade peritoneal.\n\n### Comparação\n\n| Fator de Segurança | Mecanismo | Contribuição (mmHg) |\n|---|---|---|\n| Baixa complacência intersticial (pressão negativa) | Pequeno aumento de volume → grande aumento de pressão → opõe-se à filtração | ~3 mmHg |\n| Aumento do fluxo linfático | Linfáticos removem líquido e proteínas do interstício (até 50× o normal) | ~7 mmHg |\n| Lavagem de proteínas intersticiais | ↑ fluxo linfático → ↓ proteínas no interstício → ↓ pressão coloidosmótica intersticial | ~7 mmHg |\n| **TOTAL** | | **~17 mmHg** |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[↑ Filtração capilar] --> B[↑ Volume intersticial]\n B --> C[↑ Pressão hidrostática intersticial]\n C --> D[Opõe-se à filtração - 3 mmHg]\n B --> E[↑ Fluxo linfático 10-50x]\n E --> F[Remoção de líquido e proteínas]\n F --> G[↓ Pressão coloidosmótica intersticial - 7 mmHg]\n E --> H[Lavagem de proteínas - 7 mmHg]\n D & G & H --> I[Fator de segurança total ~17 mmHg]\n I --> J{Pressão capilar > 17 mmHg acima do normal?}\n J -- Não --> K[Sem edema significativo]\n J -- Sim --> L[EDEMA CLÍNICO]\n```\n\n> **Mnemônico:** CLaVa: Complacência baixa (3 mmHg) + Linfático aumentado (7 mmHg) + Varredura/lavagem de proteínas (7 mmHg) = 17 mmHg total\n\n<sub>Fontes: 7045a5149a0b780c:15, 7045a5149a0b780c:16, 7045a5149a0b780c:17, 7045a5149a0b780c:18</sub>\n\n---\n\n## Osmolaridade, Compartimentos de Líquidos Corporais e Equilíbrio de Starling\n\nA água é o principal constituinte do corpo humano, variando de 45% a 75% do peso corporal, sendo o principal determinante dessa variação a proporção de tecido adiposo (que contém apenas 10% de água). Em um homem de 70 kg, o volume total de água é de aproximadamente 45 litros: 30 L intracelulares, 12 L no líquido intersticial e 3 L no plasma. O líquido extracelular representa cerca de 21% do peso corporal (~15 L), sendo subdividido em líquido intersticial e plasma. O líquido intersticial é considerado um ultrafiltrado do plasma, com composição iônica semelhante, mas com conteúdo proteico muito baixo.\n\nA osmolaridade dos fluidos corporais é mantida notavelmente constante em 285–295 mOsmol/kg. Os íons Na⁺ e Cl⁻ respondem por cerca de 85% da atividade osmótica do líquido extracelular. A pressão oncótica (coloidosmótica) exercida pelas proteínas plasmáticas é de apenas ~28 mmHg, mas é crucial para o controle do movimento de líquido através da parede capilar, pois os capilares são impermeáveis às proteínas mas altamente permeáveis a moléculas de baixo peso molecular. O equilíbrio de Starling descreve o balanço entre pressão hidrostática capilar (que força líquido para fora) e pressão oncótica (que retém líquido no vaso): na extremidade arteriolar, a pressão de filtração líquida é +10 mmHg; na extremidade venosa, é -10 mmHg (reabsorção). Apenas ~2 L/dia drenam para o sistema linfático.\n\nSoluções isotônicas não causam variação de volume celular (ex: NaCl 0,9% e glicose 5%). Soluções hipotônicas causam edema celular; hipertônicas causam encolhimento. A ureia, embora isosmótica com NaCl 0,9%, não é isotônica porque permeia livremente a membrana celular, não gerando gradiente osmótico efetivo. O transporte de água através das membranas ocorre principalmente por aquaporinas, cuja expressão pode ser regulada fisiologicamente (ex: ADH nos ductos coletores renais).\n\n### Pontos-chave\n\n- Distribuição da água corporal em homem de 70 kg: ~45 L totais (30 L intracelular, 12 L intersticial, 3 L plasma).\n- Na⁺ e Cl⁻ respondem por ~85% da atividade osmótica do líquido extracelular; osmolalidade normal: 285–295 mOsmol/kg.\n- Pressão oncótica (~28 mmHg) é pequena em relação à osmótica total, mas é o principal determinante do movimento de líquido através da parede capilar.\n- Equilíbrio de Starling: pressão de filtração líquida arteriolar = +10 mmHg; venosa = -10 mmHg (reabsorção).\n- Solução isotônica ≠ isosmótica: ureia 1,8% é isosmótica com NaCl 0,9%, mas não é isotônica pois permeia a membrana e causa hemólise.\n- Aquaporinas são proteínas transportadoras de água; ADH regula sua inserção na membrana luminal dos ductos coletores renais.\n- Hipoproteinemia (síndrome nefrótica, desnutrição) reduz pressão oncótica e causa expansão generalizada do volume intersticial.\n- Expansão de volume pode causar edema, ascite, hipertensão e hiponatremia; depleção de volume causa hipotensão, taquicardia, redução da TFG.\n- Líquido transcelular (pleural, peritoneal, sinovial, LCR): 0,7–2,0 L; é compartimento especializado do líquido extracelular.\n\n### Comparação\n\n| Solução | Osmolalidade | Isotônica? | Efeito nas hemácias |\n|---|---|---|---|\n| NaCl 0,9% | ~285 mOsmol/kg | Sim | Sem alteração de volume |\n| Glicose 5% | ~285 mOsmol/kg | Sim | Sem alteração de volume |\n| NaCl 0,5% | < 285 mOsmol/kg | Não (hipotônica) | Edema → hemólise |\n| NaCl 1,8% | > 285 mOsmol/kg | Não (hipertônica) | Encolhimento |\n| Ureia 1,8% | ~285 mOsmol/kg | Não (apesar de isosmótica) | Hemólise (ureia permeia a membrana) |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart LR\n A[Extremidade arteriolar\\nP hidrostática: 35 mmHg\\nP oncótica: 25 mmHg] --> B[Pressão de filtração líquida\\n+10 mmHg → FILTRAÇÃO]\n B --> C[Líquido intersticial]\n C --> D[Extremidade venosa\\nP hidrostática: 15 mmHg\\nP oncótica: 25 mmHg]\n D --> E[Pressão de reabsorção líquida\\n-10 mmHg → REABSORÇÃO]\n C --> F[~2 L/dia → Sistema linfático → Circulação]\n```\n\n> **Mnemônico:** POHL para o equilíbrio de Starling: Pressão hidrostática (para fora) vs. Oncótica (para dentro) = Homeostase do Líquido intersticial\n\n<sub>Fontes: 0630654247dedf11:0, 0630654247dedf11:1, 0630654247dedf11:2, 0630654247dedf11:3</sub>\n\n---\n\n## Questões de Prova: Bioquímica e Biologia Celular (N1 e N2)\n\nAs provas N1 e N2 da disciplina de Bioquímica e Biologia Celular abrangem temas integrados que vão desde a fisiologia celular básica até mecanismos moleculares de doenças. No N1, destacam-se questões sobre manutenção do gradiente iônico (bomba Na⁺/K⁺-ATPase com gasto energético), equilíbrio acidobásico (acidose metabólica na cetoacidose diabética, alcalose e excreção de bicarbonato), metabolismo de carboidratos (glicogênio sintase, glicogênio fosforilase, gliconeogênese pelo glucagon), lipídeos e lipoproteínas (quilomicrons, VLDL, remanescentes), disfunção endotelial (redução do óxido nítrico por espécies reativas de oxigênio), vitaminas (K na coagulação, B12 na anemia megaloblástica) e estrutura proteica (pontes dissulfeto, estrutura primária, modificações pós-translacionais).\n\nNo N2, o foco se amplia para biologia molecular: replicação do DNA (DNA polimerase α sintetiza primers de RNA), transcrição (RNA polimerase, TATA-binding protein, cap 5', poliadenilação 3', rifampicina como inibidor da RNA polimerase bacteriana), regulação epigenética (acetilação de histonas → eucromatina → ativação transcricional; metilação do DNA → silenciamento), resposta ao estresse (fosforilação do eIF2α, chaperonas, UCP-1 no tecido adiposo marrom), apoptose (via intrínseca: citocromo c → caspase-9; via extrínseca: Fas → caspase-8; morfologia: condensação de cromatina, corpos apoptóticos, sem inflamação) e ciclo celular (p53, p21, checkpoints, Rb).\n\nQuestões discursivas recorrentes incluem: processos na parede endotelial em diabéticos com mau controle glicêmico (glicação, estresse oxidativo, disfunção endotelial, inflamação), formação de placa aterosclerótica, membrana hialina do prematuro (deficiência de surfactante → acidose respiratória), e a razão pela qual amostras hemolisadas não permitem dosagem confiável de potássio (K⁺ é predominantemente intracelular; hemólise libera K⁺ intracelular para o plasma, falsamente elevando o resultado).\n\n### Pontos-chave\n\n- Bomba Na⁺/K⁺-ATPase mantém gradiente iônico com gasto de energia (ATP); transporte ativo primário.\n- Na acidose, os rins reabsorvem bicarbonato e excretam prótons (NH₄⁺); na alcalose, excretam bicarbonato.\n- Glucagon é o principal hormônio que promove gliconeogênese e glicogenólise durante o jejum prolongado.\n- Disfunção endotelial: ↑ espécies reativas de oxigênio → ↓ disponibilidade de óxido nítrico → ↓ relaxamento vascular dependente do endotélio.\n- Acetilação de histonas → eucromatina (cromatina mais frouxa) → ↑ transcrição gênica; associada a tumores com histona acetilase hiperexpressa.\n- Apoptose extrínseca: Fas (CD95) → caspase-8; intrínseca: dano ao DNA → citocromo c → caspase-9. Morfologia: condensação de cromatina, corpos apoptóticos, SEM inflamação.\n- p53 mutado → perda dos checkpoints → células tumorais escapam da apoptose e acumulam danos ao DNA.\n- Rifampicina inibe a RNA polimerase bacteriana → bloqueia transcrição e síntese de RNA → indiretamente prejudica síntese proteica bacteriana.\n- Membrana hialina: deficiência de surfactante (lecitina/fosfatidilcolina) no prematuro → colapso alveolar → acidose respiratória.\n- Hemólise da amostra eleva falsamente o potássio sérico porque K⁺ é o principal cátion intracelular; sua liberação das hemácias contamina o plasma.\n\n### Comparação\n\n| Tema | Conceito-chave N1 | Conceito-chave N2 |\n|---|---|---|\n| Membrana e transporte | Bomba Na⁺/K⁺ gasta ATP; aquaporinas para água | DNA polimerase α sintetiza primers de RNA |\n| Equilíbrio acidobásico | Acidose metabólica na cetoacidose; bicarbonato renal | Sepse → resposta inflamatória → NF-κB |\n| Metabolismo de carboidratos | Glucagon → gliconeogênese/glicogenólise | Estresse → fosforilação eIF2α → ↓ tradução global |\n| Proteínas/Enzimas | Estrutura primária, pontes dissulfeto, sítio catalítico | Chaperonas (HSP) na resposta ao choque térmico |\n| Lipídeos/Lipoproteínas | Quilomicrons → remanescentes; VLDL; LDL | UCP-1 no tecido adiposo marrom (termogênese) |\n| Endotélio/Vascular | ↓ NO por ROS → disfunção endotelial | Aterosclerose: shear stress baixo → placas |\n| Morte celular | — | Apoptose (caspases) vs. Necrose (ruptura de membrana, inflamação) |\n| Epigenética | — | Acetilação histonas → eucromatina; metilação DNA → silenciamento |\n| Vitaminas | K (coagulação), B12 (anemia megaloblástica) | B9 (ácido fólico) → síntese de nucleotídeos → transcrição |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Dano ao DNA / Estresse celular] --> B{Tipo de estresse}\n B -- Oxidativo/Térmico --> C[↑ Chaperonas HSP]\n B -- Infeccioso/Sepse --> D[TLR → NF-κB → genes pró-inflamatórios]\n B -- Dano genômico grave --> E[↑ p53]\n E --> F[↑ p21 → parada G1]\n E --> G[↑ BAX → citocromo c → caspase-9]\n G --> H[APOPTOSE INTRÍNSECA]\n D --> I[DNMT → metilação → ↓ genes pró-inflamatórios fase tardia]\n B -- Estresse de tradução --> J[Fosforilação eIF2α]\n J --> K[↓ Tradução global + ↑ Tradução proteínas de sobrevivência]\n```\n\n> **Mnemônico:** GABE para apoptose: G (genes pró-apoptóticos BAX), A (Apaf-1), B (Bcl-2 antiapoptótico), E (Executoras: caspases 3/6/7) — via intrínseca\n\n<sub>Fontes: 44a343e9822cff8b:0, 44a343e9822cff8b:1, 44a343e9822cff8b:2, 44a343e9822cff8b:3, 44a343e9822cff8b:4, 44a343e9822cff8b:5, 44a343e9822cff8b:6, c45346871801c1b5:0, c45346871801c1b5:1, c45346871801c1b5:2, c45346871801c1b5:3, c45346871801c1b5:4</sub>\n\n---\n\n## Osmose, Pressão Osmótica e Tonicidade\n\nA osmose é o movimento de água através de uma membrana semipermeável de uma região de maior concentração de água para uma de menor concentração de água, ou seja, do compartimento de menor concentração de soluto para o de maior concentração. A pressão osmótica é a pressão hidrostática necessária para impedir esse fluxo e é determinada pelo número total de íons e moléculas não-difusíveis impermeáveis à membrana. Nos fluidos corporais, a osmolalidade normal é de 285–295 mOsmol/kg, sendo Na⁺ e Cl⁻ responsáveis por cerca de 85% da atividade osmótica do fluido extracelular.\n\nÉ fundamental distinguir isosmótico de isotônico: uma solução isosmótica possui a mesma osmolalidade que outra solução, independentemente da permeabilidade dos solutos; já uma solução isotônica é aquela que não causa variação do volume celular (movimento líquido de água nulo). O exemplo clássico é a ureia a 1,8%: isosmótica com NaCl 0,9%, mas não isotônica, pois a ureia permeia livremente a membrana celular, gerando gradiente osmótico intracelular e hemólise. Soluções hipotônicas causam tumefação celular; soluções hipertônicas causam encolhimento celular.\n\nA água não permeia facilmente bicamadas lipídicas; por isso, as membranas celulares possuem transportadores proteicos chamados aquaporinas. A ligação do hormônio antidiurético (ADH) às células do ducto coletor renal induz a inserção de aquaporinas específicas na membrana luminal, facilitando a reabsorção de água — mecanismo central no controle da osmolalidade plasmática.\n\n### Pontos-chave\n\n- Osmose: difusão de água de região de alta concentração de água para baixa concentração de água através de membrana semipermeável.\n- Osmolalidade normal do plasma: 285–295 mOsmol/kg; Na⁺ e Cl⁻ respondem por ~85% da atividade osmótica do fluido extracelular.\n- 1 mol de NaCl dissocia-se em 2 partículas, exercendo pressão osmótica de 2 osmols — o dobro de 1 mol de glicose.\n- Isosmótico ≠ isotônico: solução de ureia 1,8% é isosmótica com NaCl 0,9%, mas hemolisa eritrócitos por ser permeável à membrana.\n- Solução hipotônica → tumefação celular; solução hipertônica → encolhimento celular.\n- Aquaporinas são transportadores proteicos que permitem fluxo osmótico de água; sua expressão pode ser regulada fisiologicamente (ex.: ADH no ducto coletor renal).\n- A pressão osmótica de 285–295 mOsmol/kg equivale a ~6,7 atmosferas ou 5100 mmHg — força considerável.\n- A osmolalidade pode ser medida pela depressão do ponto de congelamento: plasma congela a −0,553°C, correspondendo a 0,297 osmol/kg.\n\n### Comparação\n\n| Característica | Isosmótico | Isotônico | Hipotônico | Hipertônico |\n|---|---|---|---|---|\n| Osmolalidade vs. plasma | Igual | Igual (solutos não-penetrantes) | Menor | Maior |\n| Permeabilidade dos solutos | Qualquer | Apenas não-penetrantes | — | — |\n| Efeito no volume celular | Variável | Nenhum | Tumefação | Encolhimento |\n| Exemplo | Ureia 1,8% | NaCl 0,9% ou glicose 5% | NaCl 0,5% | NaCl 1,8% |\n| Hemólise de eritrócitos? | Depende | Não | Sim | Não (crenação) |\n\n<sub>Fontes: 18cb7c924174c944:1, 18cb7c924174c944:2, 18cb7c924174c944:6</sub>\n\n---\n\n## Distribuição dos Fluidos Corporais e Compartimentos\n\nA água é o principal constituinte do organismo, representando 45–75% do peso corporal, com variação determinada principalmente pela proporção de tecido adiposo (que contém apenas 10% de água). Em um homem de 70 kg com constituição média, o volume total de água é ~45 L (64% do peso corporal), enquanto em uma mulher de mesmo peso é ~36 L (51%), refletindo maior proporção de tecido adiposo feminino. O fluido corporal divide-se em intracelular (~28–30 L, 40% do peso) e extracelular (~15 L, 21% do peso), sendo este subdividido em fluido intersticial (~12 L) e plasma (~3 L, 4,5% do peso). O fluido transcelular (liquor, intraocular, pleural, peritoneal, sinovial) é um compartimento especializado do extracelular com volume de 0,7–2,0 L.\n\nA medição dos volumes utiliza o método de diluição (V = Q/C). Água corporal total: isótopos de água (deutério) ou antipirina. Fluido extracelular: tiossulfato ou inulina (baixa permeabilidade de membrana). Volume plasmático: albumina radioiodada ou corante Evans Blue. O volume intracelular não pode ser medido diretamente — é calculado como diferença entre água total e fluido extracelular; o volume intersticial é calculado como diferença entre fluido extracelular e plasma.\n\nDesequilíbrios do volume de fluido corporal têm consequências clínicas importantes. A expansão de volume pode causar edema, ascite, distensão de veias jugulares, hipertensão, poliúria e hiponatremia (se por sobrecarga hídrica). A depleção de volume associa-se a redução da pressão venosa e arterial, aumento da frequência cardíaca, redução do turgor cutâneo, mucosas secas, queda da taxa de filtração glomerular e hipocalemia (em vômitos ou diarreia prolongados).\n\n### Pontos-chave\n\n- Água corporal total: 45–75% do peso; principal determinante é a proporção de tecido adiposo.\n- Compartimentos: intracelular (~28–30 L / 40%), extracelular (~15 L / 21%) — subdividido em intersticial (~12 L) e plasma (~3 L).\n- Fluido transcelular: compartimento especializado do extracelular; volume 0,7–2,0 L (liquor, intraocular, pleural, peritoneal, sinovial).\n- Fluido intersticial: ultrafiltrado do plasma com composição iônica semelhante, mas muito baixo teor proteico.\n- Método de diluição: V = Q/C; substância deve não ser metabolizada, sequestrada ou excretada antes do equilíbrio.\n- Expansão de volume → edema, ascite, hipertensão, poliúria, hiponatremia.\n- Depleção de volume → hipotensão, taquicardia, redução do turgor cutâneo, oligúria, hipocalemia.\n- Infantes têm maior proporção de água corporal em relação ao peso porque os depósitos de gordura são relativamente subdesenvolvidos.\n\n### Comparação\n\n| Compartimento | Volume (homem 70 kg) | % Peso Corporal | Método de Medição |\n|---|---|---|---|\n| Água corporal total | ~45 L | 64% | Deutério, água tritiada, antipirina |\n| Fluido extracelular | ~15 L | 21% | Tiossulfato, inulina |\n| Plasma | ~3 L | 4,5% | Albumina radioiodada, Evans Blue |\n| Fluido intersticial | ~12 L | ~17% | Calculado (ECF − plasma) |\n| Fluido intracelular | ~28–30 L | 40% | Calculado (água total − ECF) |\n| Fluido transcelular | 0,7–2,0 L | ~1–3% | — |\n\n> **Mnemônico:** **\"PIPE\"** para os compartimentos extracelulares: **P**lasma, **I**ntersticial, **P**eritoneal/transcelular, **E**xtracelular total\n\n<sub>Fontes: 18cb7c924174c944:2, 18cb7c924174c944:0, 0630654247dedf11:4</sub>\n\n---\n\n## Equilíbrio de Donnan, Bomba Na⁺-K⁺-ATPase e Homeostase do Volume Celular\n\nAs células contêm ânions não-difusíveis (proteínas e fosfatos orgânicos como ATP) que criam uma assimetria na distribuição de íons difusíveis através da membrana — o equilíbrio de Donnan. Dois critérios governam essa distribuição: (1) cada lado da membrana deve ser eletricamente neutro; (2) o produto dos íons difusíveis de um lado deve igualar o produto do outro lado. Como consequência, no compartimento com ânions não-penetrantes (interior celular), a concentração de cátions é maior e o número total de íons é maior, gerando pressão osmótica superior e tendência de entrada de água. Isso cria uma tendência intrínseca de as células incharem e eventualmente romperem.\n\nA Na⁺-K⁺-ATPase contrapõe esse efeito ao expulsar ativamente Na⁺ da célula. Sua função principal é manter o volume celular apesar do vazamento contínuo de Na⁺ para o interior. Quando a atividade da bomba é reduzida — por armazenamento a baixas temperaturas, isquemia tecidual ou venenos metabólicos que bloqueiam o fornecimento de ATP — as células incham e podem morrer. A isquemia reduz a atividade da bomba de sódio, induz tumefação celular e agrava a limitação do fluxo sanguíneo para a área isquêmica. A inflamação também aumenta a permeabilidade iônica da membrana, permitindo entrada de Na⁺ e fluxo osmótico de água para o citoplasma.\n\nCélulas epiteliais especializadas no transporte de solutos (como enterócitos) podem apresentar elevação considerável da atividade osmótica intracelular — concentrações pós-prandiais de glicose >80 mM foram descritas. Para minimizar a tumefação, a ativação de canais de K⁺ ou Cl⁻ na membrana basolateral permite a saída desses íons com água associada, regulando o volume celular.\n\n### Pontos-chave\n\n- Ânions não-difusíveis intracelulares (proteínas, ATP) criam assimetria iônica: maior concentração de cátions e maior número total de íons no interior celular.\n- Equilíbrio de Donnan: [cátions difusíveis]A × [ânions difusíveis]A = [cátions difusíveis]B × [ânions difusíveis]B.\n- Consequência do equilíbrio de Donnan: pressão osmótica intracelular > extracelular → tendência de tumefação celular.\n- Na⁺-K⁺-ATPase: função principal é manter o volume celular expulsando Na⁺ que vaza continuamente para dentro da célula.\n- Isquemia tecidual → redução da Na⁺-K⁺-ATPase → tumefação celular → agravamento da limitação do fluxo sanguíneo (ciclo vicioso).\n- Venenos metabólicos bloqueiam o fornecimento de ATP necessário para a Na⁺-K⁺-ATPase.\n- Armazenamento de células a baixas temperaturas reduz a atividade da Na⁺-K⁺-ATPase; eritrócitos podem hemolizar se armazenados por períodos mais longos que o normal.\n- Inflamação → aumento generalizado da permeabilidade iônica → entrada de Na⁺ → edema celular.\n- Células epiteliais intestinais regulam o volume pela ativação de canais de K⁺ ou Cl⁻ basolaterais, permitindo saída de íons e água.\n\n### Comparação\n\n| Causa de Disfunção da Bomba | Mecanismo | Consequência |\n|---|---|---|\n| Isquemia tecidual | Redução do ATP disponível | Tumefação celular; agrava limitação do fluxo sanguíneo |\n| Venenos metabólicos | Bloqueio do fornecimento de ATP | Inibição da Na⁺-K⁺-ATPase; morte celular |\n| Armazenamento a baixas temperaturas | Redução da atividade enzimática | Células não mantêm volume; hemólise de eritrócitos |\n| Inflamação | Aumento da permeabilidade iônica | Entrada de Na⁺ e água; edema celular |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Ânions não-difusíveis intracelulares\\nProteínas e ATP] --> B[Assimetria iônica\\nEquilíbrio de Donnan]\n B --> C[Maior concentração de cátions\\ne total de íons intracelular]\n C --> D[Pressão osmótica intracelular elevada]\n D --> E[Tendência de entrada de Na⁺ e água]\n E --> F{Na⁺-K⁺-ATPase ativa?}\n F -- Sim --> G[Expulsão de Na⁺\\nVolume celular mantido]\n F -- Não --> H[Tumefação celular]\n H --> I[Isquemia / Venenos / Frio / Inflamação]\n```\n\n> **Mnemônico:** **\"IVIA\"** para causas de disfunção da bomba Na⁺-K⁺-ATPase: **I**squemia, **V**enenos metabólicos, **I**nflamação, **A**rmazenamento a frio\n\n<sub>Fontes: 18cb7c924174c944:4, 18cb7c924174c944:5, 0630654247dedf11:4, 0630654247dedf11:5</sub>\n\n---\n\n## Movimento de Fluidos Transcapilar (Equilíbrio de Starling), Edema e Controle Renal da Osmolalidade\n\nO movimento de fluido através da parede capilar é determinado por duas forças opostas: a pressão hidrostática vascular (que impulsiona a filtração) e a pressão oncótica (pressão osmótica coloidal) exercida pelas proteínas plasmáticas — principalmente albumina — que se opõe à filtração. Na extremidade arteriolar, a pressão hidrostática é ~35 mmHg e a pressão oncótica é ~25 mmHg, resultando em pressão de filtração líquida de +10 mmHg. Na extremidade venosa, a pressão hidrostática cai para ~15 mmHg, tornando a força líquida de −10 mmHg (reabsorção). Cerca de 2 L/dia drenam para o sistema linfático. Condições que reduzem a pressão oncótica (hipoproteinemia por síndrome nefrótica, desnutrição ou cirrose) ou aumentam a pressão hidrostática (insuficiência ventricular direita, obstrução venosa) causam edema. Na cirrose, a fibrose hepática impede o fluxo portal, aumentando a pressão hidrostática ao longo da circulação portal e causando exsudação de fluido e proteína para o peritônio (ascite).\n\nO controle renal do volume e da osmolalidade do fluido extracelular opera por mecanismos distintos. O volume do fluido extracelular está intimamente relacionado ao conteúdo de Na⁺ corporal; sua regulação envolve receptores de estiramento cardiovasculares, hormônios (peptídeo natriurético atrial, angiotensina II, aldosterona) e o SNC. A osmolalidade é regulada principalmente pelo ajuste da excreção de água via ADH: plasma hipo-osmolar → redução do ADH → diurese; plasma hiperosmolar → aumento do ADH → retenção de água. Após ingestão de 1 L de água, a diurese começa em 20 minutos e a excreção é completa em ~3 horas. Após ingestão de 1 L de NaCl isotônico, a excreção é muito mais lenta (18–24 horas), pois o soluto fica restrito ao compartimento extracelular e não altera a osmolalidade plasmática imediatamente.\n\nColoides intravenosos são substitutos plasmáticos eficazes porque seus compostos de alto peso molecular não cruzam facilmente a parede capilar, mantendo atividade osmótica que impede a saída de fluido para o espaço intersticial.\n\n### Pontos-chave\n\n- Pressão de filtração capilar arteriolar: hidrostática (35 mmHg) − oncótica (25 mmHg) = +10 mmHg (filtração líquida).\n- Pressão de reabsorção capilar venosa: hidrostática (15 mmHg) − oncótica (25 mmHg) = −10 mmHg (reabsorção líquida).\n- ~2 L/dia drenam para o sistema linfático e retornam à circulação.\n- Hipoproteinemia (síndrome nefrótica, desnutrição, cirrose) → redução da pressão oncótica → edema generalizado.\n- Cirrose: fibrose hepática impede fluxo portal → hipertensão portal → ascite por exsudação de fluido e proteína para o peritônio.\n- Inflamação aumenta a permeabilidade capilar a proteínas → edema local.\n- Volume do fluido extracelular regulado pelo conteúdo de Na⁺; osmolalidade regulada pelo ajuste da excreção de água (ADH).\n- Ingestão de 1 L de água: diurese em 20 min, excreção completa em ~3 h; osmolalidade urinária cai de 600–800 para 40–50 mOsmol/kg.\n- Ingestão de 1 L de NaCl isotônico: excreção completa em 18–24 h; resposta envolve ANP, redução de renina/angiotensina II/aldosterona e hiperfiltração renal.\n- Coloides IV (alto peso molecular) não cruzam a parede capilar → mantêm pressão oncótica → eficazes como substitutos plasmáticos.\n\n### Comparação\n\n| Parâmetro | Ingestão de 1 L de Água | Ingestão de 1 L de NaCl Isotônico |\n|---|---|---|\n| Efeito na osmolalidade plasmática | Redução (~2%) | Mínimo |\n| Distribuição nos compartimentos | Todos (intra + extracelular) | Apenas extracelular |\n| Aumento do volume sanguíneo | ~2% | ~dobro do observado com água |\n| Resposta osmorreceptora (ADH) | Sim (redução do ADH) | Não (osmolalidade inalterada) |\n| Início da diurese | ~20 minutos | Mais lento |\n| Excreção completa | ~3 horas | 18–24 horas |\n| Mecanismos adicionais | Barorreceptores atriais (>1 L) | ANP, redução renina/AII/aldosterona, hiperfiltração |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Redução da osmolalidade plasmática\\nEx.: ingestão de água] --> B[Osmorreceptores hipotalâmicos\\nnúcleos supraóptico e paraventricular]\n B --> C[Redução da atividade elétrica\\nno trato hipotálamo-hipofisário]\n C --> D[Redução da liberação de ADH\\nda hipófise posterior]\n D --> E[Redução da reabsorção de água\\nno ducto coletor renal]\n E --> F[Aumento da produção de urina\\n0,5–1,0 → até 15–20 mL/min]\n F --> G[Restauração da osmolalidade plasmática]\n G --> H[Normalização da secreção de ADH]\n```\n\n> **Mnemônico:** **\"HORA\"** para causas de edema por desequilíbrio de Starling: **H**idrostática aumentada (ICC direita, obstrução venosa), **O**ncótica reduzida (hipoproteinemia), **R**etenção linfática prejudicada, **A**umento da permeabilidade capilar (inflamação)\n\n<sub>Fontes: 18cb7c924174c944:3, 18cb7c924174c944:4, 0630654247dedf11:4, 18cb7c924174c944:6, 0630654247dedf11:6</sub>\n\n---\n\n## Composição Lipídica do Óleo de Coco e Classificação dos Ácidos Graxos\n\nO óleo de coco é uma gordura tropical com composição lipídica peculiar: contém aproximadamente 90% de gordura saturada, sendo o ácido láurico (12:0) seu principal ácido graxo, correspondendo a cerca de metade do total de ácidos graxos. Além disso, aproximadamente 25% da gordura do coco consiste nos ácidos graxos saturados de cadeia longa ácido mirístico (14:0) e ácido palmítico (16:0). Embora o ácido láurico seja quimicamente classificado como ácido graxo de cadeia média (AGCM), ele não se comporta biologicamente como os demais AGCMs.\n\nOs AGCMs verdadeiros são rapidamente absorvidos pela veia porta e desempenham papel predominante como fonte de energia via beta-oxidação, em vez de participar da síntese de colesterol. Contudo, o ácido láurico é amplamente absorvido e transportado por quilomícrons, de forma semelhante aos ácidos graxos de cadeia longa. Os triglicerídeos de cadeia média utilizados em estudos de redução de peso consistem principalmente nos ácidos caprílico (8:0) e cáprico (10:0), que constituem apenas ~7% e ~5%, respectivamente, no óleo de coco — e não o ácido láurico, o principal ácido graxo do óleo de coco.\n\nEssa distinção bioquímica é clinicamente relevante: o argumento popular de que o óleo de coco seria metabolicamente benéfico por ser rico em AGCMs não se sustenta, pois o ácido láurico — seu componente majoritário — comporta-se metabolicamente como ácido graxo de cadeia longa, participando da síntese de colesterol e sendo incorporado em quilomícrons, e não oxidado preferencialmente como energia.\n\n### Pontos-chave\n\n- O óleo de coco contém cerca de 90% de gordura saturada, sendo o ácido láurico (12:0) responsável por aproximadamente metade dos ácidos graxos totais.\n- Cerca de 25% do óleo de coco é composto
