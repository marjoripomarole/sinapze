ompensação adequada)?\n\n<sub>Fontes: 2c1fb88d06450be5:2, 2c1fb88d06450be5:3, 2c1fb88d06450be5:4, 2c1fb88d06450be5:5, 2c1fb88d06450be5:6, 2c1fb88d06450be5:7, 2c1fb88d06450be5:8, 2c1fb88d06450be5:9</sub>\n\n---\n\n## Eletroforese de Proteínas Séricas (EPS): Frações, Interpretação e Correlação Clínica\n\nA Eletroforese de Proteínas Séricas (EPS) é um 'método laboratorial simples para separar as proteínas presentes no plasma humano em frações, de acordo com suas respectivas cargas elétricas'. A amostra de soro é aplicada em acetato de celulose ou gel de agarose e submetida a potencial elétrico; as proteínas migram em direção ao ânodo em velocidades distintas conforme peso molecular e carga, gerando cinco bandas: albumina, alfa-1-globulina, alfa-2-globulina, betaglobulina e gamaglobulina. O resultado é expresso em forma percentual, de concentração e gráfica (densitometria).\n\nCada fração tem composição e significado clínico específicos. A albumina, proteína mais abundante (~60% do total), é sintetizada exclusivamente no fígado e mantém a pressão oncótica; sua queda (hipoalbuminemia) ocorre por síntese prejudicada (cirrose, hepatite), catabolismo aumentado, desnutrição ou perdas (síndrome nefrótica, enteropatia). As alfaglobulinas (alfa-1 e alfa-2) são proteínas de fase aguda que se elevam em processos inflamatórios, infecciosos e imunes. A alfa-1-antitripsina representa 90% do pico alfa-1, e sua deficiência (homozigose ZZ) causa enfisema panlobular e cirrose precoce. A alfa-2 inclui haptoglobina (liga-se à hemoglobina livre) e alfa-2-macroglobulina (eleva-se marcadamente na síndrome nefrótica). As betaglobulinas incluem transferrina (↑ na anemia ferropriva e gravidez), beta-lipoproteínas (↑ em dislipidemia, hipotireoidismo, diabetes) e C3 do complemento (↓ em doenças glomerulares).\n\nA fração gamaglobulina é composta por imunoglobulinas (IgG, IgA, IgM, IgD, IgE). Seu aumento pode ser policlonal (curva de base larga — infecções, doenças inflamatórias crônicas, autoimunes) ou monoclonal (pico fusiforme de base estreita — mieloma múltiplo, macroglobulinemia de Waldenström). A hipogamaglobulinemia indica imunodeficiência congênita ou adquirida. A EPS é ferramenta de triagem valiosa e de baixo custo para monitorar doenças como mieloma múltiplo, síndrome nefrótica e cirrose.\n\n### Pontos-chave\n\n- EPS separa proteínas por carga elétrica e peso molecular em 5 bandas: albumina, alfa-1, alfa-2, beta e gama.\n- Albumina: ~60% das proteínas totais; sintetizada no fígado; mantém pressão oncótica; menor nível na síndrome nefrótica e enteropatia perdedora de proteínas.\n- Alfa-1-antitripsina: 90% do pico alfa-1; deficiência (ZZ) → enfisema panlobular grave e cirrose na infância.\n- Alfa-2-macroglobulina: eleva-se ~10 vezes na síndrome nefrótica, podendo igualar ou superar a albumina.\n- Haptoglobina (alfa-2): liga-se à hemoglobina livre; cai após hemólise intravascular; normaliza em ~1 semana.\n- Transferrina (beta): aumenta na anemia ferropriva, gravidez e uso de anovulatórios.\n- Gamaglobulinas: IgG (73%), IgA (19%), IgM (5%), IgD, IgE — em ordem decrescente de concentração.\n- Pico policlonal (base larga): resposta imune a múltiplos antígenos — tuberculose, LES, artrite reumatoide, etc.\n- Pico monoclonal (base estreita, fusiforme): produção por único clone — mieloma múltiplo (principal), Waldenström.\n- Hipogamaglobulinemia: imunodeficiência congênita ou adquirida; variante de cadeia leve do mieloma (pico na urina, não no soro).\n\n### Comparação\n\n| Fração | Principais Proteínas | Aumento | Diminuição |\n|---|---|---|---|\n| Albumina | Albumina | Raro (hemoconcentração) | Cirrose, síndrome nefrótica, desnutrição, enteropatia, inflamação crônica |\n| Alfa-1 | Alfa-1-antitripsina (90%), transcortina, TBG, alfafetoproteína | Inflamação, infecção, processos imunes | Deficiência de alfa-1-antitripsina (homozigose ZZ) |\n| Alfa-2 | Haptoglobina, alfa-2-macroglobulina, ceruloplasmina, eritropoetina | Inflamação, infecção, síndrome nefrótica (macroglobulina) | Hemólise intravascular (haptoglobina) |\n| Beta | Transferrina, beta-lipoproteínas, C3 | Anemia ferropriva, gravidez, dislipidemia, hipotireoidismo | Doenças glomerulares (C3), processos crônicos |\n| Gama | IgG, IgA, IgM, IgD, IgE | Policlonal: infecção/inflamação/autoimune; Monoclonal: mieloma, Waldenström | Imunodeficiência congênita ou adquirida |\n\n> **Mnemônico:** **'A-A-A-B-G'** para as 5 bandas em ordem: **A**lbumina → **A**lfa-1 → **A**lfa-2 → **B**eta → **G**ama. Lembre: 'As Almas Andam Bem Guardadas' (Albumina, Alfa-1, Alfa-2, Beta, Gama).\n\n<sub>Fontes: 607be99c1c035ac3:0, 607be99c1c035ac3:1, 607be99c1c035ac3:2, 607be99c1c035ac3:3, 607be99c1c035ac3:4, 607be99c1c035ac3:5, bc2b5e01dab36bdd:0, bc2b5e01dab36bdd:1, bc2b5e01dab36bdd:2, bc2b5e01dab36bdd:3, bc2b5e01dab36bdd:4</sub>\n\n---\n\n## Equilíbrio Acidobásico: Conceitos Fundamentais e Sistemas Tampão\n\nO equilíbrio acidobásico é mantido por meio de regulação precisa da concentração de íons H⁺ nos líquidos corporais, essencial porque 'as atividades de quase todos os sistemas de enzimas no corpo são influenciadas pela concentração de H⁺'. O pH normal do sangue arterial é 7,4, correspondendo a uma [H⁺] de 40 nEq/L — valor extremamente baixo comparado a outros íons como o sódio (142 mEq/L). A escala de pH é logarítmica e inversamente proporcional à [H⁺]: pH baixo = acidose (pH < 7,4), pH alto = alcalose (pH > 7,4), com limites de sobrevivência entre 6,8 e 8,0.\n\nExistem três linhas de defesa contra variações do pH: (1) sistemas tampão químicos, que respondem em fração de segundo; (2) o sistema respiratório, que age em minutos eliminando CO₂; e (3) os rins, que atuam em horas a dias e são 'sem dúvida, os sistemas reguladores acidobásicos mais potentes'. O tampão mais importante do líquido extracelular é o sistema bicarbonato (H₂CO₃/HCO₃⁻), descrito pela equação de Henderson-Hasselbalch: pH = 6,1 + log [HCO₃⁻ / (0,03 × PCO₂)]. Apesar de seu pK (6,1) estar distante do pH fisiológico (7,4), sua potência se deve ao fato de que 'os dois elementos do sistema-tampão, HCO₃⁻ e CO₂, são regulados, respectivamente, pelos rins e pelos pulmões'.\n\nOutros sistemas tampão relevantes incluem o tampão fosfato (pK 6,8), mais importante nos líquidos tubulares renais e intracelulares, e as proteínas intracelulares, que respondem por 'aproximadamente 60% a 70% do tamponamento químico total dos líquidos corporais'. Todos os tampões operam simultaneamente segundo o princípio isoídrico: qualquer alteração em um sistema tampão altera todos os demais, pois compartilham o mesmo H⁺.\n\n### Pontos-chave\n\n- pH normal do sangue arterial = 7,4; venoso e intersticial = 7,35; urina varia de 4,5 a 8,0; HCl gástrico = 0,8.\n- Acidose = pH < 7,4 (↑[H⁺]); alcalose = pH > 7,4 (↓[H⁺]); limites de sobrevivência: 6,8–8,0.\n- Três linhas de defesa: tampões químicos (segundos) → sistema respiratório (minutos) → rins (horas a dias).\n- Equação de Henderson-Hasselbalch: pH = 6,1 + log [HCO₃⁻ / (0,03 × PCO₂)]; ↑HCO₃⁻ → alcalose; ↑PCO₂ → acidose.\n- O sistema tampão bicarbonato é o mais potente do extracelular por ser regulado pelos pulmões (PCO₂) e rins (HCO₃⁻), apesar do pK desfavorável de 6,1.\n- Tampão fosfato (pK 6,8): pouco importante no extracelular, mas fundamental nos túbulos renais e líquido intracelular.\n- Proteínas intracelulares (incluindo hemoglobina nas hemácias) são os tampões mais abundantes do corpo.\n- Princípio isoídrico: todos os tampões de uma solução estão em equilíbrio com a mesma [H⁺] e se influenciam mutuamente.\n- Cerca de 80 mEq de H⁺ são produzidos diariamente pelo metabolismo e precisam ser tamponados e excretados.\n- O CO₂ difunde-se rapidamente por todas as membranas celulares, enquanto H⁺ e HCO₃⁻ levam horas para equilibrar entre compartimentos.\n\n### Comparação\n\n| Sistema Tampão | Localização Principal | pK | Importância Relativa | Regulação |\n|---|---|---|---|---|\n| Bicarbonato (HCO₃⁻/H₂CO₃) | Líquido extracelular | 6,1 | Maior tampão extracelular | Rins (HCO₃⁻) + Pulmões (PCO₂) |\n| Fosfato (H₂PO₄⁻/HPO₄²⁻) | Túbulo renal e intracelular | 6,8 | Baixa no extracelular; alta no túbulo renal | Concentração tubular |\n| Proteínas (incluindo Hb) | Intracelular (hemácias) | Variável (~próximo ao pH intracelular) | 60–70% do tamponamento total corporal | Metabolismo celular |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Perturbação do pH] --> B{Resposta imediata}\n B --> C[Tampões químicos\\n- Bicarbonato\\n- Fosfato\\n- Proteínas\\nResposta: segundos]\n C --> D{Resposta em minutos}\n D --> E[Sistema Respiratório\\n↑H⁺ → ↑ventilação → ↓PCO₂\\n↓H⁺ → ↓ventilação → ↑PCO₂\\nEficiência: 50–75%]\n E --> F{Resposta em horas-dias}\n F --> G[Rins\\nSecreção de H⁺\\nReabsorção de HCO₃⁻\\nGeração de novo HCO₃⁻\\nMecanismo mais potente]\n```\n\n> **Mnemônico:** **TRP** — Tampões (segundos) → Respiração (minutos) → Pulmão+Rim (horas/dias): lembre 'Três Respostas Progressivas'\n\n<sub>Fontes: 8ea631ac7eedf449:0, 8ea631ac7eedf449:1, 8ea631ac7eedf449:2, 8ea631ac7eedf449:3, 8ea631ac7eedf449:4, 8ea631ac7eedf449:5</sub>\n\n---\n\n## Regulação Respiratória do Equilíbrio Acidobásico\n\nO sistema respiratório constitui a segunda linha de defesa contra distúrbios acidobásicos, atuando em minutos por meio do controle da PCO₂ no líquido extracelular. O CO₂ é continuamente produzido pelo metabolismo celular, transportado pelo sangue até os pulmões e eliminado pela ventilação alveolar. Como 'o aumento da ventilação alveolar diminui a concentração de H⁺ do líquido extracelular e aumenta o pH', e a redução da ventilação tem efeito oposto, os pulmões funcionam como um controlador por feedback negativo da [H⁺]: acidose estimula hiperventilação, que reduz a PCO₂ e corrige o pH; alcalose inibe a ventilação, elevando a PCO₂.\n\nA eficiência desse controle é de 50% a 75% (ganho de feedback de 1 a 3), o que significa que ele não retorna o pH completamente ao normal, mas atenua significativamente o desvio até que os rins completem a correção. Por exemplo, se o pH cai de 7,4 para 7,0, o sistema respiratório pode retorná-lo a 7,2–7,3 em 3 a 12 minutos. A capacidade total de tamponamento do sistema respiratório é 'uma a duas vezes maior que o poder de tamponamento de todos os outros tampões químicos do líquido extracelular combinados'. Quando a função pulmonar está comprometida (ex.: enfisema grave), ocorre acúmulo de CO₂ e acidose respiratória, e os rins tornam-se o único mecanismo fisiológico remanescente para correção.\n\n### Pontos-chave\n\n- ↑PCO₂ → ↑H₂CO₃ → ↑[H⁺] → acidose respiratória; ↓PCO₂ → alcalose respiratória.\n- Feedback negativo: ↑[H⁺] estimula ventilação → ↓PCO₂ → ↓[H⁺]; ↓[H⁺] inibe ventilação → ↑PCO₂.\n- Duplicar a ventilação alveolar aumenta o pH em ~0,23; reduzir a 1/4 do normal reduz o pH em ~0,45.\n- A ventilação alveolar pode variar de 0 a 15 vezes o normal, conferindo grande amplitude de controle do pH.\n- Eficiência respiratória: 50–75%; resposta ocorre em 3–12 minutos.\n- Capacidade tampão respiratória = 1–2× maior que todos os tampões químicos extracelulares combinados.\n- Compensação à alcalose é menos eficaz que à acidose, pois a hipoventilação reduz também a PO₂, estimulando a ventilação.\n- Enfisema grave compromete a eliminação de CO₂, causando acidose respiratória e limitando a compensação metabólica.\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[↑[H⁺] / ↓pH\\nACIDOSE] --> B[Estimulação do\\ncentro respiratório]\n B --> C[↑Ventilação alveolar]\n C --> D[↓PCO₂ no líquido extracelular]\n D --> E[↓H₂CO₃ → ↓[H⁺]]\n E --> F[↑pH — correção parcial\\n50–75% de eficiência]\n G[↓[H⁺] / ↑pH\\nALCALOSE] --> H[Inibição do\\ncentro respiratório]\n H --> I[↓Ventilação alveolar]\n I --> J[↑PCO₂]\n J --> K[↑[H⁺] → ↓pH\\ncorreção menos eficaz]\n```\n\n<sub>Fontes: 8ea631ac7eedf449:5, 8ea631ac7eedf449:6</sub>\n\n---\n\n## Regulação Renal do Equilíbrio Acidobásico: Secreção de H⁺, Reabsorção e Geração de HCO₃⁻\n\nOs rins são a linha de defesa mais potente e definitiva contra distúrbios acidobásicos, atuando por três mecanismos fundamentais: '(1) secreção de H⁺, (2) reabsorção de HCO₃⁻ filtrado e (3) produção de novo HCO₃⁻'. Diariamente, os rins filtram cerca de 4.320 mEq de bicarbonato e secretam ~4.400 mEq de H⁺ nos túbulos — 4.320 mEq para reabsorver o HCO₃⁻ filtrado e 80 mEq adicionais para excretar os ácidos não voláteis produzidos pelo metabolismo. Nos segmentos proximais (túbulo proximal, ramo ascendente espesso da alça de Henle e início do túbulo distal), a secreção de H⁺ ocorre por transporte ativo secundário via contratransporte Na⁺-H⁺, responsável por ~95% da reabsorção de bicarbonato. Nos túbulos coletores, células intercaladas realizam secreção ativa primária de H⁺ por ATPase transportadora de hidrogênio, capaz de acidificar a urina até pH 4,5.\n\nQuando há excesso de H⁺ em relação ao HCO₃⁻ tubular (acidose), o H⁺ restante é tamponado por fosfato (HPO₄²⁻ → H₂PO₄⁻, excretado como NaH₂PO₄) e pelo sistema amônia-amônio. A glutamina é metabolizada nas células tubulares proximais gerando 2 NH₄⁺ e 2 HCO₃⁻ por molécula: o NH₄⁺ é secretado na urina e o HCO₃⁻ retorna ao sangue como 'novo bicarbonato'. Nos túbulos coletores, o H⁺ secretado combina-se com NH₃ difundido para o lúmen, formando NH₄⁺ que fica retido e é excretado. Na acidose crônica, a excreção de NH₄⁺ pode aumentar para até 500 mEq/dia, tornando-se o mecanismo dominante de excreção ácida e geração de novo HCO₃⁻.\n\nA regulação da secreção tubular de H⁺ é influenciada por múltiplos fatores: ↑PCO₂ e ↑[H⁺] estimulam a secreção; ↓volume do líquido extracelular estimula via angiotensina II e aldosterona; hipocalemia estimula e hipercalemia inibe. A aldosterona, especificamente, estimula as células intercaladas dos ductos coletores, e sua secreção excessiva (síndrome de Conn) pode causar alcalose metabólica.\n\n### Pontos-chave\n\n- Os rins filtram ~4.320 mEq/dia de HCO₃⁻ e secretam ~4.400 mEq/dia de H⁺; o excesso de 80 mEq excreta os ácidos não voláteis metabólicos.\n- 80–90% da reabsorção de HCO₃⁻ ocorre no túbulo proximal via contratransporte Na⁺-H⁺ (transporte ativo secundário).\n- Túbulos coletores: secreção ativa primária de H⁺ por H⁺-ATPase nas células intercaladas; pH mínimo urinário = 4,5.\n- Tampão fosfato tubular: HPO₄²⁻ + H⁺ → H₂PO₄⁻ (excretado como NaH₂PO₄); gera novo HCO₃⁻ para o sangue.\n- Tampão amônia: glutamina → 2 NH₄⁺ + 2 HCO₃⁻ (túbulo proximal); NH₃ + H⁺ → NH₄⁺ (túbulo coletor); na acidose crônica, excreção de NH₄⁺ pode chegar a 500 mEq/dia.\n- Excreção efetiva de ácido = Excreção de NH₄⁺ + Ácido titulável − Excreção de HCO₃⁻.\n- Aldosterona estimula secreção de H⁺ pelas células intercaladas; hipersecreção (Conn) → alcalose metabólica.\n- Hipocalemia → ↑secreção de H⁺ → alcalose; hipercalemia → ↓secreção de H⁺ → acidose.\n- Depleção de volume → ↑angiotensina II + ↑aldosterona → ↑secreção de H⁺ → tendência à alcalose.\n- Na acidose, os rins reabsorvem todo o HCO₃⁻ filtrado E geram novo HCO₃⁻; na alcalose, excretam o excesso de HCO₃⁻.\n\n### Comparação\n\n| Segmento Tubular | Mecanismo de Secreção de H⁺ | % do HCO₃⁻ Reabsorvido | pH Mínimo Atingível |\n|---|---|---|---|\n| Túbulo proximal | Contratransporte Na⁺-H⁺ (ativo secundário) | ~85% | ~6,7 |\n| Ramo ascendente espesso (alça de Henle) | Contratransporte Na⁺-H⁺ (ativo secundário) | ~10% | — |\n| Início do túbulo distal | Contratransporte Na⁺-H⁺ (ativo secundário) | Pequena fração | — |\n| Túbulo distal final + ducto coletor | H⁺-ATPase nas células intercaladas (ativo primário) | ~5% | ~4,5 |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[CO₂ entra na célula tubular] --> B[CO₂ + H₂O → H₂CO₃\\n(anidrase carbônica)]\n B --> C[H₂CO₃ → H⁺ + HCO₃⁻]\n C --> D[H⁺ secretado no lúmen tubular]\n C --> E[HCO₃⁻ → sangue peritubular]\n D --> F{H⁺ encontra no lúmen}\n F --> G[HCO₃⁻ filtrado\\n→ H₂CO₃ → CO₂ + H₂O\\nReabsorção de HCO₃⁻]\n F --> H[HPO₄²⁻\\n→ H₂PO₄⁻ excretado\\n+ NOVO HCO₃⁻ ao sangue]\n F --> I[NH₃\\n→ NH₄⁺ excretado\\n+ NOVO HCO₃⁻ ao sangue]\n```\n\n> **Mnemônico:** **FANG** para os tampões urinários não-bicarbonato: **F**osfato, **A**mônia/amônio, **N**ão-bicarbonato **G**eram novo HCO₃⁻\n\n<sub>Fontes: 8ea631ac7eedf449:7, 8ea631ac7eedf449:8, 8ea631ac7eedf449:9, 8ea631ac7eedf449:10, 8ea631ac7eedf449:11, 8ea631ac7eedf449:12</sub>\n\n---\n\n## Distúrbios Acidobásicos: Classificação, Características e Compensações\n\nOs distúrbios acidobásicos são classificados em quatro tipos com base na causa primária: acidose respiratória (↑PCO₂), alcalose respiratória (↓PCO₂), acidose metabólica (↓HCO₃⁻) e alcalose metabólica (↑HCO₃⁻). Nos distúrbios respiratórios, a alteração primária é na PCO₂, e a compensação é renal (alteração do HCO₃⁻, em dias). Nos distúrbios metabólicos, a alteração primária é no HCO₃⁻, e a compensação é respiratória (alteração da PCO₂, em minutos) associada à compensação renal. A equação de Henderson-Hasselbalch é o eixo central para compreender todas essas relações: pH = 6,1 + log [HCO₃⁻ / (0,03 × PCO₂)].\n\nAs causas clínicas são diversas: acidose respiratória resulta de qualquer fator que diminua a ventilação (enfisema, obstrução de vias aéreas, dano ao centro respiratório bulbar); alcalose respiratória ocorre por hiperventilação (psiconeurose, altitude elevada). A acidose metabólica tem múltiplas origens: insuficiência renal, diarreia grave ('a causa mais frequente de acidose metabólica', por perda de NaHCO₃ nas fezes), acidose tubular renal, cetoacidose diabética, entre outras. A alcalose metabólica pode resultar de vômitos com perda de HCl gástrico, uso de diuréticos ou hiperaldosteronismo. O reconhecimento do distúrbio primário e da resposta compensatória é fundamental para o diagnóstico clínico correto.\n\n### Pontos-chave\n\n- Acidose respiratória: ↓pH, ↑H⁺, ↑↑PCO₂, ↑HCO₃⁻ (compensação renal); causa: ↓ventilação.\n- Alcalose respiratória: ↑pH, ↓H⁺, ↓↓PCO₂, ↓HCO₃⁻ (compensação renal); causa: hiperventilação.\n- Acidose metabólica: ↓pH, ↑H⁺, ↓↓HCO₃⁻, ↓PCO₂ (compensação respiratória); causas: diarreia, IRC, cetoacidose.\n- Alcalose metabólica: ↑pH, ↓H⁺, ↑↑HCO₃⁻, ↑PCO₂ (compensação respiratória); causas: vômitos, diuréticos, hiperaldosteronismo.\n- Diarreia grave = causa mais frequente de acidose metabólica, por perda de bicarbonato de sódio nas fezes.\n- Acidose tubular renal: defeito na secreção de H⁺ ou reabsorção de HCO₃⁻; causas incluem IRC, doença de Addison, síndrome de Fanconi.\n- Na acidose respiratória crônica, a compensação renal aumenta o HCO₃⁻ plasmático para compensar o ↑PCO₂.\n- Na alcalose respiratória, a compensação renal reduz o HCO₃⁻ plasmático por maior excreção de HCO₃⁻.\n- O evento primário nos distúrbios respiratórios é a PCO₂; nos metabólicos, é o HCO₃⁻ (setas duplas na Tabela 30-3).\n- Altitude elevada → hipóxia → hiperventilação → alcalose respiratória branda (tipo fisiológico).\n\n### Comparação\n\n| Distúrbio | pH | [H⁺] | PCO₂ | HCO₃⁻ | Alteração Primária | Compensação |\n|---|---|---|---|---|---|---|\n| Normal | 7,4 | 40 mEq/L | 40 mmHg | 24 mEq/L | — | — |\n| Acidose respiratória | ↓ | ↑↑ | ↑↑ | ↑ | ↑PCO₂ | Renal: ↑HCO₃⁻ |\n| Alcalose respiratória | ↑ | ↓ | ↓↓ | ↓ | ↓PCO₂ | Renal: ↓HCO₃⁻ |\n| Acidose metabólica | ↓ | ↑ | ↓ | ↓↓ | ↓HCO₃⁻ | Respiratória: ↓PCO₂ + Renal: ↑HCO₃⁻ |\n| Alcalose metabólica | ↑ | ↓ | ↑ | ↑↑ | ↑HCO₃⁻ | Respiratória: ↑PCO₂ + Renal: ↓HCO₃⁻ |\n\n> **Mnemônico:** **ROME** (em inglês, útil para lembrar a relação PCO₂/HCO₃⁻ com pH): **R**espiratory **O**pposite, **M**etabolic **E**qual — na acidose/alcalose respiratória, PCO₂ e pH se movem em direções opostas; na metabólica, HCO₃⁻ e pH se movem na mesma direção.\n\n<sub>Fontes: 8ea631ac7eedf449:13, 8ea631ac7eedf449:14, 8ea631ac7eedf449:3</sub>\n\n---\n\n## Regulação do pH e Sistemas Tampão nos Líquidos Corporais\n\nA concentração de íons hidrogênio (H⁺) nos líquidos corporais é mantida em níveis extremamente baixos — cerca de 0,00004 mEq/L (40 nEq/L) — e sua regulação precisa é essencial porque 'as atividades de quase todos os sistemas de enzimas no corpo são influenciadas pela concentração de H⁺'. O pH normal do sangue arterial é 7,4, e valores abaixo desse limite caracterizam acidose, enquanto valores acima caracterizam alcalose. Os limites compatíveis com a vida ficam entre aproximadamente 6,8 e 8,0.\n\nExistem três linhas de defesa contra variações do pH: (1) os sistemas tampão químicos, que respondem em fração de segundo; (2) o sistema respiratório, que age em minutos eliminando CO₂; e (3) os rins, que atuam em horas a dias e são 'sem dúvida, os sistemas reguladores acidobásicos mais potentes'. O sistema tampão do bicarbonato é o mais importante do líquido extracelular, apesar de seu pK (6,1) estar distante do pH fisiológico (7,4), porque seus dois componentes — HCO₃⁻ e CO₂ — são regulados independentemente pelos rins e pelos pulmões, respectivamente. O tampão fosfato (pK 6,8) é mais relevante nos líquidos tubulares renais e intracelulares, enquanto as proteínas intracelulares respondem por cerca de 60–70% do tamponamento químico total do corpo.\n\nA equação de Henderson-Hasselbalch — pH = 6,1 + log([HCO₃⁻] / 0,03 × PCO₂) — resume matematicamente o equilíbrio acidobásico e deixa claro que aumento de HCO₃⁻ eleva o pH (alcalose metabólica) e aumento de PCO₂ reduz o pH (acidose respiratória). O princípio isoídrico estabelece que todos os tampões de uma solução estão em equilíbrio com a mesma concentração de H⁺, de modo que qualquer alteração em um sistema tampão repercute em todos os demais.\n\n### Pontos-chave\n\n- pH normal do sangue arterial = 7,4; venoso e intersticial ≈ 7,35; intracelular entre 6,0 e 7,4; urina entre 4,5 e 8,0.\n- Limites de sobrevivência: pH mínimo ≈ 6,8 e máximo ≈ 8,0.\n- O sistema tampão bicarbonato é o mais potente do líquido extracelular porque HCO₃⁻ é regulado pelos rins e CO₂ pelos pulmões, permitindo controle fisiológico preciso.\n- O tampão fosfato (pK 6,8) é especialmente eficaz nos túbulos renais e no líquido intracelular, onde o pH se aproxima de seu pK.\n- Proteínas intracelulares (incluindo hemoglobina nas hemácias) respondem por '60% a 70% do tamponamento químico total dos líquidos corporais'.\n- O sistema respiratório tem eficiência de 50–75% na correção do pH e capacidade tampão 'uma a duas vezes maior que o poder de tamponamento de todos os outros tampões químicos do líquido extracelular combinados'.\n- Pelo princípio isoídrico, todos os tampões estão em equilíbrio com a mesma [H⁺]; alterar um sistema altera todos os outros.\n- Dobrar a ventilação alveolar aumenta o pH em cerca de 0,23; reduzir a ventilação a um quarto do normal reduz o pH em 0,45.\n\n### Comparação\n\n| Sistema Tampão | Localização Principal | pK | Importância Relativa |\n|---|---|---|---|\n| Bicarbonato (HCO₃⁻/CO₂) | Líquido extracelular | 6,1 | Maior tampão extracelular; regulado por rins e pulmões |\n| Fosfato (H₂PO₄⁻/HPO₄²⁻) | Líquido tubular renal e intracelular | 6,8 | Importante nos túbulos renais e intracelular; baixa concentração no LEC |\n| Proteínas (incluindo Hb) | Intracelular (hemácias) | Variável (~próximo pH intracelular) | 60–70% do tamponamento químico total do corpo |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Variação do pH] --> B[Tampões Químicos\\n(fração de segundo)]\n B --> C[Sistema Respiratório\\n(minutos: ajusta PCO₂)]\n C --> D[Rins\\n(horas a dias: ajusta HCO₃⁻)]\n D --> E[Restauração do pH para ~7,4]\n```\n\n> **Mnemônico:** \"TRP\" — Tampões → Respiração → Pulmões+Rins: as três linhas de defesa em ordem de velocidade de resposta.\n\n<sub>Fontes: 1505b4589c5c5c15:0, 1505b4589c5c5c15:1, 1505b4589c5c5c15:2, 1505b4589c5c5c15:3, 1505b4589c5c5c15:4, 1505b4589c5c5c15:5</sub>\n\n---\n\n## Controle Renal do Equilíbrio Acidobásico: Secreção de H⁺, Reabsorção de HCO₃⁻ e Geração de Novo Bicarbonato\n\nOs rins regulam o pH do líquido extracelular por três mecanismos fundamentais: '(1) secreção de H⁺, (2) reabsorção de HCO₃⁻ filtrado e (3) produção de novo HCO₃⁻'. Diariamente, cerca de 4.320 mEq de HCO₃⁻ são filtrados e quase todo esse montante é reabsorvido. Para isso, aproximadamente 4.400 mEq de H⁺ são secretados nos túbulos por dia — 4.320 mEq para reabsorver o bicarbonato filtrado e 80 mEq adicionais para eliminar os ácidos não voláteis produzidos pelo metabolismo. Nos segmentos proximais (túbulo proximal, ramo ascendente espesso da alça de Henle e início do túbulo distal), a secreção de H⁺ ocorre por contratransporte Na⁺/H⁺ (transporte ativo secundário), respondendo por cerca de 80–90% da reabsorção de HCO₃⁻. Nas células intercaladas do túbulo distal final e ductos coletores, a secreção é feita por bomba H⁺-ATPase (transporte ativo primário), capaz de reduzir o pH urinário até 4,5 — o limite mínimo alcançável pelos rins normais.\n\nQuando há excesso de H⁺ em relação ao HCO₃⁻ filtrado, o H⁺ excedente é tamponado no lúmen tubular pelo sistema fosfato (HP O₄²⁻ → H₂PO₄⁻) e pelo sistema amônia/amônio (NH₃ + H⁺ → NH₄⁺). Em ambos os casos, para cada H⁺ tamponado por um tampão não bicarbonato, um novo HCO₃⁻ é gerado e adicionado ao sangue — mecanismo essencial na correção da acidose. O sistema amônia é quantitativamente mais importante: sob condições normais responde por cerca de 50% do ácido excretado, e na acidose crônica a excreção de NH₄⁺ pode aumentar até 500 mEq/dia. O NH₄⁺ é produzido a partir da glutamina nas células tubulares proximais, gerando dois NH₄⁺ e dois HCO₃⁻ por molécula de glutamina metabolizada.\n\nA excreção efetiva de ácido pelos rins é calculada como: Excreção de NH₄⁺ + Ácido titulável urinário − Excreção de HCO₃⁻. Na acidose, esse valor aumenta (predomina excreção de NH₄⁺ e ácido titulável); na alcalose, torna-se negativo (predomina excreção de HCO₃⁻). Os principais estímulos para aumentar a secreção tubular de H⁺ na acidose são o aumento da PCO₂ (acidose respiratória) e a queda do HCO₃⁻ plasmático (acidose metabólica).\n\n### Pontos-chave\n\n- 80–90% da reabsorção de HCO₃⁻ ocorre no túbulo proximal via contratransporte Na⁺/H⁺ (transporte ativo secundário).\n- Células intercaladas do túbulo distal final e ductos coletores secretam H⁺ por H⁺-ATPase (transporte ativo primário), reduzindo o pH urinário até 4,5.\n- Para cada H⁺ secretado, um HCO₃⁻ é reabsorvido ou gerado de novo — ambos os processos dependem da anidrase carbônica intracelular.\n- O tampão fosfato tubular (pK 6,8) e o tampão amônia/amônio são os principais sistemas que permitem excreção de grandes quantidades de H⁺ sem ultrapassar o pH mínimo urinário de 4,5.\n- Cada molécula de glutamina metabolizada no túbulo proximal gera dois NH₄⁺ (secretados na urina) e dois HCO₃⁻ (adicionados ao sangue).\n- Na acidose crônica, a excreção de NH₄⁺ pode chegar a 500 mEq/dia, tornando-se o mecanismo dominante de eliminação de ácido.\n- Excreção efetiva de ácido = Excreção de NH₄⁺ + Ácido titulável − Excreção de HCO₃⁻.\n- Na alcalose, os rins aumentam a excreção de HCO₃⁻ (excreção efetiva de ácido negativa); na acidose, aumentam NH₄⁺ e ácido titulável.\n\n### Comparação\n\n| Característica | Túbulo Proximal / Alça de Henle / Início Distal | Túbulo Distal Final / Ducto Coletor |\n|---|---|---|\n| Mecanismo de secreção de H⁺ | Contratransporte Na⁺/H⁺ (ativo secundário) | H⁺-ATPase (ativo primário) — células intercaladas |\n| Proporção do HCO₃⁻ reabsorvido | ~80–90% | ~5–10% |\n| pH mínimo atingível | ~6,7 (aumento de [H⁺] de 3–4×) | ~4,5 (aumento de [H⁺] de até 900×) |\n| Importância funcional | Volume principal de reabsorção | Acidificação final da urina |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[CO₂ entra na célula tubular] --> B[Anidrase carbônica:\\nCO₂ + H₂O → H₂CO₃]\n B --> C[H₂CO₃ → H⁺ + HCO₃⁻]\n C --> D[H⁺ secretado no lúmen]\n C --> E[HCO₃⁻ → sangue peritubular]\n D --> F{HCO₃⁻ disponível no lúmen?}\n F -- Sim --> G[H⁺ + HCO₃⁻ → H₂CO₃ → CO₂ + H₂O\\nReabsorção de HCO₃⁻ filtrado]\n F -- Não --> H{Tampão disponível?}\n H -- Fosfato --> I[H⁺ + HPO₄²⁻ → H₂PO₄⁻ excretado\\n+ Novo HCO₃⁻ gerado]\n H -- Amônia --> J[H⁺ + NH₃ → NH₄⁺ excretado\\n+ Novo HCO₃⁻ gerado]\n```\n\n> **Mnemônico:** \"FANG\" para tampões tubulares que geram novo bicarbonato: Fosfato e Amônia são os tampões Não bicarbonato que Geram novo HCO₃⁻.\n\n<sub>Fontes: 1505b4589c5c5c15:7, 1505b4589c5c5c15:8, 1505b4589c5c5c15:9, 1505b4589c5c5c15:10, 1505b4589c5c5c15:11</sub>\n\n---\n\n## Distúrbios Acidobásicos: Causas, Diagnóstico e Tratamento\n\nOs distúrbios acidobásicos são classificados em quatro tipos primários com base na equação de Henderson-Hasselbalch: acidose metabólica (↓HCO₃⁻ primário), alcalose metabólica (↑HCO₃⁻ primário), acidose respiratória (↑PCO₂ primário) e alcalose respiratória (↓PCO₂ primário). O diagnóstico clínico baseia-se na análise de três parâmetros do sangue arterial: pH, HCO₃⁻ plasmático e PCO₂. pH < 7,4 indica acidose; pH > 7,4 indica alcalose. Em seguida, avalia-se se a alteração primária é no HCO₃⁻ (componente metabólico) ou na PCO₂ (componente respiratório). As respostas compensatórias esperadas são: na acidose metabólica, queda compensatória da PCO₂ (hiperventilação); na alcalose metabólica, elevação compensatória da PCO₂ (hipoventilação); na acidose respiratória, elevação compensatória do HCO₃⁻ (retenção renal); na alcalose respiratória, queda compensatória do HCO₃⁻ (excreção renal). Quando as respostas compensatórias diferem do esperado, suspeita-se de distúrbio misto.\n\nO nomograma acidobásico permite diagnóstico rápido ao cruzar os valores de pH, HCO₃⁻ e PCO₂: valores dentro das áreas sombreadas (limites de confiança de 95%) sugerem distúrbio simples; valores fora dessas áreas sugerem distúrbio misto. O hiato aniônico (anion gap) — calculado como [Na⁺] − [HCO₃⁻] − [Cl⁻], com valor normal de 8–16 mEq/L — é ferramenta diagnóstica essencial na acidose metabólica: hiato elevado indica acúmulo de ânions não medidos (cetoacidose, acidose lática, insuficiência renal, intoxicações); hiato normal (hiperclorêmica) indica perda de HCO₃⁻ com retenção proporcional de Cl⁻ (diarreia, acidose tubular renal, inibidores da anidrase carbônica).\n\nO tratamento visa corrigir a causa subjacente. Na acidose, pode-se administrar bicarbonato de sódio, lactato de sódio ou gluconato de sódio (que são metabolizados a HCO₃⁻). Na alcalose, utiliza-se cloreto de amônio oral ou intravenoso (a porção amônia é convertida pelo fígado em ureia, liberando HCl que acidifica os líquidos corporais) ou monocloridrato de lisina.\n\n### Pontos-chave\n\n- Diagnóstico em três etapas: (1) pH → acidose ou alcalose; (2) HCO₃⁻ e PCO₂ → metabólico ou respiratório; (3) resposta compensatória → simples ou misto.\n- Acidose metabólica simples: pH↓, HCO₃⁻↓, PCO₂↓ (compensação respiratória por hiperventilação).\n- Alcalose metabólica simples: pH↑, HCO₃⁻↑, PCO₂↑ (compensação respiratória por hipoventilação).\n- Acidose respiratória simples: pH↓, PCO₂↑, HCO₃⁻↑ (compensação renal após 3–5 dias).\n- Alcalose respiratória simples: pH↑, PCO₂↓, HCO₃⁻↓ (compensação renal após 3–5 dias).\n- Hiato aniônico = [Na⁺] − [HCO₃⁻] − [Cl⁻]; valor normal = 12 mEq/L (faixa 8–16 mEq/L).\n- Causas de acidose metabólica com hiato elevado: cetoacidose diabética, acidose lática, insuficiência renal crônica, intoxicação por aspirina, metanol, etilenoglicol, inanição, doença de Addison.\n- Causas de acidose metabólica com hiato normal (hiperclorêmica): diarreia, acidose tubular renal, inibidores da anidrase carbônica.\n- Diarreia causa acidose metabólica por perda de HCO₃⁻; vômito de conteúdo gástrico causa alcalose metabólica por perda de HCl.\n- Diuréticos (exceto inibidores da anidrase carbônica) e excesso de aldosterona causam alcalose metabólica por aumento da secreção tubular de H⁺ e reabsorção de HCO₃⁻.\n\n### Comparação\n\n| Distúrbio | pH | HCO₃⁻ | PCO₂ | Mecanismo Primário | Compensação |\n|---|---|---|---|---|---|\n| Acidose Metabólica | ↓ | ↓ (primário) | ↓ | Perda de HCO₃⁻ ou ganho de H⁺ | Hiperventilação (↓PCO₂) |\n| Alcalose Metabólica | ↑ | ↑ (primário) | ↑ | Ganho de HCO₃⁻ ou perda de H⁺ | Hipoventilação (↑PCO₂) |\n| Acidose Respiratória | ↓ | ↑ | ↑ (primário) | Retenção de CO₂ (↑PCO₂) | Retenção renal de HCO₃⁻ |\n| Alcalose Respiratória | ↑ | ↓ | ↓ (primário) | Eliminação excessiva de CO₂ (↓PCO₂) | Excreção renal de HCO₃⁻ |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Amostra de sangue arterial] --> B{pH?}\n B -- < 7,4 --> C[ACIDOSE]\n B -- > 7,4 --> D[ALCALOSE]\n C --> E{HCO₃⁻ < 24 mEq/L?}\n E -- Sim --> F[Acidose METABÓLICA\\nCompensação: PCO₂↓]\n E -- Não --> G{PCO₂ > 40 mmHg?}\n G -- Sim --> H[Acidose RESPIRATÓRIA\\nCompensação: HCO₃⁻↑]\n D --> I{HCO₃⁻ > 24 mEq/L?}\n I -- Sim --> J[Alcalose METABÓLICA\\nCompensação: PCO₂↑]\n I -- Não --> K{PCO₂ < 40 mmHg?}\n K -- Sim --> L[Alcalose RESPIRATÓRIA\\nCompensação: HCO₃⁻↓]\n F & H & J & L --> M{Compensação dentro\\ndas áreas do nomograma?}\n M -- Sim --> N[Distúrbio SIMPLES]\n M -- Não --> O[Distúrbio MISTO]\n```\n\n> **Mnemônico:** \"MARA\" para causas de acidose metabólica com hiato ELEVADO: Metanol, Acidose lática, Renal (insuficiência), Aspirina/cetoAcidose (DM/inanição/Addison).\n\n<sub>Fontes: 1505b4589c5c5c15:3, 8ea631ac7eedf449:15, 8ea631ac7eedf449:16, 8ea631ac7eedf449:17, 8ea631ac7eedf449:18</sub>\n\n---\n\n## Regulação do pH e Sistemas-Tampão dos Líquidos Corporais\n\nO controle preciso da concentração de íons hidrogênio (H⁺) é fundamental para a homeostasia, pois 'as atividades de quase todos os sistemas de enzimas no corpo são influenciadas pela concentração de H⁺'. O pH normal do sangue arterial é 7,4, e variações extremas (abaixo de 6,8 ou acima de 8,0) são incompatíveis com a vida. Para manter esse equilíbrio, o organismo conta com três linhas de defesa que atuam em velocidades distintas: os sistemas-tampão químicos (resposta em fração de segundo), o sistema respiratório (resposta em minutos) e os rins (resposta em horas a dias).\n\nOs principais sistemas-tampão são o bicarbonato (mais importante no líquido extracelular), o fosfato (mais relevante nos túbulos renais e líquido intracelular) e as proteínas (tampões intracelulares mais abundantes, responsáveis por 60–70% do tamponamento químico total). O sistema bicarbonato é paradoxalmente o mais potente do líquido extracelular, apesar de operar longe do seu pK (6,1), porque seus dois componentes — HCO₃⁻ e CO₂ — são regulados independentemente pelos rins e pelos pulmões, respectivamente. Todos os tampões de uma solução funcionam de forma integrada, pois compartilham o mesmo H⁺ — fenômeno denominado princípio isoídrico.\n\nA equação de Henderson-Hasselbalch expressa matematicamente essa relação: pH = 6,1 + log [HCO₃⁻ / (0,03 × PCO₂)]. Ela evidencia que o pH depende da razão entre HCO₃⁻ (controlado pelos rins) e PCO₂ (controlada pelos pulmões). Aumento de HCO₃⁻ eleva o pH (alcalose); aumento de PCO₂ reduz o pH (acidose). Essa equação é a base para a classificação e interpretação de todos os distúrbios acidobásicos.\n\n### Pontos-chave\n\n- pH normal do sangue arterial = 7,4; limites de sobrevivência: 6,8–8,0.\n- Três linhas de defesa em ordem de velocidade: tampões químicos (segundos) → pulmões (minutos) → rins (horas a dias).\n- Sistema-tampão bicarbonato: pK = 6,1; componentes H₂CO₃ (≈ 0,03 × PCO₂) e HCO₃⁻; é o mais potente do líquido extracelular por ser regulado pelos pulmões e rins.\n- Sistema-tampão fosfato: pK = 6,8; pouco relevante no líquido extracelular, mas importante nos túbulos renais e no líquido intracelular.\n- Proteínas intracelulares (incluindo hemoglobina) respondem por 60–70% do tamponamento químico total dos líquidos corporais.\n- Princípio isoídrico: todos os tampões de uma solução estão em equilíbrio com a mesma concentração de H⁺ e se afetam mutuamente.\n- Henderson-Hasselbalch: pH = 6,1 + log [HCO₃⁻ / (0,03 × PCO₂)] — base para classificação dos distúrbios acidobásicos.\n- O sistema respiratório tem capacidade de tamponamento uma a duas vezes maior que todos os tampões químicos combinados, mas não retorna o pH completamente ao normal (eficiência de 50–75%).\n\n### Comparação\n\n| Sistema-Tampão | Localização Principal | pK | Importância Relativa |\n|---|---|---|---|\n| Bicarbonato (HCO₃⁻/CO₂) | Líquido extracelular | 6,1 | Mais potente do LEC; regulado por rins e pulmões |\n| Fosfato (H₂PO₄⁻/HPO₄²⁻) | Túbulos renais e líquido intracelular | 6,8 | Pouco relevante no LEC; importante nos túbulos e LIC |\n| Proteínas (incluindo Hb) | Intracelular (e hemácias) | ~6,0–7,4 | 60–70% do tamponamento químico total do corpo |\n\n> **Mnemônico:** \"Tampões BFP\" — Bicarbonato (extracelular), Fosfato (tubular/intracelular), Proteínas (intracelular) — em ordem decrescente de importância no LEC.\n\n<sub>Fontes: f8d97a9f5383249e:0, f8d97a9f5383249e:1, f8d97a9f5383249e:2, f8d97a9f5383249e:3, f8d97a9f5383249e:4, f8d97a9f5383249e:5</sub>\n\n---\n\n## Regulação Respiratória do Equilíbrio Acidobásico\n\nOs pulmões constituem a segunda linha de defesa contra distúrbios acidobásicos, atuando em minutos por meio do controle da PCO₂ no líquido extracelular. O CO₂ é produzido continuamente pelo metabolismo celular e transportado pelo sangue até os alvéolos, onde é eliminado pela ventilação. 'Quanto maior a ventilação alveolar, menor a PCO₂; em contrapartida, quanto menor a ventilação alveolar, maior a PCO₂.' Como o CO₂ se combina com H₂O para formar H₂CO₃ (e, consequentemente, H⁺), a ventilação regula indiretamente o pH extracelular.\n\nExiste um mecanismo de retroalimentação negativa entre o pH e a ventilação: o aumento da concentração de H⁺ estimula os quimiorreceptores, elevando a ventilação alveolar, o que reduz a PCO₂ e, portanto, a concentração de H⁺. O inverso ocorre na alcalose. Contudo, a compensação respiratória é incompleta — sua eficiência é de 50% a 75% —, pois quando a ventilação diminui em resposta à alcalose, a queda da PO₂ arterial estimula novamente a respiração, limitando a compensação. Por isso, os rins são indispensáveis para a correção definitiva dos distúrbios.\n\n### Pontos-chave\n\n- Pulmões atuam em minutos, controlando a PCO₂ e, indiretamente, o pH extracelular.\n- Duplicar a ventilação alveolar aumenta o pH em ~0,23; reduzir a ventilação a ¼ do normal reduz o pH em ~0,45.\n- Retroalimentação negativa: ↑H⁺ → ↑ventilação → ↓PCO₂ → ↓H⁺.\n- Eficiência do controle respiratório: 50–75% (ganho de feedback de 1 a 3); não normaliza completamente o pH.\n- Comprometimento pulmonar (ex.: enfisema) causa acidose respiratória e prejudica a compensação de acidoses metabólicas.\n- Alcalose respiratória ocorre por hiperventilação (ex.: altitude elevada, psiconeurose); acidose respiratória ocorre por hipoventilação (ex.: obstrução de vias aéreas, pneumonia, danos ao centro respiratório bulbar).\n- A capacidade de tamponamento do sistema respiratório é uma a duas vezes maior que a de todos os tampões químicos do LEC combinados.\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[↑ H⁺ / ↓ pH] --> B[Estimulação dos quimiorreceptores]\n B --> C[↑ Ventilação alveolar]\n C --> D[↓ PCO₂ no LEC]\n D --> E[↓ H₂CO₃ e ↓ H⁺]\n E --> F[↑ pH — tendência ao normal]\n F -.->|Feedback negativo| A\n\n G[↓ H⁺ / ↑ pH] --> H[Inibição do centro respiratório]\n H --> I[↓ Ventilação alveolar]\n I --> J[↑ PCO₂ no LEC]\n J --> K[↑ H₂CO₃ e ↑ H⁺]\n K --> L[↓ pH — tendência ao normal]\n```\n\n<sub>Fontes: f8d97a9f5383249e:5, f8d97a9f5383249e:6</sub>\n\n---\n\n## Controle Renal do Equilíbrio Acidobásico: Secreção de H⁺ e Reabsorção de HCO₃⁻\n\nOs rins são os reguladores acidobásicos mais potentes do organismo, atuando por meio de três mecanismos fundamentais: secreção de H⁺, reabsorção de HCO₃⁻ filtrado e produção de novo HCO₃⁻. Diariamente, cerca de 4.320 mEq de HCO₃⁻ são filtrados, e quase todo esse bicarbonato é reabsorvido — processo que exige a secreção de quantidades equivalentes de H⁺. Além disso, os 80 mEq de ácidos não voláteis produzidos diariamente pelo metabolismo proteico precisam ser excretados, totalizando ~4.400 mEq de H⁺ secretados por dia nos túbulos.\n\nA secreção de H⁺ ocorre em praticamente todos os segmentos tubulares, exceto nas porções finas da alça de Henle. No túbulo proximal, segmento espesso ascendente e início do túbulo distal, o H⁺ é secretado por contratransporte Na⁺-H⁺ (transporte ativo secundário), acoplado ao gradiente de Na⁺ mantido pela Na⁺-K⁺-ATPase basolateral. Nos túbulos e ductos coletores, células intercaladas secretam H⁺ por H⁺-ATPase e H⁺-K⁺-ATPase. O HCO₃⁻ filtrado não atravessa diretamente a membrana luminal; em vez disso, reage com o H⁺ secretado para formar H₂CO₃, que se dissocia em CO₂ e H₂O. O CO₂ difunde-se para a célula tubular, onde a anidrase carbônica o reconverte em H₂CO₃, gerando novo HCO₃⁻ que é transportado para o sangue peritubular. Fatores que aumentam a secreção de H⁺ incluem: ↑PCO₂, ↑H⁺, depleção de volume (via angiotensina II e aldosterona), hipocalemia e excesso de aldosterona.\n\n### Pontos-chave\n\n- Rins filtram ~4.320 mEq/dia de HCO₃⁻; secretam ~4.400 mEq/dia de H⁺ (4.320 para reabsorver HCO₃⁻ + 80 para excretar ácidos não voláteis).\n- 80–90% da reabsorção de HCO₃⁻ ocorre no túbulo proximal; ~10% no ramo espesso ascendente; restante no túbulo distal e ducto coletor.\n- Mecanismo proximal: contratransporte Na⁺-H⁺ (antiporte) — transporte ativo secundário dependente do gradiente de Na⁺ gerado pela Na⁺-K⁺-ATPase.\n- Anidrase carbônica é essencial: catalisa CO₂ + H₂O ⇌ H₂CO₃ nas células tubulares e na borda em escova luminal.\n- HCO₃⁻ filtrado não é reabsorvido diretamente — reage com H⁺ secretado → H₂CO₃ → CO₂ + H₂O → difunde para a célula → novo HCO₃⁻ para o sangue.\n- Aldosterona estimula secreção de H⁺ pelas células intercaladas do ducto coletor; excesso de aldosterona (Síndrome de Conn) causa alcalose.\n- Hipocalemia estimula secreção de H⁺ e reabsorção de HCO₃⁻ → alcalose; hipercalemia inibe → acidose.\n- Depleção de volume do LEC → ↑angiotensina II (ativa trocador Na⁺-H⁺) + ↑aldosterona → ↑secreção de H⁺ → tendência à alcalose.\n- Na acidose crônica, produção de NH₄⁺ pode chegar a 500 mEq/dia, excretando H⁺ e gerando novo HCO₃⁻ para o sangue.\n\n### Comparação\n\n| Fator | Efeito sobre Secreção de H⁺ e Reabsorção de HCO₃⁻ |\n|---|---|\n| ↑ PCO₂ | Aumenta |\n| ↓ PCO₂ | Diminui |\n| ↑ H⁺ (↓ pH) | Aumenta |\n| ↓ H⁺ (↑ pH) | Diminui |\n| Depleção de volume do LEC | Aumenta (via AngII e aldosterona) |\n| Expansão de volume do LEC | Diminui |\n| ↑ Angiotensina II | Aumenta |\n| ↑ Aldosterona | Aumenta |\n| Hipocalemia | Aumenta |\n| Hipercalemia | Diminui |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[CO₂ difunde para célula tubular] --> B[Anidrase carbônica: CO₂ + H₂O → H₂CO₃]\n B --> C[H₂CO₃ → H⁺ + HCO₃⁻]\n C --> D[H⁺ secretado para lúmen via antiporte Na⁺-H⁺]\n C --> E[HCO₃⁻ transportado para sangue peritubular]\n D --> F[H⁺ + HCO₃⁻ filtrado → H₂CO₃ no lúmen]\n F --> G[H₂CO₃ → CO₂ + H₂O no lúmen]\n G --> A\n```\n\n> **Mnemônico:** \"APAH\" — Aldosterona, PCO₂ alta, Angiotensina II, Hipocalemia → todos AUMENTAM a secreção de H⁺ pelos túbulos.\n\n<sub>Fontes: f8d97a9f5383249e:6, f8d97a9f5383249e:7, f8d97a9f5383249e:8, 1505b4589c5c5c15:12</sub>\n\n---\n\n## Distúrbios Acidobásicos: Classificação, Causas Clínicas e Diagnóstico\n\nOs distúrbios acidobásicos são classificados em quatro tipos primários com base na causa inicial e nas variáveis pH, PCO₂ e HCO₃⁻: acidose respiratória (↑PCO₂), alcalose respiratória (↓PCO₂), acidose metabólica (↓HCO₃⁻) e alcalose metabólica (↑HCO₃⁻). Em cada distúrbio, o organismo ativa mecanismos compensatórios: distúrbios respiratórios são compensados pelos rins (em 3–5 dias), e distúrbios metabólicos são compensados pelos pulmões (em 6–12 horas). A compensação é sempre parcial — o pH não retorna completamente ao normal em distúrbios simples. Quando as respostas compensatórias são inadequadas ou ausentes, suspeita-se de distúrbio acidobásico misto.\n\nAs causas clínicas mais relevantes incluem: acidose respiratória por hipoventilação (enfisema, obstrução de vias aéreas, lesão do centro respiratório); alcalose respiratória por hiperventilação (altitude elevada, psiconeurose); acidose metabólica por diarreia (perda de HCO₃⁻ nas fezes — 'provavelmente a causa mais frequente'), cetoacidose diabética (acúmulo de ácido acetoacético), insuficiência renal crônica, acidose tubular renal e ingestão de ácidos (aspirina, metanol); alcalose metabólica por vômito do conteúdo gástrico (perda de HCl), excesso de aldosterona, uso de diuréticos e ingestão de agentes alcalinos.\n\nO diagnóstico é feito pela análise de três variáveis no sangue arterial: pH, PCO₂ e HCO₃⁻. O hiato aniônico (anion gap = [Na⁺] − [HCO₃⁻] − [Cl⁻]; normal = 8–16 mEq/L) auxilia na diferenciação das causas de acidose metabólica: hiato elevado indica acúmulo de ânions não medidos (cetoacidose, acidose lática, insuficiência renal, intoxicações); hiato normal (hiperclorêmica) indica perda de HCO₃⁻ com retenção de Cl⁻ (diarreia, acidose tubular renal, inibidores da anidrase carbônica).\n\n### Pontos-chave\n\n- Quatro distúrbios primários: acidose/alcalose respiratória (alteração primária da PCO₂) e acidose/alcalose metabólica (alteração primária do HCO₃⁻).\n- Compensação respiratória de distúrbios metabólicos: 6–12 horas; compensação renal de distúrbios respiratórios: 3–5 dias.\n- Acidose metabólica: ↓pH, ↓HCO₃⁻, ↓PCO₂ (compensação respiratória). Alcalose metabólica: ↑pH, ↑HCO₃⁻, ↑PCO₂.\n- Acidose respiratória: ↓pH, ↑PCO₂, ↑HCO₃⁻ (compensação renal). Alcalose respiratória: ↑pH, ↓PCO₂, ↓HCO₃⁻.\n- Diarreia grave é 'provavelmente a causa mais frequente de acidose metabólica' — perda de NaHCO₃ nas fezes.\n- Vômito do conteúdo gástrico → alcalose metabólica (perda de HCl); vômito do conteúdo intestinal → acidose metabólica.\n- Cetoacidose diabética: degradação de gorduras → ácido acetoacético → acidose metabólica com hiato aniônico elevado.\n- Hiato aniônico = [Na⁺] − [HCO₃⁻] − [Cl⁻] = 12 mEq/L (normal: 8–16 mEq/L).\n- Hiato aniônico elevado (normoclorêmica): cetoacidose, acidose lática, insuficiência renal crônica, intoxicação por aspirina/metanol/etilenoglicol, inanição, Doença de Addison.\n- Hiato aniônico normal (hiperclorêmica): diarreia, acidose tubular renal, inibidores da anidrase carbônica.\n- Distúrbio misto: valores fora das áreas de confiança do nomograma acidobásico ou compensação inadequada para o distúrbio primário identificado.\n\n### Comparação\n\n| Distúrbio | pH | H⁺ | PCO₂ | HCO₃⁻ | Evento Primário | Compensação |\n|---|---|---|---|---|---|---|\n| Acidose respiratória | ↓ | ↑ | ↑↑ | ↑ (compensação) | ↑PCO₂ | Renal: ↑HCO₃⁻ (3–5 dias) |\n| Alcalose respiratória | ↑ | ↓ | ↓↓ | ↓ (compensação) | ↓PCO₂ | Renal: ↓HCO₃⁻ (3–5 dias) |\n| Acidose metabólica | ↓ | ↑ | ↓ (compensação) | ↓↓ | ↓HCO₃⁻ | Respiratória: ↓PCO₂ (6–12h) |\n| Alcalose metabólica | ↑ | ↓ | ↑ (compensação) | ↑↑ | ↑HCO₃⁻ | Respiratória: ↑PCO₂ (6–12h) |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Amostra de sangue arterial] --> B{pH?}\n B -->|< 7,4| C[ACIDOSE]\n B -->|> 7,4| D[ALCALOSE]\n C --> E{PCO₂ e HCO₃⁻?}\n E -->|PCO₂ > 40 mmHg| F[Acidose RESPIRATÓRIA]\n E -->|HCO₃⁻ < 24 mEq/L| G[Acidose METABÓLICA]\n F --> H[Compensação renal: ↑HCO₃⁻]\n G --> I[Compensação respiratória: ↓PCO₂]\n D --> J{PCO₂ e HCO₃⁻?}\n J -->|PCO₂ < 40 mmHg| K[Alcalose RESPIRATÓRIA]\n J -->|HCO₃⁻ > 24 mEq/L| L[Alcalose METABÓLICA]\n K --> M[Compensação renal: ↓HCO₃⁻]\n L --> N[Compensação respiratória: ↑PCO₂]\n```\n\n> **Mnemônico:** \"ROME\" (em inglês, útil para lembrar a relação PCO₂/HCO₃⁻ com o tipo de distúrbio): Respiratory Opposite, Metabolic Equal — na acidose/alcalose respiratória, pH e PCO₂ variam em sentidos opostos; na metabólica, pH e HCO₃⁻ variam no mesmo sentido.\n\n<sub>Fontes: 1505b4589c5c5c15:12, 1505b4589c5c5c15:13, 1505b4589c5c5c15:14, 1505b4589c5c5c15:15, 1505b4589c5c5c15:16, 1505b4589c5c5c15:17, 1505b4589c5c5c15:18</sub>\n\n---\n\n## Secreção Tubular de H⁺ e Reabsorção de HCO₃⁻: Mecanismos e Segmentos do Néfron\n\nA secreção de íons hidrogênio ao longo do néfron ocorre por mecanismos distintos conforme o segmento. Nos túbulos proximais, alça de Henle e início dos túbulos distais, o H⁺ é secretado principalmente por contratransporte (antiporte Na⁺-H⁺), enquanto no final dos túbulos distais e nos túbulos coletores a secreção ocorre por transporte ativo primário via ATPase transportadora de hidrogênio, localizada nas células intercaladas. Em ambos os casos, para cada H⁺ secretado, um HCO₃⁻ é reabsorvido para o sangue, pois o CO₂ dissolvido na célula combina-se com H₂O para formar H₂CO₃, que se dissocia em H⁺ (secretado) e HCO₃⁻ (reabsorvido).\n\nA importância funcional dos segmentos difere quantitativamente e qualitativamente. Embora os túbulos proximais secretem a maior parte do H⁺, os túbulos coletores são capazes de concentrar o H⁺ até 900 vezes, reduzindo o pH urinário ao mínimo de aproximadamente 4,5. Esse limite mínimo de pH impõe restrição à excreção de H⁺ livre na urina: para excretar 80 mEq de ácido não volátil produzidos diariamente pelo metabolismo, seriam necessários cerca de 2.667 litros de urina se todo o H⁺ permanecesse livre em solução. Por isso, a excreção eficiente de ácido depende de sistemas tampão tubulares.\n\nA regulação da secreção tubular de H⁺ é influenciada por múltiplos fatores: aumento da PCO₂ (acidose respiratória), aumento da concentração de H⁺ extracelular (acidose metabólica ou respiratória), depleção do volume do líquido extracelular (via angiotensina II e aldosterona), hipocalemia e excesso de aldosterona estimulam a secreção de H⁺ e a reabsorção de HCO₃⁻. Inversamente, queda da PCO₂, aumento do pH, expansão volêmica e hipercalemia reduzem a secreção de H⁺.\n\n### Pontos-chave\n\n- Nos túbulos coletores, a secreção de H⁺ ocorre por bomba ATPase nas células intercaladas, diferente do contratransporte usado nos segmentos proximais.\n- O pH mínimo urinário alcançável pelos rins normais é de aproximadamente 4,5, correspondendo ao limite da concentração de H⁺ livre.\n- Para cada H⁺ secretado, um HCO₃⁻ é reabsorvido para o sangue — mecanismo comum a todos os segmentos do néfron.\n- Os túbulos proximais secretam a maior quantidade de H⁺, mas os túbulos coletores são responsáveis pela formação de urina muito ácida (apenas 5% do total secretado, porém com maior gradiente de concentração).\n- Aldosterona estimula a secreção de H⁺ pelas células intercaladas dos túbulos coletores; excesso de aldosterona (síndrome de Conn) causa alcalose metabólica.\n- Hipocalemia estimula e hipercalemia inibe a secreção de H⁺ no túbulo proximal, influenciando o equilíbrio acidobásico.\n- Depleção do volume extracelular aumenta a secreção de H⁺ via angiotensina II (ativa trocador Na⁺-H⁺) e aldosterona (estimula células intercaladas), tendendo a causar alcalose.\n\n### Comparação\n\n| Característica | Túbulo Proximal / Alça de Henle / Início Túbulo Distal | Final Túbulo Distal e Túbulo Coletor |\n|---|---|---|\n| Mecanismo de secreção de H⁺ | Contratransporte Na⁺-H⁺ (antiporte) | Bomba ATPase transportadora de H⁺ (ativo primário) |\n| Tipo celular principal | Células epiteliais tubulares | Células intercaladas |\n| Proporção do H⁺ total secretado | ~95% | ~5% |\n| Gradiente máximo de H⁺ | ~3–4 vezes (pH mínimo ~6,7) | ~900 vezes (pH mínimo ~4,5) |\n| Acoplamento com reabsorção de HCO₃⁻ | Sim | Sim |\n| Importância clínica | Reabsorção em massa de HCO₃⁻ filtrado | Formação de urina ácida; geração de novo HCO₃⁻ |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[CO₂ dissolvido na célula tubular] --> B[CO₂ + H₂O → H₂CO₃]\n B --> C[H₂CO₃ → H⁺ + HCO₃⁻]\n C --> D[H⁺ secretado para o lúmen tubular]\n C --> E[HCO₃⁻ reabsorvido para o sangue peritubular]\n D --> F{Lúmen tubular: H⁺ disponível}\n F -->|HCO₃⁻ presente| G[H⁺ + HCO₃⁻ → H₂CO₃ → CO₂ + H₂O: reabsorção de HCO₃⁻]\n F -->|Excesso de H⁺| H[H⁺ combina com tampões não-bicarbonato]\n H --> I[Tampão fosfato: H⁺ + HPO₄²⁻ → H₂PO₄⁻ excretado]\n H --> J[Tampão amônia: H⁺ + NH₃ → NH₄⁺ excretado]\n I --> K[Geração de NOVO HCO₃⁻ adicionado ao sangue]\n J --> K\n```\n\n> **Mnemônico:** Para lembrar os fatores que AUMENTAM a secreção de H⁺: 'PHÁVA-K' — PCO₂ alta, H⁺ alto (pH baixo), Aldosterona alta, Volume extracelular baixo, Angiotensina II alta, K⁺ baixo (hipocalemia).\n\n<sub>Fontes: f8d97a9f5383249e:9, f8d97a9f5383249e:11, f8d97a9f5383249e:12</sub>\n\n---\n\n## Sistemas Tampão Tubulares: Fosfato e Amônia na Geração de Novo HCO₃⁻\n\nQuando a quantidade de H⁺ secretado supera a de HCO₃⁻ filtrado, o excesso de H⁺ não pode ser excretado livremente na urina (pH mínimo ~4,5). A solução fisiológica é a combinação do H⁺ com tampões tubulares não-bicarbonato, principalmente o sistema fosfato (HPO₄²⁻/H₂PO₄⁻) e o sistema amônia (NH₃/NH₄⁺). O ponto crítico é que, sempre que um H⁺ secretado se combina com um tampão que não o HCO₃⁻, o efeito líquido é a adição de novo HCO₃⁻ ao sangue — diferente da simples reabsorção do HCO₃⁻ filtrado, que apenas repõe o que foi filtrado.\n\nO sistema fosfato é eficiente porque o fosfato é concentrado no líquido tubular (reabsorção de água maior que a de fosfato) e seu pK (~6,8) está próximo ao pH urinário normal, operando em sua faixa mais efetiva. Entretanto, apenas 30–40 mEq/dia de fosfato ficam disponíveis para tamponamento. O sistema amônia é quantitativamente mais importante: a glutamina é metabolizada nas células tubulares proximais, gerando dois NH₄⁺ e dois HCO₃⁻ por molécula; o NH₄⁺ é secretado por contratransporte com Na⁺ e o HCO₃⁻ retorna ao sangue. Nos túbulos coletores, o H⁺ secretado combina-se com NH₃ difundido para o lúmen, formando NH₄⁺ que fica retido e é excretado.\n\nNa acidose crônica, o metabolismo renal da glutamina é intensamente estimulado pelo aumento da concentração de H⁺ extracelular, podendo elevar a excreção de NH₄⁺ de valores normais (~50% do ácido excretado) para até 500 mEq/dia. Esse mecanismo é o dominante na eliminação de ácido na acidose crônica e representa a principal fonte de geração de novo HCO₃⁻ pelos rins nessa condição.\n\n### Pontos-chave\n\n- Sempre que H⁺ se combina com tampão não-bicarbonato no lúmen tubular, gera-se novo HCO₃⁻ que é adicionado ao sangue — não apenas reposição do filtrado.\n- O sistema fosfato opera próximo ao seu pK (~6,8), coincidindo com o pH urinário normal, tornando-o eficiente como tampão tubular.\n- O fosfato disponível para tamponamento é limitado a ~30–40 mEq/dia; por isso, o sistema amônia é quantitativamente mais importante na acidose.\n- A glutamina metabolizada no túbulo proximal gera dois NH₄⁺ e dois HCO₃⁻ por molécula; o NH₄⁺ é secretado e o HCO₃⁻ vai para o sangue.\n- Nos túbulos coletores, NH₃ difunde-se para o lúmen e combina-se com H⁺ secretado formando NH₄⁺, que é impermeável à membrana luminal e fica retido na urina.\n- Na acidose crônica, a excreção de NH₄⁺ pode aumentar para até 500 mEq/dia, tornando-se o mecanismo dominante de excreção de ácido.\n- A excreção efetiva de ácido = Excreção de NH₄⁺ + Ácido titulável − Excreção de HCO₃⁻.\n- O ácido titulável é medido pela quantidade de NaOH necessária para retornar o pH urinário a 7,4; não inclui H⁺ associado ao NH₄⁺ (pK = 9,2).\n\n### Comparação\n\n| Característica | Sistema Tampão Fosfato | Sistema Tampão Amônia |\n|---|---|---|\n| Componentes | HPO₄²⁻ / H₂PO₄⁻ | NH₃ / NH₄⁺ |\n| pK do sistema | ~6,8 | ~9,2 |\n| Origem | Filtrado glomerular (concentrado por reabsorção de água) | Metabolismo da glutamina nas células tubulares |\n| Segmento principal | Túbulos distais e coletores | Túbulo proximal (produção) e túbulos coletores (excreção) |\n| Capacidade normal | ~30–40 mEq/dia | ~50% do ácido excretado normalmente |\n| Capacidade na acidose crônica | Limitada (fosfato não aumenta muito) | Até 500 mEq/dia de NH₄⁺ |\n| Produto excretado | NaH₂PO₄ (sal de sódio) | NH₄⁺ |\n| Regulação fisiológica | Pouca (depende da carga filtrada) | Alta (estimulado pelo aumento de H⁺ extracelular) |\n| Medição clínica | Ácido titulável (titulação com NaOH até pH 7,4) | Excreção urinária de NH₄⁺ |\n\n> **Mnemônico:** Para lembrar as etapas da geração de NH₄⁺ no túbulo proximal: 'GLU-DOIS-DOIS' — GLUtamina → DOIS NH₄⁺ secretados + DOIS HCO₃⁻ para o sangue.\n\n<sub>Fontes: f8d97a9f5383249e:9, f8d97a9f5383249e:10, f8d97a9f5383249e:11</sub>\n\n---\n\n## Distúrbios Acidobásicos: Classificação, Compensação e Diagnóstico\n\nOs distúrbios acidobásicos são classificados em quatro tipos primários com base na equação de Henderson-Hasselbalch: acidose respiratória (↑PCO₂), alcalose respiratória (↓PCO₂), acidose metabólica (↓HCO₃⁻) e alcalose metabólica (↑HCO₃⁻). Em cada distúrbio primário, o organismo aciona mecanismos compensatórios: distúrbios respiratórios são compensados pelos rins (em 3–5 dias), e distúrbios metabólicos são compensados pelos pulmões (em 6–12 horas) e pelos rins. A compensação nunca é completa — ela atenua, mas não normaliza totalmente o pH.\n\nO diagnóstico clínico baseia-se na análise de três variáveis do sangue arterial: pH, PCO₂ e HCO₃⁻ plasmático. O algoritmo diagnóstico parte do pH (acidose se <7,4; alcalose se >7,4), depois identifica a variável primariamente alterada (PCO₂ para distúrbios respiratórios; HCO₃⁻ para metabólicos) e verifica se a compensação é adequada. Quando a compensação está fora dos limites esperados, suspeita-se de distúrbio misto. O nomograma acidobásico permite visualizar graficamente os limites de confiança de 95% das compensações normais.\n\nO hiato aniônico (anion gap) é ferramenta diagnóstica adicional para diferenciar causas de acidose metabólica: calculado como [Na⁺] − [HCO₃⁻] − [Cl⁻], com valor normal de 8–16 mEq/L. Acidoses com hiato aniônico elevado (normoclorêmicas) resultam de acúmulo de ânions não medidos (cetoácidos, lactato, toxinas), enquanto acidoses com hiato aniônico normal (hiperclorêmicas) resultam de perda de HCO₃⁻ com retenção compensatória de Cl⁻ (diarreia, acidose tubular renal).\n\n### Pontos-chave\n\n- Os quatro distúrbios primários: acidose respiratória (↑PCO₂), alcalose respiratória (↓PCO₂), acidose metabólica (↓HCO₃⁻), alcalose metabólica (↑HCO₃⁻).\n- Compensação respiratória de distúrbios metabólicos ocorre em 6–12 horas; compensação renal de distúrbios respiratórios leva 3–5 dias.\n- Na acidose respiratória, a resposta compensatória renal é aumento do HCO₃⁻ plasmático (adição de novo HCO₃⁻ pelos rins).\n- Na acidose metabólica, a compensação primária é hiperventilação (↓PCO₂) e compensação renal com geração de novo HCO₃⁻.\n- Na alcalose respiratória, a compensação renal é redução do HCO₃⁻ plasmático por maior excreção de HCO₃⁻.\n- Na alcalose metabólica, as compensações são hipoventilação (↑PCO₂) e maior excreção renal de HCO₃⁻.\n- Distúrbio misto é suspeitado quando a compensação está fora das áreas sombreadas do nomograma acidobásico.\n- Hiato aniônico = [Na⁺] − [HCO₃⁻] − [Cl⁻]; valor normal 8–16 mEq/L; elevado em cetoacidose, acidose lática, intoxicações; normal na diarreia e acidose tubular renal.\n- Causas de acidose metabólica com hiato aniônico elevado: diabetes melito (cetoacidose), acidose lática, insuficiência renal crônica, aspirina, metanol, etilenoglicol, inanição, doença de Addison.\n- Causas de acidose metabólica com hiato aniônico normal (hiperclorêmica): diarreia, acidose tubular renal, inibidores da anidrase carbônica.\n\n### Comparação\n\n| Distúrbio | pH | H⁺ | PCO₂ | HCO₃⁻ | Evento Primário | Compensação |\n|---|---|---|---|---|---|---|\n| Acidose respiratória | ↓ | ↑ | ↑↑ | ↑ (compensação) | ↑PCO₂ | Renal: ↑HCO₃⁻ (3–5 dias) |\n| Alcalose respiratória | ↑ | ↓ | ↓↓ | ↓ (compensação) | ↓PCO₂ | Renal: ↓HCO₃⁻ |\n| Acidose metabólica | ↓ | ↑ | ↓ (compensação) | ↓↓ | ↓HCO₃⁻ | Pulmonar: ↓PCO₂ (6–12h) + Renal: ↑HCO₃⁻ |\n| Alcalose metabólica | ↑ | ↓ | ↑ (compensação) | ↑↑ | ↑HCO₃⁻ | Pulmonar: ↑PCO₂ + Renal: ↑excreção HCO₃⁻ |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Amostra de sangue arterial: pH, PCO₂, HCO₃⁻] --> B{pH?}\n B -->|< 7,4| C[ACIDOSE]\n B -->|> 7,4| D[ALCALOSE]\n C --> E{PCO₂ > 40 mmHg?}\n E -->|Sim| F[Acidose RESPIRATÓRIA\\nCompensação: ↑HCO₃⁻ renal]\n E -->|Não| G{HCO₃⁻ < 24 mEq/L?}\n G -->|Sim| H[Acidose METABÓLICA\\nCompensação: ↓PCO₂ pulmonar]\n G -->|Não + PCO₂ elevada| I[Distúrbio MISTO]\n D --> J{PCO₂ < 40 mmHg?}\n J -->|Sim| K[Alcalose RESPIRATÓRIA\\nCompensação: ↓HCO₃⁻ renal]\n J -->|Não| L{HCO₃⁻ > 24 mEq/L?}\n L -->|Sim| M[Alcalose METABÓLICA\\nCompensação: ↑PCO₂ pulmonar]\n H --> N{Calcular Hiato Aniônico\\n= Na⁺ - HCO₃⁻ - Cl⁻}\n N -->|> 16 mEq/L| O[Hiato elevado: cetoacidose, acidose lática,\\ninsuficiência renal, toxinas]\n N -->|8–16 mEq/L| P[Hiato normal hiperclorêmica:\\ndiarreia, acidose tubular renal]\n```\n\n> **Mnemônico:** Para lembrar causas de acidose metabólica com hiato aniônico ELEVADO: 'MUDILES' — Metanol, Uremia (insuficiência renal), Diabetes (cetoacidose), Inanição, Lactato (acidose lática), Etilenoglicol, Salicilatos (aspirina).\n\n<sub>Fontes: f8d97a9f5383249e:12, f8d97a9f5383249e:13, f8d97a9f5383249e:14, f8d97a9f5383249e:15, f8d97a9f5383249e:16, f8d97a9f5383249e:17, f8d97a9f5383249e:18</sub>\n\n---\n\n## Insulina: Síntese, Receptor, Efeitos Metabólicos e Deficiência\n\nA insulina é um hormônio peptídico sintetizado pelas células beta das ilhotas de Langerhans do pâncreas, que constituem aproximadamente 60% das células das ilhotas. Sua síntese segue a via clássica das proteínas secretórias: pré-pró-insulina (PM ~11.500) → pró-insulina (PM ~9.000, clivada no retículo endoplasmático) → insulina + peptídeo C (clivagem no aparelho de Golgi). A insulina madura é composta por duas cadeias (A e B) ligadas por pontes dissulfeto; a separação das cadeias elimina a atividade funcional. O peptídeo C é secretado em quantidades equimolares à insulina e pode ser dosado para estimar a produção endógena de insulina. A meia-vida plasmática da insulina é de apenas ~6 minutos, sendo degradada principalmente pela insulinase hepática.\n\nA insulina age ligando-se a receptor tetramérico de membrana (duas subunidades α extracelulares + duas subunidades β transmembrana), ativando tirosinocinase intrínseca por autofosforilação das subunidades β. Isso desencadeia cascata de fosforilação via substratos do receptor de insulina (IRS), resultando em efeitos em segundos (translocação de transportadores de glicose GLUT para a membrana, aumentando captação de glicose em ~15 vezes nas células musculares e adiposas), minutos (aumento de permeabilidade a aminoácidos, K⁺ e fosfato) e horas/dias (alterações na transcrição e tradução gênica). Neurônios cerebrais são independentes da insulina para captação de glicose.\n\nMetabolicamente, a insulina é o 'hormônio da abundância': promove armazenamento de glicogênio no fígado (até 5–6% da massa hepática) e músculo, síntese de ácidos graxos e triglicerídeos, inibição da gliconeogênese e da lipólise (inibe lipase hormônio-sensível), e síntese proteica. Na deficiência de insulina (diabetes mellitus), ocorre lipólise intensa com liberação de ácidos graxos livres, formação excessiva de acetil-CoA nas mitocôndrias hepáticas, produção de corpos cetônicos (ácido acetoacético) e cetoacidose metabólica, além de hipercolesterolemia e aterosclerose acelerada.\n\n### Pontos-chave\n\n- Células beta (~60% das ilhotas de Langerhans) secretam insulina e amilina; células alfa (~25%) secretam glucagon; células delta (~10%) secretam somatostatina.\n- Via de síntese: pré-pró-insulina → pró-insulina (retículo endoplasmático) → insulina + peptídeo C (aparelho de Golgi); secretados em quantidades equimolares.\n- O peptídeo C pode ser dosado para avaliar produção endógena de insulina em diabéticos tratados com insulina exógena.\n- Meia-vida plasmática da insulina: ~6 minutos; degradada principalmente pela insulinase hepática.\n- Receptor de insulina: tetrâmero (2α + 2β); ligação à subunidade α → autofosforilação da subunidade β → ativação de tirosinocinase → cascata IRS.\n- Efeito mais rápido (segundos): translocação de vesículas com transportadores de glicose (GLUT) para a membrana celular, aumentando captação de glicose ~15 vezes no músculo.\n- Neurônios cerebrais captam glicose independentemente da insulina e utilizam quase exclusivamente glicose como fonte de energia.\n- No fígado, insulina ativa glicocinase e glicogênio sintase, inativa fosforilase e glicose-6-fosfatase, e inibe gliconeogênese.\n- Deficiência de insulina ativa lipase hormônio-sensível → lipólise → ↑ácidos graxos livres → ↑betaoxidação → ↑acetil-CoA → cetogênese → cetoacidose.\n- A insulina inibe a secreção de glucagon (controle parácrino intralhotas); somatostatina inibe tanto insulina quanto glucagon.\n\n### Comparação\n\n| Efeito da Insulina | Músculo | Fígado | Tecido Adiposo | Cérebro |\n|---|---|---|---|---|\n| Captação de glicose | ↑↑ (GLUT translocação) | ↑ (glicocinase) | ↑ (substrato para glicerol) | Independente da insulina |\n| Síntese de glicogênio | ↑ (até 2–3% da massa) | ↑ (até 5–6% da massa) | — | — |\n| Síntese de gordura | — | ↑ (acetil-CoA → ácidos graxos → VLDL) | ↑ (triglicerídeos armazenados) | — |\n| Lipólise | — | — | ↓ (inibe lipase hormônio-sensível) | — |\n| Gliconeogênese | ↓ (↓aminoácidos disponíveis) | ↓ (↓enzimas gliconeogênicas) | — | — |\n| Síntese proteica | ↑ (↑captação de aminoácidos) | ↑ | — | — |\n| Efeito na deficiência | ↓captação glicose, ↑proteólise | ↑gliconeogênese, ↑cetogênese | ↑lipólise, ↑ácidos graxos livres | Sem efeito direto |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Refeição rica em carboidratos → ↑Glicemia] --> B[Células beta das ilhotas de Langerhans]\n B --> C[Secreção de insulina]\n C --> D[Ligação ao receptor: subunidades α]\n D --> E[Autofosforilação subunidades β → Tirosinocinase ativa]\n E --> F[Fosforilação de IRS-1, IRS-2, IRS-3]\n F --> G[Segundos: Translocação de GLUT → ↑Captação de glicose]\n F --> H[Minutos: ↑Permeabilidade a aminoácidos, K⁺, fosfato]\n F --> I[Horas/dias: Alterações enzimáticas e de transcrição gênica]\n G --> J[Músculo: Glicogênio + energia]\n G --> K[Fígado: Glicogênio → excesso → ácidos graxos → VLDL]\n G --> L[Adipócito: Triglicerídeos armazenados]\n C --> M[Deficiência de insulina]\n M --> N[↑Lipase hormônio-sensível → Lipólise]\n N --> O[↑Ácidos graxos livres → Betaoxidação → ↑Acetil-CoA]\n O --> P[↑Corpos cetônicos: Ácido acetoacético]\n P --> Q[Cetoacidose metabólica]\n```\n\n> **Mnemônico:** Para lembrar os efeitos ANABÓLICOS da insulina: 'GALS' — Glicogênio (síntese), Ácidos graxos (síntese e armazenamento), Lipólise (inibição), Síntese proteica (estímulo).\n\n<sub>Fontes: 76cae3be4bc84980:0, 76cae3be4bc84980:1, 76cae3be4bc84980:2, 76cae3be4bc84980:3, 76cae3be4bc84980:4, 76cae3be4bc84980:5</sub>\n\n---\n\n## Insulina: Efeitos Metabólicos sobre Proteínas, Lipídios e Carboidratos\n\nA insulina é o principal hormônio anabólico do organismo, atuando de forma integrada no metabolismo de carboidratos, lipídios e proteínas. No metabolismo proteico, a insulina estimula o transporte de aminoácidos para as células (especialmente valina, leucina, isoleucina, tirosina e fenilalanina), aumenta a tradução do RNAm nos ribossomos, promove a transcrição de sequências genéticas selecionadas do DNA, inibe o catabolismo proteico pelos lisossomos e deprime a gliconeogênese hepática — conservando assim os aminoácidos nas reservas proteicas. Em resumo, 'a insulina promove a formação de proteínas e impede a sua degradação.'\n\nNo metabolismo de carboidratos e lipídios, a insulina funciona como um 'interruptor metabólico': quando a glicemia está elevada, a insulina é secretada e favorece a utilização de carboidratos como fonte de energia, armazenando o excesso como glicogênio hepático, glicogênio muscular e lipídios hepáticos. Na ausência de insulina, ocorre o oposto — os lipídios passam a ser a principal fonte de energia (exceto no tecido neural), com aumento da lipólise, produção de ácidos graxos livres e formação de corpos cetônicos (ácido acetoacético, ácido β-hidroxibutírico e acetona). O acúmulo excessivo desses corpos cetônicos leva à cetose e, nos casos graves, à acidose metabólica potencialmente fatal.\n\nA deficiência de insulina provoca um estado catabólico generalizado: cessam as reservas proteicas, aumenta o catabolismo proteico, eleva-se a concentração plasmática de aminoácidos (utilizados como substrato energético e para gliconeogênese), aumenta a excreção urinária de ureia e ocorre depleção proteica grave. Paralelamente, a ausência de insulina também deprime a utilização do ácido acetoacético nos tecidos periféricos, agravando a cetose. Esse 'consumo de proteínas é um dos efeitos mais graves do diabetes mellitus; pode levar à fraqueza extrema, bem como à alteração de diversas funções dos órgãos.'\n\n### Pontos-chave\n\n- A insulina estimula o transporte de aminoácidos para as células, especialmente valina, leucina, isoleucina, tirosina e fenilalanina.\n- A insulina aumenta a tradução do RNAm e a transcrição de sequências genéticas selecionadas do DNA, promovendo síntese proteica.\n- A insulina inibe o catabolismo proteico pelos lisossomos celulares e deprime a gliconeogênese hepática, conservando aminoácidos.\n- Na ausência de insulina, o catabolismo proteico aumenta, a síntese cessa e grandes quantidades de aminoácidos são lançadas no plasma.\n- A insulina funciona como 'interruptor metabólico': favorece carboidratos quando a glicemia está alta e lipídios quando está baixa.\n- A ausência de insulina leva à cetose: acúmulo de ácido acetoacético, ácido β-hidroxibutírico e acetona nos líquidos corporais.\n- A concentração de ácido acetoacético pode atingir 10 mEq/L ou mais, configurando estado grave de acidose.\n- Insulina e hormônio do crescimento atuam de forma sinérgica para promover crescimento — nenhum dos dois é suficiente isoladamente.\n- A depleção proteica no diabetes mellitus grave pode levar à fraqueza extrema e alteração de diversas funções orgânicas.\n\n### Comparação\n\n| Efeito | Com Insulina | Sem Insulina |\n|---|---|---|\n| Síntese proteica | Aumentada (tradução e transcrição ativas) | Cessada (ribossomos param) |\n| Catabolismo proteico | Inibido (lisossomos deprimidos) | Aumentado |\n| Aminoácidos plasmáticos | Reduzidos (captação celular aumentada) | Elevados (liberação muscular) |\n| Gliconeogênese hepática | Deprimida | Aumentada |\n| Utilização de carboidratos | Predominante | Deprimida (exceto encéfalo) |\n| Utilização de lipídios | Deprimida | Predominante |\n| Corpos cetônicos | Baixos | Elevados (cetose/acidose) |\n| Ácidos graxos livres | Baixos | Elevados |\n\n> **Mnemônico:** TATIC-D: Transporte de aminoácidos → Ativação ribossômica (tradução) → Transcrição do DNA → Inibição do catabolismo → Conservação (antigliconeogênese) → Depleção na ausência\n\n<sub>Fontes: 76cae3be4bc84980:6, 76cae3be4bc84980:9</sub>\n\n---\n\n## Mecanismo de Secreção de Insulina e Controle pela Glicemia\n\nA secreção de insulina pelas células beta pancreáticas é desencadeada primariamente pela elevação da glicose sanguínea. O mecanismo celular envolve uma cascata sequencial: a glicose entra nas células beta pelos transportadores GLUT-2 e é fosforilada pela glicocinase em glicose-6-fosfato — etapa considerada 'o principal mecanismo sensor de glicose'. A oxidação da glicose-6-fosfato gera ATP, que fecha os canais de potássio sensíveis ao ATP, despolarizando a membrana. Essa despolarização abre canais de cálcio dependentes de voltagem, promovendo influxo de cálcio que estimula a exocitose das vesículas de insulina. As sulfonilureias (ex.: glyburide, tolbutamida) mimetizam esse efeito ao bloquear diretamente os canais de K⁺ sensíveis ao ATP.\n\nA resposta secretória à hiperglicemia ocorre em dois estágios: uma fase inicial rápida (pico em 3–5 minutos, com aumento de ~10 vezes) decorrente da liberação de insulina pré-formada, seguida de uma fase tardia (início em ~15 minutos, platô em 2–3 horas) resultante da síntese e liberação de nova insulina. Além da glicose, aminoácidos (especialmente arginina e lisina), hormônios gastrointestinais (gastrina, secretina, colecistocinina, peptídeo insulinotrópico dependente de glicose), glucagon, hormônio do crescimento, cortisol e estimulação parassimpática (acetilcolina) potencializam a secreção. Em contrapartida, somatostatina, norepinefrina (via receptores α-adrenérgicos), leptina e jejum inibem a secreção.\n\nA secreção prolongada de hormônios como GH, cortisol, glucagon, progesterona e estrogênio pode levar à exaustão das células beta e ao desenvolvimento de diabetes mellitus. Isso explica a alta prevalência de diabetes em acromegalia e síndrome de Cushing. O mecanismo de feedback é preciso: a glicemia acima de 100 mg/dL estimula rapidamente a insulina, que por sua vez aumenta a captação de glicose pelo fígado, músculos e outras células, restaurando a normoglicemia.\n\n### Pontos-chave\n\n- GLUT-2 permite influxo de glicose proporcional à concentração plasmática nas células beta — é o sensor primário.\n- A glicocinase fosforila glicose em glicose-6-fosfato: etapa limitante e principal mecanismo sensor de glicose nas células beta.\n- Cascata: ATP → fechamento de canais K⁺ → despolarização → abertura de canais Ca²⁺ → exocitose de insulina.\n- Sulfonilureias bloqueiam canais de K⁺ sensíveis ao ATP, despolarizando a célula beta e estimulando secreção de insulina.\n- Resposta bifásica: fase rápida (3–5 min, insulina pré-formada) e fase tardia (~15 min, síntese de nova insulina).\n- Aminoácidos (arginina e lisina) potencializam o estímulo da glicose sobre a secreção de insulina, podendo duplicá-la.\n- Hormônios gastrointestinais causam aumento 'antecipatório' da insulina antes da absorção de nutrientes.\n- Somatostatina e norepinefrina (receptores α-adrenérgicos) inibem a exocitose de insulina.\n- Secreção prolongada de GH ou cortisol pode exaurir células beta e precipitar diabetes mellitus.\n- A interrupção da secreção de insulina é rápida: ocorre em 3–5 minutos após queda da glicemia ao nível de jejum.\n\n### Comparação\n\n| Fator | Efeito sobre Secreção de Insulina |\n|---|---|\n| Glicose sanguínea elevada | Aumenta (principal estímulo) |\n| Aminoácidos (arginina, lisina) | Potencializa (duplica resposta à glicose) |\n| Hormônios GI (GIP, CCK, gastrina, secretina) | Aumenta (efeito antecipatório) |\n| Glucagon, GH, cortisol | Aumenta (risco de exaustão beta com uso prolongado) |\n| Acetilcolina (parassimpático) | Aumenta |\n| Estimulação β-adrenérgica | Aumenta |\n| Somatostatina | Diminui |\n| Norepinefrina (receptor α-adrenérgico) | Diminui |\n| Leptina | Diminui |\n| Jejum / glicose baixa | Diminui |\n| Sulfonilureias | Aumenta (bloqueio canal K⁺-ATP) |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Glicose entra pela GLUT-2] --> B[Glicocinase: glicose → glicose-6-fosfato]\n B --> C[Oxidação → formação de ATP]\n C --> D[Fechamento dos canais de K⁺ sensíveis ao ATP]\n D --> E[Despolarização da membrana da célula beta]\n E --> F[Abertura dos canais de Ca²⁺ dependentes de voltagem]\n F --> G[Influxo de Ca²⁺ intracelular]\n G --> H[Fusão das vesículas com a membrana]\n H --> I[Exocitose de insulina]\n```\n\n> **Mnemônico:** GLUT-GK-ATP-K-Ca-EXO: GLUT-2 → Glicocinase → ATP ↑ → K⁺ fecha → Ca²⁺ entra → EXOcitose\n\n<sub>Fontes: 76cae3be4bc84980:7, 76cae3be4bc84980:8, 76cae3be4bc84980:9</sub>\n\n---\n\n## Glucagon, Somatostatina e Regulação da Glicemia\n\nO glucagon, secretado pelas células alfa das ilhotas de Langerhans em resposta à hipoglicemia, exerce efeitos opostos aos da insulina, sendo o principal hormônio hiperglicemiante. Seus dois principais efeitos hepáticos são a glicogenólise e o aumento da gliconeogênese. A glicogenólise ocorre por uma cascata de amplificação via AMPc: glucagon → ativação da adenilil ciclase → AMPc → proteína reguladora da proteinoquinase → proteinoquinase → fosforilase quinase b → fosforilase a → degradação do glicogênio em glicose-1-fosfato → desfosforilação → liberação de glicose. Esse mecanismo de cascata representa 'potente mecanismo de amplificação', explicando como microgramas de glucagon podem elevar a glicemia em 25% em ~20 minutos. Apenas 1 μg/kg de glucagon é capaz de elevar a glicose sanguínea em cerca de 20 mg/100 mL.\n\nA somatostatina, secretada pelas células delta das ilhotas de Langerhans, atua como regulador parácrino com meia-vida de apenas 3 minutos. É estimulada por praticamente todos os nutrientes absorvidos (glicose, aminoácidos, ácidos graxos e hormônios GI) e inibe tanto a secreção de insulina quanto a de glucagon. Além disso, reduz a motilidade gastrointestinal e a absorção de nutrientes, prolongando o tempo de assimilação dos alimentos. A regulação integrada da glicemia envolve quatro mecanismos principais: (1) o fígado como tampão de glicose; (2) o eixo insulina-glucagon como feedback; (3) a epinefrina em situações de estresse; e (4) GH e cortisol na hipoglicemia prolongada.\n\nA importância fisiológica da regulação rigorosa da glicemia deve-se ao fato de que 'a glicose é o único nutriente que pode ser utilizado normalmente pelo encéfalo, pela retina e pelo epitélio germinativo das gônadas em quantidade suficiente para supri-los de modo ideal.' A hiperglicemia crônica, por outro lado, causa lesão vascular, neuropatia periférica, retinopatia, nefropatia e aumento do risco cardiovascular.\n\n### Pontos-chave\n\n- Glucagon é secretado pelas células alfa em resposta à hipoglicemia e é chamado de 'hormônio hiperglicêmico'.\n- Cascata do glucagon: adenilil ciclase → AMPc → proteinoquinase → fosforilase a → glicogenólise hepática.\n- O mecanismo de cascata do AMPc representa amplificação de até um milhão de vezes na resposta.\n- Glucagon também aumenta a gliconeogênese hepática ao ativar enzimas de captação de aminoácidos e conversão de piruvato em fosfoenolpiruvato.\n- Aminoácidos (alanina e arginina) estimulam tanto insulina quanto glucagon — nesse caso as respostas não são opostas.\n- Somatostatina (células delta, 14 aminoácidos, meia-vida de 3 min) inibe insulina, glucagon, motilidade GI e absorção de nutrientes.\n- O fígado funciona como tampão de glicose: armazena ~2/3 da glicose absorvida como glicogênio e a libera nas horas seguintes.\n- Glicemia normal em jejum: 80–90 mg/100 mL; pós-prandial: 120–140 mg/100 mL, retornando ao normal em ~2 horas.\n- Epinefrina eleva glicemia (glicogenólise hepática) E ácidos graxos (lipólise no tecido adiposo) — efeito dual no estresse.\n- GH e cortisol são secretados na hipoglicemia e inibem a utilização celular de glicose, promovendo uso de lipídios (efeito lento, horas).\n\n### Comparação\n\n| Hormônio | Origem | Estímulo Principal | Efeito na Glicemia | Mecanismo Principal |\n|---|---|---|---|---|\n| Insulina | Células beta (ilhotas) | Hiperglicemia | Diminui | Captação celular de glicose; síntese de glicogênio e lipídios |\n| Glucagon | Células alfa (ilhotas) | Hipoglicemia; aminoácidos | Aumenta | Glicogenólise e gliconeogênese hepática (via AMPc) |\n| Somatostatina | Células delta (ilhotas) | Nutrientes pós-prandiais | Indireta (inibe insulina e glucagon) | Inibição parácrino de células alfa e beta |\n| Epinefrina | Medula adrenal | Estresse; hipoglicemia grave | Aumenta | Glicogenólise hepática + lipólise no tecido adiposo |\n| Cortisol | Córtex adrenal | Hipoglicemia prolongada | Aumenta | Inibe utilização celular de glicose; promove lipólise |\n| GH | Hipófise anterior | Hipoglicemia prolongada | Aumenta | Inibe utilização celular de glicose; promove lipólise |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Glucagon liga-se ao receptor hepático] --> B[Ativação da adenilil ciclase]\n B --> C[Formação de AMPc - 2º mensageiro]\n C --> D[Ativação da proteína reguladora da proteinoquinase]\n D --> E[Ativação da proteinoquinase]\n E --> F[Ativação da fosforilase quinase b]\n F --> G[Conversão: fosforilase b → fosforilase a]\n G --> H[Degradação do glicogênio → glicose-1-fosfato]\n H --> I[Desfosforilação → glicose livre]\n I --> J[Liberação de glicose no sangue - hiperglicemia]\n```\n\n> **Mnemônico:** A-AMPc-PK-FK-FA-GLI: Adenilil ciclase → AMPc → Proteinoquinase → Fosforilase Quinase → Fosforilase A → GLIcogenólise\n\n<sub>Fontes: 76cae3be4bc84980:9, 76cae3be4bc84980:10, 76cae3be4bc84980:11</sub>\n\n---\n\n##
