omeostase proteica, a célula pode ativar vias que levam à morte celular por apoptose.\n- Digestão proteica: enzimas proteolíticas degradam proteínas em aminoácidos, que são absorvidos e usados na síntese de proteínas do próprio organismo.\n- O pH ácido gástrico desnatura proteínas alimentares sem quebrar ligações peptídicas, facilitando a ação das enzimas digestivas.\n\n### Comparação\n\n| Agente Desnaturante | Tipo | Mecanismo/Exemplo |\n|---|---|---|\n| Calor | Físico | Cozimento do ovo (albumina → precipitado branco) |\n| Raio X | Físico | Radiação ionizante altera conformação |\n| Ultrassom | Físico | Vibração mecânica |\n| Ácidos/Bases | Químico | pH ácido gástrico desnatura proteínas alimentares |\n| Detergente | Químico | Rompe interações hidrofóbicas |\n| Ureia | Químico | Rompe pontes de hidrogênio |\n| Mercaptoetanol | Químico | Reduz pontes dissulfeto |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Proteína nativa\\nConformação 3D preservada] -->|Agente desnaturante\\nfísico ou químico| B[Proteína desnaturada\\nEstrutura primária mantida]\n B --> C{Renaturação possível?}\n C -->|In vitro - algumas proteínas| D[Renaturação espontânea\\nProteína ativa]\n C -->|In vivo - difícil| E[Chaperonas auxiliam\\novo enovelamento]\n E --> F{Enovelamento\\ncorreto?}\n F -->|Sim| G[Proteína funcional]\n F -->|Não - acúmulo de\\nproteínas mal dobradas| H[Ativação da UPR]\n H --> I{UPR suficiente?}\n I -->|Sim| G\n I -->|Não| J[Apoptose]\n```\n\n> **Mnemônico:** Efeitos da desnaturação: **SAP** — **S**olubilidade reduzida, **A**tividade biológica perdida, **P**rotease-digestibilidade aumentada\n\n<sub>Fontes: 3f5f409b556f5f85:2, fb11fbdf33477d7a:2, 2c7a6c02c6525261:0, 30a0c307d98d50fe:0, 23892e9fa1ef9f11:0, 30a0c307d98d50fe:3, 2c7a6c02c6525261:3</sub>\n\n---\n\n## Eletroforese de Proteínas e Proteinograma\n\nA eletroforese é a separação de compostos carregados baseada em sua carga elétrica. Quando uma voltagem é aplicada a uma solução, uma corrente elétrica é produzida pelo fluxo de íons. Quanto maior for a quantidade de cargas de um composto dissolvido, mais rápido ele se moverá pela solução em direção ao eletrodo com carga oposta. A carga de um composto depende do pH da solução — fundamento que conecta diretamente o conceito de ponto isoelétrico (pI) à aplicação laboratorial. As proteínas séricas majoritárias são os componentes detectados em géis de eletroforese corados por meio de técnicas convencionais utilizadas em laboratórios clínicos, num exame chamado de proteinograma.\n\nO proteinograma tem grande utilidade diagnóstica: permite identificar alterações nas bandas de albumina, alfa-1, alfa-2, beta e gama-globulinas. A albumina é a proteína isolada mais abundante no plasma normal e, usualmente, constitui até dois terços do conteúdo plasmático total de proteínas; sua queda resulta em sério desequilíbrio da pressão oncótica intravascular, manifestando-se clinicamente como edema periférico. Alterações específicas nas bandas têm correlações clínicas importantes: gamopatia monoclonal (pico estreito na região gama) sugere neoplasia de plasmócitos; pico policlonal em gama indica resposta imune policlonal (infecções, doenças autoimunes); a proteína de Bence Jones (cadeias leves livres na urina) tem valor diagnóstico em mieloma múltiplo.\n\n### Pontos-chave\n\n- Eletroforese: separação de compostos carregados pela carga elétrica — compostos com mais cargas migram mais rápido para o eletrodo oposto.\n- A carga do composto depende do pH da solução — base do ponto isoelétrico (pI).\n- Proteinograma: eletroforese de proteínas séricas em gel, detectando as bandas proteicas majoritárias do soro.\n- Albumina: proteína mais abundante do plasma (até dois terços das proteínas totais); queda → desequilíbrio da pressão oncótica → edema periférico.\n- Cirrose hepática: síntese de albumina comprometida → hipoalbuminemia → edema.\n- Gamopatia monoclonal: pico estreito na banda gama → investigar neoplasia de plasmócitos (ex.: mieloma múltiplo).\n- Pico policlonal em gama: resposta imune ampla (infecções crônicas, doenças autoimunes).\n- Proteína de Bence Jones: cadeias leves livres na urina — valor diagnóstico em mieloma múltiplo.\n\n### Comparação\n\n| Banda Eletroforética | Principais Proteínas | Alteração Clínica Relevante |\n|---|---|---|\n| Albumina | Albumina | ↓ em cirrose (síntese reduzida), síndrome nefrótica (perda urinária) → edema |\n| Alfa-1 | Alfa-1-antitripsina | ↑ em inflamação aguda; ↓ em deficiência genética |\n| Alfa-2 | Haptoglobina, alfa-2-macroglobulina | ↑ em síndrome nefrótica |\n| Beta | Transferrina, complemento | ↑ transferrina em anemia ferropriva |\n| Gama | Imunoglobulinas | Pico monoclonal (mieloma); pico policlonal (infecção/autoimunidade) |\n\n> **Mnemônico:** Bandas do proteinograma em ordem: **A-A-A-B-G** — **A**lbumina, **A**lfa-1, **A**lfa-2, **B**eta, **G**ama\n\n<sub>Fontes: 573375214164280b:0, caf2fad6a5ed4303:0, 3f5f409b556f5f85:0, fb11fbdf33477d7a:0</sub>\n\n---\n\n## Enzimas: Conceito, Especificidade e Fatores que Afetam a Atividade\n\nAs enzimas são, em sua grande maioria, proteínas que atuam como catalisadores biológicos, aumentando a velocidade das reações químicas sem serem consumidas no processo. Conforme descrito nas fontes, 'praticamente todas as reações no organismo são mediadas por enzimas, as quais são proteínas catalisadoras que aumentam a velocidade das reações, sem sofrerem alterações no processo global.' O mecanismo central de ação envolve a redução da energia de ativação necessária para o início da reação, conferindo eficiência catalítica. A especificidade enzimática resulta do arranjo tridimensional de resíduos de aminoácidos que formam o sítio ativo — local exato onde o substrato se encaixa para ser convertido em produto — explicando por que alterações na estrutura proteica comprometem diretamente a função enzimática.\n\nComo toda proteína, as enzimas são sensíveis a condições ambientais. 'Alterações de pH e temperatura podem fazer com que as enzimas não funcionem, já que tais condições podem desnaturá-las.' A temperatura ótima para a maioria das enzimas humanas está entre 35°C e 40°C, e valores extremos de pH podem levar à desnaturação. Além disso, algumas enzimas necessitam de cofatores (íons como Fe²⁺, Zn²⁺, Mg²⁺, Ca²⁺, Cu¹⁺/²⁺) ou coenzimas (moléculas orgânicas derivadas de vitaminas) para funcionar. Proteínas conjugadas possuem grupos prostéticos — componentes químicos não aminoacídicos permanentemente associados à proteína.\n\nA velocidade enzimática aumenta com a concentração de substrato até atingir uma velocidade máxima (Vmáx), quando todos os sítios ativos estão saturados. O parâmetro Km representa a concentração de substrato que produz velocidade igual a Vmáx/2, sendo uma medida da afinidade enzima-substrato: Km baixo indica alta afinidade. A regulação alostérica ocorre quando efetores (moduladores) se ligam a sítios distintos do sítio ativo, alterando a atividade enzimática — como o ATP, que é efetor negativo da fosfofrutoquinase, principal ponto de controle da glicólise.\n\n### Pontos-chave\n\n- Enzimas são catalisadores que não se alteram no processo global: 'E + S → ES → E + P' — a enzima é regenerada ao final.\n- A especificidade resulta do 'arranjo tridimensional de resíduos de aminoácidos específicos que forma sítios de ligação para os substratos'.\n- Exceções à regra proteica: ribozimas são moléculas de RNA com atividade catalítica (endonuclease ou nucleotídeo ligase).\n- Cofatores são íons metálicos (ex.: Zn²⁺, Fe²⁺); coenzimas são moléculas orgânicas (ex.: vitaminas); grupos prostéticos são componentes não aminoacídicos permanentemente associados.\n- Temperatura ótima das enzimas humanas: 35–40°C; acima disso, ocorre desnaturação.\n- Km baixo = alta afinidade entre enzima e substrato; Km alto = baixa afinidade.\n- Enzimas alostéricas possuem sítio regulatório distinto do sítio ativo, podendo estar em subunidade não catalítica.\n- A fosforilação/desfosforilação é 'uma das principais formas pelas quais os processos celulares são regulados', podendo ativar ou inativar enzimas dependendo do caso.\n- Dosagem de enzimas plasmáticas auxilia no diagnóstico de infarto do miocárdio, pancreatite aguda e patologias ósseas e hepáticas.\n- O nível de atividade enzimática específica no plasma frequentemente está relacionado com a extensão da lesão tecidual.\n\n### Comparação\n\n| Tipo de Componente | Natureza Química | Ligação à Enzima | Exemplos |\n|---|---|---|---|\n| Cofator | Íon inorgânico | Não covalente (geralmente) | Fe²⁺, Zn²⁺, Mg²⁺, Ca²⁺, Cu¹⁺/²⁺ |\n| Coenzima | Molécula orgânica (vitamina) | Não covalente | NAD⁺, FAD, biotina |\n| Grupo prostético | Orgânico ou inorgânico | Covalente/permanente | Heme (hemoglobina), carboidratos (imunoglobulina G) |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Substrato S] --> B[Liga-se ao Sítio Ativo da Enzima E]\n B --> C[Complexo Enzima-Substrato ES]\n C --> D{Cofator/Coenzima necessário?}\n D -- Sim --> E[Cofator/Coenzima participa da catálise]\n D -- Não --> F[Catálise direta]\n E --> G[Produto P formado]\n F --> G\n G --> H[Enzima E liberada e regenerada]\n H --> B\n```\n\n> **Mnemônico:** Para lembrar os cofatores iônicos: 'Fe Zn Mg Ca Cu' → 'Feras Zelosas Merecem Cuidado Constante'\n\n<sub>Fontes: 275f182a2585479d:0, 275f182a2585479d:1, 35ee3f3d4437a1d0:0, 35ee3f3d4437a1d0:1, a0d536f9d4d5391f:0, a0d536f9d4d5391f:1, 6b700e5ad57d0ea1:0, 6b700e5ad57d0ea1:1</sub>\n\n---\n\n## Inibição Enzimática: Mecanismos e Relevância Farmacológica\n\nA inibição enzimática é um mecanismo fundamental pelo qual fármacos, toxinas e moléculas regulatórias modulam a atividade metabólica. O inibidor competitivo 'compete com o substrato pelo sítio ativo da enzima. Quando o inibidor ocupa o sítio ativo, ele expulsa o substrato do sítio ativo, e vice-versa.' Esse tipo de inibição é reversível e pode ser superado pelo aumento da concentração de substrato. Um exemplo clínico clássico são os inibidores da ECA (enalapril, captopril), que competem com o substrato natural da enzima conversora de angiotensina. O inibidor não competitivo (ou misto) liga-se simultaneamente à enzima em sítio distinto do sítio ativo, sem impedir a ligação do substrato, mas reduzindo a eficiência catalítica — exemplos incluem benzodiazepínicos e intoxicação por cianeto. O inibidor acompetitivo liga-se exclusivamente ao complexo enzima-substrato.\n\nOs inibidores irreversíveis 'ligam-se covalentemente com ou destroem um grupo funcional da enzima', tornando a inibição permanente até que nova enzima seja sintetizada. O ácido acetilsalicílico (aspirina) é o exemplo paradigmático: inibe irreversivelmente a cicloxigenase, levando à inibição da síntese de prostaglandinas e tromboxanos. Os organofosforados são inibidores irreversíveis da acetilcolinesterase, causando hiperexcitabilidade neuronal e toxicidade ao sistema nervoso central. No contexto do HIV, inibidores específicos bloqueiam seletivamente enzimas virais como transcriptase reversa (zidovudina, lamivudina), integrase (dolutegravir, bictegravir) e protease (atazanavir, darunavir). A lovastatina, inibidor competitivo da HMG-CoA redutase, 'liga-se de forma transitória não-covalente no sítio ativo' dessa enzima, reduzindo a síntese de colesterol.\n\n### Pontos-chave\n\n- Inibição competitiva: reversível, ocorre no sítio ativo, pode ser superada por aumento de substrato; ex.: IECAs (captopril, enalapril, lisinopril).\n- Inibição não competitiva: inibidor e substrato ligam-se simultaneamente em sítios distintos; ex.: benzodiazepínicos, cianeto.\n- Inibição acompetitiva: inibidor liga-se apenas ao complexo ES; ex.: lítio.\n- Inibição irreversível: ligação covalente ao sítio ativo ou destruição de grupo funcional; ex.: aspirina (cicloxigenase), organofosforados (acetilcolinesterase).\n- Organofosforados: 'são inibidores irreversíveis da enzima acetilcolinesterase, causando hiperexcitabilidade neuronal e toxicidade ao sistema nervoso central.'\n- Lovastatina inibe competitivamente a HMG-CoA redutase (etapa inicial da síntese de colesterol), sendo inibidor reversível.\n- Captopril foi desenvolvido a partir do 'fator potenciador da bradicinina do veneno da Bothrops jararaca', descoberto por Sérgio Henrique Ferreira na década de 1960.\n- Enzimas-alvo do HIV: transcriptase reversa, integrase e protease — cada uma com fármacos inibidores específicos.\n- Zinco e cobre atuam como 'cofatores de muitas enzimas oxidativas', sendo elementos-traço essenciais mesmo em baixas concentrações.\n\n### Comparação\n\n| Tipo de Inibição | Reversibilidade | Local de Ligação | Efeito no Km | Efeito na Vmáx | Exemplos Clínicos |\n|---|---|---|---|---|---|\n| Competitiva | Reversível | Sítio ativo | Aumenta | Inalterada | Captopril, enalapril, lovastatina |\n| Não competitiva | Reversível | Sítio alostérico (≠ sítio ativo) | Inalterado | Diminui | Benzodiazepínicos, cianeto |\n| Acompetitiva | Reversível | Complexo ES | Diminui | Diminui | Lítio |\n| Irreversível | Irreversível | Sítio ativo (covalente) | — | Diminui permanentemente | Aspirina (COX), organofosforados (AChE) |\n\n> **Mnemônico:** Para lembrar os tipos de inibição: 'CANI' → Competitiva (sítio Ativo), Não competitiva (sítio Alostérico), acompetItiva (complexo ES), Irreversível (covalente)\n\n<sub>Fontes: 275f182a2585479d:1, 35ee3f3d4437a1d0:1, a0d536f9d4d5391f:2, a0d536f9d4d5391f:3, a0d536f9d4d5391f:4, 6b700e5ad57d0ea1:2, 6b700e5ad57d0ea1:3, 6b700e5ad57d0ea1:4, 4c87c63efb158cd1:0, 9b438d2a5c793f6f:0</sub>\n\n---\n\n## Erros Inatos do Metabolismo e Fenilcetonúria como Protótipo\n\nOs erros inatos do metabolismo (EIM) são 'distúrbios de natureza genética que, geralmente, correspondem a um defeito enzimático capaz de acarretar a interrupção de uma via metabólica.' As consequências bioquímicas decorrem de três mecanismos principais: ausência do produto esperado, acúmulo do substrato anterior à etapa interrompida, ou surgimento de uma rota metabólica alternativa. Em conjunto, os cerca de 500 distúrbios conhecidos têm frequência de aproximadamente 1/5000 nascidos vivos, embora a maioria tenha herança autossômica recessiva e incidência individual baixa. A apresentação clínica é frequentemente inespecífica — letargia, recusa alimentar, icterícia, vômitos, diarreia, retardo de crescimento, convulsões e coma — dificultando o diagnóstico diferencial com doenças infecciosas.\n\nA fenilcetonúria (PKU) é o protótipo clínico dos EIM com defeito enzimático. O gene afetado é o PAH (localizado em 12q23), que codifica a fenilalanina hidroxilase. A criança parece saudável ao nascimento, pois 'os sintomas aparecem quando há alteração, por fatores exógenos, do equilíbrio bioquímico mantido até o momento pela criança.' O diagnóstico precoce pelo Teste do Pezinho — 'um teste de triagem neonatal obrigatório e gratuito no Brasil' — é essencial, pois 'quanto mais precoce for instituído o tratamento para fenilcetonúria, melhor será a proteção do paciente para quaisquer agravamentos.' O tratamento baseia-se fundamentalmente na restrição dietética de fenilalanina, e não na reposição enzimática oral, pois enzimas proteicas seriam degradadas no trato gastrointestinal antes de exercer efeito sistêmico. A deficiência de ornitina transcarbamilase (OTC) é o EIM mais prevalente entre as doenças do ciclo da ureia, resultando em acúmulo de amônia plasmática e redução de citrulina.\n\n### Pontos-chave\n\n- EIM: defeito enzimático genético → interrupção de via metabólica → acúmulo de substrato, falta de produto ou rota alternativa.\n- Herança geralmente autossômica recessiva; frequência global ~1/5000 nascidos vivos.\n- Apresentação clínica inespecífica: letargia, icterícia, vômitos, convulsões — pode mimetizar infecção.\n- Fenilcetonúria: gene PAH (12q23) → deficiência de fenilalanina hidroxilase → acúmulo de fenilalanina.\n- Crianças com PKU 'parecem perfeitamente normais ao nascimento'; sintomas surgem com exposição dietética à fenilalanina.\n- Hipopigmentação na PKU: fenilalanina é precursora da tirosina, que é precursora da melanina — acúmulo de Phe inibe síntese de melanina.\n- Teste do Pezinho: triagem neonatal obrigatória e gratuita no Brasil; versões expandidas analisam até 100 doenças; Teste da Bochechinha avalia mais de 120 EIM.\n- Deficiência de OTC: acúmulo de amônia (elevada) e redução de citrulina (diminuída) no plasma.\n- Reposição enzimática oral não é eficaz para EIM sistêmicos porque enzimas proteicas são degradadas no trato gastrointestinal.\n- Prevalências no Brasil: fenilcetonúria 1:12.000–1:15.000; Doença da Urina de Xarope de Bordo 1:43.000; Deficiência de Biotinidase 1:125.000.\n\n### Comparação\n\n| Doença | Enzima Deficiente | Substrato Acumulado | Produto Ausente | Triagem |\n|---|---|---|---|---|\n| Fenilcetonúria (PKU) | Fenilalanina hidroxilase (PAH) | Fenilalanina | Tirosina | Teste do Pezinho |\n| Deficiência de OTC | Ornitina transcarbamilase | Amônia | Citrulina | Clínica/laboratorial |\n| Deficiência de Biotinidase | Biotinidase | Biotina ligada | Biotina livre | Teste do Pezinho |\n| Doença da Urina de Xarope de Bordo | Desidrogenase de cetoácidos de cadeia ramificada | Leucina, isoleucina, valina | — | Teste do Pezinho |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Defeito Genético no Gene Enzimático] --> B[Enzima Ausente ou Disfuncional]\n B --> C[Interrupção da Via Metabólica]\n C --> D[Acúmulo de Substrato]\n C --> E[Ausência do Produto Esperado]\n C --> F[Rota Metabólica Alternativa]\n D --> G[Toxicidade celular / Sintomas]\n E --> G\n F --> G\n G --> H{Diagnóstico Precoce?}\n H -- Sim: Teste do Pezinho --> I[Tratamento Precoce → Redução de Sequelas]\n H -- Não --> J[Agravamento Irreversível dos Sintomas]\n```\n\n> **Mnemônico:** Para lembrar as 3 consequências dos EIM: 'ASR' → Acúmulo de substrato, ausência do produto (Sem produto), Rota alternativa\n\n<sub>Fontes: 7d656f94c968fe82:0, 99d3a669d43c7d06:0, 306c81c57e9e0519:0, d3e92c714dbfa6dc:0</sub>\n\n---\n\n## Sistema Renina-Angiotensina-Aldosterona (SRAA) e Inibidores da ECA\n\nO sistema renina-angiotensina-aldosterona (SRAA) é uma cascata enzimática central no controle da pressão arterial e do volume sanguíneo. 'Os barorreceptores nos rins respondem à pressão arterial reduzida, liberando a enzima renina.' A renina, uma peptidase, converte angiotensinogênio em angiotensina I, que é então convertida em angiotensina II pela enzima conversora de angiotensina (ECA). A angiotensina II é 'um vasoconstritor circulante potente, que contrai arteríolas e veias, resultando no aumento da pressão arterial', além de exercer ação vasoconstritora preferencial nas arteríolas eferentes do glomérulo renal e estimular a secreção de aldosterona, levando ao aumento da reabsorção renal de sódio e ao aumento do volume sanguíneo.\n\nOs inibidores da ECA (IECAs) — captopril, enalapril e lisinopril — bloqueiam competitivamente a ECA, impedindo a formação de angiotensina II. São 'recomendados como tratamento de primeira escolha contra hipertensão em pacientes com uma variedade de indicações, incluindo risco alto de doença coronária ou história de diabetes, AVE, insuficiência cardíaca, infarto do miocárdio ou doença renal crônica.' O captopril tem origem histórica notável: foi desenvolvido a partir do 'fator potenciador da bradicinina do veneno da Bothrops jararaca', isolado pelo farmacologista brasileiro Sérgio Henrique Ferreira na década de 1960. Como a ECA também degrada bradicinina, sua inibição leva ao acúmulo desse peptídeo, explicando o efeito colateral característico da tosse seca.\n\n### Pontos-chave\n\n- Cascata do SRAA: Queda de PA → Renina (rim) → Angiotensinogênio → Angiotensina I → ECA → Angiotensina II.\n- Angiotensina II: vasoconstrição de arteríolas e veias + vasoconstrição preferencial da arteríola eferente renal + estimulação da secreção de aldosterona.\n- Aldosterona → aumento da reabsorção renal de sódio → aumento do volume sanguíneo → aumento adicional da PA.\n- IECAs (captopril, enalapril, lisinopril): inibição competitiva da ECA → bloqueio da formação de angiotensina II.\n- Indicações dos IECAs: hipertensão com risco coronário, diabetes, AVE, insuficiência cardíaca, IAM, doença renal crônica.\n- Captopril: origem no veneno da jararaca (Bothrops jararaca); descoberta de Sérgio Henrique Ferreira (1934–2016).\n- Tosse seca como efeito colateral: acúmulo de bradicinina por inibição da ECA (que normalmente a degrada).\n- IECAs podem causar hipercalemia: bloqueio da aldosterona reduz excreção renal de potássio.\n- O objetivo do tratamento anti-hipertensivo é 'reduzir a morbidade cardiovascular e renal e a mortalidade'.\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Queda da Pressão Arterial] --> B[Barorreceptores Renais Ativados]\n B --> C[Liberação de Renina]\n C --> D[Angiotensinogênio → Angiotensina I]\n D --> E[ECA converte Angiotensina I → Angiotensina II]\n E --> F[Vasoconstrição: ↑ PA]\n E --> G[Vasoconstrição Arteríola Eferente: ↑ Filtração Glomerular]\n E --> H[Estimulação da Secreção de Aldosterona]\n H --> I[↑ Reabsorção de Na⁺ Renal → ↑ Volume Sanguíneo → ↑ PA]\n J[IECA: Captopril/Enalapril/Lisinopril] -->|Inibe competitivamente| E\n J --> K[↓ Angiotensina II → ↓ PA]\n J --> L[Acúmulo de Bradicinina → Tosse Seca]\n```\n\n> **Mnemônico:** Para lembrar a cascata: 'Renina Ataca Angiotensinogênio, ECA Converte, Aldosterona Sobe' → RAAECAS\n\n<sub>Fontes: 4c87c63efb158cd1:0, 9b438d2a5c793f6f:0, 275f182a2585479d:1, 35ee3f3d4437a1d0:1</sub>\n\n---\n\n## Proteínas: Estrutura Hierárquica e Propriedades Funcionais\n\nAs proteínas são macromoléculas formadas por aminoácidos unidos por ligações peptídicas — ligações que ocorrem entre o grupo carboxila de um aminoácido e o grupo amino do seguinte, com liberação de uma molécula de água. Essa sequência linear de aminoácidos constitui a estrutura primária, que determina todas as demais organizações moleculares. Alterações nessa sequência, como uma única substituição de aminoácido (mutação pontual), afetam diretamente a estrutura primária e podem ter consequências funcionais graves, como ocorre na anemia falciforme, doença genética que afeta a estrutura primária da hemoglobina.\n\nA partir da estrutura primária, as proteínas adquirem conformações espaciais progressivamente mais complexas. A estrutura secundária inclui padrões regulares como a alfa-hélice e a folha beta, estabilizados por pontes de hidrogênio. A estrutura terciária resulta do dobramento tridimensional de uma cadeia polipeptídica, enquanto a estrutura quaternária descreve a associação de múltiplas cadeias polipeptídicas — como no caso da catalase, que é um tetrâmero composto por quatro subunidades polipeptídicas idênticas que se organizam num arranjo tetraédrico, formando uma única estrutura funcional. A insulina exemplifica a estrutura quaternária ao ser constituída de duas cadeias peptídicas ligadas por pontes dissulfeto.\n\nA desnaturação proteica é a perda da conformação nativa sem necessariamente romper a estrutura primária. Agentes desnaturantes incluem calor, pH extremo (como o vinagre/ácido acético) e outros fatores físico-químicos. A desnaturação explica por que enzimas perdem sua atividade catalítica quando expostas a tais agentes — a batata cozida, por exemplo, não apresenta atividade da catalase porque o calor do cozimento desnaturou a enzima, ao passo que a batata crua exposta ao peróxido de hidrogênio produz espuma visível pela decomposição do H₂O₂.\n\n### Pontos-chave\n\n- A ligação peptídica ocorre entre o grupo carboxila de um aminoácido e o grupo amino do seguinte, com liberação de água — NÃO entre dois grupos carboxila.\n- Uma mutação que altera um único aminoácido afeta diretamente a estrutura primária da proteína.\n- A anemia falciforme é uma doença genética que afeta a estrutura primária da hemoglobina.\n- Alfa-hélice e folha beta são estruturas secundárias das proteínas.\n- Quatro cadeias polipeptídicas interligadas correspondem à estrutura quaternária (ex.: catalase — tetrâmero; hemoglobina).\n- A insulina é constituída de duas cadeias peptídicas ligadas por pontes dissulfeto.\n- Desnaturação = perda de conformação nativa; pode ser causada por calor, pH extremo, entre outros agentes.\n- A especificidade enzimática é determinada principalmente por complementaridade estrutural entre o sítio ativo e o substrato.\n- O teste do biureto detecta proteínas pela formação de complexo entre íon cúprico (Cu²⁺) e múltiplas ligações peptídicas, gerando coloração violeta púrpura estável.\n- Quanto mais ligações peptídicas, mais corada a solução que as contém ficará no teste do biureto.\n\n### Comparação\n\n| Nível Estrutural | Descrição | Estabilizado por | Exemplo clínico/laboratorial |\n|---|---|---|---|\n| Primária | Sequência linear de aminoácidos | Ligações peptídicas (covalentes) | Anemia falciforme (mutação pontual na hemoglobina) |\n| Secundária | Padrões regulares locais (alfa-hélice, folha beta) | Pontes de hidrogênio | — |\n| Terciária | Dobramento 3D de uma cadeia polipeptídica | Interações hidrofóbicas, pontes dissulfeto, H, iônicas | — |\n| Quaternária | Associação de múltiplas cadeias polipeptídicas | Mesmas da terciária entre subunidades | Catalase (tetrâmero); Insulina (2 cadeias + pontes dissulfeto) |\n\n> **Mnemônico:** **P-S-T-Q** = **P**rimária (sequência) → **S**ecundária (alfa-hélice/folha beta) → **T**erciária (dobramento 3D) → **Q**uaternária (múltiplas cadeias)\n\n<sub>Fontes: cccb92f22a90a6b8:1, 5a1fb13ebefda48c:1, 974d1da0e2adca02:0, 974d1da0e2adca02:2, 400d17390920ed68:0, 400d17390920ed68:2, cccb92f22a90a6b8:2, 5a1fb13ebefda48c:2</sub>\n\n---\n\n## Enzimas: Cinética, Inibição e Aplicações Clínicas\n\nEnzimas são catalisadores biológicos de natureza proteica cuja especificidade é determinada pela complementaridade estrutural entre o sítio ativo e o substrato — princípio fundamental que explica por que, na ausência de uma enzima específica (como na fenilcetonúria), nenhuma outra proteína pode substituí-la funcionalmente. A cinética enzimática descreve a velocidade das reações: a Vmáx é a velocidade máxima de uma reação enzimática quando esta está saturada com seu substrato, enquanto o Km (constante de Michaelis) reflete a afinidade enzima-substrato — quanto menor o Km, maior a afinidade. No caso da amilase salivar, o menor Km foi observado a 37°C (0,42 mg%), indicando maior afinidade pelo amido nessa temperatura fisiológica.\n\nA inibição enzimática pode ser reversível ou irreversível, competitiva ou não competitiva. Na inibição competitiva, o inibidor compete com o substrato pelo sítio ativo — como o etanol, que atua como inibidor reversível da álcool desidrogenase (ADH) por semelhança estrutural com o metanol, sendo utilizado terapeuticamente na intoxicação por metanol para impedir a formação de formaldeído. A azida sódica, por sua vez, atua como inibidor competitivo da catalase, ligando-se ao grupo heme da enzima e interrompendo sua atividade catalítica. Já a inibição irreversível envolve modificação covalente do sítio ativo, como ocorre com a aspirina (AAS), que inativa a cicloxigenase transferindo um grupo acetil para um resíduo de serina no sítio ativo — ligação covalente e irreversível.\n\nA catalase é uma enzima antioxidante intracelular capaz de decompor o peróxido de hidrogênio (H₂O₂) em água e oxigênio (2 H₂O₂ → 2 H₂O + O₂), sendo produzida nos peroxissomos. Sua importância clínica reside no combate ao dano oxidativo celular. A amilase salivar (ptialina), secretada pelas glândulas parótidas, hidrolisa o amido em maltose e pequenos polímeros de glicose; sua atividade é bloqueada no estômago quando o pH cai abaixo de 4. Deficiências de enzimas digestivas pancreáticas levam à redução da quebra de macronutrientes alimentares, com consequente má absorção.\n\n### Pontos-chave\n\n- Especificidade enzimática = complementaridade estrutural entre o sítio ativo e o substrato.\n- Vmáx = velocidade máxima quando a enzima está saturada com seu substrato; Km menor = maior afinidade.\n- Catalase: substrato = H₂O₂; produtos = H₂O + O₂; produzida nos peroxissomos.\n- Amilase salivar (ptialina): secretada pelas glândulas parótidas; hidrolisa amido em maltose; inativada no estômago com pH < 4.\n- Cerca de 30 a 40% dos amidos são hidrolisados antes da mistura completa com as secreções gástricas.\n- Inibição irreversível: AAS acetila covalentemente resíduo de serina no sítio ativo da COX.\n- Inibição competitiva reversível: etanol compete com metanol na ADH; azida sódica compete na catalase (grupo heme).\n- Deficiência de enzima digestiva pancreática → redução da quebra de macronutrientes alimentares.\n- O grupo heme da catalase é classificado como grupo prostético.\n- A amilase salivar apresenta maior afinidade pelo amido a 37°C (Km = 0,42 mg%), temperatura fisiológica.\n\n### Comparação\n\n| Tipo de Inibição | Mecanismo | Reversibilidade | Exemplo do Material |\n|---|---|---|---|\n| Competitiva | Inibidor ocupa o sítio ativo competindo com o substrato | Reversível | Etanol vs. metanol na ADH; azida sódica na catalase |\n| Irreversível | Modificação covalente do sítio ativo | Irreversível | AAS acetila serina no sítio ativo da COX |\n| Não competitiva | Inibidor liga-se fora do sítio ativo, alterando conformação | Reversível (em geral) | Não exemplificado diretamente no material |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Ingestão de metanol] --> B[ADH hepática converte metanol em formaldeído]\n B --> C[Formaldeído causa lesão tecidual / cegueira]\n D[Tratamento: administração de etanol] --> E[Etanol compete com metanol no sítio ativo da ADH]\n E --> F[Inibição competitiva reversível da ADH]\n F --> G[Redução da produção de formaldeído]\n```\n\n> **Mnemônico:** **CRIA** = tipos de inibição enzimática: **C**ompetitiva (compete pelo sítio ativo) → **R**eversível (em geral) → **I**rreversível (modificação covalente, ex.: AAS) → **A**lostérica/não competitiva (fora do sítio ativo)\n\n<sub>Fontes: cccb92f22a90a6b8:0, 974d1da0e2adca02:1, 974d1da0e2adca02:2, 400d17390920ed68:1, 400d17390920ed68:2, cccb92f22a90a6b8:2, 5a1fb13ebefda48c:2</sub>\n\n---\n\n## AINEs e Inibição das Cicloxigenases (COX-1 e COX-2)\n\nOs anti-inflamatórios não esteroides (AINEs) são um grupo de fármacos quimicamente heterogêneos que atuam, principalmente, inibindo as enzimas cicloxigenase, que catalisam o primeiro estágio da biossíntese de prostanoides. Isso leva à redução da síntese de prostaglandinas, com efeitos desejados (anti-inflamatório, analgésico, antipirético) e indesejados (dano gástrico, entre outros). As diferenças na segurança e eficácia dos AINEs podem ser explicadas pela seletividade relativa para COX-1 ou COX-2: a inibição da COX-2 parece levar aos efeitos anti-inflamatórios e analgésicos, enquanto a inibição da COX-1 é responsável pela prevenção dos eventos cardiovasculares e pela maioria dos eventos adversos.\n\nA COX-1 é uma enzima constitutiva presente na maioria das células, produzindo prostanoides que atuam como reguladores homeostáticos — modulando respostas vasculares e regulando a secreção de ácido gástrico. A COX-2, em geral, não está presente na maioria dos tecidos, mas é fortemente induzida por estímulos inflamatórios, sendo considerada o alvo mais relevante para fármacos anti-inflamatórios. O celecoxibe é um inibidor seletivo da COX-2, significativamente mais seletivo para inibir a COX-2 do que a COX-1, proporcionando ações anti-inflamatórias e analgésicas com menos dano gástrico em comparação com AINEs padrão.\n\nO ácido acetilsalicílico (AAS) é um ácido orgânico fraco que acetila irreversivelmente e, assim, inativa a cicloxigenase — sendo o único AINE com mecanismo irreversível. Todos os outros AINEs são inibidores reversíveis da cicloxigenase. Ao contrário da inibição da COX-1 pelo AAS (que é rápida e irreversível), a inibição da COX-2 pelo celecoxibe é reversível. Essa distinção tem implicações clínicas diretas: o AAS em baixas doses é utilizado para prevenção cardiovascular justamente por sua inibição irreversível da COX-1 plaquetária.\n\n### Pontos-chave\n\n- AINEs inibem cicloxigenases (COX), que catalisam o primeiro estágio da biossíntese de prostanoides.\n- COX-1: constitutiva, presente na maioria das células; regula homeostase vascular e secreção de ácido gástrico.\n- COX-2: induzível por estímulos inflamatórios; alvo principal dos efeitos anti-inflamatórios e analgésicos.\n- Inibição da COX-1 → prevenção cardiovascular + maioria dos eventos adversos (ex.: dano gástrico).\n- Inibição da COX-2 → efeitos anti-inflamatórios e analgésicos.\n- AAS: único AINE que acetila irreversivelmente a cicloxigenase (ligação covalente com resíduo de serina no sítio ativo).\n- Todos os outros AINEs são inibidores reversíveis da cicloxigenase.\n- Celecoxibe: inibidor seletivo da COX-2; inibição reversível; menos dano gástrico que AINEs padrão.\n- Os AINEs realizam três ações terapêuticas principais: anti-inflamatória, analgésica e antipirética.\n- Nem todos os AINEs são igualmente potentes em cada uma dessas ações.\n\n### Comparação\n\n| Característica | COX-1 | COX-2 |\n|---|---|---|\n| Tipo de expressão | Constitutiva (presente na maioria das células) | Induzível (por estímulos inflamatórios) |\n| Função principal | Regulação homeostática (vasculatura, ácido gástrico) | Mediação da inflamação |\n| Efeito da inibição | Prevenção cardiovascular + eventos adversos (dano gástrico) | Efeito anti-inflamatório e analgésico |\n| Inibidor seletivo | AAS (irreversível, rápido) | Celecoxibe (reversível, seletivo) |\n| Inibidores não seletivos | AINEs padrão (reversíveis) | AINEs padrão (reversíveis) |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Estímulo inflamatório ou homeostático] --> B{Qual COX é ativada?}\n B -->|Constitutiva| C[COX-1]\n B -->|Induzida pela inflamação| D[COX-2]\n C --> E[Prostanoides homeostáticos]\n E --> F[Regulação vascular / proteção gástrica / prevenção cardiovascular]\n D --> G[Prostanoides inflamatórios / prostaglandinas]\n G --> H[Inflamação, dor, febre]\n I[AAS] -->|Acetilação irreversível| C\n I -->|Acetilação irreversível| D\n J[Celecoxibe] -->|Inibição seletiva reversível| D\n K[Outros AINEs] -->|Inibição reversível não seletiva| C\n K -->|Inibição reversível não seletiva| D\n```\n\n> **Mnemônico:** **COX-1 = Casa** (constitutiva, cuida da casa = homeostase); **COX-2 = Combate** (induzida, combate a inflamação). **AAS = Acetila para Sempre** (irreversível). **Celecoxibe = Seletivo** (só COX-2, reversível).\n\n<sub>Fontes: cccb92f22a90a6b8:1, 5a1fb13ebefda48c:1, 974d1da0e2adca02:2, 400d17390920ed68:2</sub>\n\n---\n\n## Carboidratos: Classificação, Digestão e Relevância Clínica\n\nOs carboidratos, também chamados de glicídios ou sacarídeos, são as moléculas orgânicas mais abundantes na natureza e possuem funções diversas: fornecimento de energia, armazenamento energético (glicogênio nos animais, amido nos vegetais), componentes estruturais (celulose nas plantas, quitina nos insetos) e mediação de comunicação intercelular (glicocálice, sistema ABO). Os monossacarídeos são classificados pelo número de carbonos (trioses, pentoses, hexoses) e pelo grupo funcional: aldoses (grupo aldeído, ex.: glicose) e cetoses (grupo cetona, ex.: frutose). Glicose e frutose são isômeros — mesma fórmula molecular (C₆H₁₂O₆), estruturas diferentes — e ambas são hexoses que assumem forma cíclica em solução aquosa. Os dissacarídeos e polissacarídeos são formados por monossacarídeos unidos por ligações glicosídicas.\n\nA digestão dos carboidratos inicia-se na boca com a amilase salivar (ptialina), secretada pelas glândulas parótidas, que hidrolisa o amido em maltose e pequenos polímeros de glicose. No estômago, a atividade da amilase é bloqueada quando o pH cai abaixo de 4. A amilase pancreática continua o processo, e o processo final ocorre no epitélio mucoso do intestino delgado, onde dissacaridases (lactase, sacarase, maltase, isomaltase) produzem monossacarídeos absorvíveis (glicose, galactose, frutose). Carboidratos não digeridos — como as fibras — passam ao cólon, onde são fermentados pela microbiota, exercendo efeitos positivos como redução da glicemia, aumento da saciedade e redução do risco de diabetes mellitus, doença cardiovascular, obesidade e câncer colorretal.\n\nA intolerância à lactose resulta da deficiência da enzima lactase, levando ao acúmulo de lactose na luz intestinal com efeito osmótico, fermentação bacteriana com produção de gases (H₂, CH₄, CO₂) e ácidos graxos de cadeia curta, causando distensão abdominal, flatulência, fezes amolecidas e dor abdominal. O diagnóstico pode ser feito pelo teste oral de tolerância à lactose (incremento de 20 mg/dL na glicemia indica digestão normal) ou por teste molecular que detecta a variante genética C/T-13.910 no gene MCM6 — genótipo CC predispõe à intolerância. A consequência nutricional mais relevante é o baixo consumo de cálcio, predispondo à osteopenia e osteoporose.\n\n### Pontos-chave\n\n- Carboidratos = glicídios = sacarídeos; moléculas orgânicas mais abundantes na natureza.\n- Aldoses: grupo aldeído (ex.: glicose); cetoses: grupo cetona (ex.: frutose). Glicose e frutose são isômeros hexoses.\n- Monossacarídeos com 5 ou mais carbonos assumem forma cíclica em solução aquosa.\n- Amido = homopolissacarídeo de reserva energética dos vegetais; glicogênio = homopolissacarídeo de reserva energética dos animais (fígado e músculo).\n- Celulose = polissacarídeo estrutural primário dos vegetais; não digerível pelo organismo humano.\n- Digestão do amido: amilase salivar (boca) → amilase pancreática → dissacaridases intestinais → monossacarídeos absorvíveis.\n- Amilase salivar inativada no estômago com pH < 4; cerca de 30–40% do amido é hidrolisado antes da mistura completa com suco gástrico.\n- Intolerância à lactose: deficiência de lactase → acúmulo osmótico → fermentação bacteriana → gases + ácidos graxos → distensão, flatulência, diarreia.\n- Diagnóstico molecular da hipolactasia primária: variante C/T-13.910 no gene MCM6; genótipo CC = predisposição à intolerância.\n- Glicocálice (carboidratos de membrana) medeia reconhecimento celular, incluindo o sistema ABO de antígenos eritrocitários.\n- GLUT4: presente em músculo esquelético e tecido adiposo, regulado por insulina; após refeição rica em carboidratos: aumento de insulina → translocação de GLUT4 para membrana.\n\n### Comparação\n\n| Polissacarídeo | Tipo | Função | Organismo | Digerível pelo humano? |\n|---|---|---|---|---|\n| Glicogênio | Homopolissacarídeo (glicose), ramificado | Reserva energética | Animais (fígado e músculo) | Sim |\n| Amido | Homopolissacarídeo (glicose) | Reserva energética | Vegetais | Sim (por amilases) |\n| Celulose | Homopolissacarídeo (glicose), estrutural | Parede celular | Vegetais | Não |\n| Quitina | Homopolissacarídeo | Estrutural (exoesqueleto/parede celular) | Insetos, fungos | Não |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Ingestão de carboidratos complexos - amido] --> B[Boca: amilase salivar hidrolisa amido em maltose e oligossacarídeos]\n B --> C[Estômago: amilase inativada pH menor que 4]\n C --> D[Intestino delgado: amilase pancreática continua digestão]\n D --> E[Borda em escova intestinal: dissacaridases - lactase, sacarase, maltase, isomaltase]\n E --> F[Monossacarídeos: glicose, galactose, frutose]\n F --> G[Absorção intestinal → corrente sanguínea]\n G --> H[Aumento de insulina → translocação de GLUT4]\n H --> I[Captação de glicose por músculo e tecido adiposo]\n J[Fibras e carboidratos não digeridos] --> K[Cólon: fermentação pela microbiota]\n K --> L[Gases H2, CH4, CO2 + ácidos graxos de cadeia curta + efeitos benéficos]\n```\n\n> **Mnemônico:** **GACE** = polissacarídeos importantes: **G**licogênio (animais, energia) → **A**mido (vegetais, energia) → **C**elulose (vegetais, estrutura, não digerível) → **E**xoesqueleto/quitina (insetos/fungos, estrutura)\n\n<sub>Fontes: c34e55e9c0c0df3e:0, c34e55e9c0c0df3e:1, c34e55e9c0c0df3e:2, c34e55e9c0c0df3e:3, 1158ecdc3bbb6c96:0, 1158ecdc3bbb6c96:1, 1158ecdc3bbb6c96:2, 1158ecdc3bbb6c96:3, 47a6535feedae2b8:0, 47a6535feedae2b8:1, 974d1da0e2adca02:1, 400d17390920ed68:1</sub>\n\n---\n\n## Carboidratos: Estrutura, Classificação e Funções Biológicas\n\nOs carboidratos — também chamados de açúcares ou glicídios — são biomoléculas fundamentais para o organismo humano, desempenhando papéis que vão muito além do simples fornecimento de energia. Sua função energética é a mais conhecida: a glicose, principal monossacarídeo, é utilizada pelas células como substrato energético preferencial e pode ser armazenada na forma de polissacarídeos (glicogênio nos animais e amido nos vegetais) para uso em períodos de privação metabólica. Além disso, os carboidratos participam de funções estruturais (celulose nos vegetais, quitina nos insetos), de reconhecimento celular (glicocálice, glicoproteínas e glicolipídeos de membrana) e de lubrificação e suporte tecidual (proteoglicanos nas cartilagens e articulações).\n\nQuanto à estrutura, os carboidratos são classificados em monossacarídeos (oses), oligossacarídeos/dissacarídeos e polissacarídeos (osídeos). Os monossacarídeos são as unidades mais simples, com cadeias carbônicas não ramificadas e ligações simples, classificados pelo número de carbonos (trioses, pentoses, hexoses etc.). A glicose é uma hexose de enorme importância biológica, sintetizada pelos vegetais via fotossíntese e armazenada como polissacarídeos. Monossacarídeos com 5 ou mais carbonos tendem a assumir forma cíclica em solução aquosa. Os dissacarídeos resultam da união de dois monossacarídeos por ligação glicosídica — exemplos importantes incluem a lactose (intolerância presente em mais de 75% dos adultos mundialmente), a maltose (encontrada no malte) e a sacarose (principal forma de transporte de carboidratos nas plantas, rica na cana-de-açúcar).\n\nOs polissacarídeos são macromoléculas formadas por múltiplas unidades de monossacarídeos, sem sabor adocicado, que precisam ser hidrolisadas durante a digestão. Podem ser homopolissacarídeos (mesmo monossacarídeo repetido, como glicogênio e amido) ou heteropolissacarídeos (diferentes monossacarídeos). O glicogênio, com estrutura ramificada, permite rápida mobilização de glicose e é armazenado principalmente no fígado e músculo. O amido é a principal reserva energética dos vegetais e é digerido pela amilase salivar e pancreática. A celulose, polissacarídeo estrutural dos vegetais, não é digerível pelo organismo humano — o que explica por que estruturas como a parede do milho passam intactas pelo trato gastrointestinal.\n\n### Pontos-chave\n\n- Carboidratos têm funções de energia imediata, armazenamento (glicogênio/amido), estrutura (celulose/quitina), reconhecimento celular (glicocálice, sistema ABO) e lubrificação (proteoglicanos).\n- Monossacarídeos recebem sufixo '-ose' precedido pelo número de carbonos (ex.: hexose = 6 carbonos); a glicose é o mais importante biologicamente.\n- A ligação entre dois carboidratos é denominada ligação glicosídica; dissacarídeos resultam dessa ligação entre dois monossacarídeos.\n- Mais de 75% dos adultos na população mundial são intolerantes à lactose.\n- Glicogênio: homopolissacarídeo ramificado de reserva energética animal, armazenado no fígado e músculo.\n- Amido: polissacarídeo de reserva dos vegetais, digerido pela amilase (salivar e pancreática).\n- Celulose: polissacarídeo estrutural dos vegetais, não digerível pelo organismo humano.\n- O glicocálice é uma camada de carboidratos projetada ao ambiente extracelular da membrana plasmática, importante para reconhecimento e adesão celular.\n- Glicoproteínas são importantes para a adesão celular, um passo fundamental para processos como a diapedese.\n- Os carboidratos constituem normalmente 50% de uma dieta e oferecem energia mais rápida por possuírem digestão e absorção mais simples que outros nutrientes.\n\n### Comparação\n\n| Polissacarídeo | Tipo | Organismo | Função | Digestibilidade |\n|---|---|---|---|---|\n| Glicogênio | Homopolissacarídeo (ramificado) | Animais | Reserva energética (fígado e músculo) | Digerível |\n| Amido | Homopolissacarídeo | Vegetais | Reserva energética | Digerível (amilase) |\n| Celulose | Homopolissacarídeo | Vegetais | Estrutural (parede celular) | Não digerível |\n| Quitina | Homopolissacarídeo | Insetos/fungos | Estrutural (proteção) | Não digerível |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Carboidratos ingeridos] --> B[Digestão: amilase salivar e pancreática]\n B --> C[Quebra em monossacarídeos]\n C --> D[Absorção intestinal]\n D --> E[Corrente sanguínea: glicose]\n E --> F{Necessidade energética?}\n F -- Sim --> G[Utilização pelas células como energia]\n F -- Não --> H[Armazenamento como glicogênio no fígado e músculo]\n H --> I{Privação metabólica?}\n I -- Sim --> G\n```\n\n> **Mnemônico:** GACE — Glicogênio (animal, reserva), Amido (vegetal, reserva), Celulose (estrutural, vegetal), Quitina (Estrutural, inseto) — para lembrar os principais polissacarídeos e suas funções.\n\n<sub>Fontes: d2a6f225abc0e71f:0, d2a6f225abc0e71f:1</sub>\n\n---\n\n## Identificação Laboratorial de Carboidratos: Reagente de Benedict e Dosagem de Glicose\n\nA identificação bioquímica de carboidratos em laboratório clínico baseia-se em propriedades químicas específicas das moléculas. O reagente de Benedict é uma solução de sulfato cúprico (Cu²⁺) de coloração azulada utilizada para detectar açúcares redutores — aqueles que possuem uma hidroxila (-OH) livre no carbono 1 (C-1) de sua molécula. Essa hidroxila livre confere capacidade redutora ao açúcar, permitindo que ele reduza íons Cu²⁺ a Cu⁺ em meio alcalino, gerando um precipitado de coloração vermelho-tijolo. A glicose e a frutose são exemplos de açúcares redutores; a sacarose, por não possuir hidroxila livre no C-1, é um açúcar não redutor e, portanto, resulta em teste negativo com Benedict.\n\nPara a dosagem semiquantitativa de glicose, utiliza-se a enzima glicose oxidase, que catalisa especificamente a oxidação da glicose. A intensidade da coloração avermelhada produzida é proporcional à concentração de glicose na solução, tornando o método semiquantitativo. Essa metodologia enzimática possui grande especificidade analítica e é amplamente aplicada no laboratório clínico para o doseamento de glicose em fluidos biológicos. A temperatura de 37°C no banho-maria mimetiza as condições fisiológicas do organismo humano, otimizando a atividade enzimática da glicose oxidase.\n\nA relevância clínica desses testes é direta: a determinação da glicemia é um procedimento de grande demanda laboratorial, sendo fundamental no acompanhamento e diagnóstico do diabetes mellitus, descrito como a desordem mais frequente relacionada ao metabolismo dos carboidratos. O diagnóstico precoce e o controle adequado dos pacientes diabéticos visam evitar a cetoacidose e as complicações resultantes da hiperglicemia crônica.\n\n### Pontos-chave\n\n- Açúcares redutores possuem hidroxila (-OH) livre no carbono 1 (C-1); essa característica permite reduzir Cu²⁺ a Cu⁺ na presença do reagente de Benedict.\n- Resultado positivo no teste de Benedict: precipitado vermelho-tijolo (Cu²⁺ → Cu⁺); resultado negativo: ausência de coloração vermelho-tijolo.\n- Glicose e frutose são açúcares redutores; sacarose é açúcar não redutor (resultado negativo com Benedict).\n- A glicose oxidase catalisa a oxidação da glicose com alta especificidade; a intensidade da coloração avermelhada é proporcional à concentração de glicose.\n- O banho-maria a 37°C na prática de dosagem de glicose mimetiza a temperatura fisiológica, otimizando a atividade da glicose oxidase.\n- O diabetes mellitus é a desordem mais frequente relacionada com o metabolismo dos carboidratos.\n- O diagnóstico precoce e o controle dos pacientes diabéticos têm por objeto evitar a cetoacidose e as complicações da hiperglicemia.\n- A glicosúria (glicose na urina) pode ser detectada pelo mesmo método enzimático, com relevância diagnóstica.\n\n### Comparação\n\n| Característica | Reagente de Benedict | Glicose Oxidase |\n|---|---|---|\n| Princípio | Redução de Cu²⁺ a Cu⁺ por açúcar redutor | Oxidação enzimática específica da glicose |\n| O que detecta | Açúcares redutores (qualquer) | Glicose especificamente |\n| Resultado positivo | Precipitado vermelho-tijolo | Coloração avermelhada |\n| Tipo de análise | Qualitativa/semiquantitativa | Semiquantitativa |\n| Temperatura do procedimento | Banho-maria 80°C por 5 min | Banho-maria 37°C por 8 min |\n| Sacarose detectada? | Não (açúcar não redutor) | Não (sem glicose livre) |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Amostra com carboidrato] --> B{Possui -OH livre no C-1?}\n B -- Sim --> C[Açúcar redutor]\n B -- Não --> D[Açúcar não redutor]\n C --> E[Reagente de Benedict + banho-maria 80°C]\n E --> F[Cu²⁺ reduzido a Cu⁺]\n F --> G[Precipitado vermelho-tijolo = POSITIVO]\n D --> H[Sem reação com Benedict = NEGATIVO]\n A --> I[Glicose oxidase + banho-maria 37°C]\n I --> J{Glicose presente?}\n J -- Sim --> K[Coloração avermelhada proporcional à concentração]\n J -- Não --> L[Ausência de coloração = NEGATIVO]\n```\n\n<sub>Fontes: d2a6f225abc0e71f:0, 940b175fd48e7283:0, 940b175fd48e7283:1, 940b175fd48e7283:2, 3277988260fa31cb:0, 3277988260fa31cb:1, 3277988260fa31cb:2</sub>\n\n---\n\n## Lipídeos: Estrutura, Funções e Classificação dos Ácidos Graxos\n\nOs lipídeos constituem uma classe de compostos com estrutura bastante variada, caracterizados por alta solubilidade em solventes orgânicos e por serem praticamente insolúveis em água. Suas funções biológicas são diversas: composição das membranas biológicas, isolamento térmico, reserva de energia, sustentação e forma do corpo, e síntese de vitaminas e hormônios. Muitos lipídeos são anfipáticos, ou seja, apresentam uma porção polar (hidrofílica) e uma porção apolar (hidrofóbica) na mesma molécula — propriedade fundamental para a formação das bicamadas lipídicas das membranas celulares.\n\nOs ácidos graxos são componentes centrais dos lipídeos e podem ser classificados quanto ao grau de saturação: saturados (sem duplas ligações na cadeia carbônica), monoinsaturados (uma dupla ligação) e poli-insaturados (duas ou mais duplas ligações). A posição da primeira dupla ligação a partir da extremidade metil determina a classificação ômega (ω): ômega-3, ômega-6, ômega-9 etc. A configuração geométrica das duplas ligações também é relevante: gorduras cis têm os hidrogênios do mesmo lado da dupla ligação, enquanto as trans têm configuração oposta — as gorduras trans estão associadas a maior risco cardiovascular. Um exemplo clínico importante é o ácido palmitoteico 16:1(9), um ácido graxo monoinsaturado com 16 carbonos e uma dupla ligação na posição 9, sintetizado em células adiposas e hepáticas.\n\nOs triacilgliceróis (triglicerídeos) são formados pela esterificação de três ácidos graxos ao glicerol e representam a principal forma de armazenamento de energia nos animais. A hidrólise de um triacilglicerol produz ácidos graxos e glicerol. A composição em ácidos graxos de uma dieta tem impacto direto no risco cardiovascular: dietas ricas em gorduras saturadas e trans elevam o LDL e aumentam o risco aterosclerótico, enquanto gorduras insaturadas (como as do óleo de oliva e canola) têm perfil mais favorável.\n\n### Pontos-chave\n\n- Lipídeos são caracterizados por alta solubilidade em solventes orgânicos e praticamente insolúveis em água.\n- Funções dos lipídeos: composição de membranas biológicas, isolamento térmico, reserva de energia, sustentação corporal e síntese de vitaminas e hormônios.\n- Muitos lipídeos são anfipáticos: possuem porção polar (hidrofílica) e apolar (hidrofóbica) na mesma molécula.\n- Ácidos graxos saturados: sem duplas ligações; monoinsaturados: uma dupla ligação; poli-insaturados: duas ou mais duplas ligações.\n- A classificação ômega indica a posição da primeira dupla ligação a partir da extremidade metil da cadeia carbônica.\n- Gorduras cis: hidrogênios no mesmo lado da dupla ligação; gorduras trans: configuração oposta — associadas a maior risco cardiovascular.\n- A hidrólise de triacilgliceróis produz ácidos graxos e glicerol.\n- Ácido oleico 18:1(9) é um ácido graxo monoinsaturado ômega-9 encontrado no óleo de abacate e oliva.\n- Ácido palmitoteico 16:1(9): monoinsaturado, 16 carbonos, sintetizado em células adiposas e hepáticas.\n- Dietas ricas em gorduras saturadas e trans impactam negativamente o risco cardiovascular; gorduras insaturadas têm perfil mais favorável.\n\n### Comparação\n\n| Tipo de Ácido Graxo | Duplas Ligações | Exemplo | Fonte Alimentar | Impacto Cardiovascular |\n|---|---|---|---|---|\n| Saturado | Nenhuma | Ácido palmítico 16:0 | Gordura animal, óleo de coco | Aumenta LDL (desfavorável) |\n| Monoinsaturado (cis) | Uma | Ácido oleico 18:1(9) ômega-9 | Azeite, abacate, canola | Favorável |\n| Poli-insaturado ômega-3 | Duas ou mais | Ácido linolênico | Peixes, linhaça | Favorável |\n| Poli-insaturado ômega-6 | Duas ou mais | Ácido linoleico 18:2(9,12) | Óleo de soja, girassol | Favorável (em equilíbrio) |\n| Trans | Uma ou mais (trans) | Gordura vegetal hidrogenada | Alimentos industrializados | Aumenta LDL, reduz HDL (desfavorável) |\n\n> **Mnemônico:** MEPS — Membranas, Energia, Proteção (isolamento térmico), Síntese (vitaminas e hormônios) — para lembrar as funções dos lipídeos.\n\n<sub>Fontes: 7a9a020e6dd7dad4:0, 7a9a020e6dd7dad4:1, 7a9a020e6dd7dad4:2, 7a9a020e6dd7dad4:3, 72ac6c23532e77b9:0, 72ac6c23532e77b9:2, 48716abd61a20a94:0, 48716abd61a20a94:2</sub>\n\n---\n\n## Lipoproteínas, Dislipidemia e Aterosclerose\n\nAs lipoproteínas são partículas responsáveis pelo transporte de lipídeos no plasma sanguíneo. Os distúrbios no metabolismo das lipoproteínas e dos lipídeos são os fatores patogênicos mais comuns para a formação da placa aterosclerótica e são preditores de risco para doenças cerebrovasculares e doença arterial coronariana. As principais lipoproteínas plasmáticas — quilomícrons, VLDL, LDL e HDL — diferem em composição, tamanho, densidade e função. Em ordem crescente de densidade (e decrescente de tamanho): quilomícron < VLDL < LDL < HDL. Os quilomícrons transportam principalmente triglicerídeos para os tecidos periféricos e recebem ApoC-II e ApoE do HDL após serem secretados. As partículas de VLDL são sintetizadas nos hepatócitos e sofrem hidrólise dos triglicerídeos nos tecidos adiposo e muscular. O LDL é a principal partícula transportadora de colesterol para os tecidos periféricos e está diretamente associado ao risco aterosclerótico.\n\nO HDL possui papel antiaterogênico central: participa do transporte reverso do colesterol (dos tecidos periféricos de volta ao fígado), possui efeito anti-inflamatório e previne a oxidação do LDL. A elevação de 1% no HDL associa-se a uma redução significante de 3% nas taxas de mortalidade cardiovascular. Em estados de disfunção endotelial, ocorre aumento da permeabilidade do endotélio, facilitando a entrada de partículas de LDL na íntima arterial — evento central na aterogênese. As células espumosas formadas na aterogênese derivam principalmente de macrófagos carregados de lipídeos.\n\nA estratificação do risco cardiovascular é a base para a tomada de decisão clínica, sendo categorizado em baixo, intermediário, alto, muito alto e extremo. Os fatores de risco modificáveis incluem tabagismo, obesidade, dieta não saudável, dislipidemia, diabetes mellitus, sedentarismo, hipertensão arterial sistêmica e etilismo; os não modificáveis incluem história familiar, etnia e idade. As fibras solúveis reduzem o colesterol ao formar um gel que se liga aos ácidos biliares no lúmen intestinal, aumentando sua excreção e induzindo a síntese de novos ácidos biliares — diminuindo assim o colesterol disponível para incorporação em lipoproteínas. O psyllium é a fibra solúvel mais estudada nesse contexto, com doses de 7 a 15 g/dia associadas a reduções de 5,7% a 20,2% de LDL-c.\n\n### Pontos-chave\n\n- Ordem crescente de densidade das lipoproteínas: Quilomícron < VLDL < LDL < HDL (ordem decrescente de tamanho).\n- Quilomícrons: transportam triglicerídeos para tecidos periféricos; recebem ApoC-II e ApoE do HDL após serem secretados.\n- VLDL: sintetizadas nos hepatócitos; sofrem hidrólise de triglicerídeos nos tecidos adiposo e muscular.\n- LDL: principal transportador de colesterol para tecidos periféricos; pró-aterogênico.\n- HDL: antiaterogênico; realiza transporte reverso do colesterol; elevação de 1% no HDL reduz 3% da mortalidade cardiovascular.\n- Células espumosas na aterogênese derivam principalmente de macrófagos carregados de lipídeos.\n- Disfunção endotelial aumenta a permeabilidade e facilita a entrada de partículas de LDL na íntima arterial.\n- Fatores de risco modificáveis para DCV: tabagismo, obesidade, dislipidemia, DM, sedentarismo, HAS, etilismo, dieta não saudável.\n- Fibras solúveis reduzem LDL ao se ligar a ácidos biliares no intestino, aumentando sua excreção e reduzindo o colesterol disponível para lipoproteínas.\n- Psyllium (7–15 g/dia) associa-se a redução de 5,7% a 20,2% de LDL-c e 2% a 14,8% de colesterol total.\n\n### Comparação\n\n| Lipoproteína | Tamanho | Densidade | Origem | Principal Carga | Função Principal |\n|---|---|---|---|---|---|\n| Quilomícron | Maior | Menor | Enterócitos | Triglicerídeos | Transporte de TG da dieta para tecidos periféricos |\n| VLDL | Grande | Baixa | Hepatócitos | Triglicerídeos | Transporte de TG endógenos para tecidos adiposo e muscular |\n| LDL | Médio | Alta | Derivado do VLDL | Colesterol | Transporte de colesterol para tecidos periféricos (pró-aterogênico) |\n| HDL | Menor | Maior | Fígado e intestino | Proteínas/colesterol | Transporte reverso do colesterol; antiaterogênico |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Disfunção endotelial] --> B[Aumento da permeabilidade do endotélio]\n B --> C[Entrada de LDL na íntima arterial]\n C --> D[Oxidação do LDL]\n D --> E[Recrutamento de monócitos]\n E --> F[Diferenciação em macrófagos]\n F --> G[Fagocitose de LDL oxidado]\n G --> H[Formação de células espumosas]\n H --> I[Placa aterosclerótica]\n I --> J{Localização?}\n J -- Coronárias --> K[Doença arterial coronariana]\n J -- Cerebrovasculares --> L[AVC]\n```\n\n> **Mnemônico:** TOSED — Tabagismo, Obesidade, Sedentarismo, Etilismo, Dislipidemia — principais fatores de risco MODIFICÁVEIS para doenças cardiovasculares.\n\n<sub>Fontes: 7a9a020e6dd7dad4:1, 7a9a020e6dd7dad4:2, 7a9a020e6dd7dad4:3, 7a9a020e6dd7dad4:4, 72ac6c23532e77b9:1, 72ac6c23532e77b9:2, 72ac6c23532e77b9:3, 72ac6c23532e77b9:4, 48716abd61a20a94:1, 48716abd61a20a94:2, 48716abd61a20a94:3, 48716abd61a20a94:4, 43d2e2f98e5a7472:0, bc2c93d9c5d0b2bb:0</sub>\n\n---\n\n## Lipídeos: Tipos, Funções e Impacto Cardiovascular\n\nOs lipídeos são moléculas essenciais ao organismo humano, desempenhando funções de reserva energética, precursores de hormônios, fonte de ácidos graxos essenciais e vitaminas lipossolúveis, além de serem componentes estruturais das membranas celulares. Quimicamente, os ácidos graxos são moléculas anfipáticas — apresentam uma região hidrofóbica e uma região hidrofílica — e podem ser classificados como saturados, insaturados (cis ou trans) e ômega. Os triglicerídeos (triacilgliceróis) são formados pela esterificação de três ácidos graxos a uma molécula de glicerol.\n\nO tipo de ácido graxo consumido na dieta tem impacto direto no risco cardiovascular. O consumo elevado de ácidos graxos saturados causa aumento da atividade da enzima colesterol aciltransferase (ACAT) hepática, induzindo a esterificação de colesterol, além de favorecer o aumento da lipogênese hepática, da secreção de VLDL e a elevação dos triglicerídeos. Em contraste, a substituição de ácidos graxos saturados por poli-insaturados na dieta promove efeito cardioprotetor, por aumentar o catabolismo e a captação de VLDL via maior atividade da lipase lipoproteica (LPL) e reduzir a síntese de triglicerídeos pela inibição da diacilglicerol acetiltransferase.\n\nOs ácidos graxos trans, obtidos através da hidrogenação industrial de óleos vegetais, apresentam conformação em que os hidrogênios ligados aos carbonos de uma insaturação encontram-se em lados opostos. Estudos epidemiológicos indicaram que maior ingestão de ácidos graxos trans industriais está associada a risco aumentado de doenças cardiovasculares. O óleo de coco, apesar de vegetal, aumenta significativamente as concentrações de LDL e não deve ser visto como um óleo saudável, sendo justificado limitar seu consumo devido ao seu alto teor de gordura saturada.\n\n### Pontos-chave\n\n- Lipídeos têm cinco funções principais: reserva energética, precursores de hormônios, fonte de ácidos graxos essenciais, fonte de vitaminas lipossolúveis e componente estrutural das membranas celulares.\n- Ácidos graxos saturados ativam a ACAT hepática → esterificação de colesterol → aumento de LDL e triglicerídeos.\n- Ácidos graxos poli-insaturados aumentam a atividade da LPL → maior catabolismo de VLDL → efeito cardioprotetor.\n- Ácidos graxos trans são produzidos por hidrogenação industrial de óleos vegetais, tornando-os mais sólidos à temperatura ambiente.\n- Há associação positiva entre a ingestão de ácidos graxos trans industriais e o desenvolvimento de doenças cardiovasculares.\n- O óleo de coco aumenta significativamente as concentrações de LDL e não apresenta evidência de benefícios para adiposidade ou marcadores glicêmicos.\n- Dieta rica em gordura saturada aumenta a resistência à insulina e o risco de desenvolvimento de diabetes do tipo 2.\n- A redução da ingestão de gordura saturada causa redução importante nos eventos cardiovasculares combinados.\n\n### Comparação\n\n| Tipo de Ácido Graxo | Estrutura | Efeito Enzimático Principal | Impacto Cardiovascular |\n|---|---|---|---|\n| Saturado | Sem duplas ligações | Ativa ACAT hepática; aumenta lipogênese e secreção de VLDL | Pró-aterogênico; aumenta LDL e triglicerídeos |\n| Poli-insaturado (cis) | Múltiplas duplas ligações, H no mesmo lado | Ativa LPL; inibe diacilglicerol acetiltransferase | Cardioprotetor; reduz VLDL e triglicerídeos |\n| Trans (industrial) | Dupla ligação com H em lados opostos | Mecanismos pró-inflamatórios e pró-aterogênicos | Associado a risco aumentado de doenças cardiovasculares |\n| Óleo de coco (saturado vegetal) | Rico em gordura saturada | Semelhante aos saturados | Aumenta significativamente LDL; não recomendado |\n\n> **Mnemônico:** **REPH-M** — funções dos lipídeos: **R**eserva energética, **E**steroide (precursor de hormônios), **P**oli-insaturados essenciais (ácidos graxos essenciais), **H**idrossolúveis (vitaminas lipossolúveis), **M**embrana celular (componente estrutural)\n\n<sub>Fontes: bcb3049bb00b1bb2:0, 5486f0031c7a09ef:0, bcb3049bb00b1bb2:1, 5486f0031c7a09ef:1</sub>\n\n---\n\n## Dislipidemia, Aterosclerose e Risco Cardiovascular — Caso Clínico de Judite\n\nO caso clínico de Judite ilustra de forma paradigmática a convergência de múltiplos fatores de risco cardiovascular. Aos 58 anos, previamente assintomática, ela apresentou infarto agudo do miocárdio com evidência de doença aterosclerótica difusa, incluindo lesão pseudo-oclusiva, detectada no quarto dia pós-infarto. Seus exames laboratoriais em jejum demonstravam dislipidemia grave: colesterol total de 309 mg/dL (referência: < 190 mg/dL), LDL de 222 mg/dL (referência: < 130 mg/dL), HDL de 26 mg/dL (referência: > 40 mg/dL) e triglicerídeos de 305 mg/dL (referência: < 150 mg/dL). Além disso, apresentava hiperglicemia (glicose: 169 mg/dL), hipertensão arterial, tabagismo por 30 anos (15 a 20 cigarros/dia) e sobrepeso/obesidade (83 kg, 1,63 m — IMC aproximado de 31,2 kg/m², acima do valor de referência de 20 a 25 kg/m²).\n\nA dislipidemia interfere diretamente na doença cardiovascular por meio do acúmulo de LDL na parede arterial, processo central na aterogênese. O HDL baixo (26 mg/dL no caso de Judite) representa perda do efeito protetor desta lipoproteína. A aterosclerose, ao gerar placas que reduzem o lúmen arterial, pode evoluir para oclusão aguda — mecanismo subjacente ao infarto agudo do miocárdio com supradesnivelamento do segmento ST, como evidenciado no eletrocardiograma de Judite.\n\nA trajetória de Judite evidencia que fatores de risco modificáveis — tabagismo, sedentarismo, dieta inadequada, não adesão medicamentosa — quando não controlados, levam à progressão da doença. Apesar de ter recebido alta com anticoagulantes, anti-hipertensivos e diuréticos, e ter sido submetida à revascularização após o segundo infarto, Judite manteve o mesmo estilo de vida, evoluindo ao óbito aos 64 anos. Isso reforça que a prevenção secundária depende criticamente da modificação do estilo de vida e da adesão terapêutica.\n\n### Pontos-chave\n\n- Judite apresentava dislipidemia com todos os parâmetros alterados: colesterol total 309, LDL 222, HDL 26 e triglicerídeos 305 mg/dL — todos fora dos valores de referência.\n- IMC de Judite: 83 kg / (1,63)² ≈ 31,2 kg/m² — acima do valor de referência de 20 a 25 kg/m².\n- Fatores de risco cardiovascular presentes: dislipidemia, hipertensão arterial, tabagismo (30 anos, 15–20 cigarros/dia), hiperglicemia, sobrepeso/obesidade, sedentarismo e não adesão medicamentosa.\n- A doença aterosclerótica difusa, incluindo lesão pseudo-oclusiva, foi evidenciada por exame de imagem no quarto dia pós-infarto.\n- O eletrocardiograma mostrou supraelevação do segmento ST, característica do infarto com oclusão coronariana aguda.\n- A paciente foi submetida à revascularização após o segundo infarto, mas manteve o mesmo estilo de vida, evoluindo ao óbito.\n- A alta prevalência de hipertensão arterial na população é um fator de risco cardiovascular de grande impacto coletivo.\n- A não adesão ao tratamento medicamentoso e às mudanças de estilo de vida foi determinante para o desfecho fatal de Judite.\n\n### Comparação\n\n| Parâmetro Lipídico | Valor de Judite | Valor de Referência | Interpretação |\n|---|---|---|---|\n| Colesterol total | 309 mg/dL | < 190 mg/dL | Muito elevado |\n| LDL | 222 mg/dL | < 130 mg/dL | Muito elevado (pró-aterogênico) |\n| HDL | 26 mg/dL | > 40 mg/dL | Muito baixo (perda de proteção) |\n| Triglicerídeos | 305 mg/dL | < 150 mg/dL | Muito elevado |\n| Glicose | 169 mg/dL | (referência não especificada no texto) | Hiperglicemia |\n| IMC | ~31,2 kg/m² | 20–25 kg/m² | Obesidade |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Fatores de risco: dislipidemia, HAS, tabagismo, hiperglicemia, obesidade, sedentarismo] --> B[Aterosclerose difusa: acúmulo de lipídeos na parede arterial]\n B --> C[Formação de placa aterosclerótica e lesão pseudo-oclusiva]\n C --> D[Oclusão coronariana aguda]\n D --> E[Infarto Agudo do Miocárdio com supradesnivelamento de ST]\n E --> F{Tratamento e revascularização}\n F --> G[Manutenção do estilo de vida de risco: não adesão medicamentosa, sedentarismo, dieta inadequada]\n G --> H[Novo evento cardiovascular fatal]\n```\n\n> **Mnemônico:** **THAT-SO** — fatores de risco de Judite: **T**abagismo, **H**ipertensão arterial, **A**desão medicamentosa deficiente, **T**riglicerídeos/dislipidemia, **S**edentarismo/sobrepeso, **O**besidade/hiperglicemia\n\n<sub>Fontes: 45312ddd49010628:0, a70337300827ae4a:0</sub>\n\n---\n\n## Membrana Plasmática: Estrutura, Permeabilidade Seletiva e Osmose\n\nA membrana plasmática é uma estrutura universal presente em todas as células de todos os seres vivos, desempenhando funções de proteção, comunicação, transporte e mobilidade. Sua estrutura é baseada em uma bicamada lipoproteica, na qual os fosfolipídeos — moléculas anfipáticas com região hidrofílica e hidrofóbica — organizam-se de modo que as caudas hidrofóbicas ficam voltadas para o interior e as cabeças hidrofílicas ficam expostas aos meios aquosos intra e extracelular. Apesar de sua função protetora, a membrana não é rígida, apresentando fluidez. Proteínas integrais e periféricas participam de funções de transporte e reconhecimento. Os carboidratos da membrana estão voltados para o lado externo da célula, formando o glicocálice, responsável pelo reconhecimento celular — inclusive pela tipagem sanguínea.\n\nA permeabilidade seletiva da membrana plasmática permite que algumas substâncias a atravessem livremente enquanto outras são barradas. A osmose é o movimento de solvente (água) através de uma membrana semipermeável, do meio de menor concentração de soluto para o de maior concentração, sem gasto de energia. Quando uma célula é colocada em meio hipertônico (maior concentração de soluto que o interior celular), ocorre saída de água e a célula murcha; em meio hipotônico, a água entra e a célula incha. Em meio isotônico, não há variação líquida de volume. A hemácia, fisiologicamente, está sempre submetida a um meio isotônico, o que explica por que seu volume real não é alterado apesar do enorme fluxo de água que a atravessa.\n\n### Pontos-chave\n\n- Todas as células de todos os seres vivos apresentam membrana plasmática — estrutura universal e essencial à vida.\n- Os fosfolipídeos são anfipáticos: região hidrofílica (cabeça) voltada para os meios aquosos e região hidrofóbica (cauda) voltada para o interior da bicamada.\n- O glicocálice é formado por carboidratos voltados para o exterior celular e é responsável pelo reconhecimento celular, inclusive pela tipagem sanguínea.\n- Osmose: movimento de água do meio hipotônico para o hipertônico, sem gasto de ATP — transporte passivo.\n- Célula em meio hipertônico → perde água → murcha (crenação em hemácias); célula em meio hipotônico → ganha água → incha (pode lisar).\n- A hemácia está fisiologicamente submetida a um meio isotônico, mantendo seu volume constante.\n- A membrana plasmática apresenta fluidez — não é rígida — o que é essencial para suas funções dinâmicas.\n- Proteínas de membrana facilitam a passagem de certas substâncias (difusão facilitada) sem gasto de energia.\n\n### Comparação\n\n| Tipo de Meio | Concentração de Soluto Externo vs. Interno | Movimento de Água | Efeito na Célula |\n|---|---|---|---|\n| Isotônico | Igual | Nulo (equilíbrio) | Volume inalterado |\n| Hipotônico | Menor que o interior celular | Entra na célula | Célula incha (turgescência/lise) |\n| Hipertônico | Maior que o interior celular | Sai da célula | Célula murcha (crenação/plasmólise) |\n\n> **Mnemônico:** **PCTM** — funções da membrana plasmática: **P**roteção, **C**omunicação, **T**ransporte, **M**obilidade\n\n<sub>Fontes: 83fc1bb52ed5efaa:0, 83fc1bb52ed5efaa:2, 83fc1bb52ed5efaa:3, a25f2908e3e2dcc2:0, a25f2908e3e2dcc2:2, a25f2908e3e2dcc2:3, c3f94cbf86ba7d20:0, c3f94cbf86ba7d20:2, c3f94cbf86ba7d20:3</sub>\n\n---\n\n## Transporte Ativo, Bomba Na⁺-K⁺-ATPase e Aplicações Clínicas (Digoxina, SGLT2, Fibrose Cística)\n\nO transporte ativo é um processo que transporta moléculas contra seus gradientes de concentração — de áreas de menor para maior concentração — requerendo energia proveniente direta ou indiretamente das ligações fosfato ricas em energia do ATP. A molécula liga-se a um carreador de membrana que muda sua conformação, liberando a molécula no compartimento oposto; essa mudança conformacional distingue o transporte ativo da difusão facilitada. A bomba de sódio-potássio (Na⁺-K⁺-ATPase) é provavelmente a proteína de transporte mais importante em células animais: bombeia 3 Na⁺ para fora e 2 K⁺ para dentro da célula para cada ATP consumido, sendo classificada como antiporte. Em algumas células, essa bomba utiliza até 30% de todo o ATP produzido.\n\nO conhecimento do transporte ativo tem aplicações clínicas diretas. A digoxina, glicosídeo cardíaco derivado da dedaleira (Digitalis spp.), age inibindo a Na⁺-K⁺-ATPase, o que aumenta a concentração citoplasmática de cálcio, resultando em aumento do volume sistólico e do débito cardíaco — efeito terapêutico na insuficiência cardíaca congestiva. A dapagliflozina (Farxiga) bloqueia o cotransportador sódio-glicose 2 (SGLT2), responsável pela reabsorção da glicose no rim, levando à eliminação do excesso de glicose na urina e melhorando o controle do diabetes mellitus tipo 2, com efeitos adicionais benéficos na função renal e cardíaca. Na fibrose cística, a proteína CFTR (reguladora de condutância transmembrana) está defeituosa, levando ao transporte anormal de cloreto, com consequências sistêmicas graves — infecções respiratórias, obstrução gastrointestinal e disfunção pancreática exócrina.\n\nOs lisossomos mantêm pH interno ácido (~5) por meio de uma bomba de prótons na membrana lisossomal, que transporta ativamente H⁺ do citosol para o lisossomo com gasto de ATP, mantendo concentração de H⁺ aproximadamente cem vezes maior dentro do lisossomo. Esse mecanismo protege o citosol de digestão descontrolada pelas hidrolases ácidas, que são inativas no pH neutro (~7,2) do citoplasma.\n\n### Pontos-chave\n\n- Transporte ativo: movimento contra gradiente de concentração, com gasto de ATP — diferente da difusão facilitada, que não requer energia.\n- Bomba Na⁺-K⁺-ATPase: bombeia 3 Na⁺ para fora e 2 K⁺ para dentro por ATP consumido; é um antiporte; pode usar até 30% do ATP celular.\n- Simporte: moléculas cotransportadas migram na mesma direção (ex.: cotransportador Na⁺-glicose no intestino); antiporte: migram em direções opostas (ex.: Na⁺-K⁺-ATPase).\n- Digoxina inibe a Na⁺-K⁺-ATPase → aumenta Ca²⁺ citoplasmático → aumenta contratilidade cardíaca (volume sistólico e débito cardíaco).\n- Dapagliflozina (Farxiga) bloqueia o SGLT2 renal → elimina glicose na urina → melhora controle glicêmico e tem efeito benéfico renal e cardíaco.\n- Fibrose cística: doença autossômica recessiva por defeito na proteína CFTR (canal de cloreto) → secreções espessas → infecções respiratórias, obstrução gastrointestinal, disfunção pancreática.\n- CFTR é uma proteína (formada por aminoácidos) — a macromolécula defeituosa na fibrose cística.\n- Lisossomos mantêm pH ~5 por bomba de prótons dependente de ATP, protegendo o citosol de hidrolases ácidas.\n- A fibrose cística afeta aproximadamente 1 a cada 2.500 indivíduos de origem caucasiana e é incluída no Teste do Pezinho do SUS.\n\n### Comparação\n\n| Mecanismo/Fármaco | Alvo Molecular | Tipo de Transporte | Efeito Clínico |\n|---|---|---|---|\n| Bomba Na⁺-K⁺-ATPase (fisiológica) | Na⁺ e K⁺ | Ativo (antiporte) | Mantém gradientes iônicos celulares |\n| Digoxina | Inibe Na⁺-K⁺-ATPase | Ativo (bloqueio) | Aumenta Ca²⁺ intracelular → maior contratilidade cardíaca |\n| Dapagliflozina (Farxiga) | Bloqueia SGLT2 renal | Ativo (simporte bloqueado) | Elimina glicose na urina; melhora controle do DM2 e função renal/cardíaca |\n| CFTR (defeituosa na FC) | Canal de Cl⁻ | Transporte iônico (ativo) | Defeito → secreções espessas → infecções e obstrução |\n| Bomba de prótons lisossomal | H⁺ | Ativo | Mantém pH ~5 no lisossomo; protege citosol |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Digoxina inibe Na⁺-K⁺-ATPase] --> B[Acúmulo de Na⁺ intracelular]\n B --> C[Redução da atividade do trocador Na⁺/Ca²⁺]\n C --> D[Aumento de Ca²⁺ citoplasmático]\n D --> E[Maior contratilidade do miocárdio]\n E --> F[Aumento do volume sistólico e débito cardíaco]\n```\n\n> **Mnemônico:** **3 fora, 2 dentro** — a bomba Na⁺-K⁺-ATPase bombeia **3 Na⁺ para FORA** e **2 K⁺ para DENTRO** por ATP\n\n<sub>Fontes: 584ea7e1df69fa89:0, 584ea7e1df69fa89:1, 91ff50d4225bcb90:0, 91ff50d4225bcb90:1, 83fc1bb52ed5efaa:1, 83fc1bb52ed5efaa:3, a25f2908e3e2dcc2:1, a25f2908e3e2dcc2:3, c3f94cbf86ba7d20:1, c3f94cbf86ba7d20:3</sub>\n\n---\n\n## Membrana Plasmática: Estrutura e Composição\n\nA membrana plasmática é o envoltório externo de toda célula, presente tanto em procariontes quanto em eucariontes, e sua função primordial é separar e proteger os constituintes químicos do ambiente externo. Sua estrutura é explicada pelo modelo do mosaico fluido, proposto por Singer e Nicholson, que estabelece uma composição mista de proteínas, lipídeos e carboidratos. A bicamada fosfolipídica é formada por moléculas anfipáticas — com cabeças hidrofílicas voltadas para o ambiente aquoso e caudas hidrofóbicas protegidas no interior — que se organizam espontaneamente em compartimentos selados, pois a exposição das caudas hidrocarbonadas à água seria energeticamente desfavorável.\n\nAs proteínas compõem 50% da massa total das membranas celulares e desempenham funções diversas: transportadoras (como a bomba de Na⁺), âncoras (como as integrinas), receptoras (como o receptor de PDGF) e enzimáticas (como a adenilato-ciclase). Além disso, a membrana possui um complexo de carboidratos projetado ao ambiente extracelular, denominado glicocálice, formado por glicoproteínas e glicolipídeos com função de adesão e reconhecimento celular. A fluidez da membrana é influenciada pelo tamanho das caudas hidrofóbicas, pelo grau de insaturação das cadeias e pela concentração de colesterol — altas concentrações de colesterol diminuem a fluidez da membrana.\n\nA membrana plasmática possui permeabilidade seletiva (é semipermeável), sendo capaz de selecionar as substâncias que entram e saem das células. Essa propriedade é fundamental para a manutenção da homeostase celular e para o controle do transporte de íons, nutrientes e resíduos. Especializações como as microvilosidades — expansões semelhantes a dedos de luvas — aumentam a superfície de absorção e estão presentes no revestimento do intestino.\n\n### Pontos-chave\n\n- A membrana plasmática tem espessura entre 5 e 9 nm, invisível ao microscópio óptico; só observável por microscopia eletrônica.\n- O modelo do mosaico fluido foi proposto por Singer e Nicholson e estabelece uma estrutura mista de proteínas, lipídeos e carboidratos.\n- Os fosfolipídeos anfipáticos formam bicamadas e se fecham espontaneamente sobre elas mesmas, formando compartimentos selados.\n- A fluidez diminui com: cadeias longas, cadeias saturadas e altas concentrações de colesterol.\n- Proteínas de membrana têm quatro classes funcionais principais: transportadoras, âncoras, receptoras e enzimáticas.\n- O glicocálice (glicoproteínas e glicolipídeos) tem função de adesão e reconhecimento celular — exemplo clínico: rejeição de órgãos.\n- Na esferocitose hereditária, defeitos em proteínas de ancoragem (anquirina ou espectrina) comprometem a estabilidade estrutural e a flexibilidade da bicamada fosfolipídica.\n- Na Distrofia Muscular de Duchenne, a ausência de distrofina — que conecta o citoesqueleto de actina à matriz extracelular — causa instabilidade no sarcolema e influxo patológico de cálcio.\n\n### Comparação\n\n| Classe Funcional | Exemplo | Função Específica |\n|---|---|---|\n| Transportadoras | Bomba de Na⁺ | Bombeia Na⁺ para fora e K⁺ para dentro de forma ativa |\n| Âncoras | Integrinas | Ligam filamentos de actina a proteínas extracelulares da matriz |\n| Receptoras | Receptor de PDGF | Liga PDGF e gera sinais intracelulares de crescimento e divisão celular |\n| Enzimas | Adenilato-ciclase | Catalisa produção intracelular de cAMP em resposta a sinais extracelulares |\n\n> **Mnemônico:** TARE: Transportadoras, Âncoras, Receptoras, Enzimáticas (classes de proteínas de membrana)\n\n<sub>Fontes: 36f2ff3a2cd3fb54:0, 36f2ff3a2cd3fb54:1, 36f2ff3a2cd3fb54:2, a2cd71f14864394a:0, a2cd71f14864394a:1, a2cd71f14864394a:2, f03ea052805d8e63:1, f03ea052805d8e63:3</sub>\n\n---\n\n## Transporte Passivo: Difusão Simples, Difusão Facilitada e Osmose\n\nO transporte passivo ocorre sem gasto de energia e a favor do gradiente eletroquímico. A difusão simples é o movimento de moléculas de regiões de maior concentração para regiões de menor concentração, de forma aleatória, até atingir o equilíbrio. A bicamada fosfolipídica é amplamente impermeável a moléculas solúveis em água e íons; apenas gases (O₂, CO₂), moléculas polares pequenas sem carga (ureia, etanol) e amônia conseguem atravessá-la por difusão simples. É por esse mecanismo que o O₂ entra no sangue nos alvéolos e o CO₂ é eliminado — ambos seguindo seus respectivos gradientes de concentração. A hemodiálise é um exemplo clínico direto: moléculas residuais em excesso n
