, "type": "cloze", "tags": ["bioquímica::pcos::epidemiologia", "exam::n1", "high_yield", "exam::n1"], "source_span": "acometendo, aproximadamente, 6% de todas as mulheres durante sua vida reprodutiva", "source_chunk_id": "76cae3be4bc84980:15", "explanation": null, "mnemonic": null, "verified": true, "card_id": "f15a44be288c5ded"}, {"front": "A PCO₂ normal de 40 mmHg corresponde a cerca de {{c1::1,2 mol/L}} de CO₂ dissolvido nos líquidos extracelulares.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acidobasico::pco2_normal", "exam::n1", "high_yield", "exam::n1"], "source_span": "Cerca de 1,2 mol/L de Co2 dissolvido é, normalmente, encontrado nos líquidos extracelulares, correspondendo à Pco2 de 40 mmHg", "source_chunk_id": "f8d97a9f5383249e:5", "explanation": null, "mnemonic": null, "verified": true, "card_id": "7fd05e7b2f8285e2"}, {"front": "A PCO₂ normal de 40 mmHg corresponde a cerca de {{c1::1,2 mol/L}} de CO₂ dissolvido nos líquidos extracelulares.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acidobasico::pco2", "exam::n1", "high_yield", "exam::n1"], "source_span": "Cerca de 1,2 mol/L de C02 dissolvido é, normalmente, encontrado nos líquidos extracelulares, correspondendo à Pco2 de 40 mmHg", "source_chunk_id": "49ed06ff34adc89d:13", "explanation": null, "mnemonic": null, "verified": false, "card_id": "7fd05e7b2f8285e2"}, {"front": "A PERK é ativada durante a {{c1::Resposta de Proteína Desdobrada}} no retículo endoplasmático.", "back": "", "type": "cloze", "tags": ["bioquimica::resposta_proteina_desdobrada::UPR", "exam::n1", "high_yield", "exam::n1"], "source_span": "que é ativada durante a Resposta de Proteína Desdobrada no retículo endoplasmático", "source_chunk_id": "b678350d1f36470c:7", "explanation": null, "mnemonic": null, "verified": true, "card_id": "27f62966d1f9b705"}, {"front": "A Rede de Proteostase compreende mais de {{c1::2.000}} componentes moleculares.", "back": "", "type": "cloze", "tags": ["bioquimica::proteostase", "exam::n1", "high_yield", "exam::n1"], "source_span": "compreende mais de 2.000 componentes moleculares que, coletivamente, garantem que todas as proteínas", "source_chunk_id": "b678350d1f36470c:7", "explanation": null, "mnemonic": null, "verified": true, "card_id": "0c68639db67b36be"}, {"front": "A UPR (Unfolded Protein Response) responde ao acúmulo de proteínas {{c1::mal dobradas}} no retículo endoplasmático, restaurando a homeostase.", "back": "", "type": "cloze", "tags": ["bioquimica::upr::reticulo_endoplasmatico", "exam::n1", "high_yield", "exam::n1"], "source_span": "Responde ao acúmulo de proteínas mal dobradas no retículo endoplasmático, restaurando a homeostase.", "source_chunk_id": "5fb85c2e0ca8d9fb:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "ce1343e64f237578"}, {"front": "A UPR (Unfolded Protein Response) é ativada em resposta ao acúmulo de proteínas {{c1::mal dobradas}} no {{c2::retículo endoplasmático}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::UPR::estresse_RE", "exam::n1", "high_yield", "exam::n1"], "source_span": "A UPR responde ao acúmulo de proteínas mal dobradas no retículo endoplasmático.", "source_chunk_id": "4039b509b4eccea3:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "a7de4fb696ed11a3"}, {"front": "A UPR (Unfolded Protein Response) é ativada em resposta ao acúmulo de proteínas {{c1::mal dobradas}} no {{c2::retículo endoplasmático}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::UPR::retículo_endoplasmático", "exam::n1", "high_yield", "exam::n1"], "source_span": "Responde ao acúmulo de proteínas mal dobradas no retículo endoplasmático, restaurando a homeostase.", "source_chunk_id": "30a0c307d98d50fe:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "a7de4fb696ed11a3"}, {"front": "A UPR promove uma resposta tríplice: atenuação da tradução, regulação positiva de chaperonas do RE e {{c1::aumento da biogênese do RE}}.", "back": "", "type": "cloze", "tags": ["bioquimica::UPR::resposta", "exam::N1", "high_yield", "exam::n1"], "source_span": "Uma resposta tríplice: 1) atenuação geral da tradução, 2) regulação positiva de chaperonas do RE e componentes do ERAD e 3) aumento da biogênese do RE", "source_chunk_id": "b678350d1f36470c:11", "explanation": null, "mnemonic": "ATF-BiP: Atenuação, Transcrição de chaperonas, Fabricação do RE.", "verified": true, "card_id": "29282b0f4d9933c4"}, {"front": "A UPR responde ao acúmulo de proteínas {{c1::mal dobradas}} no {{c2::retículo endoplasmático}}, restaurando a homeostase.", "back": "", "type": "cloze", "tags": ["biologia_celular::UPR::estresse_RE", "exam::n1", "high_yield", "exam::n1"], "source_span": "Responde ao acúmulo de proteínas mal dobradas no retículo endoplasmático, restaurando a homeostase.", "source_chunk_id": "2c7a6c02c6525261:3", "explanation": null, "mnemonic": "UPR = Unfolded Protein Response", "verified": true, "card_id": "88ae4b822e0a900d"}, {"front": "A UPR é desencadeada pelo acúmulo de proteínas mal enoveladas no {{c1::Retículo Endoplasmático}}.", "back": "", "type": "cloze", "tags": ["bioquimica::UPR", "exam::N1", "high_yield", "exam::n1"], "source_span": "Acúmulo de proteínas mal enoveladas no Retículo Endoplasmático (RE).", "source_chunk_id": "b678350d1f36470c:11", "explanation": null, "mnemonic": null, "verified": true, "card_id": "c3e8ba9c90a47af8"}, {"front": "A abertura dos canais de potássio é responsável, em parte, pelo {{c1::término}} do potencial de ação.", "back": "", "type": "cloze", "tags": ["bioquimica_biologia_celular::canais_ionicos::potencial_de_acao", "exam::n1", "high_yield", "exam::n1"], "source_span": "A abertura desses canais é responsável, em parte, pelo término do potencial de ação", "source_chunk_id": "ca1d03681e38ff3b:4", "explanation": "A saída de K⁺ repolariza a membrana, encerrando o potencial de ação.", "mnemonic": null, "verified": true, "card_id": "38aeea6464290028"}, {"front": "A abertura dos canais de sódio dependentes de voltagem é o mecanismo básico para a geração de {{c1::potenciais de ação}}.", "back": "", "type": "cloze", "tags": ["bioquimica_biologia_celular::canais_ionicos::potencial_de_acao", "exam::n1", "high_yield", "exam::n1"], "source_span": "Esse é o mecanismo básico para a geração de potenciais de ação nas fibras nervosas responsáveis pelos sinais nervosos.", "source_chunk_id": "ca1d03681e38ff3b:4", "explanation": null, "mnemonic": null, "verified": true, "card_id": "d2c0881123f697f1"}, {"front": "A abertura e o fechamento dos canais iônicos podem ser controlados por variações de {{c1::voltagem}} ou por controle {{c2::químico (ligantes)}}.", "back": "", "type": "cloze", "tags": ["bioquimica_biologia_celular::canais_ionicos::comportas", "exam::n1", "high_yield", "exam::n1"], "source_span": "A abertura e o fechamento desses canais podem ser controlados por dois modos: 1. Por variações da voltagem. 2. Por controle químico (por ligantes).", "source_chunk_id": "ca1d03681e38ff3b:4", "explanation": null, "mnemonic": null, "verified": true, "card_id": "e44708fc37e5ffd3"}, {"front": "A acetil-CoA derivada dos corpos cetônicos nos tecidos periféricos entra em qual via para ser oxidada como fonte de energia?", "back": "Ciclo do ácido cítrico", "type": "basic", "tags": ["bioquímica::lipídios::metabolismo_corpos_cetônicos", "exam::n1", "high_yield", "exam::n1"], "source_span": "Essas, por sua vez, entram no ciclo do ácido cítrico e são oxidadas como fonte de energia", "source_chunk_id": "8405ad39f361404f:5", "explanation": null, "mnemonic": null, "verified": true, "card_id": "628240929702f97e"}, {"front": "A acetil-CoA formada pela betaoxidação entra imediatamente no {{c1::ciclo do ácido cítrico}} nas mitocôndrias.", "back": "", "type": "cloze", "tags": ["bioquímica::lipídios::betaoxidação", "exam::n1", "high_yield", "exam::n1"], "source_span": "as moléculas de acetil-CoA, formadas pela betaoxidação de ácidos graxos nas mitocôndrias penetram, imediatamente, no ciclo do ácido cítrico", "source_chunk_id": "8405ad39f361404f:4", "explanation": null, "mnemonic": null, "verified": true, "card_id": "6738c1f8059aa5c5"}, {"front": "A acetilação de histonas que inibiam a transcrição de genes de proliferação celular resulta em {{c1::ativação}} desses genes.", "back": "", "type": "cloze", "tags": ["bioquimica::epigenetica::cancer", "exam::n1", "high_yield", "exam::n1"], "source_span": "Houve acetilação de histonas que inibiam a transcrição de genes envolvidos na proliferação celular", "source_chunk_id": "c45346871801c1b5:3", "explanation": "Ao acetilar histonas repressoras, a cromatina se abre e genes de proliferação passam a ser transcritos.", "mnemonic": null, "verified": true, "card_id": "d7a33bc91e6c90e1"}, {"front": "A acetilcolina abre a comporta do canal de acetilcolina formando poro negativamente carregado com diâmetro de cerca de {{c1::0,65}} nanômetro.", "back": "", "type": "cloze", "tags": ["bioquimica_biologia_celular::canais_ionicos::canal_acetilcolina", "exam::n1", "high_yield", "exam::n1"], "source_span": "A acetilcolina abre a comporta desse canal, formando poro negativamente carregado, com diâmetro de cerca de 0,65 nanômetro", "source_chunk_id": "ca1d03681e38ff3b:4", "explanation": null, "mnemonic": null, "verified": true, "card_id": "2f7cc2fb1a1fa5e3"}, {"front": "A acidose metabólica ocorre quando a proporção HCO3-/CO2 diminui devido a queda no {{c1::HCO3-}}.", "back": "", "type": "cloze", "tags": ["fisiologia_renal::classificação_acidose", "exam::n1", "high_yield", "exam::n1"], "source_span": "Se esta razão diminui devido a uma queda em HC03~, a acidose é denominada acidose metabólica.", "source_chunk_id": "1505b4589c5c5c15:12", "explanation": null, "mnemonic": null, "verified": true, "card_id": "efdd9edbe6565679"}, {"front": "A acidose metabólica ocorre quando a razão HCO3-/CO2 diminui devido a uma queda em {{c1::HCO3-}}.", "back": "", "type": "cloze", "tags": ["subject::fisiologia_renal::acidobásico", "topic::classificação_acidose", "exam::N1", "high_yield", "exam::n1"], "source_span": "Se esta razão diminui devido a uma queda em HC03~, a acidose é denominada acidose metabólica.", "source_chunk_id": "f8d97a9f5383249e:12", "explanation": null, "mnemonic": null, "verified": true, "card_id": "4de7ba4a8ad423b1"}, {"front": "A acidose metabólica por diarreia pode ser especialmente grave e levar ao óbito, principalmente em {{c1::crianças}}.", "back": "", "type": "cloze", "tags": ["bioquimica::acidobásico::acidose_metabólica", "exam::n1", "high_yield", "exam::n1"], "source_span": "Essa forma de acidose metabólica pode ser particularmente grave e pode levar ao óbito, especialmente em crianças", "source_chunk_id": "1505b4589c5c5c15:15", "explanation": null, "mnemonic": null, "verified": true, "card_id": "905a9510eab402db"}, {"front": "A acidose metabólica por diarreia pode ser especialmente grave em {{c1::crianças}}, podendo levar ao óbito.", "back": "", "type": "cloze", "tags": ["fisiologia::acidobásico::acidose_metabólica", "exam::n1", "high_yield", "exam::n1"], "source_span": "Essa forma de acidose metabólica pode ser particularmente grave e pode levar ao óbito, especialmente em crianças", "source_chunk_id": "f8d97a9f5383249e:14", "explanation": null, "mnemonic": null, "verified": true, "card_id": "29da71f1a41fc320"}, {"front": "A acidose metabólica por diarréia pode ser especialmente grave e levar ao óbito, especialmente em {{c1::crianças}}.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acido_base::acidose_metabolica", "exam::n1", "high_yield", "exam::n1"], "source_span": "Essa forma de acidose metabólica pode ser particularmente grave e pode levar ao óbito, especialmente em crianças", "source_chunk_id": "f8d97a9f5383249e:15", "explanation": null, "mnemonic": null, "verified": true, "card_id": "de23cca27d43c077"}, {"front": "A acidose respiratória ocorre por {{c1::retenção de CO2}}.", "back": "", "type": "cloze", "tags": ["subject::bioquimica::equilibrio_acido_base", "exam::n1", "high_yield", "exam::n1"], "source_span": "AcidoseRespiratória: retençãode CO2", "source_chunk_id": "49ed06ff34adc89d:18", "explanation": null, "mnemonic": null, "verified": false, "card_id": "5781edeab9a220dd"}, {"front": "A acidose respiratória ocorre quando o pH cai por causa de aumento na {{c1::PCO2}}.", "back": "", "type": "cloze", "tags": ["subject::fisiologia_renal::acidobásico", "topic::classificação_acidose", "exam::N1", "high_yield", "exam::n1"], "source_span": "Se o pH cai por causa de um aumento na Pco2, a acidose é denominada acidose respiratória.", "source_chunk_id": "f8d97a9f5383249e:12", "explanation": null, "mnemonic": null, "verified": true, "card_id": "21d3b9c6203e27ba"}, {"front": "A acidose respiratória ocorre quando o pH cai por causa de aumento na {{c1::PCO2}}.", "back": "", "type": "cloze", "tags": ["fisiologia_renal::classificação_acidose", "exam::n1", "high_yield", "exam::n1"], "source_span": "Se o pH cai por causa de um aumento na Pco2, a acidose é denominada acidose respiratória.", "source_chunk_id": "1505b4589c5c5c15:12", "explanation": null, "mnemonic": null, "verified": true, "card_id": "21d3b9c6203e27ba"}, {"front": "A acidose respiratória é causada por {{c1::retenção de CO2}}.", "back": "", "type": "cloze", "tags": ["gasometria::acidose_respiratoria::mecanismo", "exam::n1", "high_yield", "exam::n1"], "source_span": "AcidoseRespiratória: retençãode CO2", "source_chunk_id": "0d58a2246d9c0f12:18", "explanation": null, "mnemonic": null, "verified": true, "card_id": "96f8f09f92d85a7f"}, {"front": "A acidose respiratória é causada primariamente por {{c1::hipoventilação}}.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acido_base::acidose_respiratoria", "exam::n1", "high_yield", "exam::n1"], "source_span": "Causas de Acidose Respiratória: Hipoventilação", "source_chunk_id": "51723ae60ff2d9cb:8", "explanation": null, "mnemonic": null, "verified": true, "card_id": "f13a409e018cae0d"}, {"front": "A acidose respiratória é gerada pelo mecanismo de {{c1::hipoventilação}}.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acido_base::acidose_respiratoria", "exam::n1", "high_yield", "exam::n1"], "source_span": "Hipoventilação", "source_chunk_id": "49ed06ff34adc89d:10", "explanation": "A hipoventilação reduz a eliminação de CO₂, elevando a pCO₂ e diminuindo o pH.", "mnemonic": null, "verified": false, "card_id": "c2d409fef9c977b5"}, {"front": "A acidose tubular renal causa acidose metabólica por {{c1::perda de bicarbonato}}.", "back": "", "type": "cloze", "tags": ["bioquímica::acidose_metabólica::causas", "exam::n1", "high_yield", "exam::n1"], "source_span": "Perda de bicarbonato:•Acidose tubular renal", "source_chunk_id": "51723ae60ff2d9cb:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "08295696188855d1"}, {"front": "A acidose tubular renal resulta de defeito na {{c1::secreção renal de H+}} ou na {{c2::reabsorção de HCO3-}}.", "back": "", "type": "cloze", "tags": ["fisiologia::acidobásico::acidose_tubular_renal", "exam::n1", "high_yield", "exam::n1"], "source_span": "Esse tipo de acidose resulta de defeito na secreção renal de H+ ou na reabsorção de HCO3 ou de ambos", "source_chunk_id": "f8d97a9f5383249e:14", "explanation": null, "mnemonic": null, "verified": true, "card_id": "006b1805f3853e0d"}, {"front": "A acidose tubular renal resulta de defeito na {{c1::secreção renal de H+}} ou na {{c2::reabsorção de HCO3-}}.", "back": "", "type": "cloze", "tags": ["bioquimica::acidobásico::acidose_tubular_renal", "exam::n1", "high_yield", "exam::n1"], "source_span": "Esse tipo de acidose resulta de defeito na secreção renal de H+ ou na reabsorção de HCO3 ou de ambos", "source_chunk_id": "1505b4589c5c5c15:14", "explanation": null, "mnemonic": null, "verified": true, "card_id": "006b1805f3853e0d"}, {"front": "A adenilato-ciclase produz qual segundo mensageiro intracelular?", "back": "cAMP (adenosina monofosfato cíclico).", "type": "basic", "tags": ["bioquimica::enzimas_de_membrana::adenilato_ciclase", "exam::n1", "high_yield", "exam::n1"], "source_span": "Catalisa a produção intracelular de cAMP em resposta a sinais extracelulares", "source_chunk_id": "36f2ff3a2cd3fb54:2", "explanation": "O cAMP atua como segundo mensageiro amplificando sinais extracelulares no interior da célula.", "mnemonic": null, "verified": true, "card_id": "8373346f5ac23e1c"}, {"front": "A adição de NaCl ao líquido extracelular causa difusão de água da célula para o {{c1::líquido extracelular}}.", "back": "", "type": "cloze", "tags": ["bioquimica::osmose::nacl", "exam::n1", "high_yield", "exam::n1"], "source_span": "se o soluto como por exemplo o cloreto de sódio for adicionado ao líquido extracelular, rapidamente ocorrerá difusão de água através da membrana celular, da célula para o líquido extracelular", "source_chunk_id": "7045a5149a0b780c:6", "explanation": null, "mnemonic": null, "verified": true, "card_id": "b50dbe71e6c8a86a"}, {"front": "A adição de NaOH ao tampão bicarbonato tende a {{c1::diminuir}} os níveis de CO2 no sangue, {{c2::inibindo}} a respiração.", "back": "", "type": "cloze", "tags": ["bioquímica::tampão_bicarbonato", "exam::n1", "high_yield", "exam::n1"], "source_span": "resultado efetivo, portanto, é tendência dos níveis de C02 no sangue diminuírem, mas a diminuição de CO2 no sangue inibe a respiração", "source_chunk_id": "1505b4589c5c5c15:2", "explanation": "A base consome H⁺, deslocando o equilíbrio para consumir CO2, reduzindo o estímulo respiratório.", "mnemonic": null, "verified": true, "card_id": "410eda1aa88f2e76"}, {"front": "A adição de solução hipertônica ao líquido extracelular {{c1::aumenta}} a osmolaridade extracelular.", "back": "", "type": "cloze", "tags": ["bioquimica::liquidos_corporais::solucoes_hipertonicas", "exam::n1", "high_yield", "exam::n1"], "source_span": "se solução hipertônica é adicionada ao líquido extracelular, a osmolaridade extracelular aumenta", "source_chunk_id": "7045a5149a0b780c:9", "explanation": null, "mnemonic": null, "verified": true, "card_id": "a8ee417110f77f1d"}, {"front": "A adição de solução salina isotônica ao compartimento extracelular causa apenas aumento no volume do {{c1::líquido extracelular}}, sem osmose.", "back": "", "type": "cloze", "tags": ["bioquimica::tonicidade::isotonica", "exam::n1", "high_yield", "exam::n1"], "source_span": "não ocorre osmose através das membranas celulares. O único efeito é o aumento no volume do líquido extracelular", "source_chunk_id": "7045a5149a0b780c:9", "explanation": "Como a osmolaridade não muda, não há gradiente para mover água entre compartimentos.", "mnemonic": null, "verified": true, "card_id": "df5cb869def539ed"}, {"front": "A adição de solução salina isotônica ao compartimento extracelular {{c1::não altera}} a osmolaridade extracelular.", "back": "", "type": "cloze", "tags": ["bioquimica::tonicidade::isotonica", "exam::n1", "high_yield", "exam::n1"], "source_span": "se solução salina isotônica for adicionada ao compartimento de líquido extracelular, a osmolaridade do líquido extracelular não se altera", "source_chunk_id": "7045a5149a0b780c:9", "explanation": null, "mnemonic": null, "verified": true, "card_id": "faff1c5e0eb9cd73"}, {"front": "A adição de solução {{c1::hipotônica}} ao líquido extracelular aumenta tanto o volume intracelular quanto o extracelular, com maior aumento no intracelular.", "back": "", "type": "cloze", "tags": ["bioquimica::liquidos_corporais::solucoes_hipotonicas", "exam::n1", "high_yield", "exam::n1"], "source_span": "Ambos os volumes, intracelular e extracelular, aumentam quando se adiciona líquido hipotônico, embora o volume intracelular aumente em maior grau", "source_chunk_id": "7045a5149a0b780c:10", "explanation": null, "mnemonic": null, "verified": true, "card_id": "53f6db408d74f422"}, {"front": "A afidicolina inibe a DNA polimerase alfa por meio de ligação {{c1::competitiva}} no {{c2::sítio ativo}} da enzima.", "back": "", "type": "cloze", "tags": ["bioquimica::replicacao_dna::afidicolina", "exam::n1", "high_yield", "exam::n1"], "source_span": "caracterizado pela sua capacidade de perturbar a atividade da enzima através de uma ligação competitiva no sítio ativo", "source_chunk_id": "c45346871801c1b5:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "821a1a102acdeb08"}, {"front": "A afidicolina é um inibidor seletivo da {{c1::DNA polimerase alfa}}.", "back": "", "type": "cloze", "tags": ["bioquimica::replicacao_dna::afidicolina", "exam::n1", "high_yield", "exam::n1"], "source_span": "fármaco afidicolina funciona como um inibidor seletivo da DNA polimerase a (alfa)", "source_chunk_id": "c45346871801c1b5:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "0fc9316355a5f7fc"}, {"front": "A albumina constitui até {{c1::dois terços}} do conteúdo plasmático total de proteínas.", "back": "", "type": "cloze", "tags": ["bioquímica::proteínas_plasmáticas::albumina", "exam::n1", "high_yield", "exam::n1"], "source_span": "É a proteína isolada mais abundante no plasma normal e, usualmente, constitui até dois terços do conteúdo plasmático total de proteínas.", "source_chunk_id": "573375214164280b:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "684ed8624ea5f27b"}, {"front": "A albumina constitui até {{c1::dois terços}} do conteúdo plasmático total de proteínas.", "back": "", "type": "cloze", "tags": ["bioquimica::proteinas::albumina", "exam::n1", "high_yield", "exam::n1"], "source_span": "usualmente, constitui até dois terços do conteúdo plasmático total de proteínas.", "source_chunk_id": "573375214164280b:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "684ed8624ea5f27b"}, {"front": "A albumina é a principal proteína plasmática e é produzida pelo {{c1::fígado}}.", "back": "", "type": "cloze", "tags": ["bioquimica::proteinas_plasmaticas::albumina", "exam::n1", "high_yield", "exam::n1"], "source_span": "Principal proteína plasmática ● Produzida pelo fígado", "source_chunk_id": "4039b509b4eccea3:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "9e1357363d5c4c89"}, {"front": "A albumina é a proteína isolada mais abundante no plasma normal, constituindo até {{c1::dois terços}} do conteúdo plasmático total de proteínas.", "back": "", "type": "cloze", "tags": ["bioquimica::albumina", "exam::n1", "high_yield", "exam::n1"], "source_span": "usualmente, constitui até dois terços do conteúdo plasmático total de proteínas.", "source_chunk_id": "cc3cf8e2bfd342c7:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "4fec0444b123f58f"}, {"front": "A alcalose metabólica resulta de excesso de retenção de {{c1::HCO3-}} ou de perda de {{c2::H+}} pelo corpo.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acido_base::alcalose_metabolica", "exam::n1", "high_yield", "exam::n1"], "source_span": "Quando ocorre excesso de retenção de HC03~ ou de perda de H+ pelo corpo, aparece a alcalose metabólica", "source_chunk_id": "f8d97a9f5383249e:15", "explanation": null, "mnemonic": null, "verified": true, "card_id": "0b48cd1750d54e23"}, {"front": "A alcalose metabólica resulta de excesso de retenção de {{c1::HCO3-}} ou de perda de {{c2::H+}} pelo corpo.", "back": "", "type": "cloze", "tags": ["bioquimica::alcalose_metabolica", "exam::n1", "high_yield", "exam::n1"], "source_span": "Quando ocorre excesso de retenção de HC03~ ou de perda de H+ pelo corpo, aparece a alcalose metabólica", "source_chunk_id": "1505b4589c5c5c15:15", "explanation": null, "mnemonic": null, "verified": true, "card_id": "0b48cd1750d54e23"}, {"front": "A alcalose respiratória ocorre por {{c1::hiperventilação}} e excreção aumentada de CO2.", "back": "", "type": "cloze", "tags": ["subject::bioquimica::equilibrio_acido_base", "exam::n1", "high_yield", "exam::n1"], "source_span": "AlcaloseRespiratória: hiperventilaçãoe excreçãoaumentadade CO2", "source_chunk_id": "49ed06ff34adc89d:18", "explanation": null, "mnemonic": null, "verified": false, "card_id": "8e999b5ab12565af"}, {"front": "A alcalose respiratória é causada por diminuição da PCO2 plasmática por {{c1::hiperventilação}}.", "back": "", "type": "cloze", "tags": ["fisiologia_renal::alcalose_respiratória", "exam::n1", "high_yield", "exam::n1"], "source_span": "A causa da alcalose é a diminuição da Pco2 plasmática causada por hiperventilação", "source_chunk_id": "1505b4589c5c5c15:13", "explanation": null, "mnemonic": null, "verified": true, "card_id": "d31e819c7d19dd2f"}, {"front": "A alcalose respiratória é causada por {{c1::hiperventilação}} e excreção aumentada de CO2.", "back": "", "type": "cloze", "tags": ["bioquimica::gasometria::alcalose_respiratoria", "exam::n1", "high_yield", "exam::n1"], "source_span": "Alcalose Respiratória: hiperventilação e excreção aumentada de CO2", "source_chunk_id": "0d58a2246d9c0f12:21", "explanation": null, "mnemonic": null, "verified": true, "card_id": "90db874ac121921a"}, {"front": "A alcalose respiratória é causada por {{c1::hiperventilação}}.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acido_base::alcalose_respiratoria", "exam::n1", "high_yield", "exam::n1"], "source_span": "Alcalose Respiratória: Causas Hiperventilação", "source_chunk_id": "49ed06ff34adc89d:12", "explanation": "A hiperventilação elimina CO₂ em excesso, reduzindo a pCO₂ e elevando o pH.", "mnemonic": null, "verified": false, "card_id": "5e226b38d8ba6421"}, {"front": "A alcalose respiratória é causada por {{c1::ventilação pulmonar excessiva}}.", "back": "", "type": "cloze", "tags": ["fisiologia::acidobásico::alcalose_respiratória", "exam::n1", "high_yield", "exam::n1"], "source_span": "A alcalose respiratória é causada por ventilação pulmonar excessiva", "source_chunk_id": "f8d97a9f5383249e:14", "explanation": null, "mnemonic": null, "verified": true, "card_id": "085b560ca7f40b75"}, {"front": "A alcalose respiratória é causada por {{c1::ventilação pulmonar excessiva}}.", "back": "", "type": "cloze", "tags": ["bioquimica::acidobásico::alcalose_respiratória", "exam::n1", "high_yield", "exam::n1"], "source_span": "A alcalose respiratória é causada por ventilação pulmonar excessiva", "source_chunk_id": "1505b4589c5c5c15:14", "explanation": null, "mnemonic": null, "verified": true, "card_id": "085b560ca7f40b75"}, {"front": "A aldosterona estimula a secreção de H+ pelas células {{c1::intercaladas}} do ducto coletor.", "back": "", "type": "cloze", "tags": ["subject::fisiologia_renal::acidobásico", "topic::regulação_aldosterona", "exam::N1", "high_yield", "exam::n1"], "source_span": "A aldosterona estimula a secreção de H+ pelas células intercaladas do dueto coletor.", "source_chunk_id": "f8d97a9f5383249e:12", "explanation": null, "mnemonic": null, "verified": true, "card_id": "7716d7be5d9e8804"}, {"front": "A aldosterona estimula a secreção de H+ pelas células {{c1::intercaladas}} do ducto coletor.", "back": "", "type": "cloze", "tags": ["subject::bioquimica::equilibrio_acido_base", "topic::regulacao_acidobasica_renal", "exam::N1", "high_yield", "exam::n1"], "source_span": "A aldosterona estimula a secreção de H+ pelas células intercaladas do dueto coletor.", "source_chunk_id": "1505b4589c5c5c15:12", "explanation": null, "mnemonic": null, "verified": true, "card_id": "7716d7be5d9e8804"}, {"front": "A aldosterona estimula a secreção de H+ pelas células {{c1::intercaladas}} dos túbulos coletores.", "back": "", "type": "cloze", "tags": ["bioquimica::alcalose_metabolica::aldosterona", "exam::n1", "high_yield", "exam::n1"], "source_span": "estimulando também a secreção de H+ pelas células intercaladas dos túbulos coletores", "source_chunk_id": "1505b4589c5c5c15:16", "explanation": null, "mnemonic": null, "verified": true, "card_id": "c3f2b6028481e546"}, {"front": "A aldosterona estimula a secreção de H+ pelas {{c1::células intercaladas}} dos túbulos coletores.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acido_base::alcalose_metabolica::aldosterona", "exam::n1", "high_yield", "exam::n1"], "source_span": "estimulando também a secreção de H+ pelas células intercaladas dos túbulos coletores", "source_chunk_id": "f8d97a9f5383249e:16", "explanation": null, "mnemonic": null, "verified": true, "card_id": "454e68a3af169806"}, {"front": "A alfa-1-antitripsina corresponde a {{c1::90%}} do pico normal de alfa-1-globulina.", "back": "", "type": "cloze", "tags": ["bioquimica::alfa1_antitripsina", "exam::n1", "high_yield", "exam::n1"], "source_span": "A alfa-1-antitripsina corresponde a 90% do pico normal de alfa-1-globulina", "source_chunk_id": "607be99c1c035ac3:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "393730e05aed8b2e"}, {"front": "A alfa-1-antitripsina é codificada por dois alelos co-dominantes denominados {{c1::M}} e {{c2::Z}}.", "back": "", "type": "cloze", "tags": ["bioquimica::alfa1_antitripsina::genetica", "exam::n1", "high_yield", "exam::n1"], "source_span": "codificada por dois alelos co-dominantes denominados M (mais comum) e Z", "source_chunk_id": "607be99c1c035ac3:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "8f43ede78e0094ad"}, {"front": "A alteração conformacional da proteína cotransportadora Na⁺-glicose só ocorre quando {{c1::ambos (Na⁺ e glicose)}} estão ligados à proteína.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte_ativo_secundario::cotransporte_glicose", "exam::n1", "high_yield", "exam::n1"], "source_span": "a alteração conformacional, para permitir que o sódio se movimente para o interior, não ocorre até que a molécula da glicose também se ligue", "source_chunk_id": "ca1d03681e38ff3b:11", "explanation": "Mecanismo de segurança: garante que glicose só entre quando Na⁺ também estiver presente para fornecer energia.", "mnemonic": null, "verified": true, "card_id": "c5947e5efb5ad225"}, {"front": "A amilase está presente na glândula salivar e no {{c1::pâncreas}}, enquanto a lipase é encontrada apenas no {{c2::pâncreas}}.", "back": "", "type": "cloze", "tags": ["subject::bioquímica::enzimas_digestivas", "exam::n1", "high_yield", "exam::n1"], "source_span": "amilase tem na glândula salivar", "source_chunk_id": "56d0a30d83e5310f:3", "explanation": null, "mnemonic": null, "verified": false, "card_id": "38fb7f24c2009c68"}, {"front": "A amilase medeia a quebra do {{c1::amido}}, iniciando a digestão dos {{c2::carboidratos}}.", "back": "", "type": "cloze", "tags": ["bioquímica::enzimas::amilase", "exam::n1", "high_yield", "exam::n1"], "source_span": "Ela medeia a quebra do amido como iniciação da digestão dos carboidratos", "source_chunk_id": "5a1fb13ebefda48c:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "2179430728e8df00"}, {"front": "A amilase salivar (ptialina) é secretada principalmente pelas glândulas {{c1::parótidas}}.", "back": "", "type": "cloze", "tags": ["bioquimica::amilase_salivar", "exam::n1", "high_yield", "exam::n1"], "source_span": "amilase salivar (ou ptialina), secretada principalmente pelas glândulas parótidas", "source_chunk_id": "974d1da0e2adca02:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "9cca6681a5256fd7"}, {"front": "A amilase salivar hidrolisa o amido em dissacarídeo {{c1::maltose}} e pequenos polímeros de glicose.", "back": "", "type": "cloze", "tags": ["bioquimica::amilase_salivar", "exam::n1", "high_yield", "exam::n1"], "source_span": "Essa enzima hidrolisa o amido em dissacarídeo maltose e em outros pequenos polímeros de glicose", "source_chunk_id": "974d1da0e2adca02:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "0930e81e94a2a407"}, {"front": "A amilase salivar inicia a quebra de {{c1::amido}} na boca.", "back": "", "type": "cloze", "tags": ["bioquímica::digestão_carboidratos", "exam::n1", "high_yield", "exam::n1"], "source_span": "amilase salivar, que inicia a quebra do amido", "source_chunk_id": "e07c53735f89e95b:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "2d4c1b40fa769814"}, {"front": "A amilase salivar produz {{c1::oligossacarídeos}} a partir dos polissacarídeos da dieta.", "back": "", "type": "cloze", "tags": ["bioquimica::carboidratos::digestao", "exam::n1", "high_yield", "exam::n1"], "source_span": "A amilase salivar atua sobre os polissacarídeos da dieta, produzindo oligossacarídeos", "source_chunk_id": "c34e55e9c0c0df3e:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "f54e32dfd7445112"}, {"front": "A amilase salivar é essencialmente inativada quando o pH cai abaixo de cerca de {{c1::4}}.", "back": "", "type": "cloze", "tags": ["bioquímica::cinética_enzimática", "exam::n1", "high_yield", "exam::n1"], "source_span": "a amilase é essencialmente inativada como enzima, uma vez que o pH do meio cai abaixo de cerca de 4", "source_chunk_id": "974d1da0e2adca02:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "c9d2107918e31505"}, {"front": "A amilase salivar é secretada pelas glândulas salivares sob estímulo {{c1::simpático}}.", "back": "", "type": "cloze", "tags": ["bioquímica::enzimas::amilase", "exam::n1", "high_yield", "exam::n1"], "source_span": "secretada pelas glândulas salivares sob estímulo simpático", "source_chunk_id": "5a1fb13ebefda48c:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "8ebe17ea9f767221"}, {"front": "A amilina inibe a secreção de {{c1::insulina}}.", "back": "", "type": "cloze", "tags": ["bioquimica::pancreas::regulacao_hormonal", "exam::n1", "high_yield", "exam::n1"], "source_span": "a amilina inibe a secreção de insulina", "source_chunk_id": "76cae3be4bc84980:0", "explanation": "A amilina, co-secretada pelas células beta, exerce retroalimentação negativa sobre a própria secreção de insulina.", "mnemonic": null, "verified": true, "card_id": "ef9892fefce3c64c"}, {"front": "A anemia falciforme causa {{c1::hemólise intravascular}}, adesão celular e oclusão vascular.", "back": "", "type": "cloze", "tags": ["bioquímica::anemia_falciforme", "exam::n1", "high_yield", "exam::n1"], "source_span": "polimerização e despolimerização repetidas da hemoglobina resultando em hemólise intravascular, adesão celular, oclusão vascular", "source_chunk_id": "2c7a6c02c6525261:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "dab067862223e9cb"}, {"front": "A anemia falciforme é a hemoglobinopatia monogênica {{c1::mais grave}}.", "back": "", "type": "cloze", "tags": ["bioquímica::hemoglobinopatias::anemia_falciforme", "exam::n1", "high_yield", "exam::n1"], "source_span": "A anemia falciforme é a hemoglobinopatia monogênica mais grave", "source_chunk_id": "30a0c307d98d50fe:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "9e222282150e6962"}, {"front": "A anemia falciforme é a hemoglobinopatia {{c1::monogênica}} mais grave.", "back": "", "type": "cloze", "tags": ["bioquímica::anemia_falciforme", "exam::n1", "high_yield", "exam::n1"], "source_span": "A anemia falciforme é a hemoglobinopatia monogênica mais grave", "source_chunk_id": "2c7a6c02c6525261:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "650d396a07c3e11a"}, {"front": "A anemia falciforme é causada pela {{c1::substituição de um resíduo de aminoácido}} na hemoglobina.", "back": "", "type": "cloze", "tags": ["bioquímica::hemoglobina::anemia_falciforme", "exam::n1", "high_yield", "exam::n1"], "source_span": "anemia falciforme é uma doença genética causada pela alteração na estrutura terciária da proteína, onde há a substituição de um resíduo de aminoácido.", "source_chunk_id": "2c7a6c02c6525261:2", "explanation": "A substituição altera a estrutura terciária da hemoglobina, comprometendo sua função.", "mnemonic": null, "verified": true, "card_id": "a50b902f50d12709"}, {"front": "A anemia ferropriva resulta da falta de {{c1::ferro}} necessário para a {{c2::hemoglobina}}.", "back": "", "type": "cloze", "tags": ["bioquímica::proteínas::anemia_ferropriva", "exam::n1", "high_yield", "exam::n1"], "source_span": "Anemias ferroprivas, falta de ferro.", "source_chunk_id": "c4ba34e1626d7685:0", "explanation": null, "mnemonic": null, "verified": false, "card_id": "401246f12fbbfaeb"}, {"front": "A angiotensina II exerce vasoconstrição preferencial nas arteríolas {{c1::eferentes}} do glomérulo renal.", "back": "", "type": "cloze", "tags": ["bioquimica::angiotensina_ii", "exam::n1", "high_yield", "exam::n1"], "source_span": "A angiotensina II exerce ação vasoconstritora preferencial nas arteríolas eferentes do glomérulo renal, aumentando a filtração glomerular.", "source_chunk_id": "4c87c63efb158cd1:0", "explanation": "Constrição da eferente aumenta a pressão de filtração glomerular.", "mnemonic": null, "verified": true, "card_id": "62287fdceed5d914"}, {"front": "A anidrase carbônica está presente nas células epiteliais dos {{c1::túbulos renais}}, onde CO2 reage com H2O formando H2CO3.", "back": "", "type": "cloze", "tags": ["bioquímica::anidrase_carbônica", "exam::n1", "high_yield", "exam::n1"], "source_span": "a anidrase carbônica está presente, ainda, nas células epiteliais dos túbulos renais, onde o CO2 reage com H2O, formando H2CO3", "source_chunk_id": "1505b4589c5c5c15:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "5677e23af761c3fc"}, {"front": "A anidrase carbônica é especialmente abundante nas paredes dos {{c1::alvéolos pulmonares}}.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acidobasico::anidrase_carbonica", "exam::n1", "high_yield", "exam::n1"], "source_span": "Esta enzima é especialmente abundante nas paredes dos alvéolos pulmonares, onde o CO2 é liberado", "source_chunk_id": "f8d97a9f5383249e:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "add9b85082f41e34"}, {"front": "A anormalidade mensurável mais precoce nos vasos que se tornam ateroscleróticos é a {{c1::lesão do endotélio vascular}}.", "back": "", "type": "cloze", "tags": ["bioquimica::aterosclerose", "exam::n1", "high_yield", "exam::n1"], "source_span": "Anormalidade que pode ser medida muito cedo, nos vasos sanguíneos, que posteriormente se tornam ateroscleróticos, é a lesão do endotélio vascular", "source_chunk_id": "8405ad39f361404f:12", "explanation": null, "mnemonic": null, "verified": true, "card_id": "2fcba645386f9382"}, {"front": "A antipirina distribui-se uniformemente pelos compartimentos intracelular e extracelular porque é {{c1::altamente lipossolúvel}}.", "back": "", "type": "cloze", "tags": ["bioquimica::liquidos_corporais::agua_total::antipirina", "exam::n1", "high_yield", "exam::n1"], "source_span": "antipirina, que é altamente lipossolúvel e pode rapidamente se difundir pelas membranas celulares e se distribuir uniformemente pelos compartimentos intracelulares e extracelulares", "source_chunk_id": "7045a5149a0b780c:4", "explanation": null, "mnemonic": null, "verified": true, "card_id": "cb5e573ccf90c9f3"}, {"front": "A análise proteogenômica permitiu descobrir regiões codificadoras novas, incluindo {{c1::pseudogenes traduzidos}}, {{c2::RNAs não codificantes}} e {{c3::quadros de leitura abertos a montante}}.", "back": "", "type": "cloze", "tags": ["bioquímica::proteogenômica", "exam::n1", "high_yield", "exam::n1"], "source_span": "discover a number of novel protein-coding regions, which includes translated pseudogenes, non-coding RNAs and upstream open reading frames", "source_chunk_id": "b678350d1f36470c:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "24e1c9d51e14e264"}, {"front": "A apolipoproteína estrutural característica dos quilomícrons é a {{c1::ApoB-48}}.", "back": "", "type": "cloze", "tags": ["bioquimica::lipoproteinas::quilomicron", "exam::n1", "high_yield", "exam::n1"], "source_span": "A apolipoproteína estrutural característica dos quilomícrons é: c) ApoB-48.", "source_chunk_id": "5fb85c2e0ca8d9fb:7", "explanation": null, "mnemonic": "Quilomícron = ApoB-48 (intestino produz versão menor, 48%)", "verified": true, "card_id": "9a40f50d44fa16a5"}, {"front": "A apolipoproteína {{c1::ApoB-48}} é fundamental para a secreção e estabilidade do quilomícron.", "back": "", "type": "cloze", "tags": ["bioquímica::lipídeos::quilomícrons::apolipoproteínas", "exam::n1", "high_yield", "exam::n1"], "source_span": "Essa partícula adquire apolipoproteína B-48 (ApoB-48), fundamental para sua secreção e estabilidade.", "source_chunk_id": "349053d639a3f6a1:0", "explanation": null, "mnemonic": "ApoB-48 = intestino (48% do gene ApoB); ApoB-100 = fígado (100% do gene).", "verified": true, "card_id": "bdb322c9cdccc17d"}, {"front": "A apoptose extrínseca é mediada pela caspase-{{c1::8}}.", "back": "", "type": "cloze", "tags": ["bioquimica::apoptose::extrínseca", "exam::n1", "high_yield", "exam::n1"], "source_span": "Apoptose extrínseca mediada por caspase-8.", "source_chunk_id": "c45346871801c1b5:2", "explanation": null, "mnemonic": "Extrínseca = 8 (E vira 8 de fora)", "verified": true, "card_id": "589942defa3bd5c2"}, {"front": "A apoptose intrínseca envolve liberação de {{c1::citocromo c}} pela mitocôndria, ativando caspase-{{c2::9}}.", "back": "", "type": "cloze", "tags": ["bioquimica::apoptose::intrínseca", "exam::n1", "high_yield", "exam::n1"], "source_span": "Liberação de citocromo c pela mitocôndria, ativando caspase-9.", "source_chunk_id": "c45346871801c1b5:2", "explanation": null, "mnemonic": "Intrínseca = 9 (mitocôndria = dentro = 9)", "verified": true, "card_id": "80a69be76bbff22c"}, {"front": "A ascite resulta dos efeitos combinados de {{c1::redução da concentração de proteínas plasmáticas}} e {{c2::alta pressão no sistema porta hepático}}.", "back": "", "type": "cloze", "tags": ["fisiologia::ascite", "exam::n1", "high_yield", "exam::n1"], "source_span": "efeitos combinados da redução da concentração de proteínas plasmáticas e da alta pressão no sistema porta hepático", "source_chunk_id": "7045a5149a0b780c:15", "explanation": null, "mnemonic": null, "verified": true, "card_id": "1249eaeacf7b0852"}, {"front": "A aspirina (ácido acetilsalicílico) é exemplo de inibidor enzimático {{c1::irreversível}}.", "back": "", "type": "cloze", "tags": ["bioquímica::enzimas::inibidores", "farmacologia::aspirina", "exam::n1", "high_yield", "exam::n1"], "source_span": "A aspirina, ácido acetilsalicílico.", "source_chunk_id": "c4ba34e1626d7685:2", "explanation": null, "mnemonic": null, "verified": false, "card_id": "520f4c30ff0706d8"}, {"front": "A aspirina inativa a COX transferindo um grupo {{c1::acetil}} para um resíduo de {{c2::serina}} no sítio ativo.", "back": "", "type": "cloze", "tags": ["bioquímica::inibição_enzimática::aspirina", "exam::n1", "high_yield", "exam::n1"], "source_span": "A aspirina inativa a enzima transferindo um grupo acetil para um resíduo de serina no sítio ativo", "source_chunk_id": "974d1da0e2adca02:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "e5d2d15bafd9c4ea"}, {"front": "A aterosclerose acomete principalmente a camada {{c1::íntima}} de artérias de {{c2::médio e grande calibres}}.", "back": "", "type": "cloze", "tags": ["bioquimica::aterosclerose", "exam::n1", "high_yield", "exam::n1"], "source_span": "acometendo principalmente a camada íntima de artérias de médio e grande calibres", "source_chunk_id": "34c7cf2f0d9ce0b6:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "19753afb6cd90b8a"}, {"front": "A aterosclerose acomete principalmente a camada {{c1::íntima}} de artérias de {{c2::médio e grande calibres}}.", "back": "", "type": "cloze", "tags": ["bioquimica::aterosclerose", "exam::n1", "high_yield", "exam::n1"], "source_span": "acometendo principalmente a camada íntima de artérias de médio e grande calibres", "source_chunk_id": "72ac6c23532e77b9:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "19753afb6cd90b8a"}, {"front": "A aterosclerose em geral é fatal quando afeta as artérias do {{c1::coração}} ou do {{c2::cérebro}}.", "back": "", "type": "cloze", "tags": ["bioquimica::aterosclerose", "exam::n1", "high_yield", "exam::n1"], "source_span": "A aterosclerose em geral é fatal quando afeta as artérias do coração ou do cérebro", "source_chunk_id": "7a9a020e6dd7dad4:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "0d09e804cb125abd"}, {"front": "A aterosclerose ocorre em resposta à agressão {{c1::endotelial}}, acometendo principalmente a camada {{c2::íntima}} de artérias de médio e grande calibres.", "back": "", "type": "cloze", "tags": ["bioquimica::aterosclerose", "exam::n1", "high_yield", "exam::n1"], "source_span": "ocorre em resposta à agressão endotelial, acometendo principalmente a camada íntima de artérias de médio e grande calibres", "source_chunk_id": "7a9a020e6dd7dad4:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "214d0c858ec627dd"}, {"front": "A aterosclerose ocorre em resposta à {{c1::agressão endotelial}}.", "back": "", "type": "cloze", "tags": ["bioquimica::aterosclerose", "exam::n1", "high_yield", "exam::n1"], "source_span": "que ocorre em resposta à agressão endotelial", "source_chunk_id": "34c7cf2f0d9ce0b6:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "2fd99a1a9c8f4227"}, {"front": "A aterosclerose pode se manifestar subitamente como dor torácica, {{c1::infarto agudo do miocárdio}} ou morte súbita.", "back": "", "type": "cloze", "tags": ["bioquímica::aterosclerose", "exam::n1", "high_yield", "exam::n1"], "source_span": "subitamente, pode se manifestar através de dor torácica, infarto agudo do miocárdio ou morte súbita", "source_chunk_id": "a7967b3e1d8a9cfe:0", "explanation": null, "mnemonic": null, "verified": false, "card_id": "1d01bb40c446f94f"}, {"front": "A aterosclerose é fatal quando afeta as artérias do {{c1::coração}} ou do {{c2::cérebro}}.", "back": "", "type": "cloze", "tags": ["bioquimica::aterosclerose", "exam::n1", "high_yield", "exam::n1"], "source_span": "A aterosclerose em geral é fatal quando afeta as artérias do coração ou do cérebro", "source_chunk_id": "34c7cf2f0d9ce0b6:1", "explanation": "Coração e cérebro resistem apenas poucos minutos sem oxigênio, tornando a isquemia rapidamente letal.", "mnemonic": null, "verified": true, "card_id": "eae9c42ec7b790e5"}, {"front": "A aterosclerose é geralmente fatal quando afeta as artérias do {{c1::coração}} ou do {{c2::cérebro}}.", "back": "", "type": "cloze", "tags": ["bioquimica::aterosclerose", "exam::n1", "high_yield", "exam::n1"], "source_span": "A aterosclerose em geral é fatal quando afeta as artérias do coração ou do cérebro", "source_chunk_id": "72ac6c23532e77b9:2", "explanation": "Coração e cérebro resistem apenas poucos minutos sem oxigênio.", "mnemonic": null, "verified": true, "card_id": "54233a6fc65c4a2b"}, {"front": "A aterosclerose é um processo {{c1::silente}} que pode permanecer sem manifestação por décadas.", "back": "", "type": "cloze", "tags": ["bioquímica::aterosclerose", "exam::n1", "high_yield", "exam::n1"], "source_span": "ela é um processo silente. Está ativa em todos os indivíduos, permanece sem qualquer manifestação por décadas", "source_chunk_id": "a7967b3e1d8a9cfe:0", "explanation": null, "mnemonic": null, "verified": false, "card_id": "ea8a2f9536d6029d"}, {"front": "A aterosclerose é uma doença {{c1::inflamatória crônica}} de origem {{c2::multifatorial}}.", "back": "", "type": "cloze", "tags": ["bioquimica::aterosclerose", "exam::n1", "high_yield", "exam::n1"], "source_span": "A aterosclerose é uma doença inflamatória crônica de origem multifatorial", "source_chunk_id": "34c7cf2f0d9ce0b6:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "25b3eaf295e31392"}, {"front": "A aterosclerose é uma doença {{c1::inflamatória crônica}} de origem {{c2::multifatorial}}.", "back": "", "type": "cloze", "tags": ["bioquimica::aterosclerose", "exam::n1", "high_yield", "exam::n1"], "source_span": "A aterosclerose é uma doença inflamatória crônica de origem multifatorial", "source_chunk_id": "7a9a020e6dd7dad4:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "25b3eaf295e31392"}, {"front": "A aterosclerose é uma doença {{c1::inflamatória crônica}} de origem {{c2::multifatorial}}.", "back": "", "type": "cloze", "tags": ["bioquimica::aterosclerose", "exam::n1", "high_yield", "exam::n1"], "source_span": "A aterosclerose é uma doença inflamatória crônica de origem multifatorial que ocorre em resposta à agressão endotelial", "source_chunk_id": "72ac6c23532e77b9:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "25b3eaf295e31392"}, {"front": "A ativação de SREBP dependente de mTORC1 aumenta o fluxo pela via {{c1::oxidativa das pentoses fosfato (PPP)}}.", "back": "", "type": "cloze", "tags": ["bioquímica::mtor::ppp", "exam::n1", "high_yield", "exam::n1"], "source_span": "mTORC1-dependent activation of SREBP leads to increased flux through the oxidative pentose phosphate pathway (PPP)", "source_chunk_id": "3a7a538a2984b6e2:9", "explanation": null, "mnemonic": null, "verified": true, "card_id": "41cbf8b895b2a297"}, {"front": "A ativação de micróglia e astrócitos por Aβ e tau aumenta a produção de {{c1::citocinas inflamatórias}} e {{c2::espécies reativas de oxigênio (ROS)}}.", "back": "", "type": "cloze", "tags": ["bioquimica::neuroinflamacao::estresse_oxidativo", "exam::n1", "high_yield", "exam::n1"], "source_span": "A presença de Aβ e tau ativa micróglia e astrócitos, aumentando a produção de citocinas inflamatórias e espécies reativas de oxigênio (ROS)", "source_chunk_id": "b678350d1f36470c:12", "explanation": null, "mnemonic": null, "verified": true, "card_id": "471147e66c9e6371"}, {"front": "A ativação inicial da UPR é {{c1::protetora (adaptativa)}}, mas o estresse crônico do RE muda seu perfil para {{c2::pró-apoptótico}}.", "back": "", "type": "cloze", "tags": ["bioquimica::UPR::apoptose", "exam::N1", "high_yield", "exam::n1"], "source_span": "Inicialmente, a ativação da UPR é protetora. Porém, o estresse crônico do RE faz com que a UPR mude de um perfil adaptativo para um perfil pró-apoptótico", "source_chunk_id": "b678350d1f36470c:12", "explanation": null, "mnemonic": null, "verified": true, "card_id": "f0183a76ef1adea3"}, {"front": "A atividade da acetil-CoA carboxilase é acelerada na presença de intermediários do {{c1::ciclo do ácido cítrico}}.", "back": "", "type": "cloze", "tags": ["bioquímica::síntese_ácidos_graxos", "exam::n1", "high_yield", "exam::n1"], "source_span": "cuja atividade é acelerada em presença de intermediários do ciclo do ácido cítrico", "source_chunk_id": "8405ad39f361404f:8", "explanation": "Intermediários do ciclo de Krebs sinalizam abundância energética, estimulando a síntese de ácidos graxos.", "mnemonic": null, "verified": true, "card_id": "265c64c06651b5b2"}, {"front": "A atividade enzimática da papaína é decorrente do radical {{c1::sulfidrila (SH)}} do aminoácido {{c2::cisteína}}.", "back": "", "type": "cloze", "tags": ["bioquímica::papaína", "exam::n1", "high_yield", "exam::n1"], "source_span": "Sua atividade enzimática é decorrente da presença de um radical sulfidrila (SH) pertencente ao aminoácido cisteína.", "source_chunk_id": "a0d536f9d4d5391f:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "5c07ac3ca6ebc385"}, {"front": "A atividade osmolar corrigida do plasma é {{c1::282,0}} mOsm/L.", "back": "", "type": "cloze", "tags": ["bioquímica::osmolaridade", "exam::n1", "high_yield", "exam::n1"], "source_span": "Atividade osmolar corrigida (mOsm/L)282,0 281,0 281,0", "source_chunk_id": "7045a5149a0b780c:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "e66496d423ed7657"}, {"front": "A atividade osmótica do fluido ao redor das células determina os volumes relativos do fluido {{c1::celular}} e {{c2::extracelular}}.", "back": "", "type": "cloze", "tags": ["bioquimica::osmolaridade", "exam::n1", "high_yield", "exam::n1"], "source_span": "The osmotic activity of fluid surrounding cells influences water movement across the cell membrane and therefore determines the relative volumes of cellular and extracellular fluid.", "source_chunk_id": "0630654247dedf11:0", "explanation": null, "mnemonic": null, "verified": false, "card_id": "aa4e875c6221822f"}, {"front": "A atmosfera da Terra primitiva era rica em {{c1::metano}}, {{c2::amônia}}, vapor d'água e hidrogênio.", "back": "", "type": "cloze", "tags": ["bioquímica::origem_da_vida", "exam::n1", "high_yield", "exam::n1"], "source_span": "atmosfera da Terra primitiva (rica em gases como metano, amônia, vapor d'água e hidrogênio)", "source_chunk_id": "d90a50a5a5347d06:0", "explanation": null, "mnemonic": "MAVIH: Metano, Amônia, Vapor d'água, Hidrogênio", "verified": true, "card_id": "900a56947a6a1b57"}, {"front": "A atmosfera da Terra primitiva era rica em {{c1::metano}}, {{c2::amônia}}, vapor d'água e hidrogênio.", "back": "", "type": "cloze", "tags": ["biologia_celular::origem_da_vida", "exam::n1", "high_yield", "exam::n1"], "source_span": "atmosfera da Terra primitiva (rica em gases como metano, amônia, vapor d'água e hidrogênio)", "source_chunk_id": "5cddb7aac00de0f5:0", "explanation": null, "mnemonic": "MAHV: Metano, Amônia, H₂O (vapor), hidrogênio", "verified": false, "card_id": "900a56947a6a1b57"}, {"front": "A ausência de carboidratos causa acentuada redução da secreção pancreática de {{c1::insulina}}.", "back": "", "type": "cloze", "tags": ["bioquímica::regulação_hormonal_metabolismo_lipídico", "exam::n1", "high_yield", "exam::n1"], "source_span": "acentuada redução da secreção pancreática de insulina, devido à ausência de carboidratos", "source_chunk_id": "8405ad39f361404f:8", "explanation": "Sem glicose, o pâncreas secreta menos insulina, reduzindo o armazenamento de gordura e favorecendo a lipólise.", "mnemonic": null, "verified": true, "card_id": "60cdd7ebcc68bf36"}, {"front": "A ausência de insulina eleva a glicose plasmática para cerca de {{c1::300 a 1.200 mg/100 mL}}.", "back": "", "type": "cloze", "tags": ["bioquimica::diabetes::hiperglicemia", "exam::n1", "high_yield", "exam::n1"], "source_span": "elevando a glicose plasmática para cerca de 300 a 1.200 mg/100 mL", "source_chunk_id": "76cae3be4bc84980:13", "explanation": null, "mnemonic": null, "verified": true, "card_id": "74f4d42f483f5c70"}, {"front": "A ausência de insulina forma quantidades excessivas de {{c1::ácido acetoacético}} nas células hepáticas.", "back": "", "type": "cloze", "tags": ["bioquimica::cetose::deficiencia_insulina", "exam::n1", "high_yield", "exam::n1"], "source_span": "A ausência de insulina também forma quantidades excessivas de ácido acetoacético nas células hepáticas", "source_chunk_id": "76cae3be4bc84980:5", "explanation": null, "mnemonic": null, "verified": true, "card_id": "71bee01a88b6acb9"}, {"front": "A ausência de insulina leva à {{c1::depleção das proteínas}} do organismo.", "back": "", "type": "cloze", "tags": ["bioquimica::diabetes::metabolismo_proteico", "exam::n1", "high_yield", "exam::n1"], "source_span": "depleção das proteínas do organismo", "source_chunk_id": "76cae3be4bc84980:13", "explanation": null, "mnemonic": null, "verified": true, "card_id": "30b414f8179fb308"}, {"front": "A ausência de insulina, junto com aumento do glucagon, ativa a {{c1::fosforilase}}, causando clivagem do glicogênio em glicose fosfato.", "back": "", "type": "cloze", "tags": ["bioquimica::glicogenolise::hepatica", "exam::n1", "high_yield", "exam::n1"], "source_span": "A ausência de insulina (junto com o aumento do glucagon, discutido adiante) ativa a enzima fosforilase, que causa a divagem do glicogênio em glicose fosfato", "source_chunk_id": "76cae3be4bc84980:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "54b147b4490a47e3"}, {"front": "A ausência de {{c1::insulina}} ou de {{c2::hormônio tireoidiano}} aumenta a concentração de colesterol sanguíneo.", "back": "", "type": "cloze", "tags": ["bioquimica::metabolismo_colesterol", "exam::n1", "high_yield", "exam::n1"], "source_span": "A ausência de insulina ou de hormônio tireoidiano aumenta a concentração de colesterol sanguíneo", "source_chunk_id": "8405ad39f361404f:11", "explanation": null, "mnemonic": null, "verified": true, "card_id": "30443694eb4d4a28"}, {"front": "A azida sódica inibe a catalase ligando-se ao {{c1::grupo heme}} da enzima.", "back": "", "type": "cloze", "tags": ["bioquímica::inibição_enzimática", "exam::n1", "high_yield", "exam::n1"], "source_span": "A azida sódica atua como um inibidor competitivo da catalase, ligando-se ao grupo heme da enzima", "source_chunk_id": "974d1da0e2adca02:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "4769ee4ebce0fd24"}, {"front": "A azida sódica é classificada como inibidor {{c1::competitivo}} da catalase.", "back": "", "type": "cloze", "tags": ["bioquímica::inibição_enzimática", "exam::n1", "high_yield", "exam::n1"], "source_span": "A azida sódica atua como um inibidor competitivo da catalase", "source_chunk_id": "974d1da0e2adca02:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "dc18194374cd2487"}, {"front": "A betaoxidação inicia com a combinação do ácido graxo com {{c1::CoA}} para formar {{c2::acil-CoA graxo}}.", "back": "", "type": "cloze", "tags": ["bioquímica::lipídios::betaoxidação", "exam::n1", "high_yield", "exam::n1"], "source_span": "a combinação da molécula de ácido graxo com a coenzima A (CoA) para formar o acil-CoA graxo", "source_chunk_id": "8405ad39f361404f:4", "explanation": null, "mnemonic": null, "verified": true, "card_id": "5b0fd6059fe8df79"}, {"front": "A bicamada fosfolipídica é amplamente impermeável a {{c1::moléculas solúveis em água}} e {{c2::íons}}.", "back": "", "type": "cloze", "tags": ["bioquimica::membrana_plasmatica", "exam::n1", "high_yield", "exam::n1"], "source_span": "a bicamada fosfolipídica é amplamente impermeável a moléculas solúveis em água e íons.", "source_chunk_id": "139867c0a9741b7a:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "ff20ffe12dd5886f"}, {"front": "A bile e o suco pancreático compartilham {{c1::a mesma via de saída}} no duodeno.", "back": "", "type": "cloze", "tags": ["bioquimica::anatomia_pancreatica", "exam::n1", "high_yield", "exam::n1"], "source_span": "problema na vida de saída onde joga o suco pancreático no intestino é o mesmo caminho que vem a bile", "source_chunk_id": "56d0a30d83e5310f:4", "explanation": "A via comum explica por que um cálculo biliar pode obstruir simultaneamente a drenagem pancreática.", "mnemonic": null, "verified": false, "card_id": "d09c1728047a9566"}, {"front": "A bilirrubina é fabricada no {{c1::fígado}} a partir da {{c2::hemoglobina}}.", "back": "", "type": "cloze", "tags": ["subject::bioquímica::metabolismo_bilirrubina", "exam::n1", "high_yield", "exam::n1"], "source_span": "bilirrubina fabricada no fígado a partir da hemoglobina", "source_chunk_id": "56d0a30d83e5310f:3", "explanation": null, "mnemonic": null, "verified": false, "card_id": "4899d20551a3c982"}, {"front": "A bomba Na+/K+-ATPase transporta Na+ e K+ {{c1::contra}} seus gradientes de concentração em direções {{c2::opostas}}.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte_de_membrana::transporte_ativo::na_k_atpase", "exam::n1", "high_yield", "exam::n1"], "source_span": "transporta o potássio e o sódio contra seus gradientes de concentração em direções opostas", "source_chunk_id": "36f2ff3a2cd3fb54:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "b2079aa2c0d1284d"}, {"front": "A bomba Na+/K+-ATPase é fundamental para manter o {{c1::volume celular}} e os {{c2::gradientes iônicos}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::transporte_membrana::bomba_na_k", "exam::n1", "high_yield", "exam::n1"], "source_span": "a bomba de sódio e potássio é fundamental para manter o volume celular e os gradientes iônicos", "source_chunk_id": "8d967ded073fd283:0", "explanation": null, "mnemonic": null, "verified": false, "card_id": "3bc9525d6c5bd514"}, {"front": "A bomba Na⁺-K⁺ bombeia íons sódio para {{c1::fora}} e íons potássio para {{c2::dentro}} da célula.", "back": "", "type": "cloze", "tags": ["bioquimica::bomba_na_k", "exam::n1", "high_yield", "exam::n1"], "source_span": "bombeia íons sódio para fora, através da membrana celular de todas as células, e ao mesmo tempo bombeia íons potássio de fora para dentro", "source_chunk_id": "ca1d03681e38ff3b:9", "explanation": null, "mnemonic": "Na sai, K entra — 'NaKe' (Na fora, K entra)", "verified": true, "card_id": "82a92f836a1fd584"}, {"front": "A bomba Na⁺-K⁺ transporta {{c1::3}} Na⁺ para fora e {{c2::2}} K⁺ para dentro por ciclo.", "back": "", "type": "cloze", "tags": ["bioquimica::bomba_na_k", "exam::n1", "high_yield", "exam::n1"], "source_span": "esse mecanismo bombeia três íons Na+ para fora da célula a cada dois íons de K+ que são bombeados para o interior", "source_chunk_id": "ca1d03681e38ff3b:9", "explanation": null, "mnemonic": "3 Na sai, 2 K entra — '3 para fora, 2 para dentro'", "verified": true, "card_id": "8b50dcade4a85df1"}, {"front": "A bomba Na⁺-K⁺ é chamada eletrogênica porque produz {{c1::potencial elétrico::efeito}} através da membrana celular.", "back": "", "type": "cloze", "tags": ["bioquimica::bomba_na_k::natureza_eletrogenica", "exam::n1", "high_yield", "exam::n1"], "source_span": "diz-se que o bombeamento de Na+-K+ é eletrogênico por produzir potencial elétrico através da membrana celular", "source_chunk_id": "ca1d03681e38ff3b:9", "explanation": null, "mnemonic": null, "verified": true, "card_id": "d5f2b3bcb2cdfc1e"}, {"front": "A bomba Na⁺-K⁺ é responsável pelo estabelecimento da voltagem elétrica {{c1::negativa}} dentro das células.", "back": "", "type": "cloze", "tags": ["bioquimica::bomba_na_k", "exam::n1", "high_yield", "exam::n1"], "source_span": "pelo estabelecimento da voltagem elétrica negativa dentro das células", "source_chunk_id": "ca1d03681e38ff3b:9", "explanation": null, "mnemonic": null, "verified": true, "card_id": "5ae2cd5815271250"}, {"front": "A bomba de Na⁺/K⁺ bombeia Na⁺ para {{c1::fora}} da célula e K⁺ para {{c2::dentro}} da célula.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte_de_membrana::bomba_na_k", "exam::n1", "high_yield", "exam::n1"], "source_span": "Bombeia sódio (Na+) de forma ativa para fora da célula e potássio (K+) para dentro", "source_chunk_id": "36f2ff3a2cd3fb54:2", "explanation": "A bomba Na⁺/K⁺-ATPase usa ATP para manter gradientes iônicos essenciais ao potencial de membrana.", "mnemonic": "Na sai, K entra (NaKe)", "verified": true, "card_id": "3ae9e05759876e0b"}, {"front": "A bomba de cálcio bombeia Ca²⁺ para o {{c1::exterior}} da célula, mantendo baixa concentração {{c2::intracelular}}.", "back": "", "type": "cloze", "tags": ["bioquimica::bomba_calcio", "exam::n1", "high_yield", "exam::n1"], "source_span": "bomba de cálcio, uma proteína que fica na membrana celular, bombeia cálcio para o exterior da célula", "source_chunk_id": "e7d00a882df6c4ba:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "24a32ebb932e15ce"}, {"front": "A bomba de prótons lisossomal transporta prótons do {{c1::citosol}} para o {{c2::lisossomo}}, requerendo hidrólise de ATP.", "back": "", "type": "cloze", "tags": ["bioquimica::lisossomos", "exam::n1", "high_yield", "exam::n1"], "source_span": "uma bomba de prótons na membrana lisossomal, que transporta ativamente prótons do citosol para o lisossomo. Esse bombeamento requer gasto de energia na forma de hidrólise de ATP", "source_chunk_id": "584ea7e1df69fa89:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "7877476bb4a25156"}, {"front": "A bomba de prótons lisossomal transporta prótons do {{c1::citosol}} para o {{c2::lisossomo}}, requerendo hidrólise de {{c3::ATP}}.", "back": "", "type": "cloze", "tags": ["bioquimica::lisossomos::bomba_protons", "exam::n1", "high_yield", "exam::n1"], "source_span": "bomba de prótons na membrana lisossomal, que transporta ativamente prótons do citosol para o lisossomo. Esse bombeamento requer gasto de energia na forma de hidrólise de ATP", "source_chunk_id": "64f242de981408e9:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "979ced8a00cc82f0"}, {"front": "A bomba de sódio-potássio bombeia {{c1::3 Na+}} para fora e {{c2::2 K+}} para dentro por ATP consumido.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte_membrana::bomba_na_k", "exam::n1", "high_yield", "exam::n1"], "source_span": "bombeia 3 Na+ para fora e 2 K+ para dentro da célula para cada ATP consumido", "source_chunk_id": "584ea7e1df69fa89:0", "explanation": null, "mnemonic": "3 Na saem (3 letras em 'sai'), 2 K entram (2 letras em 'K+').", "verified": true, "card_id": "080d4045e0d69af3"}, {"front": "A borda em escova dos enterócitos tem como função {{c1::aumentar a superfície de contato com o alimento}}, facilitando a absorção.", "back": "", "type": "cloze", "tags": ["biologia_celular::histologia_intestinal", "exam::n1", "high_yield", "exam::n1"], "source_span": "Aumenta a superfície de contato com o alimento, facilitando a absorção dos compostos.", "source_chunk_id": "44a343e9822cff8b:5", "explanation": null, "mnemonic": null, "verified": true, "card_id": "4a314826535b4ee0"}, {"front": "A capacidade celular de manter um meio interno relativamente constante é chamada de {{c1::homeostase}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::características_da_célula", "exam::n1", "high_yield", "exam::n1"], "source_span": "Exibem homeostase, mantendo um meio interno relativamente constante;", "source_chunk_id": "fc03bff607c86d28:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "7b08ef45b42ad6c8"}, {"front": "A capacidade de tamponamento do sistema respiratório é {{c1::uma a duas vezes maior}} que todos os outros tampões químicos do líquido extracelular combinados.", "back": "", "type": "cloze", "tags": ["subject::fisiologia::equilibrio_acido_base", "topic::capacidade_tampao_respiratoria", "exam::n1", "high_ l, "mnemonic": null, "verified": true, "card_id": "baaefe77debb8e65"}, {"front": "A captação de remanescentes de quilomícrons pelos hepatócitos é iniciada pelo sequestro das partículas no {{c1::HSPG}}.", "back": "", "type": "cloze", "tags": ["bioquímica::lipídeos::captação_hepática", "exam::n1", "high_yield", "exam::n1"], "source_span": "captação de remanescentes de quilomícrons pelos hepatócitos é iniciada pelo sequestro das partículas no HSPG", "source_chunk_id": "349053d639a3f6a1:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "97d9f944eeabdb7e"}, {"front": "A carga de um composto em eletroforese depende do {{c1::pH}} da solução.", "back": "", "type": "cloze", "tags": ["bioquímica::eletroforese", "exam::n1", "high_yield", "exam::n1"], "source_span": "a carga de um composto depende do pH da solução.", "source_chunk_id": "573375214164280b:0", "explanation": "O pH determina o estado de ionização dos grupos funcionais da proteína, alterando sua carga líquida e mobilidade eletroforética.", "mnemonic": null, "verified": true, "card_id": "d3913eab1d5f21be"}, {"front": "A carga de um composto em solução depende do {{c1::pH}} da solução.", "back": "", "type": "cloze", "tags": ["bioquimica::eletroforese", "exam::n1", "high_yield", "exam::n1"], "source_span": "a carga de um composto depende do pH da solução.", "source_chunk_id": "cc3cf8e2bfd342c7:0", "explanation": "O pH determina o estado de ionização dos grupos funcionais, alterando a carga líquida do composto.", "mnemonic": null, "verified": true, "card_id": "8e23c352e326fab9"}, {"front": "A cascata de amplificação do glucagon pode amplificar a resposta em até {{c1::um milhão}} de vezes.", "back": "", "type": "cloze", "tags": ["bioquímica::glucagon_amplificação", "exam::n1", "high_yield", "exam::n1"], "source_span": "causando frequentemente amplificação de até um milhão de vezes na resposta", "source_chunk_id": "76cae3be4bc84980:10", "explanation": null, "mnemonic": null, "verified": true, "card_id": "8d18e355b3320ae6"}, {"front": "A catalase decompõe o peróxido de hidrogênio nos produtos {{c1::água}} e {{c2::oxigênio}}.", "back": "", "type": "cloze", "tags": ["bioquímica::enzimas::catalase", "exam::n1", "high_yield", "exam::n1"], "source_span": "2 H2O2 → 2 H2O + O2", "source_chunk_id": "974d1da0e2adca02:1", "explanation": null, "mnemonic": "2 H2O2 → 2 H2O + O2", "verified": true, "card_id": "1052a286ecbaa8b8"}, {"front": "A catalase transforma H₂O₂ tóxico em {{c1::água}} e {{c2::gás oxigênio}}.", "back": "", "type": "cloze", "tags": ["bioquimica::enzimas::catalase", "exam::n1", "high_yield", "exam::n1"], "source_span": "transfor mar o peróxido de hidrogênio (H 2O2), que é tóxico para as células, em produtos não danosos como a água e o gás oxigênio", "source_chunk_id": "5a1fb13ebefda48c:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "4cee8e58556b69c8"}, {"front": "A catalase é produzida nas organelas denominadas {{c1::peroxissomos}} em células animais e vegetais.", "back": "", "type": "cloze", "tags": ["bioquimica::enzimas::catalase", "exam::n1", "high_yield", "exam::n1"], "source_span": "a enzima catalase é produzida nas organelas denominadas peroxissomos", "source_chunk_id": "5a1fb13ebefda48c:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "9d5c1cf158c9b376"}, {"front": "A catalase é um {{c1::tetrâmero}}, composta por quatro subunidades polipeptídicas {{c2::idênticas}}.", "back": "", "type": "cloze", "tags": ["bioquímica::estrutura_proteica::catalase", "exam::n1", "high_yield", "exam::n1"], "source_span": "A enzima é um tetrâmero, ou seja, é composta por quatro subunidades polipeptídicas idênticas", "source_chunk_id": "974d1da0e2adca02:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "fc8ceeeda0253df3"}, {"front": "A catalase é uma enzima {{c1::antioxidante}} {{c2::intracelular}}.", "back": "", "type": "cloze", "tags": ["bioquímica::enzimas::catalase", "exam::n1", "high_yield", "exam::n1"], "source_span": "A catalase é uma enzima antioxidante intracelular capaz de decompor o peróxido de hidrogênio", "source_chunk_id": "974d1da0e2adca02:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "5323ff557a38208b"}, {"front": "A causa clinicamente mais comum de acúmulo de líquido no espaço intersticial é a {{c1::filtração excessiva do líquido capilar}}.", "back": "", "type": "cloze", "tags": ["subject::fisiologia::edema", "exam::n1", "topic::edema_extracelular", "high_yield", "exam::n1"], "source_span": "A causa clinicamente mais comum para o acúmulo de líquido no espaço intersticial é a filtração excessiva do líquido capilar", "source_chunk_id": "7045a5149a0b780c:13", "explanation": null, "mnemonic": null, "verified": true, "card_id": "76d2e79b07e46e3b"}, {"front": "A causa mais comum de hipernatremia com redução do volume extracelular é a desidratação por {{c1::perda de água::mecanismo}}.", "back": "", "type": "cloze", "tags": ["bioquimica::eletrolitos::hipernatremia::causas", "exam::n1", "high_yield", "exam::n1"], "source_span": "A causa mais comum da hipernatremia, associada à redução do volume do líquido extracelular, é a desidratação causada pelo menor ganho que a perda de água", "source_chunk_id": "7045a5149a0b780c:12", "explanation": null, "mnemonic": null, "verified": true, "card_id": "0ef1b2cffbd6bf87"}, {"front": "A causa mais frequente de acidose metabólica é a {{c1::diarreia grave}}.", "back": "", "type": "cloze", "tags": ["bioquimica::acidobásico::acidose_metabólica", "exam::n1", "high_yield", "exam::n1"], "source_span": "A diarréia grave é provavelmente a causa mais frequente de acidose metabólica", "source_chunk_id": "1505b4589c5c5c15:14", "explanation": null, "mnemonic": null, "verified": true, "card_id": "3c6784191452478d"}, {"front": "A causa mais frequente de acidose metabólica é {{c1::diarreia grave}}.", "back": "", "type": "cloze", "tags": ["fisiologia::acidobásico::acidose_metabólica", "exam::n1", "high_yield", "exam::n1"], "source_span": "A diarréia grave é provavelmente a causa mais frequente de acidose metabólica", "source_chunk_id": "f8d97a9f5383249e:14", "explanation": null, "mnemonic": null, "verified": true, "card_id": "1691de08be3f6eda"}, {"front": "A causa primária da alcalose metabólica é {{c1::aumento da concentração de HCO3-}} no líquido extracelular.", "back": "", "type": "cloze", "tags": ["fisiologia::acidobásico::alcalose_metabólica", "exam::n1", "high_yield", "exam::n1"], "source_span": "A causa da alcalose metabólica, entretanto, é o aumento da concentração de HCO ~ no líquido extracelular", "source_chunk_id": "f8d97a9f5383249e:13", "explanation": null, "mnemonic": null, "verified": true, "card_id": "662a6232d7226e1b"}, {"front": "A causa primária da alcalose respiratória é {{c1::diminuição da PCO2}} plasmática por {{c2::hiperventilação}}.", "back": "", "type": "cloze", "tags": ["fisiologia::acidobásico::alcalose_respiratória", "exam::n1", "high_yield", "exam::n1"], "source_span": "A causa da alcalose é a diminuição da Pco2 plasmática causada por hiperventilação", "source_chunk_id": "f8d97a9f5383249e:13", "explanation": null, "mnemonic": null, "verified": true, "card_id": "6323669bbc15f902"}, {"front": "A celulose é o polissacarídeo {{c1::estrutural}} primário dos vegetais.", "back": "", "type": "cloze", "tags": ["bioquímica::carboidratos::celulose", "exam::n1", "high_yield", "exam::n1"], "source_span": "A celulose é o polissacarídeo estrutural primário dos vegetais.", "source_chunk_id": "47a6535feedae2b8:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "a2a7aef77e9a24fb"}, {"front": "A cetoacidose diabética causa acidose metabólica por {{c1::acúmulo de ácidos}}.", "back": "", "type": "cloze", "tags": ["bioquímica::acidose_metabólica::causas", "exam::n1", "high_yield", "exam::n1"], "source_span": "Acúmulo de ácidos:•Cetoacidose diabética", "source_chunk_id": "51723ae60ff2d9cb:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "87fee55465761f21"}, {"front": "A cetose ocorre especialmente em quais três condições clínicas/dietéticas?", "back": "Inanição, diabetes melito e dieta composta quase inteiramente por gorduras", "type": "basic", "tags": ["bioquímica::lipídios::cetose", "exam::n1", "high_yield", "exam::n1"], "source_span": "A cetose ocorre, especialmente, na inanição, no diabetes melito, e às vezes quando a dieta da pessoa é formada, quase inteiramente, por gorduras.", "source_chunk_id": "8405ad39f361404f:5", "explanation": null, "mnemonic": "IDD: Inanição, Diabetes, Dieta gordurosa", "verified": true, "card_id": "e48921a1485f8b37"}, {"front": "A cirrose hepática causa edema por {{c1::insuficiência da síntese proteica}}.", "back": "", "type": "cloze", "tags": ["fisiologia::edema::cirrose", "exam::n1", "high_yield", "exam::n1"], "source_span": "Insuficiência da síntese proteica: Doença hepática (p. ex., cirrose)", "source_chunk_id": "7045a5149a0b780c:14", "explanation": null, "mnemonic": null, "verified": true, "card_id": "8ab0db511c184344"}, {"front": "A cisplatina induz {{c1::ligações cruzadas (crosslinks)}} no DNA que bloqueiam o avanço da RNA polimerase.", "back": "", "type": "cloze", "tags": ["bioquimica::quimioterapia::cisplatina", "exam::n1", "high_yield", "exam::n1"], "source_span": "O medicamento induz ligações cruzadas (crosslinks) no DNA, que bloqueiam o avanço da RNA polimerase", "source_chunk_id": "c45346871801c1b5:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "7100486fba279b82"}, {"front": "A compensação da acidose respiratória difere entre a fase aguda e a fase crônica: na fase crônica, {{c1::os rins}} participam ativamente do controle do pH.", "back": "", "type": "cloze", "tags": ["bioquimica::acido_base::acidose_respiratoria", "exam::n1", "high_yield", "exam::n1"], "source_span": "Agudamente Cronicamente, os rins trabalham", "source_chunk_id": "1aa9c491a2a53451:10", "explanation": "Na fase aguda, o tamponamento é químico imediato; na fase crônica, a compensação renal é predominante.", "mnemonic": null, "verified": true, "card_id": "9e139c259774c28d"}, {"front": "A compensação de um distúrbio respiratório é feita pelo rim e demora {{c1::alguns dias}}.", "back": "", "type": "cloze", "tags": ["fisiologia::acido_basico::compensacao_respiratoria", "exam::n1", "high_yield", "exam::n1"], "source_span": "A compensação de um distúrbio respiratório é feita pelo rim e demora alguns dias.", "source_chunk_id": "2c1fb88d06450be5:3", "explanation": "Ao contrário da compensação respiratória (imediata), a renal é lenta pois exige adaptação tubular.", "mnemonic": null, "verified": true, "card_id": "9ed52aee290388a7"}, {"front": "A compensação metabólica nos distúrbios respiratórios primários requer {{c1::3 a 5 dias}} para ser completa.", "back": "", "type": "cloze", "tags": ["bioquimica::acidobásico::compensação", "exam::n1", "high_yield", "exam::n1"], "source_span": "3 a 5 dias para compensações metabólicas nos distúrbios respiratórios primários", "source_chunk_id": "f8d97a9f5383249e:17", "explanation": null, "mnemonic": null, "verified": true, "card_id": "f9e04462d36acfe7"}, {"front": "A compensação metabólica nos distúrbios respiratórios primários requer {{c1::3 a 5 dias}} para ser completa.", "back": "", "type": "cloze", "tags": ["subject::bioquimica::compensacao_acidobasica", "exam::n1", "high_yield", "exam::n1"], "source_span": "3 a 5 dias para compensações metabólicas nos distúrbios respiratórios primários", "source_chunk_id": "1505b4589c5c5c15:17", "explanation": null, "mnemonic": "Respiratório → rim: 3-5 dias (dias, lento como o rim)", "verified": true, "card_id": "f9e04462d36acfe7"}, {"front": "A compensação renal da acidose metabólica resulta em aumento da geração de {{c1::novo bicarbonato}} para o plasma.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acido_base::compensacao_acidose_metabolica", "exam::n1", "high_yield", "exam::n1"], "source_span": "↑ Geração de novo bicarbonato para o plasma", "source_chunk_id": "49ed06ff34adc89d:1", "explanation": "A excreção de H⁺ pelos rins é acompanhada da geração de HCO₃⁻ que retorna ao plasma.", "mnemonic": null, "verified": false, "card_id": "b57db3b8c8984dbe"}, {"front": "A compensação renal na acidose respiratória necessita de {{c1::vários dias}} para ocorrer.", "back": "", "type": "cloze", "tags": ["fisiologia::acidobásico::acidose_respiratória", "exam::n1", "high_yield", "exam::n1"], "source_span": "os rins, que necessitam de vários dias para compensar o distúrbio", "source_chunk_id": "f8d97a9f5383249e:14", "explanation": "Os tampões corporais atuam rapidamente; a resposta renal é lenta, levando dias para ser efetiva.", "mnemonic": null, "verified": true, "card_id": "0a0bc38b680364bc"}, {"front": "A compensação respiratória ao aumento do pH é {{c1::menos efetiva}} do que a resposta à redução do pH.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acidobasico::regulacao_respiratoria_pH", "exam::n1", "high_yield", "exam::n1"], "source_span": "a compensação respiratória ao aumento do pH não é tão efetiva quanto a resposta à redução do pH", "source_chunk_id": "f8d97a9f5383249e:6", "explanation": null, "mnemonic": null, "verified": true, "card_id": "973db708ab728e7b"}, {"front": "A compensação respiratória ao aumento do pH é {{c1::menos efetiva}} do que a resposta à redução do pH.", "back": "", "type": "cloze", "tags": ["bioquímica::regulação_acidobásica_respiratória", "exam::n1", "high_yield", "exam::n1"], "source_span": "a compensação respiratória ao aumento do pH não é tão efetiva quanto a resposta à redução do pH", "source_chunk_id": "51723ae60ff2d9cb:2", "explanation": "A hipoventilação compensatória é limitada pela necessidade de manter oxigenação adequada.", "mnemonic": null, "verified": true, "card_id": "973db708ab728e7b"}, {"front": "A compensação respiratória ao aumento do pH é {{c1::menos efetiva}} do que a resposta à redução do pH.", "back": "", "type": "cloze", "tags": ["b
