ioquimica::equilibrio_acido_base::compensacao_respiratoria", "exam::n1", "high_yield", "exam::n1"], "source_span": "a compensação respiratória ao aumento do pH não é tão efetiva quanto a resposta à redução do pH", "source_chunk_id": "1aa9c491a2a53451:2", "explanation": "A hipoventilação compensatória é limitada pela necessidade de manter oxigenação adequada.", "mnemonic": null, "verified": true, "card_id": "973db708ab728e7b"}, {"front": "A compensação respiratória ao aumento do pH é {{c1::menos efetiva}} do que a resposta à redução do pH.", "back": "", "type": "cloze", "tags": ["subject::fisiologia::equilibrio_acido_base", "topic::resposta_ventilatoria_ao_ph", "exam::n1", "high_yield", "exam::n1"], "source_span": "a compensação respiratória ao aumento do pH não é tão efetiva quanto a resposta à redução do pH", "source_chunk_id": "49ed06ff34adc89d:2", "explanation": null, "mnemonic": null, "verified": false, "card_id": "973db708ab728e7b"}, {"front": "A compensação respiratória ao aumento do pH é {{c1::menos efetiva}} que a resposta à redução do pH.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acido_base::regulacao_respiratoria", "exam::n1", "high_yield", "exam::n1"], "source_span": "a compensação respiratória ao aumento do pH não é tão efetiva quanto a resposta à redução do pH", "source_chunk_id": "51723ae60ff2d9cb:7", "explanation": "A hipoventilação compensatória é limitada pela necessidade de manter oxigenação adequada.", "mnemonic": null, "verified": true, "card_id": "2e1d1ae9813549d5"}, {"front": "A compensação respiratória ao {{c1::aumento}} do pH é menos efetiva do que a resposta à {{c2::redução}} do pH.", "back": "", "type": "cloze", "tags": ["bioquímica::regulação_respiratória::pH", "exam::N1", "high_yield", "exam::n1"], "source_span": "a compensação respiratória ao aumento do pH não é tão efetiva quanto a resposta à redução do pH", "source_chunk_id": "0d58a2246d9c0f12:7", "explanation": null, "mnemonic": null, "verified": true, "card_id": "163b79407442d298"}, {"front": "A compensação respiratória ao {{c1::aumento}} do pH é menos efetiva que a resposta à {{c2::redução}} do pH.", "back": "", "type": "cloze", "tags": ["bioquímica_e_biologia_celular::resposta_ventilatória_ao_pH", "exam::n1", "high_yield", "exam::n1"], "source_span": "a compensação respiratória ao aumento do pH não é tão efetiva quanto a resposta à redução do pH", "source_chunk_id": "1505b4589c5c5c15:6", "explanation": "A hipoventilação compensatória é limitada pela necessidade de manter oxigenação adequada.", "mnemonic": null, "verified": false, "card_id": "92471c774fa3c21d"}, {"front": "A compensação respiratória da acidose metabólica ocorre por {{c1::hiperventilação}}.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acido_base::compensacao_respiratoria", "exam::n1", "high_yield", "exam::n1"], "source_span": "Diminuição do pH Estimula o centro respiratório Hiperventilação", "source_chunk_id": "1aa9c491a2a53451:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "7278e5f21e3b5c33"}, {"front": "A compensação respiratória da alcalose metabólica ocorre por {{c1::hipoventilação}}.", "back": "", "type": "cloze", "tags": ["acido_base::alcalose_metabolica::compensacao", "exam::n1", "high_yield", "exam::n1"], "source_span": "Aumento do pH Inibe o centro respiratório Hipoventilação", "source_chunk_id": "49ed06ff34adc89d:6", "explanation": null, "mnemonic": null, "verified": false, "card_id": "a2216ead4d6a8f1f"}, {"front": "A compensação respiratória da alcalose {{c1::metabólica}} ocorre por hiperventilação.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acidobasico::compensacao", "exam::n1", "high_yield", "exam::n1"], "source_span": "Hiperventilação", "source_chunk_id": "49ed06ff34adc89d:14", "explanation": "Hiperventilação elimina CO₂, compensando parcialmente o excesso de HCO₃⁻ da alcalose metabólica.", "mnemonic": null, "verified": false, "card_id": "b408bb8c0d64a6a5"}, {"front": "A compensação respiratória à {{c1::alcalose}} (aumento do pH) é menos efetiva do que a resposta à {{c2::acidose}} (redução do pH).", "back": "", "type": "cloze", "tags": ["bioquimica::acido_base::regulacao_respiratoria_ph", "exam::n1", "high_yield", "exam::n1"], "source_span": "a compensação respiratória ao aumento do pH não é tão efetiva quanto a resposta à redução do pH", "source_chunk_id": "0d58a2246d9c0f12:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "ad1130534751f71c"}, {"front": "A compensação ventilatória (distúrbio metabólico) leva {{c1::6–12 horas}}, enquanto a compensação metabólica (distúrbio respiratório) leva {{c2::3–5 dias}}.", "back": "", "type": "cloze", "tags": ["bioquimica::acidobásico::compensação::discriminação", "exam::n1", "high_yield", "exam::n1"], "source_span": "cerca de 6 a 12 horas, para a compensação ventilatória nos distúrbios metabólicos primários ... 3 a 5 dias para compensações metabólicas nos distúrbios respiratórios primários", "source_chunk_id": "f8d97a9f5383249e:16", "explanation": "A compensação renal é mais lenta que a respiratória por depender de ajustes tubulares progressivos.", "mnemonic": "Pulmão é rápido (horas); Rim é lento (dias)", "verified": true, "card_id": "b6ea5a0065322b12"}, {"front": "A compensação ventilatória nos distúrbios metabólicos primários requer cerca de {{c1::6 a 12 horas}} para ser completa.", "back": "", "type": "cloze", "tags": ["bioquimica::acidobásico::compensação", "exam::n1", "high_yield", "exam::n1"], "source_span": "cerca de 6 a 12 horas, para a compensação ventilatória nos distúrbios metabólicos primários", "source_chunk_id": "f8d97a9f5383249e:17", "explanation": null, "mnemonic": null, "verified": true, "card_id": "48a7938b30167d85"}, {"front": "A compensação ventilatória nos distúrbios metabólicos primários requer cerca de {{c1::6 a 12 horas}} para ser completa.", "back": "", "type": "cloze", "tags": ["subject::bioquimica::compensacao_acidobasica", "exam::n1", "high_yield", "exam::n1"], "source_span": "cerca de 6 a 12 horas, para a compensação ventilatória nos distúrbios metabólicos primários", "source_chunk_id": "1505b4589c5c5c15:17", "explanation": null, "mnemonic": "Metabólico → ventilação: 6-12h (horas, rápido como o pulmão)", "verified": true, "card_id": "48a7938b30167d85"}, {"front": "A complacência do tecido é muito {{c1::baixa}} quando a pressão intersticial é negativa.", "back": "", "type": "cloze", "tags": ["fisiologia::intersticio::complacencia", "exam::n1", "high_yield", "exam::n1"], "source_span": "a complacência do tecido é muito baixa no valor negativo de pressão", "source_chunk_id": "7045a5149a0b780c:16", "explanation": "Baixa complacência significa que pequenas variações de volume causam grandes variações de pressão, protegendo contra edema.", "mnemonic": null, "verified": true, "card_id": "81dad2cb2b5ab8ec"}, {"front": "A composição da membrana plasmática facilita a entrada de moléculas {{c1::lipofílicas}} para dentro da célula.", "back": "", "type": "cloze", "tags": ["biologia_celular::membrana_plasmática", "exam::n1", "high_yield", "exam::n1"], "source_span": "A composição da membrana plasmática facilita a entrada de moléculas lipofílicas para dentro da célula.", "source_chunk_id": "44a343e9822cff8b:3", "explanation": "A bicamada fosfolipídica é hidrofóbica em seu interior, permitindo difusão passiva de moléculas lipofílicas.", "mnemonic": null, "verified": true, "card_id": "7038c22ad4108666"}, {"front": "A composição da membrana plasmática facilita a entrada de moléculas {{c1::lipofílicas}} para dentro da célula.", "back": "", "type": "cloze", "tags": ["biologia_celular::membrana_plasmatica", "bioquimica::lipidios", "exam::n1", "high_yield", "exam::n1"], "source_span": "A composição da membrana plasmática facilita a entrada de moléculas lipofílicas para dentro da célula.", "source_chunk_id": "515b543e17a8338f:3", "explanation": "A bicamada fosfolipídica é hidrofóbica, permitindo passagem livre de moléculas apolares/lipofílicas.", "mnemonic": "Lipofílico = ama lipídio = passa fácil pela membrana", "verified": false, "card_id": "7038c22ad4108666"}, {"front": "A concentração de Ca++ no líquido intracelular é {{c1::0}} mOsm/L H2O.", "back": "", "type": "cloze", "tags": ["bioquímica::eletrólitos_intracelulares", "exam::n1", "high_yield", "exam::n1"], "source_span": "Ca++ 1,3 1,2 0", "source_chunk_id": "7045a5149a0b780c:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "1a877c3222dd2a96"}, {"front": "A concentração de Ca²⁺ livre intracelular é aproximadamente {{c1::0,0001 mM}}, enquanto a extracelular é {{c2::1,2–2,0 mM}}.", "back": "", "type": "cloze", "tags": ["bioquímica::concentrações_iônicas", "exam::n1", "high_yield", "exam::n1"], "source_span": "Ca²⁺~0.0001 (livre)~1.2 –2.0", "source_chunk_id": "e218cc18ab67a657:4", "explanation": null, "mnemonic": null, "verified": true, "card_id": "8339f376afcdc21f"}, {"front": "A concentração de Ca²⁺ livre intracelular é aproximadamente {{c1::0,0001 mM}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::composição_iônica", "exam::n1", "high_yield", "exam::n1"], "source_span": "~1.2 – 2.0~0.0001 (livre)Ca²", "source_chunk_id": "d90a50a5a5347d06:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "19ee44a5fe239238"}, {"front": "A concentração de Ca²⁺ livre intracelular é de aproximadamente {{c1::0,0001 mM}}.", "back": "", "type": "cloze", "tags": ["bioquimica::composicao_ionica", "exam::n1", "high_yield", "exam::n1"], "source_span": "~1.2 – 2.0~0.0001 (livre)Ca²", "source_chunk_id": "5cddb7aac00de0f5:1", "explanation": null, "mnemonic": null, "verified": false, "card_id": "9dcbb7817ddb1e5c"}, {"front": "A concentração de Cl- no plasma é {{c1::108}} mOsm/L H2O.", "back": "", "type": "cloze", "tags": ["bioquímica::eletrólitos_plasmáticos", "exam::n1", "high_yield", "exam::n1"], "source_span": "ci- 108 108 4", "source_chunk_id": "7045a5149a0b780c:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "5e7870137cc1183e"}, {"front": "A concentração de K+ no líquido intracelular é {{c1::140}} mOsm/L H2O.", "back": "", "type": "cloze", "tags": ["bioquímica::eletrólitos_intracelulares", "exam::n1", "high_yield", "exam::n1"], "source_span": "K+ 4,2 4,0 140", "source_chunk_id": "7045a5149a0b780c:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "1b9e04c669e03370"}, {"front": "A concentração de Na+ no plasma é {{c1::142}} mOsm/L H2O.", "back": "", "type": "cloze", "tags": ["bioquímica::eletrólitos_plasmáticos", "exam::n1", "high_yield", "exam::n1"], "source_span": "Na+ 142 139 14", "source_chunk_id": "7045a5149a0b780c:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "ba60db730961f514"}, {"front": "A concentração de bicarbonato no líquido extracelular é regulada primariamente pelos {{c1::rins}}.", "back": "", "type": "cloze", "tags": ["bioquímica::regulação_acidobásica", "exam::n1", "high_yield", "exam::n1"], "source_span": "a concentração de bicarbonato é regulada, basicamente, pelos rins", "source_chunk_id": "1505b4589c5c5c15:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "84fc614fdfb97a85"}, {"front": "A concentração de bicarbonato é regulada principalmente pelos {{c1::rins}}.", "back": "", "type": "cloze", "tags": ["bioquímica_e_biologia_celular::regulação_acidobásica", "exam::n1", "high_yield", "exam::n1"], "source_span": "a concentração de bicarbonato é regulada, basicamente, pelos rins", "source_chunk_id": "f8d97a9f5383249e:3", "explanation": "Os rins controlam a reabsorção e excreção de HCO3⁻, ajustando a componente metabólica do equilíbrio acidobásico.", "mnemonic": null, "verified": true, "card_id": "1e6a8ad541b184b1"}, {"front": "A concentração de sódio no líquido extracelular é cerca de {{c1::3,5 milhões}} de vezes maior que a concentração normal de H+.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acidobasico", "exam::n1", "high_yield", "exam::n1"], "source_span": "a concentração de sódio, no líquido extracelular (142 mEq/L), é de cerca de 3,5 milhões de vezes maior que a concentração normal de H+", "source_chunk_id": "1505b4589c5c5c15:0", "explanation": "Ilustra quão minúscula é a concentração fisiológica de H+ comparada a outros íons.", "mnemonic": null, "verified": true, "card_id": "510026494ca03b69"}, {"front": "A concentração de {{c1::sódio}} no líquido extracelular é cerca de 3,5 milhões de vezes maior que a concentração normal de H+.", "back": "", "type": "cloze", "tags": ["bioquímica::equilíbrio_acidobásico", "exam::n1", "high_yield", "exam::n1"], "source_span": "concentração de sódio, no líquido extracelular (142 mEq/L), é de cerca de 3,5 milhões de vezes maior que a concentração normal de H+", "source_chunk_id": "f8d97a9f5383249e:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "bd3f343e298dc01b"}, {"front": "A concentração de ácidos graxos livres no plasma em repouso é de cerca de {{c1::15 mg/dL}}.", "back": "", "type": "cloze", "tags": ["bioquimica::lipidios::transporte_acidos_graxos", "exam::n1", "high_yield", "exam::n1"], "source_span": "A concentração de ácidos graxos livres no plasma, sob condições de repouso é de cerca de 15 mg/dL", "source_chunk_id": "8405ad39f361404f:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "4733a572f0ce1602"}, {"front": "A concentração do tampão fosfato no líquido extracelular é cerca de {{c1::8%}} da concentração do tampão bicarbonato.", "back": "", "type": "cloze", "tags": ["bioquímica_e_biologia_celular::sistema_tampão_fosfato", "exam::n1", "high_yield", "exam::n1"], "source_span": "sua concentração no líquido extracelular é baixa, apenas cerca de 8% da concentração do tampão do bicarbonato", "source_chunk_id": "f8d97a9f5383249e:4", "explanation": "A baixa concentração extracelular explica por que o fosfato não é tampão relevante no líquido extracelular.", "mnemonic": null, "verified": true, "card_id": "048477c3004a71fe"}, {"front": "A concentração extracelular de Ca++ é {{c1::2,4}} mEq/L e a intracelular é {{c2::0,0001}} mEq/L.", "back": "", "type": "cloze", "tags": ["bioquimica::concentracoes_ionicas::calcio", "exam::n1", "high_yield", "exam::n1"], "source_span": "Ca++ 2,4mEq/L 0,0001mEq/L", "source_chunk_id": "36f2ff3a2cd3fb54:0", "explanation": "Ca2+ intracelular é mantido extremamente baixo; fundamental para sinalização celular.", "mnemonic": null, "verified": true, "card_id": "04661ec873b90dd0"}, {"front": "A concentração extracelular de K+ é {{c1::4}} mEq/L e a intracelular é {{c2::140}} mEq/L.", "back": "", "type": "cloze", "tags": ["bioquimica::concentracoes_ionicas::potassio", "exam::n1", "high_yield", "exam::n1"], "source_span": "K+ 4mEq/L 140mEq/L", "source_chunk_id": "36f2ff3a2cd3fb54:0", "explanation": "K+ é predominantemente intracelular; gradiente oposto ao do Na+.", "mnemonic": "K dentro: 140 (alto); K fora: 4 (baixo)", "verified": true, "card_id": "106a43a80cdf1fc7"}, {"front": "A concentração extracelular de K⁺ é aproximadamente {{c1::4–5 mM}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::composição_iônica", "exam::n1", "high_yield", "exam::n1"], "source_span": "~4 – 5~120 – 150K", "source_chunk_id": "d90a50a5a5347d06:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "d597a67ce1f35f93"}, {"front": "A concentração extracelular de K⁺ é {{c1::4}} mEq/L.", "back": "", "type": "cloze", "tags": ["bioquimica::homeostase_ionica", "exam::n1", "high_yield", "exam::n1"], "source_span": "a concentração fora da célula é oposta, de 140mEq/L de sódio e 4mEq/L de potássio", "source_chunk_id": "e7d00a882df6c4ba:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "d4973df888869377"}, {"front": "A concentração extracelular de Na+ é {{c1::142}} mEq/L e a intracelular é {{c2::10}} mEq/L.", "back": "", "type": "cloze", "tags": ["bioquimica::concentracoes_ionicas::sodio", "exam::n1", "high_yield", "exam::n1"], "source_span": "Na+ 142mEq/L 10mEq/L", "source_chunk_id": "36f2ff3a2cd3fb54:0", "explanation": "Na+ é predominantemente extracelular; a bomba Na+/K+-ATPase mantém esse gradiente.", "mnemonic": "Na fora: 142 (alto); Na dentro: 10 (baixo)", "verified": true, "card_id": "4b22f5a866aa3118"}, {"front": "A concentração extracelular de Na⁺ é de aproximadamente {{c1::140 mM}}.", "back": "", "type": "cloze", "tags": ["bioquimica::composicao_ionica", "exam::n1", "high_yield", "exam::n1"], "source_span": "~140~10 – 15Na", "source_chunk_id": "5cddb7aac00de0f5:1", "explanation": null, "mnemonic": null, "verified": false, "card_id": "28721409843a0b8f"}, {"front": "A concentração extracelular de Na⁺ é {{c1::140}} mEq/L.", "back": "", "type": "cloze", "tags": ["bioquimica::homeostase_ionica", "exam::n1", "high_yield", "exam::n1"], "source_span": "a concentração fora da célula é oposta, de 140mEq/L de sódio e 4mEq/L de potássio", "source_chunk_id": "e7d00a882df6c4ba:0", "explanation": null, "mnemonic": "Fora: Na alto (140), K baixo (4).", "verified": true, "card_id": "63e90c56f7d77470"}, {"front": "A concentração intracelular de Ca²⁺ é cerca de {{c1::10.000}} vezes menor do que no líquido extracelular.", "back": "", "type": "cloze", "tags": ["bioquimica::bomba_calcio", "exam::n1", "high_yield", "exam::n1"], "source_span": "concentração cerca de 10.000 vezes menor do que no líquido extracelular", "source_chunk_id": "e7d00a882df6c4ba:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "b2a1c43fad676664"}, {"front": "A concentração intracelular de K⁺ é aproximadamente {{c1::120–150 mM}}, enquanto a extracelular é {{c2::4–5 mM}}.", "back": "", "type": "cloze", "tags": ["bioquímica::concentrações_iônicas", "exam::n1", "high_yield", "exam::n1"], "source_span": "K⁺~120 –150~4 –5", "source_chunk_id": "e218cc18ab67a657:4", "explanation": null, "mnemonic": "K dentro (120–150) >> K fora (4–5)", "verified": true, "card_id": "f36a71208d20bb6d"}, {"front": "A concentração intracelular de K⁺ é aproximadamente {{c1::120–150 mM}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::composição_iônica", "exam::n1", "high_yield", "exam::n1"], "source_span": "~4 – 5~120 – 150K", "source_chunk_id": "d90a50a5a5347d06:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "7b82817ef5b1ee2b"}, {"front": "A concentração intracelular de K⁺ é de {{c1::120–150 mM}}.", "back": "", "type": "cloze", "tags": ["bioquimica::composicao_ionica", "exam::n1", "high_yield", "exam::n1"], "source_span": "~4 – 5~120 – 150K", "source_chunk_id": "5cddb7aac00de0f5:1", "explanation": null, "mnemonic": null, "verified": false, "card_id": "297d84bf686dbe99"}, {"front": "A concentração intracelular de K⁺ é {{c1::140}} mEq/L.", "back": "", "type": "cloze", "tags": ["bioquimica::homeostase_ionica", "exam::n1", "high_yield", "exam::n1"], "source_span": "a concentração dentro da célula é de 140mEq/L de potássio e 4mEq/L de sódio", "source_chunk_id": "e7d00a882df6c4ba:0", "explanation": null, "mnemonic": "Dentro: K alto (140), Na baixo (4). Fora: o inverso.", "verified": true, "card_id": "8a8fb9d557345218"}, {"front": "A concentração intracelular de Na⁺ é aproximadamente {{c1::10–15 mM}}, enquanto a extracelular é {{c2::140 mM}}.", "back": "", "type": "cloze", "tags": ["bioquímica::concentrações_iônicas", "exam::n1", "high_yield", "exam::n1"], "source_span": "Na⁺ ~10 –15 ~140", "source_chunk_id": "e218cc18ab67a657:4", "explanation": null, "mnemonic": "Na fora (140) >> Na dentro (10–15)", "verified": true, "card_id": "8479d284b2fc660b"}, {"front": "A concentração intracelular de Na⁺ é aproximadamente {{c1::10–15 mM}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::composição_iônica", "exam::n1", "high_yield", "exam::n1"], "source_span": "~140~10 – 15Na", "source_chunk_id": "d90a50a5a5347d06:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "98f0666c20e22fec"}, {"front": "A concentração intracelular de Na⁺ é de {{c1::10–15 mM}}.", "back": "", "type": "cloze", "tags": ["bioquimica::composicao_ionica", "exam::n1", "high_yield", "exam::n1"], "source_span": "~140~10 – 15Na", "source_chunk_id": "5cddb7aac00de0f5:1", "explanation": null, "mnemonic": null, "verified": false, "card_id": "bd55a69fc263eb7e"}, {"front": "A concentração intracelular de Na⁺ é {{c1::4}} mEq/L.", "back": "", "type": "cloze", "tags": ["bioquimica::homeostase_ionica", "exam::n1", "high_yield", "exam::n1"], "source_span": "a concentração dentro da célula é de 140mEq/L de potássio e 4mEq/L de sódio", "source_chunk_id": "e7d00a882df6c4ba:0", "explanation": null, "mnemonic": "Dentro: K alto (140), Na baixo (4).", "verified": true, "card_id": "11ea7b51cd9703e0"}, {"front": "A concentração máxima de H⁺ livre excretável na urina (pH 4,5) é de {{c1::0,03}} mEq/L.", "back": "", "type": "cloze", "tags": ["fisiologia_renal::excrecao_h", "exam::n1", "high_yield", "exam::n1"], "source_span": "o pH mínimo da urina é de cerca de 4,5, correspondendo à concentração de H +de IO-4,5 mEq/L, ou 0,03 mEq/L.", "source_chunk_id": "51723ae60ff2d9cb:5", "explanation": "Mesmo com pH mínimo de 4,5, a concentração de H⁺ livre é ínfima; a maior parte é excretada via tampões.", "mnemonic": null, "verified": true, "card_id": "8af48364d0a183a9"}, {"front": "A concentração normal de CO2 dissolvido no líquido extracelular é de cerca de {{c1::1,2 mol/L}}, correspondendo a PCO2 de {{c2::40 mmHg}}.", "back": "", "type": "cloze", "tags": ["subject::bioquimica::equilibrio_acidobasico", "topic::valores_normais_pco2", "exam::N1", "high_yield", "exam::n1"], "source_span": "Cerca de 1,2 mol/L de CO2 dissolvido é, normalmente, encontrado nos líquidos extracelulares, correspondendo à Pco2 de 40 mmHg", "source_chunk_id": "49ed06ff34adc89d:9", "explanation": null, "mnemonic": null, "verified": false, "card_id": "ea313ca2443179e1"}, {"front": "A concentração normal de CO₂ dissolvido nos líquidos extracelulares é de cerca de {{c1::1,2 mol/L}}, correspondendo à PCO₂ de {{c2::40 mmHg}}.", "back": "", "type": "cloze", "tags": ["bioquimica::acido_base::co2_extracelular", "exam::n1", "high_yield", "exam::n1"], "source_span": "Cerca de 1,2 mol/L de C02 dissolvido é, normalmente, encontrado nos líquidos extracelulares, correspondendo à Pco2 de 40 mmHg", "source_chunk_id": "1aa9c491a2a53451:9", "explanation": null, "mnemonic": null, "verified": true, "card_id": "fcdc1eaa4edb5ff2"}, {"front": "A concentração normal de H+ no líquido extracelular é em média apenas {{c1::0,00004 mEq/L}}.", "back": "", "type": "cloze", "tags": ["bioquímica::equilíbrio_acidobásico", "exam::n1", "high_yield", "exam::n1"], "source_span": "concentração normal de H+, o que representa, em média, apenas 0,00004 mEq/L", "source_chunk_id": "f8d97a9f5383249e:0", "explanation": "Equivale a 40 nEq/L; essa concentração extremamente baixa é mantida por sistemas tampão, pulmões e rins.", "mnemonic": "40 nEq/L = 0,00004 mEq/L", "verified": true, "card_id": "6c6c91a315224d66"}, {"front": "A concentração normal de H+ no líquido extracelular é em média apenas {{c1::0,00004}} mEq/L ({{c2::40}} nEq/L).", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acidobasico", "exam::n1", "high_yield", "exam::n1"], "source_span": "a concentração normal de H+, o que representa, em média, apenas 0,00004 mEq/L", "source_chunk_id": "1505b4589c5c5c15:0", "explanation": "Apesar de ínfima, pequenas variações de H+ alteram profundamente a função enzimática.", "mnemonic": null, "verified": true, "card_id": "97a5bd74ab9d53d3"}, {"front": "A concentração normal de H+ nos líquidos corporais é de aproximadamente {{c1::0,00004 mEq/L}}.", "back": "", "type": "cloze", "tags": ["bioquímica::tampões_acidobásicos", "exam::n1", "high_yield", "exam::n1"], "source_span": "a concentração de H+nos líquidos corporais, normalmente, fica em torno de 0,00004 mEq/L", "source_chunk_id": "1505b4589c5c5c15:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "d479a86e0c8450d7"}, {"front": "A concentração normal de H+ nos líquidos corporais é em torno de {{c1::0,00004 mEq/L}}.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acidobasico::tampoes", "exam::n1", "high_yield", "exam::n1"], "source_span": "a concentração de H+nos líquidos corporais, normalmente, fica em torno de 0,00004 mEq/L", "source_chunk_id": "f8d97a9f5383249e:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "b02c3f7edca61ed6"}, {"front": "A concentração normal de sódio plasmático é cerca de {{c1::142 mEq/L}}.", "back": "", "type": "cloze", "tags": ["bioquimica::osmolaridade::sodio_plasmatico", "exam::n1", "high_yield", "exam::n1"], "source_span": "cerca de 142 mEq/L", "source_chunk_id": "7045a5149a0b780c:11", "explanation": null, "mnemonic": null, "verified": true, "card_id": "5872464d46c6abcd"}, {"front": "A concentração plasmática conjunta de ácido acetoacético e β-hidroxibutírico raramente ultrapassa {{c1::3 mg/dL}} em condições normais.", "back": "", "type": "cloze", "tags": ["bioquímica::lipídios::corpos_cetônicos", "exam::n1", "high_yield", "exam::n1"], "source_span": "sua concentração conjunta no plasma raramente ultrapassa 3 mg/dL", "source_chunk_id": "8405ad39f361404f:5", "explanation": null, "mnemonic": null, "verified": true, "card_id": "d1a2912048e81cda"}, {"front": "A concentração plasmática de colesterol não se altera mais do que ±{{c1::15%}} com variação do colesterol na dieta.", "back": "", "type": "cloze", "tags": ["bioquímica::lipídios::colesterol", "exam::n1", "high_yield", "exam::n1"], "source_span": "a concentração do colesterol, em geral, não se altera para mais ou menos, por mais do que ±15% com a variação da quantidade do colesterol na dieta", "source_chunk_id": "8405ad39f361404f:11", "explanation": null, "mnemonic": null, "verified": true, "card_id": "f71780b75b2a97a0"}, {"front": "A concentração plasmática média normal de LDL é de {{c1::100 mg/dL}} (2,6 mmol/L).", "back": "", "type": "cloze", "tags": ["bioquimica::lipoproteinas::ldl", "exam::n1", "high_yield", "exam::n1"], "source_span": "A concentração plasmática média normal é de 100 mg/dL (2,6 mmol/L)", "source_chunk_id": "349053d639a3f6a1:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "24e98de7021a5e21"}, {"front": "A concentração plasmática normal de H+ é aproximadamente {{c1::40 nEq/L}}.", "back": "", "type": "cloze", "tags": ["bioquímica::equilíbrio_acidobásico", "exam::n1", "high_yield", "exam::n1"], "source_span": "valor normal de, aproximadamente, 0,00004 mEq/L (40 nEq/L)", "source_chunk_id": "f8d97a9f5383249e:1", "explanation": null, "mnemonic": "pH 7,4 → [H+] = 40 nEq/L", "verified": true, "card_id": "b61abeee260c628d"}, {"front": "A concentração plasmática normal de H+ é aproximadamente {{c1::40}} nEq/L.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acidobasico", "exam::n1", "high_yield", "exam::n1"], "source_span": "valor normal de, aproximadamente, 0,00004 mEq/L (40 nEq/L)", "source_chunk_id": "1505b4589c5c5c15:1", "explanation": "Equivale a 0,00004 mEq/L; valor de referência fundamental para o equilíbrio acidobásico.", "mnemonic": "pH 7,4 corresponde a [H+] = 40 nEq/L", "verified": true, "card_id": "e832b07d03e18738"}, {"front": "A condição em que os tecidos-alvo apresentam sensibilidade diminuída aos efeitos metabólicos da insulina é chamada de {{c1::resistência à insulina}}.", "back": "", "type": "cloze", "tags": ["bioquímica::diabetes::resistência_insulínica", "exam::n1", "high_yield", "exam::n1"], "source_span": "sensibilidade diminuída dos tecidos-alvo aos efeitos metabólicos da insulina, condição referida como resistência à insulina", "source_chunk_id": "76cae3be4bc84980:14", "explanation": null, "mnemonic": null, "verified": true, "card_id": "9c98da7cba5059c7"}, {"front": "A conformação tridimensional das proteínas é determinada pelas interações entre as {{c1::cadeias laterais}} de seus aminoácidos constituintes.", "back": "", "type": "cloze", "tags": ["bioquimica::dobramento_proteinas", "exam::n1", "high_yield", "exam::n1"], "source_span": "Interações entre as cadeias laterais de seus aminoácidos constituintes Conformação Tridimensional", "source_chunk_id": "b678350d1f36470c:7", "explanation": "As cadeias laterais (R) dos aminoácidos estabelecem interações não-covalentes e covalentes que determinam a estrutura 3D.", "mnemonic": null, "verified": true, "card_id": "09023689ecd0f54d"}, {"front": "A consequência final da desestabilização dos microtúbulos e dos agregados de tau no neurônio é a {{c1::morte neuronal}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::alzheimer", "exam::n1", "high_yield", "exam::n1"], "source_span": "a desestabilização dos microtúbulos levam à disfunção e, por fim, à morte do neurônio", "source_chunk_id": "b678350d1f36470c:16", "explanation": null, "mnemonic": null, "verified": true, "card_id": "961953dae0d877ab"}, {"front": "A correção da hiponatremia crônica deve ser limitada a menos de {{c1::10–12}} mmol/L em 24 horas.", "back": "", "type": "cloze", "tags": ["bioquimica::eletrolitos::hiponatremia::tratamento", "exam::n1", "high_yield", "exam::n1"], "source_span": "limitação da correção da hiponatremia crônica, para menos de 10 a 12 mmol/L em 24 horas", "source_chunk_id": "7045a5149a0b780c:12", "explanation": null, "mnemonic": null, "verified": true, "card_id": "05ec446aa99531ca"}, {"front": "A correção da hiponatremia crônica deve ser limitada a menos de {{c1::18}} mmol/L em 48 horas.", "back": "", "type": "cloze", "tags": ["bioquimica::eletrolitos::hiponatremia::tratamento", "exam::n1", "high_yield", "exam::n1"], "source_span": "para menos de 18 mmol/L em 48 horas", "source_chunk_id": "7045a5149a0b780c:12", "explanation": null, "mnemonic": null, "verified": true, "card_id": "ca0387a61c8cdab3"}, {"front": "A correção pelo sistema tampão ocorre em {{c1::frações de segundos}}.", "back": "", "type": "cloze", "tags": ["bioquimica::acido_basico::sistemas_tampao", "exam::n1", "high_yield", "exam::n1"], "source_span": "as reações químicas com os sistemas-tampão levam à correção do distúrbio em frações de segundos", "source_chunk_id": "0d58a2246d9c0f12:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "608f140afe9f65f6"}, {"front": "A correção pulmonar do pH sanguíneo é {{c1::menos potente}} e age em {{c2::minutos a horas}}.", "back": "", "type": "cloze", "tags": ["bioquimica::acido_base::mecanismos_correcao", "exam::n1", "high_yield", "exam::n1"], "source_span": "Menos potente, Ação imediataPulmões, Ação de minutos a horas", "source_chunk_id": "2c1fb88d06450be5:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "7bf97776950812a9"}, {"front": "A correção renal do pH sanguíneo é {{c1::mais potente}} e age em {{c2::horas a dias}}.", "back": "", "type": "cloze", "tags": ["bioquimica::acido_base::mecanismos_correcao", "exam::n1", "high_yield", "exam::n1"], "source_span": "Rins, Mais potente, Ação de horas a dias", "source_chunk_id": "2c1fb88d06450be5:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "8c169b46172f009b"}, {"front": "A correção rápida da hiponatremia crônica pode causar {{c1::desmielinização osmótica}} dos neurônios.", "back": "", "type": "cloze", "tags": ["bioquimica::eletrolitos::hiponatremia::tratamento", "exam::n1", "high_yield", "exam::n1"], "source_span": "dismienilização dos neurônios, mediada por osmose, pode ser evitada pela limitação da correção da hiponatremia crônica", "source_chunk_id": "7045a5149a0b780c:12", "explanation": "A correção rápida cria gradiente osmótico que desmieliniza neurônios adaptados à baixa osmolaridade.", "mnemonic": null, "verified": true, "card_id": "b5dd0b6ee270fa8a"}, {"front": "A correção rápida da hiponatremia pode levar à lesão osmótica dos neurônios porque ultrapassa a capacidade do cérebro de {{c1::recuperar solutos perdidos pelas células}}.", "back": "", "type": "cloze", "tags": ["subject::fisiologia::disturbios_hidroeletroliticos", "exam::n1", "topic::hiponatremia", "high_yield", "exam::n1"], "source_span": "pode ultrapassar a capacidade do cérebro de recuperar a perda de solutos das células e pode levar à lesão osmótica dos neurônios", "source_chunk_id": "7045a5149a0b780c:12", "explanation": "Correção rápida cria gradiente osmótico que retira água das células cerebrais, causando lesão neuronal.", "mnemonic": null, "verified": true, "card_id": "4bc198d38a9948a6"}, {"front": "A célula eucariótica é identificada pela presença de {{c1::núcleo definido}} e pelo enovelamento do DNA em proteína.", "back": "", "type": "cloze", "tags": ["biologia_celular::células_eucariontes", "exam::n1", "high_yield", "exam::n1"], "source_span": "A presença de núcleo definido e o enovelamento do DNA em proteína.", "source_chunk_id": "0b1b32d6fb0337df:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "c6dbc7539e51eb37"}, {"front": "A célula gasta {{c1::2/3}} de sua energia para a manutenção das bombas de sódio e potássio.", "back": "", "type": "cloze", "tags": ["bioquimica::membrana::bomba_na_k", "exam::n1", "high_yield", "exam::n1"], "source_span": "2/3 de sua energia para a manutenção dessas bombas.", "source_chunk_id": "655fa528f04d337e:0", "explanation": "A bomba Na⁺/K⁺-ATPase é altamente custosa energeticamente, refletindo sua importância na homeostase iônica celular.", "mnemonic": "2/3 = dois íons Na⁺ saem, 3 K⁺ entram — e custam 2/3 da energia!", "verified": false, "card_id": "d12cb3f748d452c5"}, {"front": "A célula é definida como a {{c1::menor porção de matéria viva}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::conceito_de_célula", "exam::n1", "high_yield", "exam::n1"], "source_span": "Menor porção de matéria viva.", "source_chunk_id": "fc03bff607c86d28:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "3045c02d079a2dcb"}, {"front": "A dapagliflozina bloqueia o cotransportador {{c1::SGLT2}}, responsável pela reabsorção de glicose no {{c2::rim}}.", "back": "", "type": "cloze", "tags": ["bioquimica::farmacologia::sglt2", "exam::n1", "high_yield", "exam::n1"], "source_span": "bloqueia o cotransportador sódio-glicose 2 (SGLT2), uma proteína responsável pela reabsorção da glicose no rim", "source_chunk_id": "64f242de981408e9:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "3a7022f5b645dd72"}, {"front": "A deficiência de ADH causa excreção de grandes volumes de urina diluída, distúrbio denominado {{c1::diabetes insípido}}.", "back": "", "type": "cloze", "tags": ["bioquimica::eletrolitos::hipernatremia::diabetes_insipido", "exam::n1", "high_yield", "exam::n1"], "source_span": "os rins excretam grandes quantidades de urina diluída (distúrbio conhecido como diabetes insípido)", "source_chunk_id": "7045a5149a0b780c:12", "explanation": null, "mnemonic": null, "verified": true, "card_id": "814277c99e8961de"}, {"front": "A deficiência de OTC é causada por mutações no gene OTC localizado no cromossomo {{c1::X}}.", "back": "", "type": "cloze", "tags": ["bioquímica::ciclo_da_ureia::deficiência_otc", "exam::n1", "high_yield", "exam::n1"], "source_span": "A etiologia é genética, por mutações no gene OTC, localizado no cromossomo X", "source_chunk_id": "aeda9a3a37981ef0:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "4ef3d871340d3509"}, {"front": "A deficiência de enzima digestiva pancreática causa, mais provavelmente, {{c1::redução da quebra de macronutrientes alimentares}}.", "back": "", "type": "cloze", "tags": ["bioquimica::enzimas_digestivas", "exam::n1", "high_yield", "exam::n1"], "source_span": "Redução da quebra de macronutrientes alimentares.", "source_chunk_id": "5a1fb13ebefda48c:2", "explanation": "O pâncreas secreta enzimas proteolíticas, lipases e amilases; sua deficiência compromete a digestão de proteínas, lipídios e carboidratos.", "mnemonic": null, "verified": true, "card_id": "85221d409d904c8e"}, {"front": "A deficiência de insulina promove conversão hepática de ácidos graxos em {{c1::fosfolipídios}} e {{c2::colesterol}}.", "back": "", "type": "cloze", "tags": ["bioquimica::deficiencia_insulina::dislipidemia", "exam::n1", "high_yield", "exam::n1"], "source_span": "deficiência de insulina, também promove a conversão hepática de alguns ácidos graxos em fosfolipídios e colesterol", "source_chunk_id": "76cae3be4bc84980:5", "explanation": null, "mnemonic": null, "verified": true, "card_id": "184ae905a6899518"}, {"front": "A deficiência de vitamina B12 pode causar anemia {{c1::megaloblástica}}, em que os glóbulos vermelhos são maiores que o normal.", "back": "", "type": "cloze", "tags": ["bioquimica::vitamina_b12", "exam::n1", "high_yield", "exam::n1"], "source_span": "A deficiência de tal vitamina pode causar a anemia megaloblástica, um tipo de anemia em que os glóbulos vermelhos são maiores do que o normal", "source_chunk_id": "44a343e9822cff8b:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "24ddc5ab00cbf851"}, {"front": "A deficiência de vitamina {{c1::B9 (ácido fólico)}} causa falhas na síntese de nucleotídeos purínicos e pirimidínicos.", "back": "", "type": "cloze", "tags": ["bioquimica::vitaminas::b9", "exam::n1", "high_yield", "exam::n1"], "source_span": "deficiência de vitamina B9 (ácido fólico). A análise molecular revela falhas na síntese de nucleotídeos purínicos e pirimidínicos", "source_chunk_id": "c45346871801c1b5:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "1c26efeb7d9e0a66"}, {"front": "A deficiência de {{c1::oxaloacetato}} limita a entrada da acetil-CoA no ciclo do ácido cítrico.", "back": "", "type": "cloze", "tags": ["bioquímica::lipídios::cetose", "exam::n1", "high_yield", "exam::n1"], "source_span": "a deficiência de oxaloacetato, derivado dos carboidratos, limita a entrada da acetil-CoA no ciclo do ácido cítrico", "source_chunk_id": "8405ad39f361404f:6", "explanation": null, "mnemonic": null, "verified": true, "card_id": "c9d8b09e4da7e458"}, {"front": "A degradação e oxidação dos ácidos graxos ocorrem exclusivamente nas {{c1::mitocôndrias}}.", "back": "", "type": "cloze", "tags": ["bioquímica::lipídios::betaoxidação", "exam::n1", "high_yield", "exam::n1"], "source_span": "A degradação e a oxidação dos ácidos graxos só ocorrem nas mitocôndrias.", "source_chunk_id": "8405ad39f361404f:3", "explanation": null, "mnemonic": null, "verified": true, "card_id": "8019a01733b16436"}, {"front": "A demonstração post-mortem de aterotrombose na artéria que supre o miocárdio infartado satisfaz critérios de IAM tipo 1 independentemente dos valores de {{c1::cTn (troponina cardíaca)}}.", "back": "", "type": "cloze", "tags": ["subject::bioquimica::biologia_celular::infarto", "exam::n1", "high_yield", "exam::n1"], "source_span": "Post-mortem demonstration of an atherothrombus in the artery supplying the infarcted myocardium meets the type 1 MI criteria regardless of cTn values", "source_chunk_id": "3a7a538a2984b6e2:10", "explanation": null, "mnemonic": null, "verified": true, "card_id": "051bca5891db09ca"}, {"front": "A densidade da aquaporina-2 nas membranas celulares pode ser {{c1::alterada}} em diferentes condições fisiológicas.", "back": "", "type": "cloze", "tags": ["bioquimica::membrana::aquaporinas", "exam::n1", "high_yield", "exam::n1"], "source_span": "a densidade de algumas aquaporinas (p. ex., aquaporina-2), nas membranas celulares, não é estática, mas pode ser alterada em diferentes condições fisiológicas", "source_chunk_id": "ca1d03681e38ff3b:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "8e3451f8ed028994"}, {"front": "A depleção do volume do líquido extracelular aumenta os níveis de {{c1::angiotensina II}}, estimulando o trocador Na+-H+ nos túbulos renais.", "back": "", "type": "cloze", "tags": ["fisiologia_renal::regulação_acidobásica", "exam::n1", "high_yield", "exam::n1"], "source_span": "aumento dos níveis de angiotensina II que estimulam diretamente a atividade do trocador Na+-H+ no túbulos renais", "source_chunk_id": "1505b4589c5c5c15:12", "explanation": null, "mnemonic": null, "verified": true, "card_id": "bc7b717f58c2baae"}, {"front": "A depleção do volume do líquido extracelular aumenta {{c1::angiotensina II}}, estimulando o trocador Na+-H+ nos túbulos renais.", "back": "", "type": "cloze", "tags": ["subject::fisiologia_renal::acidobásico", "topic::regulação_acidobásica_renal", "exam::N1", "high_yield", "exam::n1"], "source_span": "aumento dos níveis de angiotensina II que estimulam diretamente a atividade do trocador Na+-H+ no túbulos renais", "source_chunk_id": "f8d97a9f5383249e:12", "explanation": null, "mnemonic": null, "verified": true, "card_id": "69104552da11a479"}, {"front": "A depleção do volume do líquido extracelular tende a causar {{c1::alcalose}} devido à excessiva secreção de H+ e reabsorção de HCO3-.", "back": "", "type": "cloze", "tags": ["fisiologia_renal::regulação_acidobásica", "exam::n1", "high_yield", "exam::n1"], "source_span": "a depleção do volume do líquido extracelular tende a causar alcalose devido à excessiva secreção de H+ e de reabsorção de HC03~", "source_chunk_id": "1505b4589c5c5c15:12", "explanation": null, "mnemonic": null, "verified": true, "card_id": "6f0bd9be59e6eabf"}, {"front": "A desidratação é graduada em uma escala de {{c1::+/4+}}.", "back": "", "type": "cloze", "tags": ["semiologia::desidratacao", "exam::n1", "high_yield", "exam::n1"], "source_span": "Desidratado (+/4+)", "source_chunk_id": "56d0a30d83e5310f:1", "explanation": null, "mnemonic": null, "verified": false, "card_id": "e92a04fd23d24d75"}, {"front": "A desnaturação proteica causa {{c1::perda da atividade biológica}} da proteína.", "back": "", "type": "cloze", "tags": ["bioquímica::proteínas::desnaturação", "exam::n1", "high_yield", "exam::n1"], "source_span": "Há perda da atividade biológica.", "source_chunk_id": "3f5f409b556f5f85:2", "explanation": "A função biológica depende da conformação tridimensional; ao desnaturar, a proteína perde sua forma funcional.", "mnemonic": null, "verified": true, "card_id": "b35626a332ddb57a"}, {"front": "A despolarização da membrana da célula beta abre canais de {{c1::cálcio}} dependentes de voltagem.", "back": "", "type": "cloze", "tags": ["bioquimica::secrecao_insulina::mecanismo", "exam::n1", "high_yield", "exam::n1"], "source_span": "abrindo consequentemente os canais de cálcio dependentes de voltagem que são sensíveis às alterações da voltagem da membrana", "source_chunk_id": "76cae3be4bc84980:7", "explanation": null, "mnemonic": null, "verified": true, "card_id": "85973043a2f276a7"}, {"front": "A despolarização da membrana das células beta abre canais de cálcio {{c1::voltagem-dependentes}}, estimulando a secreção de insulina.", "back": "", "type": "cloze", "tags": ["bioquimica::farmacologia::glibenclamida::mecanismo", "exam::n1", "high_yield", "exam::n1"], "source_span": "abrem-se canais de cálcio voltagem-dependentes, aumentando o cálcio intracelular e estimulando a secreção de insulina", "source_chunk_id": "6cbe56609278c25d:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "9c5d53445f9f98ae"}, {"front": "A dessaturação de ácidos graxos no fígado é realizada por uma {{c1::desidrogenase}} nas células hepáticas.", "back": "", "type": "cloze", "tags": ["bioquímica::lipídios::metabolismo_hepático", "exam::n1", "high_yield", "exam::n1"], "source_span": "Essa dessaturação é realizada por meio de uma desidrogenase nas células hepáticas.", "source_chunk_id": "8405ad39f361404f:3", "explanation": "A desidrogenase hepática remove hidrogênios dos ácidos graxos, introduzindo duplas ligações e aumentando o grau de insaturação.", "mnemonic": null, "verified": true, "card_id": "8376fa93aabc3222"}, {"front": "A diabetes mellitus é uma síndrome resultante de um distúrbio no metabolismo de {{c1::açúcares, gorduras e proteínas}}.", "back": "", "type": "cloze", "tags": ["bioquimica::diabetes_mellitus", "exam::n1", "high_yield", "exam::n1"], "source_span": "A diabetes mellitus é uma síndrome resultante de um distúrbio no metabolismo de açúcares, gorduras e proteínas", "source_chunk_id": "8f0954aa2c6a919c:1", "explanation": "DM tipo I afeta simultaneamente os três macronutrientes por deficiência absoluta de insulina.", "mnemonic": null, "verified": false, "card_id": "8915e8b9b5ead078"}, {"front": "A diarreia causa acidose metabólica pela perda de grandes quantidades de {{c1::bicarbonato de sódio}} nas fezes.", "back": "", "type": "cloze", "tags": ["fisiologia::acidobásico::acidose_metabólica", "exam::n1", "high_yield", "exam::n1"], "source_span": "A causa dessa acidose é a perda de grandes quantidades de bicarbonato de sódio nas fezes", "source_chunk_id": "f8d97a9f5383249e:14", "explanation": "A perda fecal de HCO3- reduz o tampão plasmático, diminuindo o pH sanguíneo.", "mnemonic": null, "verified": true, "card_id": "54c754c212bf620b"}, {"front": "A diarreia causa acidose metabólica por {{c1::perda de bicarbonato}}.", "back": "", "type": "cloze", "tags": ["bioquímica::acidose_metabólica::causas", "exam::n1", "high_yield", "exam::n1"], "source_span": "Perda de bicarbonato:•Diarreia", "source_chunk_id": "51723ae60ff2d9cb:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "a16cf5bd3df9dfc0"}, {"front": "A diarreia grave pode ameaçar a vida caso não seja tratada em {{c1::poucos dias}}.", "back": "", "type": "cloze", "tags": ["bioquímica::balanço_hídrico", "exam::n1", "high_yield", "exam::n1"], "source_span": "a diarréia grave pode ameaçar a vida, caso não seja tratada em poucos dias.", "source_chunk_id": "e218cc18ab67a657:3", "explanation": "Perdas maciças de água e eletrólitos nas fezes levam rapidamente a desidratação e colapso hemodinâmico.", "mnemonic": null, "verified": true, "card_id": "5020a6c668799ecc"}, {"front": "A diarreia grave pode ameaçar a vida caso não seja tratada em {{c1::poucos dias}}.", "back": "", "type": "cloze", "tags": ["bioquimica::balanco_hidrico", "exam::n1", "high_yield", "exam::n1"], "source_span": "a diarréia grave pode ameaçar a vida, caso não seja tratada em poucos dias.", "source_chunk_id": "e218cc18ab67a657:9", "explanation": "A diarreia aumenta drasticamente a perda fecal de água, rompendo o balanço hídrico.", "mnemonic": null, "verified": false, "card_id": "5020a6c668799ecc"}, {"front": "A diarreia grave pode ameaçar a vida se não tratada em {{c1::poucos dias}}.", "back": "", "type": "cloze", "tags": ["bioquimica::balanco_hidrico", "exam::n1", "high_yield", "exam::n1"], "source_span": "a diarréia grave pode ameaçar a vida, caso não seja tratada em poucos dias", "source_chunk_id": "e218cc18ab67a657:5", "explanation": "A diarreia aumenta drasticamente a perda de água e eletrólitos, desequilibrando o balanço hídrico.", "mnemonic": null, "verified": false, "card_id": "b2945003156fddf0"}, {"front": "A diarréia resulta na perda de {{c1::HCO3-}} pelo corpo, causando acidose metabólica.", "back": "", "type": "cloze", "tags": ["bioquimica::equilibrio_acido_base::acidose_metabolica", "exam::n1", "high_yield", "exam::n1"], "source_span": "a diarréia resulta na perda de HC03- pelo corpo, efeito similar ao de perder grandes quantidades de bicarbonato na urina", "source_chunk_id": "f8d97a9f5383249e:15", "explanation": "Secreções intestinais são ricas em bicarbonato; sua perda reduz o tampão e acidifica o meio interno.", "mnemonic": null, "verified": true, "card_id": "4d6eb4acae4a4780"}, {"front": "A diferenciação fundamental entre eucariontes e procariontes está na {{c1::organização interna e compartimentação}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::procariontes_vs_eucariontes", "exam::n1", "high_yield", "exam::n1"], "source_span": "A diferenciação fundamental se encontra na organização interna e compartimentação", "source_chunk_id": "a0a5120f3ea20a07:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "f00cbb17334e7470"}, {"front": "A diferença de concentração dos íons sódio e potássio entre os meios intra e extracelular {{c1::não é}} mantida pelo mecanismo passivo de osmose.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte_de_membrana", "exam::n1", "high_yield", "exam::n1"], "source_span": "a diferença de concentração dos íons sódio e potássio entre os meios intra e extracelular é mantida pelo mecanismo passivo de osmose.", "source_chunk_id": "515b543e17a8338f:3", "explanation": "A manutenção dos gradientes iônicos de Na⁺/K⁺ requer transporte ativo (bomba Na⁺/K⁺-ATPase), não osmose passiva.", "mnemonic": null, "verified": false, "card_id": "2b63313d40488d25"}, {"front": "A diferença entre secreção de H+ (~4.400 mEq/dia) e filtração de HCO3- (~4.320 mEq/dia) resulta em excreção urinária de H+ de cerca de {{c1::80}} mEq/dia.", "back": "", "type": "cloze", "tags": ["fisiologia::renal::excracao_acida", "exam::n1", "high_yield", "exam::n1"], "source_span": "Esse excesso de H+eliminado pela urina (cerca de 80 mEq/L/dia) retira do corpo os ácidos não voláteis produzidos pelo metabolismo.", "source_chunk_id": "f8d97a9f5383249e:8", "explanation": "Os 80 mEq/dia excretados correspondem aos ácidos não voláteis produzidos pelo metabolismo.", "mnemonic": null, "verified": true, "card_id": "8f042dd8ad6c4ff9"}, {"front": "A difusão facilitada ocorre da região de {{c1::maior}} concentração para a de {{c2::menor}} concentração.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte_de_membrana::difusao_facilitada", "exam::n1", "high_yield", "exam::n1"], "source_span": "Passagem do soluto da região de maior concentração para a região de menor concentração através da ajuda de proteínas.", "source_chunk_id": "36f2ff3a2cd3fb54:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "80fed8b35549b321"}, {"front": "A difusão facilitada é também conhecida como difusão {{c1::mediada por transportador}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::difusao_facilitada", "high_yield", "exam::n1", "exam::n1"], "source_span": "A difusão facilitada é também conhecida como difusão mediada por transportador", "source_chunk_id": "ca1d03681e38ff3b:5", "explanation": null, "mnemonic": null, "verified": true, "card_id": "e0f353665df516f1"}, {"front": "A difusão simples ocorre a favor do gradiente de {{c1::concentração}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::transporte_membrana::difusao_simples", "exam::n1", "high_yield", "exam::n1"], "source_span": "difusão simples a favor do gradiente de concentração", "source_chunk_id": "8d967ded073fd283:0", "explanation": null, "mnemonic": null, "verified": false, "card_id": "2ddcb786ce900a73"}, {"front": "A difusão simples ocorre até que os dois compartimentos tenham {{c1::concentração do soluto semelhante}}.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte_membrana::difusao_simples", "exam::n1", "high_yield", "exam::n1"], "source_span": "A difusão ocorre até que os dois compartimentos tenham uma concentração do soluto semelhante.", "source_chunk_id": "36f2ff3a2cd3fb54:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "7994b52c1dc132da"}, {"front": "A difusão simples ocorre pelos interstícios da bicamada lipídica quando a substância é {{c1::lipossolúvel}}.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte::difusao_simples", "exam::n1", "high_yield", "exam::n1"], "source_span": "pelos interstícios da bicamada lipídica, no caso da substância que se difunde ser lipossolúvel", "source_chunk_id": "ca1d03681e38ff3b:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "54289c60233f7935"}, {"front": "A difusão simples pode ocorrer por {{c1::canais aquosos}} que penetram por toda a espessura da membrana.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte::difusao_simples", "exam::n1", "high_yield", "exam::n1"], "source_span": "pelos canais aquosos que penetram por toda a espessura da membrana, por meio de alguma das grandes proteínas transportadoras", "source_chunk_id": "ca1d03681e38ff3b:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "8c9cfaa85863428d"}, {"front": "A difusão {{c1::facilitada}} requer interação com proteína transportadora mediante ligação química.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte::difusao_facilitada", "exam::n1", "high_yield", "exam::n1"], "source_span": "A difusão facilitada requer a interação com uma proteína transportadora. A proteína transportadora ajuda a passagem das moléculas ou dos íons, através da membrana, por meio de ligação química com eles", "source_chunk_id": "ca1d03681e38ff3b:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "f7fce513cca76c2b"}, {"front": "A difusão {{c1::simples}} ocorre sem qualquer interação com proteínas transportadoras da membrana.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte::difusao_simples", "exam::n1", "high_yield", "exam::n1"], "source_span": "A difusão simples significa que o movimento cinético das moléculas ou dos íons ocorre através de abertura na membrana ou através dos espaços intermoleculares, sem que ocorra qualquer interação com as proteínas transportadoras", "source_chunk_id": "ca1d03681e38ff3b:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "70ebb59648dba867"}, {"front": "A difusão é o movimento de regiões de {{c1::maior concentração}} para regiões de {{c2::menor concentração}}.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte_membrana::difusao_simples", "exam::n1", "high_yield", "exam::n1"], "source_span": "A difusão é, portanto, o movimento de regiões de maior concentração para regiões de menor concentração.", "source_chunk_id": "139867c0a9741b7a:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "7e7635358c261380"}, {"front": "A digestão dos carboidratos começa na boca pela ação da {{c1::amilase salivar}}.", "back": "", "type": "cloze", "tags": ["bioquímica::digestão_carboidratos", "exam::n1", "high_yield", "exam::n1"], "source_span": "A digestão dos carboidratos começa na boca pela ação da amilase salivar, que inicia a quebra do amido.", "source_chunk_id": "e07c53735f89e95b:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "0a5899a3f9de7fc8"}, {"front": "A digoxina age inibindo a {{c1::Na⁺-K⁺-ATPase}}, o que aumenta a concentração citoplasmática de {{c2::cálcio}}.", "back": "", "type": "cloze", "tags": ["bioquimica::farmacos::digoxina", "exam::n1", "high_yield", "exam::n1"], "source_span": "Age inibindo a Na+-K+-ATPase, o que aumenta a concentração citoplasmática de cálcio.", "source_chunk_id": "584ea7e1df69fa89:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "c00d2cb74e6e0456"}, {"front": "A digoxina age inibindo a {{c1::Na⁺-K⁺-ATPase}}, o que aumenta a concentração citoplasmática de {{c2::cálcio}}.", "back": "", "type": "cloze", "tags": ["bioquimica::farmacologia::digoxina::mecanismo", "exam::n1", "high_yield", "exam::n1"], "source_span": "Age inibindo a Na+-K+-ATPase, o que aumenta a concentração citoplasmática de cálcio.", "source_chunk_id": "64f242de981408e9:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "c00d2cb74e6e0456"}, {"front": "A digoxina aumenta o {{c1::volume sistólico}} e o {{c2::débito cardíaco}} na insuficiência cardíaca congestiva.", "back": "", "type": "cloze", "tags": ["bioquimica::farmacos::digoxina", "exam::n1", "high_yield", "exam::n1"], "source_span": "A digoxina produz dois efeitos no coração com insuficiência: o aumento do volume sistólico e aumento do débito cardíaco.", "source_chunk_id": "584ea7e1df69fa89:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "e071ba0802c67340"}, {"front": "A digoxina inibe a {{c1::Na⁺/K⁺-ATPase}}, aumentando o sódio intracelular.", "back": "", "type": "cloze", "tags": ["bioquimica::farmacologia::digoxina::mecanismo", "exam::n1", "high_yield", "exam::n1"], "source_span": "mecanismo de ação consiste na inibição da Na⁺/K⁺-ATPase, o que aumenta o sódio intracelular", "source_chunk_id": "6cbe56609278c25d:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "b3541c6a14095061"}, {"front": "A digoxina pode ser letal porque inibe a {{c1::Na⁺/K⁺-ATPase}} da membrana plasmática.", "back": "", "type": "cloze", "tags": ["bioquimica::digoxina", "biologia_celular::transporte_membrana", "exam::n1", "high_yield", "exam::n1"], "source_span": "digoxina pode ser letal porque inibe a Na+/K+-ATPase da membrana plasmática", "source_chunk_id": "8d967ded073fd283:1", "explanation": null, "mnemonic": null, "verified": false, "card_id": "3a6c9f422bcf3e05"}, {"front": "A digoxina produz aumento do volume sistólico e do {{c1::débito cardíaco}} no coração insuficiente.", "back": "", "type": "cloze", "tags": ["bioquimica::farmacologia::digoxina", "exam::n1", "high_yield", "exam::n1"], "source_span": "A digoxina produz dois efeitos no coração com insuficiência: o aumento do volume sistólico e aumento do débito cardíaco.", "source_chunk_id": "6cbe56609278c25d:2", "explanation": null, "mnemonic": null, "verified": true, "card_id": "be5ec187b997710f"}, {"front": "A digoxina produz dois efeitos no coração com insuficiência: aumento do {{c1::volume sistólico}} e aumento do {{c2::débito cardíaco}}.", "back": "", "type": "cloze", "tags": ["bioquimica::farmacologia::digoxina", "exam::n1", "high_yield", "exam::n1"], "source_span": "A digoxina produz dois efeitos no coração com insuficiência: o aumento do volume sistólico e aumento do débito cardíaco.", "source_chunk_id": "64f242de981408e9:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "06ea5e98de318878"}, {"front": "A diminuição das concentrações plasmáticas de proteína {{c1::diminui a pressão coloidosmótica}} do plasma e aumenta a filtração capilar.", "back": "", "type": "cloze", "tags": ["fisiologia::edema::hipoproteinemia", "exam::n1", "high_yield", "exam::n1"], "source_span": "A diminuição das concentrações plasmáticas de proteína diminui a pressão coloidosmótica do plasma e aumenta a filtração capilar", "source_chunk_id": "7045a5149a0b780c:14", "explanation": null, "mnemonic": null, "verified": true, "card_id": "d39e9b3afa993004"}, {"front": "A diretriz DETeCD-ADRD da Alzheimer's Association é voltada para recomendações na {{c1::atenção primária}}.", "back": "", "type": "cloze", "tags": ["subject::bioquimica::diretrizes_clinicas", "topic::diagnostico_alzheimer::diretrizes", "exam::n1", "high_yield", "exam::n1"], "source_span": "Executive summary of recommendations for primary care", "source_chunk_id": "6ceacd6a9c590fa1:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "64fa214989ecb5ad"}, {"front": "A diretriz DETeCD-ADRD fornece recomendações especificamente para o contexto de {{c1::atenção primária}}.", "back": "", "type": "cloze", "tags": ["subject::neurologia::alzheimer", "topic::diagnostico", "exam::n1", "high_yield", "exam::n1"], "source_span": "Executive summary of recommendations for primary care", "source_chunk_id": "9de97938dd802b2a:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "1e680dfb6926bce2"}, {"front": "A disfunção da {{c1::via autofágica-lisossomal}} contribui para o acúmulo de proteínas mal dobradas.", "back": "", "type": "cloze", "tags": ["bioquimica::proteostase::autofagia", "exam::n1", "high_yield", "exam::n1"], "source_span": "Pode ocorrer disfunção dos sistemas sistema ubiquitina-proteassoma (UPS) e da via autofágica-lisossomal", "source_chunk_id": "b678350d1f36470c:12", "explanation": "A via autofágica-lisossomal degrada agregados proteicos; sua falha permite acúmulo de proteínas tóxicas.", "mnemonic": null, "verified": true, "card_id": "17f41cac60c9839c"}, {"front": "A disfunção das enzimas pancreáticas na fibrose cística conduz à {{c1::má absorção de nutrientes}}.", "back": "", "type": "cloze", "tags": ["bioquimica::fibrose_cistica::complicacoes_pancreaticas", "exam::n1", "high_yield", "exam::n1"], "source_span": "disfunção das enzimas pancreáticas, o que, por sua vez, conduzem à má absorção de nutrientes", "source_chunk_id": "83fc1bb52ed5efaa:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "1434fa862a86d6af"}, {"front": "A disfunção das {{c1::células acinares}} pancreáticas pode levar a doenças agudas ou crônicas.", "back": "", "type": "cloze", "tags": ["bioquimica::pancreas_exocrino::fisiopatologia", "exam::n1", "high_yield", "exam::n1"], "source_span": "disfunção das células acinares que produzem essas enzimas digestivas, e pode levar a doenças agudas ou crónicas", "source_chunk_id": "d04c451ccfa8aea7:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "2634609f78bb3af8"}, {"front": "A disfunção do {{c1::sistema ubiquitina-proteassoma (UPS)}} contribui para o acúmulo de proteínas mal dobradas.", "back": "", "type": "cloze", "tags": ["bioquimica::proteostase::ups", "exam::n1", "high_yield", "exam::n1"], "source_span": "Pode ocorrer disfunção dos sistemas sistema ubiquitina-proteassoma (UPS) e da via autofágica-lisossomal", "source_chunk_id": "b678350d1f36470c:12", "explanation": "O UPS é responsável pela degradação de proteínas ubiquitinadas; sua disfunção impede a eliminação de proteínas mal dobradas.", "mnemonic": null, "verified": true, "card_id": "44eebe7ab1381802"}, {"front": "A disfunção endotelial causa aumento da {{c1::permeabilidade endotelial}}.", "back": "", "type": "cloze", "tags": ["bioquímica::disfunção_endotelial", "exam::n1", "high_yield", "exam::n1"], "source_span": "ocorre aumento da permeabilidade desta estrutura", "source_chunk_id": "72ac6c23532e77b9:4", "explanation": null, "mnemonic": null, "verified": true, "card_id": "aaa40f76bbe29ea7"}, {"front": "A disfunção endotelial leva à expressão de VCAM-1, {{c1::ICAM-1}}, {{c2::E-selectina}} e P-selectina.", "back": "", "type": "cloze", "tags": ["bioquimica::aterosclerose::disfuncao_endotelial", "exam::n1", "high_yield", "exam::n1"], "source_span": "expressão de moléculas de adesão (VCAM-1, ICAM-1, E-selectina, P-selectina)", "source_chunk_id": "349053d639a3f6a1:6", "explanation": null, "mnemonic": null, "verified": true, "card_id": "1ea3ec4f188ef34f"}, {"front": "A disfunção endotelial leva à expressão de {{c1::VCAM-1}}, ICAM-1, E-selectina e P-selectina.", "back": "", "type": "cloze", "tags": ["bioquimica::aterosclerose::disfuncao_endotelial", "exam::n1", "high_yield", "exam::n1"], "source_span": "expressão de moléculas de adesão (VCAM-1, ICAM-1, E-selectina, P-selectina)", "source_chunk_id": "349053d639a3f6a1:6", "explanation": "Disfunção endotelial ativa a expressão de moléculas de adesão que recrutam leucócitos para a íntima.", "mnemonic": "VICE-P: VCAM, ICAM, C(E)-selectina, P-selectina", "verified": true, "card_id": "ccdd85eae0d63b3b"}, {"front": "A disfunção endotelial {{c1::facilita a entrada de partículas de LDL}} na íntima arterial.", "back": "", "type": "cloze", "tags": ["bioquímica::disfunção_endotelial::aterogênese", "exam::n1", "high_yield", "exam::n1"], "source_span": "Facilita a entrada de partículas de LDL na íntima arterial.", "source_chunk_id": "72ac6c23532e77b9:4", "explanation": null, "mnemonic": null, "verified": true, "card_id": "ea6d21d4f50a5374"}, {"front": "A dissacaridase responsável pela digestão da lactose é a {{c1::lactase}}.", "back": "", "type": "cloze", "tags": ["bioquimica::carboidratos::digestao::enzimas", "exam::n1", "high_yield", "exam::n1"], "source_span": "dissacaridases (por exemplo: lactase, sacarase, maltase e isomaltase) produzem monossacarídeos (glicose, galactose e frutose)", "source_chunk_id": "c34e55e9c0c0df3e:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "c7de70faca5d41d1"}, {"front": "A distinção entre DNA e RNA requer {{c1::técnicas de coloração específicas}} ou {{c2::microscopia eletrônica de alta resolução}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::microscopia", "exam::n1", "high_yield", "exam::n1"], "source_span": "Essa distinção requer técnicas de coloração específicas ou microscopia eletrônica de alta resolução", "source_chunk_id": "a0a5120f3ea20a07:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "4309e387bc12a232"}, {"front": "A distribuição de eletrólitos através da membrana celular depende, em parte, de {{c1::ânions não difusíveis}} no interior da célula.", "back": "", "type": "cloze", "tags": ["bioquimica::distribuicao_eletrolitica", "exam::n1", "high_yield", "exam::n1"], "source_span": "their distribution across the cell membrane is dependent (in part) on non-diffusible anions within the cell.", "source_chunk_id": "0630654247dedf11:0", "explanation": null, "mnemonic": null, "verified": false, "card_id": "4ad255e297783bc9"}, {"front": "A distribuição de líquidos entre compartimentos intracelular e extracelular é determinada principalmente pelo efeito osmótico de {{c1::sódio, cloreto e outros eletrólitos}}.", "back": "", "type": "cloze", "tags": ["bioquimica::liquidos_corporais::osmose", "exam::n1", "high_yield", "exam::n1"], "source_span": "determinada principalmente pelo efeito osmótico de solutos menores— especialmente sódio, cloreto e outros eletrólitos —agindo através da membrana celular", "source_chunk_id": "7045a5149a0b780c:5", "explanation": null, "mnemonic": null, "verified": true, "card_id": "15c92bcf1e760df0"}, {"front": "A distribuição de líquidos entre plasma e espaços intersticiais é determinada principalmente pelo equilíbrio das forças {{c1::hidrostáticas e coloidosmóticas}} através das membranas capilares.", "back": "", "type": "cloze", "tags": ["bioquimica::liquidos_corporais::osmose", "exam::n1", "high_yield", "exam::n1"], "source_span": "determinadas principalmente pelo equilíbrio das forças hidrostáticas e coloidosmóticas, através das membranas capilares", "source_chunk_id": "7045a5149a0b780c:5", "explanation": null, "mnemonic": null, "verified": true, "card_id": "0117ba8574a8e5c3"}, {"front": "A doença de Chagas é causada pelo protozoário flagelado {{c1::Trypanosoma cruzi}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::doenca_de_chagas", "exam::n1", "high_yield", "exam::n1"], "source_span": "infecção tecidual e hematológica causada pelo protozoário (organismo unicelular) flagelado Trypanosoma cruzi", "source_chunk_id": "0b1b32d6fb0337df:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "c6e36cf88adce518"}, {"front": "A doença de Chagas é causada pelo protozoário flagelado {{c1::Trypanosoma cruzi}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::doenca_de_chagas", "exam::n1", "high_yield", "exam::n1"], "source_span": "infecção tecidual e hematológica causada pelo protozoário (organismo unicelular) flagelado Trypanosoma cruzi", "source_chunk_id": "95445721672e0e9c:0", "explanation": null, "mnemonic": "Chagas → Cruz → Trypanosoma cruzi", "verified": false, "card_id": "c6e36cf88adce518"}, {"front": "A doença de Chagas é considerada uma doença {{c1::emergente}}, com novos casos ocorrendo em todo o mundo.", "back": "", "type": "cloze", "tags": ["biologia_celular::doenca_de_chagas", "exam::n1", "high_yield", "exam::n1"], "source_span": "a doença de Chagas deve ser considerada uma doença emergente, com novos casos ocorrendo em todo o mundo", "source_chunk_id": "0b1b32d6fb0337df:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "42946037bfa45519"}, {"front": "A doença de Chagas é considerada uma doença {{c1::emergente}}, com novos casos ocorrendo em todo o mundo.", "back": "", "type": "cloze", "tags": ["biologia_celular::doenca_de_chagas", "exam::n1", "high_yield", "exam::n1"], "source_span": "a doença de Chagas deve ser considerada uma doença emergente, com novos casos ocorrendo em todo o mundo", "source_chunk_id": "95445721672e0e9c:0", "explanation": "Urbanização, globalização e novas vias de transmissão contribuem para esse caráter emergente.", "mnemonic": null, "verified": false, "card_id": "42946037bfa45519"}, {"front": "A doença de Charcot-Marie-Tooth (CMT) é uma {{c1::neuropatia periférica hereditária}}.", "back": "", "type": "cloze", "tags": ["biologia_celular::cmt::definicao", "exam::n1", "high_yield", "exam::n1"], "source_span": "a doença de Charcot-Marie-Tooth (CMT) é um a neuropatia periférica hereditária", "source_chunk_id": "a7bb4c335d161809:0", "explanation": null, "mnemonic": null, "verified": false, "card_id": "3944cd100506595f"}, {"front": "A dor na pancreatite aguda pode irradiar para {{c1::as costas}}.", "back": "", "type": "cloze", "tags": ["bioquimica::pancreatite::apresentacao_clinica", "exam::n1", "high_yield", "exam::n1"], "source_span": "dor como 'queimação forte', que irradia para as costas e é acompanhada de náuseas e vômitos", "source_chunk_id": "d04c451ccfa8aea7:0", "explanation": "A irradiação dorsal reflete a localização retroperitoneal do pâncreas.", "mnemonic": null, "verified": true, "card_id": "6a5da4f76487146b"}, {"front": "A dosagem de enzimas plasmáticas auxilia no diagnóstico da {{c1::pancreatite aguda}}.", "back": "", "type": "cloze", "tags": ["bioquímica::enzimas::diagnóstico_clínico", "exam::n1", "high_yield", "exam::n1"], "source_span": "auxilia no diagnóstico e no prognóstico do infarto do miocárdio, da pancreatite aguda", "source_chunk_id": "a0d536f9d4d5391f:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "79564a6b2c11d4b9"}, {"front": "A dosagem de enzimas plasmáticas auxilia no diagnóstico do {{c1::infarto do miocárdio}}.", "back": "", "type": "cloze", "tags": ["bioquímica::enzimas::diagnóstico_clínico", "exam::n1", "high_yield", "exam::n1"], "source_span": "A dosagem das enzimas plasmáticas auxilia no diagnóstico e no prognóstico do infarto do miocárdio", "source_chunk_id": "a0d536f9d4d5391f:0", "explanation": "Enzimas intracelulares liberadas por células lesadas elevam sua concentração plasmática, sinalizando dano tecidual.", "mnemonic": null, "verified": true, "card_id": "aa7dcac39f6bb9a2"}, {"front": "A droga do stent impede a reestenose, mas também atrasa a formação da nova camada de {{c1::células endoteliais}}.", "back": "", "type": "cloze", "tags": ["bioquimica::stent_farmacologico::dilema_endotelio", "exam::n1", "high_yield", "exam::n1"], "source_span": "A droga utilizada no stent impede a reestenose, mas também atrasa a formação da nova camada de células endoteliais", "source_chunk_id": "b75f185a5756c146:1", "explanation": null, "mnemonic": null, "verified": false, "card_id": "8376c7487c4866cc"}, {"front": "A eficiência do mecanismo respiratório de controle do H+ situa-se entre {{c1::50%}} e {{c2::75%}}.", "back": "", "type": "cloze", "tags": ["subject::fisiologia::equilibrio_acido_base", "topic::eficiencia_controle_respiratorio", "exam::n1", "high_yield", "exam::n1"], "source_span": "o mecanismo respiratório de controle da concentração de H+ tem eficiência entre 50% e 75%", "source_chunk_id": "49ed06ff34adc89d:2", "explanation": null, "mnemonic": null, "verified": false, "card_id": "23b117348dd37de2"}, {"front": "A efusão acumulada especificamente na cavidade {{c1::abdominal}} é denominada {{c2::ascite}}.", "back": "", "type": "cloze", "tags": ["bioquimica_biologia_celular::edema::ascite", "exam::n1", "high_yield", "exam::n1"], "source_span": "A cavidade abdominal é especialmente propensa a acumular líquidos de efusão. Neste caso, a efusão é chamada de ascite.", "source_chunk_id": "7045a5149a0b780c:18", "explanation": null, "mnemonic": null, "verified": true, "card_id": "140101bd1237e388"}, {"front": "A elevada concentração de colesterol no diabetes grave promove o desenvolvimento de {{c1::aterosclerose}}.", "back": "", "type": "cloze", "tags": ["bioquimica::complicacoes_diabetes", "exam::n1", "high_yield", "exam::n1"], "source_span": "elevada concentração de colesterol —promove o desenvolvimento da aterosclerose nas pessoas portadoras de diabetes grave", "source_chunk_id": "76cae3be4bc84980:5", "explanation": null, "mnemonic": null, "verified": true, "card_id": "5513f0c1f38e9ca8"}, {"front": "A elevação de 1% no HDL associa-se à redução de {{c1::3%}} na mortalidade cardiovascular.", "back": "", "type": "cloze", "tags": ["bioquimica::lipoproteinas::hdl", "exam::n1", "high_yield", "exam::n1"], "source_span": "a elevação em 1% no HDL, se associa com redução significante de 3% nas taxas de mortalidade cardiovascular", "source_chunk_id": "7a9a020e6dd7dad4:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "6e7ae8386da36352"}, {"front": "A endocitose de remanescentes de quilomícrons pode ser mediada por {{c1::LDLR}} e/ou {{c2::LRP}}.", "back": "", "type": "cloze", "tags": ["bioquímica::lipídeos::captação_hepática", "exam::n1", "high_yield", "exam::n1"], "source_span": "processo endocítico pode ser mediado por receptores de LDL (LDLR) e/ou proteína relacionada ao receptor de LDL (LRP)", "source_chunk_id": "349053d639a3f6a1:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "19843ec940da360c"}, {"front": "A energia causadora da difusão é a energia {{c1::cinética}} normal da matéria.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte::difusao", "exam::n1", "high_yield", "exam::n1"], "source_span": "A energia causadora da difusão é a energia da movimentação cinética normal da matéria.", "source_chunk_id": "ca1d03681e38ff3b:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "f8c30814e4ac3e76"}, {"front": "A energia necessária para transporte ativo é proporcional ao {{c1::logaritmo}} do grau de concentração da substância.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte_ativo::energetica", "exam::n1", "high_yield", "exam::n1"], "source_span": "a energia necessária é proporcional ao logaritmo do grau de concentração da substância", "source_chunk_id": "ca1d03681e38ff3b:11", "explanation": null, "mnemonic": null, "verified": true, "card_id": "dbbee17458efc816"}, {"front": "A energia para a secreção de H+ nos túbulos iniciais é derivada do gradiente de {{c1::sódio}} estabelecido pela Na+/K+-ATPase basolateral.", "back": "", "type": "cloze", "tags": ["fisiologia::renal::secreção_h+", "exam::n1", "high_yield", "exam::n1"], "source_span": "a energia para a secreção do H+ contra seu gradiente de concentração é derivada do gradiente de sódio dissipado durante o movimento de Na+ para a célula", "source_chunk_id": "1505b4589c5c5c15:7", "explanation": "O cotransportador Na+/H+ usa a energia do gradiente de Na+ (criado pela Na+/K+-ATPase) para secretar H+ contra seu gradiente.", "mnemonic": null, "verified": true, "card_id": "f513363cb3a7d6f6"}, {"front": "A energia para o transporte ativo vem das ligações {{c1::fosfato ricas em energia}} do {{c2::ATP}}, direta ou indiretamente.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte_membrana::transporte_ativo", "exam::n1", "high_yield", "exam::n1"], "source_span": "A energia para o transporte ativo vem direta ou indiretamente das ligações fosfato ricas em energia do ATP", "source_chunk_id": "64f242de981408e9:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "e7f4361744c5a0ed"}, {"front": "A energia para o transporte ativo vem direta ou indiretamente das ligações fosfato ricas em energia do {{c1::ATP}}.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte_membrana::transporte_ativo", "exam::n1", "high_yield", "exam::n1"], "source_span": "A energia para o transporte ativo vem direta ou indiretamente das ligações fosfato ricas em energia do ATP", "source_chunk_id": "584ea7e1df69fa89:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "9c682015ea99a186"}, {"front": "A energia para o transporte de H⁺ contragradiente no túbulo renal é fornecida pelo gradiente de {{c1::Na⁺}} através da membrana.", "back": "", "type": "cloze", "tags": ["bioquimica::acido_base::secrecao_h::renal", "exam::n1", "high_yield", "exam::n1"], "source_span": "o gradiente de Na+, através da membrana, provê energia para o transporte do H+ contragradiente", "source_chunk_id": "1aa9c491a2a53451:11", "explanation": "O cotransporte Na⁺-H⁺ usa a energia do gradiente eletroquímico de Na⁺ gerado pela Na⁺/K⁺-ATPase basolateral.", "mnemonic": null, "verified": true, "card_id": "479739f6e25b4455"}, {"front": "A entrada total de água no corpo é em torno de {{c1::2.300}} mL/dia.", "back": "", "type": "cloze", "tags": ["bioquimica::balanço_hidrico", "exam::n1", "high_yield", "exam::n1"], "source_span": "proporciona entrada total de água em torno de 2.300 mL/dia", "source_chunk_id": "7045a5149a0b780c:0", "explanation": null, "mnemonic": null, "verified": true, "card_id": "f2cf9233d4c861d1"}, {"front": "A enzima capaz de digerir o amido é a {{c1::amilase}} (salivar e pancreática).", "back": "", "type": "cloze", "tags": ["bioquímica::carboidratos::amido", "exam::n1", "high_yield", "exam::n1"], "source_span": "Possuímos uma enzima chamada de amilase (salivar e pancreática) capaz de digerir o amido.", "source_chunk_id": "47a6535feedae2b8:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "bbd39d681629c6a4"}, {"front": "A enzima forma o complexo ES, catalisa a reação e libera o produto, permanecendo {{c1::inalterada}} ao final.", "back": "", "type": "cloze", "tags": ["bioquímica::enzimas", "exam::n1", "high_yield", "exam::n1"], "source_span": "forma o complexo ES, catalisa a reação e libera o produto, permanecendo inalterada ao final", "source_chunk_id": "aeda9a3a37981ef0:0", "explanation": "A enzima é um catalisador biológico: não é consumida na reação, podendo atuar repetidamente.", "mnemonic": null, "verified": true, "card_id": "8e4ab82712234c34"}, {"front": "A enzima lactase converte lactose em {{c1::glicose}} e {{c2::galactose}}.", "back": "", "type": "cloze", "tags": ["bioquímica::enzimas::lactase", "exam::n1", "high_yield", "exam::n1"], "source_span": "A enzima lactase converte lactose em glicose e galactose, que são absorvidas a partir do intestino delgado", "source_chunk_id": "a0d536f9d4d5391f:1", "explanation": null, "mnemonic": null, "verified": true, "card_id": "1a8f71e9908181ba"}, {"front": "A enzima mais importante para a síntese endógena de colesterol é a {{c1::3-hidroxi-3-metilglutaril CoA redutase}}.", "back": "", "type": "cloze", "tags": ["bioquímica::lipídios::colesterol::síntese", "farmacologia::estatinas", "exam::n1", "high_yield", "exam::n1"], "source_span": "inibe a enzima mais importante para a síntese endógena de colesterol, a 3-hidroxi-3-metilglutaril CoA redutase", "source_chunk_id": "8405ad39f361404f:11", "explanation": null, "mnemonic": "HMG-CoA redutase = alvo das estatinas", "verified": true, "card_id": "93c0ce51912f9ab2"}, {"front": "A enzima que catalisa a reação CO2 + H2O → H2CO3 é a {{c1::anidrase carbônica}}.", "back": "", "type": "cloze", "tags": ["bioquimica::transporte_co2::anidrase_carbonica", "exam::n1", "high_yield", "exam::n1"], "source_span": "Essa reação é catalisada pela enzima anidrase carbônica", "source_chunk_id": "8f0954aa2c6a919c:1", "explanation": null, "mnemonic": null, "verified": false, "card_id": "8bd29507fc385f6f"}, {"front": "A enzima {{c1::acetil-CoA carboxilase}} catalisa a carboxilação da acetil-CoA para formar malonil-CoA.", "back": "", "type": "cloze", "tags": ["bioquimica::sintese_acidos_graxos", "exam::n1", "high_yield", "exam::n1"], "source_span": "ativação da acetil-CoA carboxilase,a enzima necessária para realizar a carboxilação da acetil-CoA, de modo a formar malonil-CoA", "source_chunk_id": "76cae3be4bc84980:5", "explanation": null, "mnemonic": null, "verified": true, "card_id": "b4b9be5b30021fdb"}, {"front": "A enzima {{c1::acetil-CoA carboxilase}} controla primariamente a carboxilação de acetil-CoA em malonil-CoA.", "back": "", "type": "cloze", "tags": ["bioquímica::síntese_ácidos_graxos", "exam::n1", "high_yield", "exam::n1"], "source_span": "A intensidade dessa reação é controlada, primariamente, pela enzima acetil-CoA carboxilase", "source_chunk_id": "8405ad39f361404f:8", "explanation": null, "mnemonic": null, "verified": true, "card_id"
