Polifagia, Perda de peso, Desidratação\n\n<sub>Fontes: ef24d71727f6543e:2, ef24d71727f6543e:3, 4c4bd25329b0e827:2, 4c4bd25329b0e827:3</sub>\n\n---\n\n## Enzimas Séricas no Diagnóstico Médico e Pancreatite Aguda\n\nEnzimas intracelulares podem ser liberadas na corrente sanguínea quando há lesão ou destruição celular, tornando-se marcadores diagnósticos valiosos. O princípio fundamental é que cada órgão possui um perfil enzimático característico: o fígado libera ALT (TGP) e AST (TGO) em hepatites, sepse e choque; o músculo libera CK e LDH em miosite e trauma; o pâncreas libera amilase e lipase na pancreatite aguda; o coração libera troponinas e CK-MB na miocardite; e o pulmão libera LDH e enzimas do surfactante na SDRA e pneumonia. O raciocínio diagnóstico segue uma sequência lógica: coleta de dados (história, exame físico, exames básicos), geração de hipóteses (reconhecimento de padrões, afastar os piores cenários, encontrar os 'suspeitos usuais') e teste da hipótese diagnóstica (exames mais complexos, patologia).\n\nA pancreatite aguda é um exemplo paradigmático do uso de enzimas séricas no diagnóstico. O diagnóstico é confirmado pelo aumento das enzimas pancreáticas (amilase e lipase) no sangue em três ou mais vezes o limite normal, associado a achados de imagem compatíveis em TC ou RM. O mecanismo central da lesão pancreática é a autodigestão: a ativação precoce de tripsinogênio → tripsina dentro dos ácinos pancreáticos leva à ativação em cascata de outras enzimas digestivas, causando lesão direta da membrana celular por proteases, destruição de proteínas estruturais, ativação de fosfolipases (lesão de membranas ricas em fosfolipídeos) e degradação de fibras elásticas dos vasos pela elastase, resultando em hemorragia pancreática.\n\nAlém da autodigestão, outros mecanismos contribuem para a lesão pancreática: inflamação exacerbada e ativação imunológica, lesão microvascular e isquemia local, e aumento patológico do cálcio intracelular. O pâncreas exócrino é o órgão com o maior nível de síntese proteica no adulto, produzindo diariamente litros de fluido repletos de enzimas capazes de quebrar quase todas as substâncias orgânicas. A interrupção da função pancreática normal ocorre principalmente como resultado da disfunção das células acinares que produzem essas enzimas digestivas.\n\n### Pontos-chave\n\n- Diagnóstico de pancreatite aguda: amilase e lipase ≥3x o limite superior da normalidade (amilase >375 U/L; lipase >420 U/L, com base nos valores de referência do caso clínico).\n- Evento central da pancreatite: ativação precoce de tripsinogênio → tripsina dentro dos ácinos pancreáticos leva à ativação em cascata de outras enzimas digestivas.\n- A elastase degrada fibras elásticas dos vasos → hemorragia pancreática.\n- O pâncreas exócrino é o órgão com o maior nível de síntese proteica no adulto.\n- Quatro mecanismos de lesão pancreática: autodigestão enzimática, inflamação exacerbada, lesão microvascular/isquemia e aumento patológico do cálcio intracelular.\n- Perfil enzimático hepático: ALT (TGP) e AST (TGO) — elevados em hepatite, sepse e choque.\n- Perfil enzimático cardíaco: troponinas e CK-MB — elevados em miocardite.\n- O raciocínio diagnóstico segue: coleta de dados → geração de hipóteses → teste da hipótese diagnóstica.\n\n### Comparação\n\n| Órgão/Tecido | Contexto Inflamatório/Lesão | Principais Enzimas Liberadas |\n|---|---|---|\n| Fígado | Hepatite, sepse, choque | ALT (TGP), AST (TGO) |\n| Músculo | Miosite, trauma | CK, LDH |\n| Pâncreas | Pancreatite aguda | Amilase, Lipase |\n| Coração | Miocardite | Troponinas, CK-MB |\n| Pulmão | SDRA, pneumonia | LDH, enzimas do surfactante |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Lesão das Células Acinares Pancreáticas] --> B[Ativação de Tripsinogênio → Tripsina]\n B --> C[Ativação em Cascata de Outras Enzimas Digestivas]\n C --> D[Proteases: Lesão direta da membrana celular]\n C --> E[Fosfolipases: Lesão de membranas ricas em fosfolipídeos]\n C --> F[Elastase: Degrada fibras elásticas dos vasos → Hemorragia pancreática]\n B --> G[Inflamação Exacerbada e Ativação Imunológica]\n B --> H[Lesão Microvascular e Isquemia Local]\n B --> I[Aumento Patológico do Cálcio Intracelular]\n D & E & F & G & H & I --> J[Pancreatite Aguda: Liberação de Amilase e Lipase para o Sangue]\n```\n\n> **Mnemônico:** Mecanismos de lesão pancreática — 'AILA': Autodigestão enzimática, Inflamação exacerbada, Lesão microvascular/isquemia, Aumento do cálcio intracelular\n\n<sub>Fontes: d04c451ccfa8aea7:0, d04c451ccfa8aea7:1, d04c451ccfa8aea7:2, f3c5f4f19a44a941:0, f3c5f4f19a44a941:1, f3c5f4f19a44a941:2</sub>\n\n---\n\n## Lipoproteínas, Metabolismo Lipídico e Fisiopatologia da Aterosclerose\n\nOs lipídeos da dieta são absorvidos no intestino delgado após digestão pela lipase pancreática e emulsificação pelos sais biliares, entrando nos enterócitos como micelas mistas. Dentro dos enterócitos, os ácidos graxos são reesterificados em triglicerídeos, o colesterol é esterificado pela ACAT, e esses lipídeos são empacotados com a apolipoproteína ApoB-48 para formar quilomícrons, que circulam pela linfa até o ducto torácico e então entram na circulação venosa. Na corrente sanguínea, os quilomícrons adquirem ApoC-II e ApoE fornecidas pelo HDL. A Lipase Lipoproteica (LpL), presente em células musculares esqueléticas, adipócitos e miócitos cardíacos, hidrolisa os triglicerídeos dos quilomícrons, liberando ácidos graxos para os tecidos. Os remanescentes de quilomícrons, ricos em colesterol, são captados pelo fígado via receptores que reconhecem ApoE (LDLR e LRP). O fígado então produz VLDL (ricas em triglicerídeos endógenos com ApoB-100), que são convertidas sequencialmente em IDL e depois em LDL pela ação da LpL e da lipase hepática.\n\nAs LDL contêm quase apenas colesterol esterificado no núcleo central e apenas ApoB-100 em sua superfície, representando o produto final das VLDL. Sua principal função é levar colesterol do fígado para os tecidos periféricos, onde se ligam a receptores de LDL (que reconhecem ApoB-100), são internalizadas por endocitose e hidrolisadas por enzimas lisossomais. Se a célula já tem colesterol suficiente, ocorre downregulation dos receptores de LDL, aumentando o colesterol circulante — mecanismo alterado na hipercolesterolemia familiar. As HDL, sintetizadas no fígado e intestino como partículas discoides pobres em lipídeos, realizam o transporte reverso de colesterol: retiram colesterol em excesso das células periféricas (inclusive das paredes arteriais) e o levam de volta ao fígado, exercendo funções antiaterogênicas, antioxidantes e anti-inflamatórias.\n\nA aterosclerose tem início com a disfunção endotelial, desencadeada por fatores de risco como hipertensão arterial, tabagismo, níveis elevados de LDL, diabetes, hiperglicemia crônica, dislipidemias e estresse oxidativo. A disfunção endotelial leva a aumento da permeabilidade, expressão de moléculas de adesão (VCAM-1, ICAM-1, E-selectina, P-selectina) e recrutamento de leucócitos (monócitos, em especial). O óxido nítrico (NO) produzido pelo endotélio saudável é fundamental para vasodilatação, inibição da atividade plaquetária, efeitos anti-inflamatórios, regulação da proliferação de células musculares lisas e reparo endotelial. O estresse oxidativo, mediado por espécies reativas de oxigênio (EROs), é um dos principais vilões da disfunção endotelial, levando à oxidação do LDL — evento central na formação da placa aterosclerótica.\n\n### Pontos-chave\n\n- Quilomícrons transportam lipídeos exógenos (da dieta); VLDL transportam lipídeos endógenos (produzidos pelo fígado).\n- A LpL hidrolisa triglicerídeos de quilomícrons e VLDL nos capilares dos tecidos periféricos; ApoC-II é cofator essencial da LpL.\n- LDL: produto final das VLDL, rica em colesterol esterificado, ApoB-100 como única apolipoproteína; meia-vida ~2,5 dias; concentração plasmática normal ~100 mg/dL.\n- HDL: 'faxineiro do colesterol' — transporte reverso de colesterol dos tecidos periféricos para o fígado; funções antiaterogênicas, antioxidantes e anti-inflamatórias.\n- Downregulation dos receptores de LDL quando a célula tem colesterol suficiente → aumento do colesterol circulante; defeitos em LDLR, ApoB ou PCSK9 causam hipercolesterolemia familiar.\n- O NO endotelial causa vasodilatação (via sGC → cGMP), inibe agregação plaquetária e tem efeitos anti-inflamatórios.\n- Disfunção endotelial: aumento da permeabilidade + expressão de VCAM-1, ICAM-1, E-selectina, P-selectina + recrutamento de monócitos → início da aterosclerose.\n- EROs podem ser radicais livres (O2•–, OH•) ou não (H2O2, ONOO–); causam peroxidação lipídica do LDL, oxidação de proteínas e dano ao DNA.\n- Colesterol é fundamental para síntese de membranas celulares, produção de hormônios esteroides, síntese de ácidos biliares e vitamina D.\n\n### Comparação\n\n| Lipoproteína | Tamanho (nm) | Apolipoproteína Principal | % TAG | % Colesterol | Função Principal |\n|---|---|---|---|---|---|\n| Quilomícron | 75–1.200 | ApoB-48, ApoC-II, ApoE | 80–90% | 3–6% | Transportar lipídeos da dieta aos tecidos |\n| VLDL | 30–80 | ApoB-100, ApoC-II, ApoE | 55–65% | 10–15% | Exportar TAG endógenos do fígado |\n| IDL | 25–35 | ApoB-100, ApoE | 25–30% | 20–25% | Intermediária na conversão VLDL → LDL |\n| LDL | 18–25 | ApoB-100 | 5–10% | 45–50% | Entregar colesterol às células (aterogênica) |\n| HDL | 5–12 | ApoA-I, ApoA-II | 5–10% | 15–20% | Transporte reverso de colesterol (antiaterogênica) |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Dieta: Gorduras] --> B[Digestão intestinal: Lipase pancreática + Sais biliares]\n B --> C[Absorção pelos Enterócitos: Micelas mistas]\n C --> D[Reesterificação no RE: TG, Colesterol-éster, Fosfolipídeos]\n D --> E[Montagem do Quilomícron com ApoB-48]\n E --> F[Secreção por Exocitose → Vasos Linfáticos → Ducto Torácico]\n F --> G[Circulação Sistêmica: Quilomícron adquire ApoC-II e ApoE do HDL]\n G --> H[LpL nos capilares periféricos hidrolisa TG]\n H --> I[Ácidos Graxos → Músculo/Tecido Adiposo]\n H --> J[Remanescentes de Quilomícrons ricos em Colesterol]\n J --> K[Fígado: Captação via LDLR/LRP reconhecendo ApoE]\n K --> L[Fígado produz VLDL com ApoB-100]\n L --> M[LpL hidrolisa TG das VLDL → IDL]\n M --> N[Lipase Hepática hidrolisa TG das IDL → LDL]\n N --> O[LDL entrega Colesterol às células via Receptor de LDL]\n K --> P[HDL: Transporte Reverso de Colesterol dos tecidos → Fígado]\n```\n\n> **Mnemônico:** Para lembrar a ordem das lipoproteínas do maior para o menor (e do mais rico em TG para o mais rico em colesterol/proteína): 'Quilomícrons Viajam Incrivelmente Longe, Humanos' = Quilomícron → VLDL → IDL → LDL → HDL\n\n<sub>Fontes: 349053d639a3f6a1:0, 349053d639a3f6a1:1, 349053d639a3f6a1:2, 349053d639a3f6a1:3, 349053d639a3f6a1:4, 349053d639a3f6a1:5, 349053d639a3f6a1:6</sub>\n\n---\n\n## Metabolismo das Lipoproteínas: Do Quilomícron ao LDL\n\nO transporte de lipídeos no organismo depende de partículas especializadas chamadas lipoproteínas, que permitem a circulação de moléculas hidrofóbicas em um meio aquoso como o plasma. O processo começa no intestino, onde os lipídeos da dieta são absorvidos pelos enterócitos, re-esterificados no retículo endoplasmático e empacotados com a ApoB-48 para formar quilomícrons nascentes. Essas partículas seguem pela linfa até o ducto torácico, entram na circulação venosa e adquirem ApoC-II e ApoE do HDL. Na periferia, a Lipase Lipoproteica (LpL) — ancorada nas células endoteliais capilares via GPIHBP1 — hidrolisa os triglicerídeos dos quilomícrons, liberando ácidos graxos para músculo e tecido adiposo. Os remanescentes, ricos em colesterol e ApoE, são captados pelo fígado via receptores LDLR e LRP.\n\nNo fígado, os componentes dos remanescentes são reutilizados para produzir VLDL, que exportam triglicerídeos endógenos para os tecidos extra-hepáticos. A proteína MTP é essencial para a lipidação da ApoB-100 durante a montagem da VLDL no retículo endoplasmático. Na circulação, a LpL hidrolisa os triglicerídeos da VLDL, e há troca de ésteres de colesterol com o HDL, gerando IDL. A IDL tem meia-vida de 2 a 5 horas: parte é captada pelo fígado via ApoE, e o restante tem seus triglicerídeos hidrolisados pela lipase hepática, gerando LDL — partícula rica em colesterol esterificado e contendo apenas ApoB-100 em sua superfície.\n\nAs LDL são o produto final das VLDL e têm como função principal levar colesterol do fígado para os tecidos periféricos. Elas se ligam ao receptor de LDL (LDLR) via ApoB-100, são internalizadas por endocitose e degradadas em lisossomos. O colesterol liberado é utilizado para síntese de membranas, hormônios esteroides ou re-esterificado pela ACAT para armazenamento. Quando a célula já possui colesterol suficiente, ocorre 'downregulation' dos receptores de LDL, aumentando o colesterol circulante — mecanismo central na hipercolesterolemia familiar.\n\n### Pontos-chave\n\n- Quilomícrons transportam lipídeos exógenos da dieta; VLDL transportam lipídeos endógenos produzidos pelo fígado.\n- A ApoB-48 é exclusiva dos quilomícrons (intestino); a ApoB-100 é exclusiva das VLDL/IDL/LDL (fígado).\n- A LpL requer ApoC-II como cofator e ApoA-V como estabilizador para hidrolisar triglicerídeos nos capilares.\n- Remanescentes de quilomícrons são captados pelo fígado via reconhecimento da ApoE pelos receptores LDLR e LRP.\n- A proteína MTP é essencial para a montagem da VLDL: sem lipidação suficiente, a ApoB nascente é degradada.\n- IDL é a partícula intermediária entre VLDL e LDL; não possui ApoC-II, portanto a LpL não consegue hidrolisar seu TAG.\n- LDL tem meia-vida de aproximadamente 2,5 dias e concentração plasmática média normal de 100 mg/dL.\n- O excesso de colesterol intracelular é re-esterificado pela ACAT e armazenado; defeitos no LDLR, ApoB ou PCSK9 causam hipercolesterolemia familiar.\n- HDL atua como 'banco de apolipoproteínas', cedendo ApoC-II e ApoE para quilomícrons e VLDL nascentes.\n\n### Comparação\n\n| Lipoproteína | Tamanho (nm) | Apolipoproteína principal | % TAG | % Colesterol | Função principal |\n|---|---|---|---|---|---|\n| Quilomícron | 75–1.200 | ApoB-48, ApoC-II, ApoE | 80–90% | 3–6% | Transportar lipídeos da dieta aos tecidos |\n| VLDL | 30–80 | ApoB-100, ApoC-II, ApoE | 55–65% | 10–15% | Exportar TAG endógenos do fígado |\n| IDL | 25–35 | ApoB-100, ApoE | 25–30% | 20–25% | Partícula intermediária VLDL→LDL |\n| LDL | 18–25 | ApoB-100 | 5–10% | 45–50% | Entregar colesterol às células (aterogênico) |\n| HDL | 5–12 | ApoA-I, ApoA-II | 5–10% | 15–20% | Transporte reverso de colesterol (antiaterogênico) |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Dieta: gorduras] --> B[Enterócito: absorção via NPC1L1/CD36]\n B --> C[Re-esterificação no RE: TG, colesterol-ACAT, fosfolipídeos]\n C --> D[Montagem do Quilomícron + ApoB-48 no RE/Golgi]\n D --> E[Exocitose → Lacteais → Ducto Torácico]\n E --> F[Circulação venosa: adquire ApoC-II e ApoE do HDL]\n F --> G[LpL capilar hidrolisa TG → ácidos graxos para músculo/adiposo]\n G --> H[Remanescente de Quilomícron: rico em colesterol, ApoE]\n H --> I[Fígado: captação via LDLR/LRP por ApoE]\n I --> J[Fígado: síntese de VLDL + ApoB-100 + MTP]\n J --> K[VLDL na circulação: adquire ApoC-II e ApoE do HDL]\n K --> L[LpL hidrolisa TG da VLDL; troca ésteres de colesterol com HDL]\n L --> M[IDL: ApoB-100 + ApoE; meia-vida 2-5h]\n M --> N{Captação hepática via ApoE?}\n N -->|Sim| I\n N -->|Não| O[Lipase hepática hidrolisa TAG da IDL; ApoE retorna ao HDL]\n O --> P[LDL: apenas ApoB-100, rico em colesterol esterificado]\n P --> Q[Tecidos periféricos: endocitose via LDLR → uso/armazenamento]\n```\n\n> **Mnemônico:** Para lembrar a ordem das lipoproteínas por densidade crescente: 'Quilomícrons Viajam Incrivelmente Longe e Habilmente' → Q(uilomícron), V(LDL), I(DL), L(DL), H(DL)\n\n<sub>Fontes: e3a31778063f6a6d:0, e3a31778063f6a6d:1, e3a31778063f6a6d:2, e3a31778063f6a6d:3, e3a31778063f6a6d:4</sub>\n\n---\n\n## HDL, Óxido Nítrico e Disfunção Endotelial\n\nO HDL é sintetizado no fígado e no intestino como uma partícula discoide pobre em lipídeos, composta principalmente por ApoA-I, fosfolipídeos e pequenas quantidades de colesterol. Sua função central é o transporte reverso de colesterol: retirar o colesterol em excesso das células periféricas — inclusive das paredes arteriais — e devolvê-lo ao fígado, onde pode ser reutilizado ou excretado na bile. Além disso, o HDL possui funções antioxidantes e anti-inflamatórias, protegendo contra a oxidação do LDL, e atua como reservatório de apolipoproteínas (ApoC-II e ApoE) para quilomícrons e VLDL nascentes. Por essas razões, o HDL é considerado antiaterogênico e protetor cardiovascular.\n\nO endotélio vascular é muito mais do que uma barreira passiva: ele produz óxido nítrico (NO) via óxido nítrico sintase endotelial (eNOS), que exerce efeitos vasodilatadores (ativação da guanilato ciclase solúvel → ↑cGMP → relaxamento da musculatura lisa), antiagregantes plaquetários, anti-inflamatórios (inibição da adesão e migração de leucócitos) e antiproliferativos sobre células musculares lisas vasculares. O NO também promove reparo endotelial e possui atividade antioxidante. Quando fatores de risco como hipertensão, tabagismo, LDL elevado, diabetes e estresse oxidativo lesam o endotélio, ocorre disfunção endotelial: aumento da permeabilidade, expressão de moléculas de adesão (VCAM-1, ICAM-1, E-selectina, P-selectina) e recrutamento de monócitos — o primeiro passo da aterosclerose.\n\nAs Espécies Reativas de Oxigênio (EROs/ROS) são moléculas derivadas do oxigênio com alta reatividade química. Elas podem ser radicais livres (O₂⁻, OH⁻) ou não (H₂O₂, ONOO⁻). As principais fontes enzimáticas incluem NADPH oxidases (NOX), complexos I e III da cadeia respiratória mitocondrial, xantina oxidase e NOS desacoplada. Embora exercam funções fisiológicas importantes na sinalização celular e defesa imune, o excesso de EROs causa estresse oxidativo, levando à peroxidação lipídica (gerando LDL oxidada), oxidação de proteínas e DNA, e disfunção mitocondrial — todos mecanismos centrais na patogênese da aterosclerose.\n\n### Pontos-chave\n\n- HDL nasce como partícula discoide pobre em lipídeos; sua principal apolipoproteína é a ApoA-I.\n- O transporte reverso de colesterol pelo HDL é o mecanismo central de proteção antiaterogênica.\n- O NO endotelial causa vasodilatação via ativação da guanilato ciclase solúvel → ↑cGMP nas células musculares lisas.\n- O NO inibe adesão e migração de leucócitos ao endotélio, etapa crucial no desenvolvimento da aterosclerose.\n- A disfunção endotelial leva à expressão de VCAM-1, ICAM-1, E-selectina e P-selectina, recrutando monócitos.\n- EROs podem ser radicais livres (O₂⁻, OH⁻) ou não radicais (H₂O₂, ONOO⁻) — EROs ≠ radicais livres.\n- A NOS desacoplada (por deficiência de BH₄) gera O₂⁻ em vez de NO, contribuindo para disfunção endotelial.\n- A peroxidação lipídica por EROs gera LDL oxidada (oxLDL), que é pró-inflamatória e quimiotática.\n- EROs exercem funções fisiológicas importantes (sinalização, defesa imune) — não são apenas vilões.\n\n### Comparação\n\n| Fonte de EROs | Localização | Mecanismo | Relevância clínica |\n|---|---|---|---|\n| NADPH oxidase (NOX-2) | Membrana plasmática, fagossomos | Transferência de elétrons de NADPH para O₂ | Defesa imune, aterosclerose, inflamação crônica |\n| Complexo I mitocondrial | Membrana interna mitocondrial | Vazamento de elétrons durante oxidação de NADH | Envelhecimento, doenças degenerativas |\n| Complexo III mitocondrial | Membrana interna mitocondrial | Radicais semiquinona → transferência para O₂ | Hipóxia, isquemia/reperfusão |\n| Xantina oxidase | Citoplasma, endotélio, fígado | Oxidação de hipoxantina/xantina → ácido úrico | Inflamação, isquemia/reperfusão, gota |\n| NOS desacoplada | Endotélio, neurônios, músculo liso | Deficiência de BH₄ → gera O₂⁻ em vez de NO | Disfunção endotelial, hipertensão |\n\n> **Mnemônico:** Funções do NO endotelial: 'VARAP' → Vasodilatação, Antiagregação plaquetária, Reparo endotelial, Antiproliferativo (células musculares lisas), Anti-inflamatório (inibe leucócitos)\n\n<sub>Fontes: e3a31778063f6a6d:4, e3a31778063f6a6d:5, e3a31778063f6a6d:6</sub>\n\n---\n\n## Fisiopatologia da Aterosclerose: Da Disfunção Endotelial à Placa Vulnerável\n\nA aterosclerose é uma doença inflamatória crônica da parede arterial que se desenvolve em etapas sequenciais e progressivas. O processo inicia-se com a disfunção endotelial, desencadeada por fatores de risco como hipertensão, tabagismo, LDL elevado, diabetes e estresse oxidativo. O endotélio disfuncional torna-se mais permeável, permitindo que partículas de LDL penetrem e fiquem retidas na íntima, ligadas à matriz extracelular e proteoglicanos. O LDL retido sofre modificações oxidativas (oxLDL) e glicosilação, tornando-se pró-inflamatório, quimiotático e estimulador de estresse oxidativo. Simultaneamente, o endotélio ativado expressa moléculas de adesão (VCAM-1, ICAM-1, selectinas) que recrutam monócitos circulantes.\n\nOs monócitos recrutados migram para a íntima e se diferenciam em macrófagos. Esses macrófagos internalizam o LDL modificado através de receptores 'scavenger' — que, diferentemente do receptor clássico de LDL, não são regulados negativamente pelo acúmulo de colesterol — acumulando ésteres de colesterol e transformando-se em células espumosas (foam cells). O acúmulo dessas células forma a estria gordurosa (fatty streak), lesão inicial visível macroscopicamente que pode aparecer já na infância. Com a progressão, as células espumosas sofrem apoptose e necrose, formando um núcleo necrótico rico em lipídeos extracelulares e cristais de colesterol. As células musculares lisas vasculares (VSMCs) migram da camada média para a íntima, proliferam e produzem matriz extracelular (colágeno, elastina), formando o capuz fibroso que estabiliza a placa.\n\nA estabilidade da placa é determinada pelo equilíbrio entre a síntese de colágeno pelas VSMCs e a degradação por macrófagos inflamados. Placas vulneráveis possuem capuz fibroso fino, núcleo necrótico grande, muitos macrófagos ativos e pouca matriz extracelular. A ruptura do capuz fibroso expõe o material necrótico ao sangue circulante, ativando a cascata de coagulação e formando um trombo que pode obstruir o vaso, causando isquemia ou infarto. Portanto, a maioria dos eventos cardiovasculares agudos não resulta de placas que obstruem progressivamente o lúmen, mas sim da ruptura súbita de placas vulneráveis.\n\n### Pontos-chave\n\n- A aterosclerose é uma doença inflamatória crônica; fatores de risco convergem para disfunção endotelial como ponto de partida.\n- O LDL retido na íntima sofre oxidação (oxLDL), tornando-se pró-inflamatório, quimiotático e estimulador de estresse oxidativo.\n- Receptores 'scavenger' dos macrófagos não são regulados negativamente pelo colesterol, permitindo acúmulo ilimitado → células espumosas.\n- Estrias gordurosas são acúmulos iniciais de células espumosas na íntima; podem aparecer até na infância e podem regredir.\n- VSMCs migram da camada média para a íntima e produzem colágeno/elastina, formando o capuz fibroso que estabiliza a placa.\n- Placa vulnerável: capuz fibroso fino + núcleo necrótico grande + muitos macrófagos + pouca matriz extracelular.\n- A ruptura do capuz fibroso expõe o núcleo necrótico ao sangue → ativação da coagulação → trombose → isquemia/infarto.\n- A maioria dos eventos agudos resulta de ruptura de placa vulnerável, não de obstrução progressiva do lúmen.\n\n### Comparação\n\n| Etapa | Evento principal | Células envolvidas | Resultado |\n|---|---|---|---|\n| 1. Disfunção endotelial | Aumento de permeabilidade, expressão de VCAM-1/ICAM-1/selectinas | Células endoteliais | Recrutamento de monócitos |\n| 2. Retenção e modificação do LDL | LDL penetra na íntima, sofre oxidação/glicação | — | oxLDL pró-inflamatório e quimiotático |\n| 3. Formação de células espumosas | Monócitos → macrófagos; internalização de oxLDL via receptores scavenger | Monócitos, macrófagos | Células espumosas (foam cells) |\n| 4. Estria gordurosa | Acúmulo de células espumosas na íntima | Células espumosas | Lesão inicial visível; pode regredir |\n| 5. Fibro-ateroma | Morte de células espumosas, migração de VSMCs, produção de colágeno | VSMCs, macrófagos | Capuz fibroso + núcleo necrótico |\n| 6. Ruptura e trombose | Ruptura do capuz fibroso, exposição do núcleo ao sangue | Plaquetas, cascata de coagulação | Trombo → isquemia/infarto |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Fatores de risco: HAS, tabagismo, LDL↑, DM, estresse oxidativo] --> B[Disfunção endotelial]\n B --> C[↑Permeabilidade + expressão VCAM-1/ICAM-1/selectinas]\n C --> D[LDL penetra e fica retido na íntima]\n D --> E[LDL oxidado: oxLDL pró-inflamatório e quimiotático]\n C --> F[Recrutamento de monócitos]\n F --> G[Monócitos → Macrófagos na íntima]\n E --> G\n G --> H[Macrófagos internalizam oxLDL via receptores scavenger]\n H --> I[Acúmulo de ésteres de colesterol → Células espumosas]\n I --> J[Estria gordurosa: fatty streak]\n J --> K[Apoptose/necrose das células espumosas]\n K --> L[Núcleo necrótico: lipídeos extracelulares + cristais de colesterol]\n L --> M[VSMCs migram da camada média para a íntima]\n M --> N[VSMCs produzem colágeno/elastina → Capuz fibroso]\n N --> O{Placa estável ou vulnerável?}\n O -->|Capuz espesso, pouco núcleo| P[Placa estável: baixo risco de ruptura]\n O -->|Capuz fino, núcleo grande, muitos macrófagos| Q[Placa vulnerável]\n Q --> R[Ruptura do capuz fibroso]\n R --> S[Exposição do núcleo necrótico ao sangue]\n S --> T[Ativação da coagulação → Trombose]\n T --> U[Obstrução vascular → Isquemia/Infarto]\n```\n\n> **Mnemônico:** Etapas da aterosclerose: 'Disfunção Retém LDL, Espuma Forma Placa Trombótica' → D(isfunção endotelial), R(etenção e modificação do LDL), L(DL oxidado recruta monócitos), E(spuma = foam cells), F(atty streak), P(laca madura/fibro-ateroma), T(rombose por ruptura)\n\n<sub>Fontes: e3a31778063f6a6d:6, e3a31778063f6a6d:7, 349053d639a3f6a1:7</sub>\n\n---\n\n## Compartimentos Líquidos Corporais, Osmolaridade e Equação de Starling\n\nA água corporal total representa cerca de 60% do peso corporal em homens adultos de 70 kg (aproximadamente 42 litros), sendo distribuída em dois compartimentos principais: o líquido intracelular (LIC), que corresponde à maior parte, e o líquido extracelular (LEC). O LEC subdivide-se em líquido intersticial (extravascular) e plasma sanguíneo (intravascular). Existe ainda um compartimento menor, o líquido transcelular (líquido cefalorraquidiano, sinovial, peritoneal, pericárdico, intraocular), que totaliza cerca de 1 a 2 litros. A composição iônica dos compartimentos é radicalmente diferente: o LIC é rico em K⁺ (~120–150 mM), Mg²⁺ e fosfatos, enquanto o LEC é rico em Na⁺ (~140 mM) e Cl⁻ (~110 mM). Apesar dessas diferenças, a osmolaridade total de ambos os compartimentos é igual, em torno de 300 mOsm/L, garantindo o equilíbrio osmótico. A osmolaridade plasmática pode ser estimada pela fórmula: Osmolaridade = 2[Na⁺] + glicose/18 + ureia/6.\n\nA água atravessa as membranas celulares por osmose, facilitada pelas aquaporinas (AQPs) — canais proteicos altamente seletivos que permitem transporte rápido de água sem gasto de ATP. O movimento de fluidos entre o compartimento vascular e o interstício é governado pela Equação de Starling: Jv = Kf × [(Pc – Pi) – σ(πc – πi)], onde as pressões hidrostáticas (Pc, Pi) tendem a expulsar fluido do capilar, e as pressões oncóticas (πc, πi), geradas pelas proteínas plasmáticas que não atravessam os poros capilares, tendem a reter fluido no vaso. O coeficiente de reflexão (σ) representa a impermeabilidade da membrana às proteínas.\n\nO modelo clássico de Starling foi refinado com a descoberta do glicocálix endotelial — uma camada de proteoglicanos, glicoproteínas e glicosaminoglicanos na superfície luminal do endotélio. O glicocálix cria um microespaço subglicocálix onde a pressão oncótica relevante não é plasma versus interstício, mas plasma versus subglicocálix. Isso implica que não existe reabsorção sustentada no lado venoso do capilar, como o modelo clássico previa. O equilíbrio de volume do interstício depende, portanto, da drenagem linfática, não de reabsorção capilar. A homeostase hídrica global é mantida pelo balanço entre ganho (ingestão + metabolismo oxidativo, ~2.300 mL/dia) e perdas (urina, suor, fezes, perdas insensíveis pela pele e pulmões), sendo os rins o principal órgão regulador.\n\n### Pontos-chave\n\n- Água corporal total ≈ 60% do peso em homens adultos (~42 L); mulheres ≈ 50% (mais gordura corporal).\n- LIC é rico em K⁺; LEC é rico em Na⁺ e Cl⁻ — mas a osmolaridade total de ambos é igual (~300 mOsm/L).\n- Fórmula da osmolaridade plasmática: Osmolaridade = 2[Na⁺] + glicose/18 + ureia/6 (valor normal: 290–300 mOsm).\n- Aquaporinas são canais proteicos altamente seletivos que facilitam transporte rápido de água sem gasto de ATP.\n- Na Equação de Starling: pressão hidrostática capilar (Pc) empurra fluido para fora; pressão oncótica capilar (πc) puxa fluido para dentro.\n- O glicocálix endotelial revisa o modelo de Starling: a pressão oncótica relevante é plasma vs. subglicocálix, não plasma vs. interstício.\n- Não existe reabsorção sustentada no lado venoso do capilar; o equilíbrio do interstício depende da drenagem linfática.\n- Os rins são o principal regulador do balanço hídrico: a diurese pode variar de 0,5 L/dia (desidratação) a 20 L/dia.\n- Em queimaduras extensas, a perda insensível pela pele pode aumentar até 10 vezes (3–5 L/dia), exigindo reposição IV.\n- Líquido transcelular (LCR, sinovial, peritoneal, etc.) totaliza apenas 1–2 litros e é considerado tipo especializado de LEC.\n\n### Comparação\n\n| Característica | Líquido Intracelular (LIC) | Líquido Extracelular (LEC) |\n|---|---|---|\n| Íon predominante (cátion) | K⁺ (~120–150 mM) | Na⁺ (~140 mM) |\n| Íon predominante (ânion) | Fosfatos orgânicos/inorgânicos (~75 mOsm) | Cl⁻ (~100–105 mM) |\n| Proteínas | Alta concentração (~4 mM eq) | Baixa (plasma: ~1–2 mOsm) |\n| Ca²⁺ livre | ~0,0001 mM (muito baixo) | ~1,2–2,0 mM |\n| pH | ~7,0–7,2 | ~7,4 |\n| Osmolaridade total | ~300 mOsm/L | ~300 mOsm/L |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Água corporal total: ~60% peso corporal / ~42L em 70kg] --> B[Líquido Intracelular - LIC: ~28-42L]\n A --> C[Líquido Extracelular - LEC]\n C --> D[Plasma sanguíneo: intravascular]\n C --> E[Líquido intersticial: extravascular]\n C --> F[Líquido transcelular: ~1-2L - LCR, sinovial, peritoneal]\n D <-->|Equação de Starling + Glicocálix| E\n E -->|Drenagem linfática| D\n B <-->|Aquaporinas: osmose| E\n G[Ganho: ingestão 2.100 + metabolismo 200 = 2.300 mL/dia] --> A\n A --> H[Perdas: urina 1.400 + pele 350 + pulmões 350 + suor 100 + fezes 100 = 2.300 mL/dia]\n I[Rins: principal regulador do balanço hídrico e eletrolítico] --> H\n```\n\n> **Mnemônico:** Perdas diárias de água — 'PUSFF': Pele insensível (350), Urina (1.400), Suor (100), Fezes (100), Fôlego/pulmões (350) → Total 2.300 mL/dia\n\n<sub>Fontes: e218cc18ab67a657:0, e218cc18ab67a657:1, e218cc18ab67a657:2, e218cc18ab67a657:3, e218cc18ab67a657:4, e218cc18ab67a657:6, e218cc18ab67a657:8, e218cc18ab67a657:9, b21c4a0406860d94:0, b21c4a0406860d94:1, b21c4a0406860d94:2, b21c4a0406860d94:4, b21c4a0406860d94:6</sub>\n\n---\n\n## Compartimentos de Líquidos Corporais e Balanço Hídrico\n\nO líquido corporal total está distribuído principalmente em dois grandes compartimentos: o líquido intracelular (LIC) e o líquido extracelular (LEC). O LEC, por sua vez, subdivide-se em líquido intersticial (extravascular) e plasma sanguíneo (intravascular). Existe ainda um compartimento menor, o líquido transcelular (líquido cefalorraquidiano, sinovial, peritoneal, pericárdico e intraocular), que totaliza cerca de 1 a 2 litros e é considerado um tipo especializado de LEC. Em um homem adulto de 70 kg, a água corporal total corresponde a aproximadamente 60% do peso corporal (~42 litros), sendo que cerca de 28 a 42 litros estão no compartimento intracelular. Esse percentual varia com idade, sexo e gordura corporal: mulheres apresentam em média 50%, recém-nascidos e prematuros de 70% a 75%.\n\nO balanço hídrico é mantido pela equivalência entre ganho e perda de água. O ganho diário normal soma ~2.300 mL/dia (2.100 mL de ingestão + 200 mL do metabolismo oxidativo). As perdas ocorrem por múltiplas vias: perda insensível pela pele (~350 mL/dia) e pelos pulmões (~350 mL/dia), suor (~100 mL/dia em repouso, podendo chegar a 1-2 L/hora em exercício intenso), fezes (~100 mL/dia) e urina (~1.400 mL/dia). O rim é o principal regulador desse balanço, podendo ajustar o volume urinário de 0,5 L/dia (desidratação) a 20 L/dia (sobrecarga hídrica). Em situações de exercício pesado prolongado, a perda total pode atingir 6.600 mL/dia, evidenciando a importância da reposição ativa.\n\nA composição iônica dos compartimentos é radicalmente diferente: o LEC é rico em Na⁺ (~140 mM) e Cl⁻ (~110 mM), enquanto o LIC é rico em K⁺ (~120–150 mM) e fosfatos orgânicos. Essa assimetria é osmoticamente ativa e determina o movimento de água entre os compartimentos via aquaporinas — canais proteicos altamente seletivos que facilitam a difusão rápida de água sem gasto de ATP. A osmolaridade plasmática normal é de 290–300 mOsm/L e pode ser estimada pela fórmula: Osmolaridade = 2[Na⁺] + glicose/18 + ureia/6.\n\n### Pontos-chave\n\n- O líquido corporal total está distribuído em dois compartimentos: o líquido extracelular e o líquido intracelular.\n- O líquido extracelular é dividido em líquido intersticial (extravascular) e plasma sanguíneo (intravascular).\n- Em homem adulto de 70 kg: água corporal total ~60% do peso (~42 L); mulheres ~50%; recém-nascidos 70–75%.\n- O ganho de eletrólitos pelo corpo também é bastante variável — sódio pode variar de 20 a 300–500 mEq/dia.\n- O volume da urina pode ser tão baixo quanto 0,5 L/dia, em pessoa desidratada, como tão alto quanto 20 L/dia.\n- A perda insensível pela pele pode aumentar até 10 vezes (3–5 L/dia) em queimaduras extensas pela ausência da camada cornificada.\n- Aquaporinas são canais proteicos altamente seletivos que realizam transporte rápido de água sem gasto de ATP.\n- Osmolaridade plasmática = 2[Na⁺] + glicose/18 + ureia/6; valor normal: ~290–300 mOsm/L.\n- O principal íon extracelular é o Na⁺ (~140 mM); o principal íon intracelular é o K⁺ (~120–150 mM).\n\n### Comparação\n\n| Característica | Líquido Intracelular (LIC) | Líquido Intersticial | Plasma Sanguíneo |\n|---|---|---|---|\n| Localização | Dentro das células | Entre células (extravascular) | Dentro dos vasos (intravascular) |\n| Volume (70 kg) | ~28–42 L | Maior fração do LEC | Menor fração do LEC |\n| Principal cátion | K⁺ (~120–150 mM) | Na⁺ (~140 mM) | Na⁺ (~140 mM) |\n| Principal ânion | Fosfatos orgânicos (~75 mOsm/L) | Cl⁻ (~100–105 mM) | Cl⁻ (~100–105 mM) |\n| Proteínas | Alta concentração | Baixa | Alta (albumina) |\n| pH | ~7,0–7,2 | ~7,4 | ~7,4 |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Água Corporal Total ~60% peso] --> B[Líquido Extracelular LEC]\n A --> C[Líquido Intracelular LIC ~28-42 L]\n B --> D[Plasma Sanguíneo intravascular]\n B --> E[Líquido Intersticial extravascular]\n B --> F[Líquido Transcelular ~1-2 L]\n F --> G[LCR, Sinovial, Peritoneal, Pericárdico, Intraocular]\n C <-->|Aquaporinas - osmose| E\n E <-->|Forças de Starling| D\n```\n\n> **Mnemônico:** Para lembrar as vias de PERDA de água: 'PUFF-S' — Pele insensível, Urina, Fezes, Fôlego (pulmões), Suor\n\n<sub>Fontes: b21c4a0406860d94:7, b21c4a0406860d94:9, 0ed7ffa8d597f443:0, 0ed7ffa8d597f443:1, 0ed7ffa8d597f443:2</sub>\n\n---\n\n## Equação de Starling, Glicocálix Endotelial e Dinâmica Capilar\n\nA troca de fluidos entre o plasma e o interstício é governada pelo princípio de Starling, descrito pela equação: Jv = Kf × [(Pc – Pi) – σ(πc – πi)]. Nessa equação, Jv representa o fluxo líquido de fluido (positivo = filtração, negativo = reabsorção); Kf é o coeficiente de filtração (produto da permeabilidade vascular pela área de superfície); Pc e Pi são as pressões hidrostáticas capilar e intersticial, respectivamente; σ é o coeficiente de reflexão (idealmente 1, impedindo a passagem de proteínas); πc e πi são as pressões oncóticas capilar e intersticial. As forças hidrostáticas 'empurram' o líquido para fora do capilar, enquanto a pressão oncótica (gerada pelas proteínas plasmáticas, principalmente albumina, que não atravessam facilmente os poros capilares) 'puxa' o líquido de volta para dentro. O modelo clássico previa filtração no polo arteriolar e reabsorção no polo venoso.\n\nEntretanto, o modelo clássico de Starling é reconhecidamente simplificado. A descoberta do glicocálix endotelial — uma camada na superfície luminal do endotélio composta por proteoglicanos, glicoproteínas e glicosaminoglicanos — revolucionou a compreensão da dinâmica capilar. Entre o sangue e o endotélio existe um microespaço denominado 'subglicocálix'. A pressão oncótica fisiologicamente relevante NÃO é a diferença entre plasma e interstício, mas sim entre plasma (πc) e o subglicocálix (πg). Como a pressão oncótica no subglicocálix permanece baixa mesmo no polo venoso (onde Pc cai), não existe reabsorção sustentada no capilar. A equação corrigida é: Jv = Kf × [(Pc – Pi) – σ(πg – πi)].\n\nA consequência fisiológica mais importante dessa revisão é que o líquido filtrado para o interstício não retorna predominantemente pelo polo venoso capilar. Em vez disso, a troca capilar é determinada pelo glicocálix e o equilíbrio de volume depende da drenagem linfática. Clinicamente, isso explica por que condições que aumentam Pc (insuficiência cardíaca congestiva), reduzem πc (hipoalbuminemia na insuficiência hepática) ou destroem o glicocálix (sepse) levam ao acúmulo de líquido no interstício (edema) com aumento da formação de linfa.\n\n### Pontos-chave\n\n- Jv = Kf × [(Pc – Pi) – σ(πc – πi)]: filtração se positivo, reabsorção se negativo.\n- Pressão hidrostática capilar (Pc) empurra líquido para fora; pressão oncótica capilar (πc) puxa líquido para dentro.\n- Proteínas são os únicos constituintes dissolvidos no plasma que não atravessam facilmente os poros capilares, gerando pressão oncótica.\n- O glicocálix endotelial é composto por proteoglicanos, glicoproteínas e glicosaminoglicanos na superfície luminal do endotélio.\n- A pressão oncótica relevante é plasma vs. subglicocálix (πg), não plasma vs. interstício.\n- Não existe reabsorção sustentada no capilar — mesmo no lado venoso, πg permanece baixa.\n- A troca capilar é determinada pelo glicocálix; o equilíbrio de volume depende da drenagem linfática.\n- Na sepse, a degradação do glicocálix aumenta a filtração capilar e causa edema.\n- Na insuficiência cardíaca: ↑Pc → ↑filtração → edema. Na hipoalbuminemia: ↓πc → ↑filtração → edema.\n\n### Comparação\n\n| Força | Direção do Efeito | Condição que a Altera | Consequência Clínica |\n|---|---|---|---|\n| Pressão hidrostática capilar (Pc) | Filtração (para fora) | ↑ na insuficiência cardíaca | Edema |\n| Pressão hidrostática intersticial (Pi) | Reabsorção (para dentro) | Geralmente próxima de zero ou negativa | Favorece saída de líquido |\n| Pressão oncótica capilar (πc) | Reabsorção (para dentro) | ↓ na hipoalbuminemia (insuf. hepática) | Edema |\n| Pressão oncótica intersticial (πi) | Filtração (para fora) | ↑ em inflamação | Edema |\n| Pressão oncótica subglicocálix (πg) | Reabsorção (para dentro) | ↓ na degradação do glicocálix (sepse) | Edema grave |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart LR\n A[Polo Arteriolar\\nPc alta] -->|Filtração líquida| B[Interstício]\n B -->|Drenagem Linfática| C[Sistema Linfático → Circulação]\n D[Glicocálix Endotelial\\nBarreira seletiva para proteínas] -->|Determina πg no subglicocálix| E{Jv = Kf × Pc-Pi - σ×πg-πi}\n E -->|Jv positivo| B\n F[Polo Venoso\\nPc baixa, mas πg permanece baixa] -->|Sem reabsorção sustentada| G[Modelo clássico INCORRETO]\n H[Sepse: destruição do glicocálix] -->|↑ permeabilidade, ↑ filtração| B\n```\n\n> **Mnemônico:** Para lembrar as forças de Starling: 'Hidro Empurra, Oncótica Puxa' (HE-OP) — Hidrostática Empurra para fora, Oncótica Puxa para dentro\n\n<sub>Fontes: b21c4a0406860d94:8, 0ed7ffa8d597f443:2, 0ed7ffa8d597f443:3</sub>\n\n---\n\n## Sistemas Tampão e Equilíbrio Ácido-Básico\n\nA manutenção do pH sanguíneo entre 7,35 e 7,45 é essencial porque quase todos os sistemas enzimáticos funcionam de maneira ótima nessa faixa. O organismo enfrenta constante desafio ácido-básico pela ingestão de ácidos e bases na dieta e pela produção metabólica de CO₂ e ácidos não voláteis. Os sistemas tampão constituem a primeira linha de defesa: são misturas de ácido fraco e sua base conjugada capazes de resistir a alterações de pH em frações de segundos. O principal sistema tampão extracelular é o bicarbonato-CO₂ (H⁺ + HCO₃⁻ ⇌ H₂CO₃ ⇌ CO₂ + H₂O), que é um sistema aberto — o CO₂ pode ser eliminado pelos pulmões, tornando-o especialmente eficiente. Os tampões intracelulares incluem proteínas (principalmente hemoglobina nas hemácias), fosfato e bicarbonato; aproximadamente 60–70% do tamponamento químico total ocorre no interior das células.\n\nO princípio isoídrico estabelece que todos os tampões em uma solução comum estão em equilíbrio com a mesma concentração de H⁺. Portanto, qualquer alteração em um sistema tampão modifica simultaneamente todos os outros. Após o tamponamento químico imediato, a segunda linha de defesa é o sistema respiratório: o aumento da ventilação alveolar elimina CO₂ e reduz a concentração de H⁺ (ação em minutos a horas, eficiência de 50–75%). A terceira e mais potente linha é o rim, que age em horas a dias, reabsorvendo ou excretando HCO₃⁻ e secretando H⁺. O CO₂ produzido pelo metabolismo é transportado para os pulmões: 7–10% dissolvido no plasma, 20% ligado à hemoglobina, e 70% como HCO₃⁻ (via CO₂ + H₂O ⇌ H⁺ + HCO₃⁻).\n\nOs distúrbios primários são classificados em metabólicos (alteração primária no HCO₃⁻) ou respiratórios (alteração primária na pCO₂). Na acidose metabólica, o HCO₃⁻ cai, estimulando hiperventilação compensatória (pCO₂ esperada = 1,5 × [HCO₃⁻] + 8 ± 2). Na alcalose metabólica, o HCO₃⁻ sobe, causando hipoventilação compensatória limitada (pCO₂ esperada = 0,7 × [HCO₃⁻] + 20 ± 5). Na acidose respiratória, o acúmulo de CO₂ estimula retenção renal de HCO₃⁻ cronicamente. Na alcalose respiratória por hiperventilação, os rins excretam HCO₃⁻ cronicamente.\n\n### Pontos-chave\n\n- Quase todos os sistemas enzimáticos funcionam de maneira ótima quando o pH está entre 7,35 e 7,45.\n- Sistema tampão = ácido fraco + base conjugada; age em frações de segundos mas não elimina H⁺ do corpo.\n- Principal tampão extracelular: bicarbonato-CO₂ (sistema aberto, regulado pelos pulmões).\n- 70% do CO₂ é transportado como HCO₃⁻; 20% ligado à hemoglobina; 7–10% dissolvido no plasma.\n- Princípio isoídrico: todos os tampões estão em equilíbrio com a mesma [H⁺] — alterar um altera todos.\n- Pulmões: segunda linha de defesa, eficiência 50–75%, ação em 3–12 minutos.\n- Rins: terceira linha, mais potente, ação em horas a dias — excretam urina ácida ou básica.\n- Compensação da acidose metabólica: pCO₂ esperada = (1,5 × [HCO₃⁻]) + 8 ± 2.\n- Compensação da alcalose metabólica: pCO₂ esperado = 0,7 × (HCO₃⁻) + 20 mmHg ± 5.\n- Na sepse/acidose: rins reabsorvem todo HCO₃⁻ filtrado e geram novo HCO₃⁻ via tampões fosfato e amônia.\n\n### Comparação\n\n| Distúrbio | pH | pCO₂ | HCO₃⁻ | Base Excess | Mecanismo Primário | Compensação |\n|---|---|---|---|---|---|---|\n| Acidose Metabólica | ↓ | ↓ | ↓ | ↓ | ↓ HCO₃⁻ (perda ou consumo) | Hiperventilação (pulmões) |\n| Alcalose Metabólica | ↑ | ↑ | ↑ | ↑ | ↑ HCO₃⁻ (ganho ou perda de H⁺) | Hipoventilação limitada (pulmões) |\n| Acidose Respiratória | ↓ | ↑ | ↑ | ↓ | ↑ pCO₂ (hipoventilação) | Retenção renal de HCO₃⁻ |\n| Alcalose Respiratória | ↑ | ↓ | ↓ | ↑ | ↓ pCO₂ (hiperventilação) | Excreção renal de HCO₃⁻ |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Distúrbio Ácido-Básico] --> B{Primário Metabólico ou Respiratório?}\n B -->|HCO₃⁻ alterado| C[Distúrbio Metabólico]\n B -->|pCO₂ alterado| D[Distúrbio Respiratório]\n C --> E[Acidose Metabólica\\npH↓ HCO₃⁻↓]\n C --> F[Alcalose Metabólica\\npH↑ HCO₃⁻↑]\n D --> G[Acidose Respiratória\\npH↓ pCO₂↑]\n D --> H[Alcalose Respiratória\\npH↑ pCO₂↓]\n E -->|Compensação| I[Hiperventilação\\npCO₂ esperada = 1,5×HCO₃⁻ + 8 ±2]\n F -->|Compensação limitada| J[Hipoventilação\\npCO₂ esperado = 0,7×HCO₃⁻ + 20 ±5]\n G -->|Compensação crônica| K[Rins retêm HCO₃⁻]\n H -->|Compensação crônica| L[Rins excretam HCO₃⁻]\n```\n\n> **Mnemônico:** Para lembrar os tampões EXTRACELULARES: 'BPF' — Bicarbonato, Proteínas (albumina), Fosfato. Para os INTRACELULARES: 'PHB' — Proteínas (Hb), Fosfato, Bicarbonato\n\n<sub>Fontes: 1aa9c491a2a53451:0, 1aa9c491a2a53451:1, 1aa9c491a2a53451:2, 1aa9c491a2a53451:6, 1aa9c491a2a53451:7, 1aa9c491a2a53451:8, 1aa9c491a2a53451:9, 1aa9c491a2a53451:12, 0d58a2246d9c0f12:0</sub>\n\n---\n\n## Controle Renal do pH e Mecanismo de Secreção de H⁺\n\nOs rins controlam o equilíbrio ácido-básico ao excretar urina ácida ou básica. A excreção de urina ácida reduz a quantidade de ácido no líquido extracelular, enquanto a excreção de urina básica remove base. O mecanismo central envolve a secreção tubular de H⁺ acoplada à reabsorção de HCO₃⁻. Nos túbulos proximais, alça de Henle e início do túbulo distal, o CO₂ difunde-se para as células tubulares e, sob ação da anidrase carbônica, combina-se com H₂O para formar H₂CO₃, que se dissocia em H⁺ e HCO₃⁻. O H⁺ é secretado para o lúmen via contratransporte Na⁺-H⁺ (antiporte), usando o gradiente de Na⁺ gerado pela Na⁺-K⁺-ATPase basolateral como fonte de energia. Para cada H⁺ secretado, um HCO₃⁻ é reabsorvido para o sangue. Normalmente, a secreção tubular de H⁺ é ~4.400 mEq/dia e a filtração de HCO₃⁻ é ~4.320 mEq/dia — esses íons 'se titulam' nos túbulos.\n\nNos túbulos coletores, células intercaladas realizam secreção ativa primária de H⁺ via H⁺-ATPase (bomba de prótons), sem contratransporte. Esse segmento pode acidificar a urina até pH 4,5 (concentração de H⁺ até 900 vezes maior que o plasma), sendo essencial para a excreção de ácidos não voláteis. Como o pH mínimo urinário é ~4,5, a excreção de grandes quantidades de H⁺ livre seria impossível sem sistemas tampão tubulares. Os principais tampões urinários são o fosfato (pK ~6,8, concentrado nos túbulos por reabsorção preferencial de água) e a amônia. Quando H⁺ se combina com esses tampões em vez de HCO₃⁻, gera-se 'novo' HCO₃⁻ que retorna ao sangue, repondo o bicarbonato consumido na acidose.\n\nNa acidose, ocorre excesso de H⁺ em relação a HCO₃⁻: todo o HCO₃⁻ filtrado é reabsorvido e o H⁺ excedente é excretado tamponado por fosfato e amônia. Na alcalose, o excesso de HCO₃⁻ que não pode ser reabsorvido é excretado na urina. O mecanismo básico pelo qual os rins corrigem acidose ou alcalose é a titulação incompleta de H⁺ em relação ao HCO₃⁻, levando um ou outro a ser excretado na urina.\n\n### Pontos-chave\n\n- Os rins controlam o balanço acidobásico ao excretar urina ácida ou básica.\n- Anidrase carbônica catalisa: CO₂ + H₂O → H₂CO₃ → H⁺ + HCO₃⁻ nas células tubulares.\n- Túbulo proximal: H⁺ secretado por contratransporte Na⁺-H⁺; energia vem do gradiente de Na⁺ (Na⁺-K⁺-ATPase basolateral).\n- Para cada H⁺ secretado, um HCO₃⁻ é reabsorvido para o sangue.\n- Secreção tubular de H⁺: ~4.400 mEq/dia; filtração de HCO₃⁻: ~4.320 mEq/dia — titulam-se nos túbulos.\n- Túbulos coletores: células intercaladas secretam H⁺ via H⁺-ATPase (ativo primário); pH mínimo urinário = 4,5.\n- Tampões urinários principais: fosfato (pK ~6,8) e amônia — permitem excretar H⁺ sem atingir pH mínimo.\n- Combinação de H⁺ com tampões não-bicarbonato gera 'novo' HCO₃⁻ que repõe o bicarbonato consumido.\n- Na acidose: reabsorção completa de HCO₃⁻ + excreção de H⁺ tamponado. Na alcalose: excreção de HCO₃⁻ em excesso.\n\n### Comparação\n\n| Característica | Túbulo Proximal / Alça de Henle | Túbulo Coletor (Células Intercaladas) |\n|---|---|---|\n| Mecanismo de secreção de H⁺ | Contratransporte Na⁺-H⁺ (antiporte) | H⁺-ATPase (ativo primário) |\n| Fonte de energia | Gradiente de Na⁺ (Na⁺-K⁺-ATPase) | Hidrólise de ATP |\n| Capacidade de acidificação | pH mínimo ~6,7 (↑ [H⁺] 3–4×) | pH mínimo ~4,5 (↑ [H⁺] até 900×) |\n| Volume de H⁺ secretado | ~95% do total | ~5% do total |\n| Importância | Reabsorção em massa de HCO₃⁻ | Formação de urina muito ácida; excreção de ácidos não voláteis |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[CO₂ difunde para célula tubular] --> B[Anidrase Carbônica\\nCO₂ + H₂O → H₂CO₃]\n B --> C[H₂CO₃ → H⁺ + HCO₃⁻]\n C --> D[H⁺ secretado para lúmen\\nvia Na⁺-H⁺ antiporte túbulo proximal\\nou H⁺-ATPase túbulo coletor]\n C --> E[HCO₃⁻ → membrana basolateral → sangue]\n D --> F{H⁺ no lúmen tubular}\n F -->|Encontra HCO₃⁻ filtrado| G[H⁺ + HCO₃⁻ → CO₂ + H₂O\\nReabsorção indireta de HCO₃⁻]\n F -->|Excesso de H⁺ na acidose| H[H⁺ + HPO₄²⁻ → H₂PO₄⁻\\nou H⁺ + NH₃ → NH₄⁺]\n H --> I[Geração de NOVO HCO₃⁻ → sangue]\n I --> J[Reposição do HCO₃⁻ consumido na acidose]\n```\n\n> **Mnemônico:** Para lembrar os tampões urinários que geram 'novo' HCO₃⁻: 'FA' — Fosfato e Amônia\n\n<sub>Fontes: 1aa9c491a2a53451:4, 1aa9c491a2a53451:5, 1aa9c491a2a53451:11, 1aa9c491a2a53451:15</sub>\n\n---\n\n## Distúrbios do Equilíbrio Ácido-Básico: Visão Geral e Mecanismos de Compensação\n\nO equilíbrio ácido-básico do organismo depende da relação entre H⁺, HCO₃⁻, H₂CO₃, CO₂ e H₂O, expressa pela equação fundamental: H⁺ + HCO₃⁻ ⇌ H₂CO₃ ⇌ CO₂ + H₂O. Qualquer alteração primária nessa equação — seja por acúmulo ou perda de H⁺, ganho ou perda de HCO₃⁻, ou retenção/eliminação de CO₂ — gera um dos quatro distúrbios clássicos: acidose metabólica, alcalose metabólica, acidose respiratória ou alcalose respiratória. O organismo responde com mecanismos de compensação que atuam em sentido oposto ao distúrbio primário, buscando restaurar o pH para a faixa normal (7,35–7,45).\n\nA compensação respiratória é rápida (3 a 12 minutos) e atua por feedback negativo: o aumento de H⁺ estimula o centro respiratório, elevando a ventilação alveolar e reduzindo a PCO₂; a queda de H⁺ inibe o centro respiratório, reduzindo a ventilação. Contudo, a eficiência desse mecanismo é de apenas 50% a 75%, correspondendo a um ganho de feedback de 1 a 3. A compensação renal é mais lenta, porém mais precisa, e envolve ajustes na reabsorção de HCO₃⁻, na secreção de H⁺ e na excreção de tampões urinários (fosfato e amônio).\n\nÉ fundamental distinguir o distúrbio primário da compensação secundária ao interpretar uma gasometria. A compensação nunca ultrapassa o distúrbio primário: se o pCO₂ ou o HCO₃⁻ medido estiver além do esperado pelas fórmulas de compensação, há um segundo distúrbio primário coexistente. Distúrbios mistos — como acidose metabólica + acidose respiratória (caso clínico 5) ou acidose metabólica + alcalose respiratória (caso clínico 7) — são comuns em pacientes graves.\n\n### Pontos-chave\n\n- Os quatro distúrbios primários são: acidose metabólica (↓pH, ↓HCO₃⁻, ↓pCO₂), alcalose metabólica (↑pH, ↑HCO₃⁻, ↑pCO₂), acidose respiratória (↓pH, ↑pCO₂, ↑HCO₃⁻) e alcalose respiratória (↑pH, ↓pCO₂, ↓HCO₃⁻).\n- A compensação respiratória ocorre em 3 a 12 minutos, com eficiência de 50% a 75%; a compensação renal é mais lenta, mas mais completa.\n- Na acidose metabólica, a fórmula de compensação respiratória esperada é: pCO₂ esperada = (1,5 × [HCO₃⁻]) + 8 ± 2.\n- Na alcalose metabólica, a compensação é limitada pela hipóxia: pCO₂ esperado = 0,7 × (HCO₃⁻) + 20 mmHg ± 5.\n- Na acidose respiratória crônica, o HCO₃⁻ esperado = 24 + 4 × (0,1 × ΔpCO₂).\n- Na alcalose respiratória, ΔpaCO₂ de 1 mmHg corresponde a ΔHCO₃⁻ de 0,2 mEq/L.\n- Se o pCO₂ medido for menor que o esperado na acidose metabólica, há alcalose respiratória concomitante (distúrbio misto).\n- Se o HCO₃⁻ medido for menor que o esperado na alcalose respiratória, há acidose metabólica concomitante.\n- O pH normal do sangue arterial é 7,35–7,45; pCO₂ normal: 35–45 mmHg; HCO₃⁻ normal: 22–26 mEq/L.\n- A interpretação sistemática da gasometria deve seguir: (1) o exame está normal? (2) qual o nome do distúrbio? (3) qual o distúrbio primário? (4) a compensação está adequada?\n\n### Comparação\n\n| Distúrbio | pH | pCO₂ | HCO₃⁻ | Distúrbio Primário | Compensação |\n|---|---|---|---|---|---|\n| Acidose Metabólica | ↓ | ↓ | ↓ | ↓ HCO₃⁻ (perda) ou ↑ H⁺ (ganho) | Hiperventilação (↓ pCO₂) |\n| Alcalose Metabólica | ↑ | ↑ | ↑ | ↑ HCO₃⁻ (ganho) ou ↓ H⁺ (perda) | Hipoventilação (↑ pCO₂) — limitada |\n| Acidose Respiratória | ↓ | ↑ | ↑ | Retenção de CO₂ (hipoventilação) | ↑ Reabsorção HCO₃⁻ e excreção NH₄⁺ |\n| Alcalose Respiratória | ↑ | ↓ | ↓ | Eliminação de CO₂ (hiperventilação) | ↓ Reabsorção HCO₃⁻ e ↓ excreção NH₄⁺ |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Gasometria Arterial] --> B{pH normal 7,35–7,45?}\n B -- Sim --> C{pCO₂ e HCO₃⁻ normais?}\n C -- Sim --> D[Exame Normal]\n C -- Não --> E[Distúrbio Misto Compensado]\n B -- Não --> F{pH < 7,35?}\n F -- Sim --> G[ACIDOSE]\n F -- Não --> H[ALCALOSE]\n G --> I{pCO₂ elevado?}\n I -- Sim --> J[Acidose Respiratória]\n I -- Não --> K[Acidose Metabólica]\n H --> L{pCO₂ reduzido?}\n L -- Sim --> M[Alcalose Respiratória]\n L -- Não --> N[Alcalose Metabólica]\n J --> O{HCO₃⁻ esperado = 24 + 4×0,1×ΔpCO₂?}\n K --> P{pCO₂ esperada = 1,5×HCO₃⁻ + 8 ± 2?}\n M --> Q{ΔHCO₃⁻ = 0,2×ΔpaCO₂?}\n N --> R{pCO₂ esperado = 0,7×HCO₃⁻ + 20 ± 5?}\n O --> S{HCO₃⁻ medido = esperado?}\n P --> T{pCO₂ medido = esperado?}\n Q --> U{HCO₃⁻ medido = esperado?}\n R --> V{pCO₂ medido = esperado?}\n S -- Sim --> W[Compensação Adequada]\n S -- Não --> X[Distúrbio Misto]\n T -- Sim --> W\n T -- Não --> X\n U -- Sim --> W\n U -- Não --> X\n V -- Sim --> W\n V -- Não --> X\n```\n\n> **Mnemônico:** MARA: Metabólico Altera HCO₃⁻, Respiratório Altera pCO₂ (o distúrbio primário sempre altera o parâmetro do seu sistema; a compensação move o outro parâmetro na mesma direção)\n\n<sub>Fontes: 0d58a2246d9c0f12:1, 0d58a2246d9c0f12:6, 0d58a2246d9c0f12:8, 0d58a2246d9c0f12:12, 0d58a2246d9c0f12:16, 0d58a2246d9c0f12:17, 0d58a2246d9c0f12:18, 0d58a2246d9c0f12:19, 0d58a2246d9c0f12:20, 0d58a2246d9c0f12:21, 0d58a2246d9c0f12:22</sub>\n\n---\n\n## Controle Renal do pH: Secreção de H⁺, Reabsorção de HCO₃⁻ e Tampões Urinários\n\nOs rins controlam o equilíbrio ácido-básico excretando urina ácida ou básica conforme a necessidade. O mecanismo central envolve a secreção tubular de H⁺ acoplada à reabsorção de HCO₃⁻: nas células tubulares, o CO₂ (difundido ou produzido pelo metabolismo) combina-se com H₂O pela ação da anidrase carbônica, formando H₂CO₃, que se dissocia em H⁺ e HCO₃⁻. O H⁺ é secretado para o lúmen tubular — por contratransporte Na⁺/H⁺ no túbulo proximal e alça de Henle, e por ATPase transportadora de H⁺ (transporte ativo primário) nas células intercaladas do túbulo distal final e ductos coletores — enquanto o HCO₃⁻ retorna ao sangue. Para cada H⁺ secretado, um HCO₃⁻ é reabsorvido.\n\nNormalmente, a secreção tubular de H⁺ é de cerca de 4.400 mEq/dia e a filtração de HCO₃⁻ é de cerca de 4.320 mEq/dia, de modo que esses íons 'se titulam' nos túbulos. O pequeno excesso de H⁺ (~80 mEq/dia) é excretado combinado com tampões urinários — principalmente fosfato (HPO₄²⁻/H₂PO₄⁻, pK ~6,8) e amônia (NH₃ + H⁺ → NH₄⁺). Essa combinação com tampões gera 'novo' HCO₃⁻ que entra no sangue, sendo essencial na acidose para repor o HCO₃⁻ perdido do líquido extracelular. O pH mínimo urinário atingível pelos rins normais é de aproximadamente 4,5, correspondendo à concentração de H⁺ de 0,03 mEq/L.\n\nAs células intercaladas do túbulo distal final e ductos coletores são responsáveis por apenas ~5% do H⁺ secretado, mas são cruciais para acidificar ao máximo a urina: enquanto o túbulo proximal reduz o pH tubular apenas até ~6,7, os ductos coletores podem reduzir até ~4,5. Na alcalose, o excesso de HCO₃⁻ não reabsorvido é excretado na urina, corrigindo o distúrbio. Na acidose, todo o HCO₃⁻ filtrado é reabsorvido e o H⁺ excedente é tamponado e excretado como sais de fosfato e amônio.\n\n### Pontos-chave\n\n- A anidrase carbônica catalisa CO₂ + H₂O → H₂CO₃ → H⁺ + HCO₃⁻ nas células tubulares, sendo essencial para a secreção de H⁺ e reabsorção de HCO₃⁻.\n- No túbulo proximal e alça de Henle: secreção de H⁺ por contratransporte Na⁺/H⁺ (energia do gradiente de Na⁺ criado pela Na⁺/K⁺-ATPase basolateral).\n- Nas células intercaladas do túbulo distal final e ductos coletores: secreção de H⁺ por ATPase transportadora de H⁺ (transporte ativo primário), capaz de reduzir o pH urinário até 4,5.\n- Secreção tubular de H⁺ ≈ 4.400 mEq/dia; filtração de HCO₃⁻ ≈ 4.320 mEq/dia — normalmente 'se titulam' nos túbulos.\n- O excesso de H⁺ (~80 mEq/dia) é excretado combinado com tampões urinários: fosfato (H₂PO₄⁻) e amônio (NH₄⁺).\n- O tampão fosfato tem pK ~6,8, funcionando na faixa de pH mais efetiva da urina.\n- A combinação de H⁺ com tampões não-HCO₃⁻ gera 'novo' HCO₃⁻ que retorna ao plasma — mecanismo fundamental na correção da acidose.\n- Na acidose: reabsorção completa de HCO₃⁻ + excreção de H⁺ como NH₄⁺ e H₂PO₄⁻; na alcalose: excreção do excesso de HCO₃⁻ na urina.\n- O HCO₃⁻ filtrado não é reabsorvido diretamente (não permeia a membrana luminal); combina-se com H⁺ secretado → H₂CO₃ → CO₂ + H₂O → difunde para a célula → recombina com H₂O → novo HCO₃⁻ retorna ao sangue.\n- Na acidose respiratória, a compensação renal inclui: ↑ reabsorção de HCO₃⁻ no túbulo proximal e ↑ secreção de H⁺ nos túbulos distais, com ↑ excreção de NH₄⁺ como principal mecanismo.\n\n### Comparação\n\n| Segmento Tubular | Mecanismo de Secreção de H⁺ | pH Mínimo Atingível | Proporção do H⁺ Total |\n|---|---|---|---|\n| Túbulo proximal | Contratransporte Na⁺/H⁺ (secundário ativo) | ~6,7 | ~95% |\n| Alça de Henle (segmento ascendente espesso) | Contratransporte Na⁺/H⁺ | ~6,7 | Incluído nos ~95% |\n| Túbulo distal inicial | Contratransporte Na⁺/H⁺ | ~6,7 | Incluído nos ~95% |\n| Túbulo distal final e ductos coletores (células intercaladas) | ATPase transportadora de H⁺ (primário ativo) | ~4,5 | ~5% |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[CO₂ difunde para célula tubular] --> B[Anidrase carbônica]\n B --> C[CO₂ + H₂O → H₂CO₃]\n C --> D[H₂CO₃ → H⁺ + HCO₃⁻]\n D --> E[H⁺ secretado para lúmen tubular]\n D --> F[HCO₃⁻ retorna ao sangue via membrana basolateral]\n E --> G{H⁺ encontra HCO₃⁻ filtrado no lúmen?}\n G -- Sim --> H[H⁺ + HCO₃⁻ → H₂CO₃ → CO₂ + H₂O]\n H --> I[CO₂ difunde de volta para célula — ciclo de reabsorção de HCO₃⁻]\n G -- Não, excesso de H⁺ --> J[H⁺ combina com tampões urinários]\n J --> K[H⁺ + HPO₄²⁻ → H₂PO₄⁻ excretado]\n J --> L[H⁺ + NH₃ → NH₄⁺ excretado]\n K --> M[Gera NOVO HCO₃⁻ → retorna ao plasma]\n L --> M\n```\n\n> **Mnemônico:** CAFÉ-NH: Contratransporte (proximal) → ATPase (distal/coletor) → Fosfato e NH₄⁺ (tampões urinários) → Excreção de ácido → Novo HCO₃⁻ gerado\n\n<sub>Fontes: 0d58a2246d9c0f12:3, 0d58a2246d9c0f12:4, 0d58a2246d9c0f12:5, 0d58a2246d9c0f12:10, 0d58a2246d9c0f12:11, 0d58a2246d9c0f12:14, 0d58a2246d9c0f12:15</sub>\n\n---\n\n## Regulação Respiratória do pH e Tamponamento Químico\n\nO sistema respiratório constitui a segunda linha de defesa contra distúrbios ácido-básicos, atuando como tampão fisiológico de resposta rápida. O mecanismo central é o controle da PCO₂ no líquido extracelular: o aumento da ventilação alveolar elimina CO₂, reduzindo a concentração de H⁺ e elevando o pH; a redução da ventilação retém CO₂, aumentando H⁺ e reduzindo o pH. A ventilação alveolar pode variar de 0 a 15 vezes o normal, conferindo ao sistema respiratório enorme capacidade de modulação do pH. Duplicar a ventilação alveolar eleva o pH em ~0,23; reduzi-la a um quarto do normal reduz o pH em ~0,45 (para ~6,95). O sistema age como controlador por feedback negativo: ↑[H⁺] → ↑ ventilação alveolar → ↓ PCO₂ → ↓[H⁺].\n\nA eficiência do controle respiratório é de 50% a 75% (ganho de feedback de 1 a 3), e a resposta ocorre em 3 a 12 minutos. A capacidade total de tamponamento do sistema respiratório é uma a duas vezes maior que o poder de tamponamento de todos os outros tampões químicos do líquido extracelular combinados. Contudo, a compensação respiratória ao aumento do pH (alcalose) é menos efetiva que a resposta à acidose, pois a hipoventilação reduz também a PO₂, o que estimula a ventilação e limita a compensação. Quando a função pulmonar está comprometida (ex.: enfisema grave), os rins tornam-se o único mecanismo fisiológico remanescente para corrigir o pH.\n\nO tamponamento químico intracelular complementa os sistemas respiratório e renal. Aproximadamente 60% a 70% do tamponamento químico total dos líquidos corporais ocorre no interior das células, principalmente por proteínas intracelulares. Nas hemácias, a hemoglobina é tampão importante (H⁺ + Hb ⇌ HHb). O princípio isoídrico estabelece que todos os tampões de uma solução estão em equilíbrio com a mesma concentração de H⁺: qualquer alteração em um sistema tampão altera simultaneamente todos os outros, pois trocam H⁺ entre si.\n\n### Pontos-chave\n\n- A ventilação alveolar pode variar de 0 a 15 vezes o normal, permitindo ampla modulação do pH pelo sistema respiratório.\n- Duplicar a ventilação alveolar eleva o pH em ~0,23; reduzir a um quarto do normal reduz o pH em ~0,45.\n- A eficiência do controle respiratório é de 50% a 75% (ganho de feedback de 1 a 3); a resposta ocorre em 3 a 12 minutos.\n- A capacidade de tamponamento do sistema respiratório é uma a duas vezes maior que todos os outros tampões químicos do líquido extracelular combinados.\n- A compensação respiratória à alcalose (hipoventilação) é limitada porque a queda de PO₂ estimula a ventilação, impedindo hipoventilação profunda ou prolongada.\n- No enfisema grave, a capacidade de eliminar CO₂ está reduzida, causando acidose respiratória e comprometendo a compensação da acidose metabólica.\n- 60% a 70% do tamponamento químico total dos líquidos corporais ocorre no interior das células, principalmente por proteínas intracelulares.\n- A hemoglobina é o principal tampão intracelular das hemácias: H⁺ + Hb ⇌ HHb.\n- Princípio isoídrico: todos os tampões de uma solução estão em equilíbrio com a mesma [H⁺]; alterar um sistema tampão altera todos os outros simultaneamente.\n- O sistema respiratório é ativado rapidamente e 'ganha tempo' até que a resposta mais lenta dos rins corrija o distúrbio de forma mais precisa.\n\n### Comparação\n\n| Sistema de Tamponamento | Localização | Velocidade de Resposta | Eficiência/Capacidade | Limitações |\n|---|---|---|---|---|\n| Tampões químicos (bicarbonato, fosfato, proteínas plasmáticas) | Líquido extracelular | Imediata (segundos) | Base para os outros sistemas | Não corrige o distúrbio, apenas atenua |\n| Tampões intracelulares (proteínas, Hb) | Interior das células | Horas (exceto Hb: rápida) | 60–70% do tamponamento total | Lentidão de transporte de H⁺ e HCO₃⁻ através das membranas |\n| Sistema respiratório | Pulmões | 3–12 minutos | 1–2× maior que todos os tampões químicos combinados | Eficiência 50–75%; compensação à alcalose limitada pela hipóxia |\n| Sistema renal | Rins | Horas a dias | Mais preciso; pode corrigir completamente | Lento; comprometido na doença renal |\n\n> **Mnemônico:** RIQP — Rápido (respiratório, 3–12 min) → Intracelular (horas) → Quase perfeito (renal, dias): ordem crescente de precisão e tempo de resposta dos sistemas tampão\n\n<sub>Fontes: 0d58a2246d9c0f12:2, 0d58a2246d9c0f12:7, 0d58a2246d9c0f12:9, 0d58a2246d9c0f12:13</sub>\n\n---\n\n## Origem e Composição Química das Células Humanas\n\nA célula é a unidade fundamental da vida e sua origem remonta a aproximadamente 3,8 bilhões de anos. O processo evolutivo que levou ao surgimento das primeiras células envolveu etapas sequenciais: (1) formação de moléculas orgânicas simples (aminoácidos, açúcares, nucleotídeos) a partir de gases atmosféricos primitivos e energia — demonstrado pelo experimento de Miller-Urey (1953); (2) formação de polímeros complexos como proteínas e RNA; (3) surgimento de moléculas autorreplicantes (Hipótese do Mundo de RNA, em que o RNA pode armazenar informações e catalisar reações como riboenzimas); (4) formação de protocélulas com membranas; e (5) evolução para células verdadeiras com membranas complexas, vias metabólicas e genomas de DNA.\n\nUma célula é definida por seis características essenciais: (1) delimitação no espaço por membrana (bicamada fosfolipídica com proteínas); (2) citoplasma com citossol e organelas; (3) metabolismo próprio (síntese de proteínas, geração de ATP); (4) capacidade de reprodução; (5) resposta a estímulos e homeostase (pH, osmolaridade, temperatura); e (6) material genético (DNA/RNA). A composição química das células humanas é dominada pela água (~70% do volume celular) e pelo carbono, que representa ~50% do peso seco celular e forma a espinha dorsal de todas as moléculas orgânicas devido à versatilidade, abundância e estabilidade de suas ligações.\n\nOs íons intracelulares e extracelulares apresentam distribuição assimétrica fundamental para a fisiologia celular. No meio intracelular, o K⁺ é o cátion predominante (~120–150 mM), enquanto no extracelular predomina o Na⁺ (~140 mM). O Ca²⁺ livre intracelular é extremamente baixo (~0,0001 mM), contrastando com ~1,2–2,0 mM no extracelular. O pH intracelular (~7,0–7,2) é ligeiramente mais ácido que o extracelular (~7,4). Essas diferenças de concentração iônica são mantidas ativamente e são essenciais para funções como potencial de membrana, sinalização celular e transporte.\n\n### Pontos-chave\n\n- O experimento de Miller-Urey (1953) demonstrou que aminoácidos e outras moléculas orgânicas podem ser formados a partir de gases atmosféricos primitivos e energia.\n- A Hipótese do Mundo de RNA propõe que o RNA surgiu antes do DNA, podendo armazenar informações e catalisar reações (riboenzimas) — autorreplicação primitiva.\n- As seis características definidoras de uma célula são: membrana delimitante, citoplasma, metabolismo próprio, reprodução, homeostase/resposta a estímulos e material genético.\n- A água representa ~70% do volume celular; o carbono representa ~50% do peso seco celular.\n- A vida na Terra é baseada em carbono devido à versatilidade de suas ligações, abundância e estabilidade.\n- Cátion predominante intracelular: K⁺ (~120–150 mM); cátion predominante extracelular: Na⁺ (~140 mM).\n- Ca²⁺ livre intracelular é extremamente baixo (~0,0001 mM) versus ~1,2–2,0 mM extracelular — gradiente essencial para sinalização.\n- pH intracelular (~7,0–7,2) é mais ácido que o pH extracelular (~7,4).\n- As cianobactérias foram responsáveis pela produção de O₂ atmosférico (~2,7–2,4 bilhões de anos atrás), transformando a atmosfera terrestre.\n- A Terra tem ~4,5 bilhões de anos; os primeiros sinais de vida surgiram há ~3,8 bilhões de anos.\n\n### Comparação\n\n| Íon | Concentração Extracelular (mM) | Concentração Intracelular (mM) | Gradiente |\n|---|---|---|---|\n| Na⁺ | ~140 | ~10–15 | Alto gradiente para dentro |\n| K⁺ | ~4–5 | ~120–150 | Alto gradiente para fora |\n| Cl⁻ | ~110 | ~5–20 | Gradiente para dentro |\n| Ca²⁺ (livre) | ~1,2–2,0 | ~0,0001 | Gradiente enorme para dentro |\n| Mg²⁺ | ~1–2 | ~1–2 (livre) | Pequeno gradiente |\n| HCO₃⁻ | ~24 | ~10–15 | Gradiente para dentro |\n| pH | ~7,4 | ~7,0–7,2 | Interior mais ácido |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Atmosfera primitiva: CO₂, CH₄, NH₃, H₂O + energia UV/calor] --> B[1. Moléculas orgânicas simples: aminoácidos, açúcares, nucleotídeos]\n B --> C[2. Polímeros complexos: proteínas e RNA]\n C --> D[3. Moléculas autorreplicantes: Hipótese do Mundo de RNA]\n D --> E[4. Protocélulas com membranas fosfolipídicas]\n E --> F[5. Células verdadeiras com DNA, vias metabólicas e organelas]\n F --> G[~3,8 bilhões de anos: primeiros sinais de vida]\n G --> H[Cianobactérias → produção de O₂ ~2,7–2,4 bilhões de anos]\n H --> I[Evolução para células eucariontes e organismos multicelulares]\n```\n\n> **Mnemônico:** MAPA-RH: Moléculas orgânicas → Polímeros → Autorreplicação (RNA) → Protocélulas → células com RNA/DNA → Homeostase: etapas da origem celular\n\n<sub>Fontes: d90a50a5a5347d06:0, d90a50a5a5347d06:1</sub>\n\n---\n\n## Equilíbrio Ácido-Básico: Conceitos Fundamentais e Sistemas Tampão\n\nO pH do sangue humano deve ser mantido entre 7,35 e 7,45, pois 'quase todos os sistemas enzimáticos funcionam de maneira ótima quando o pH do sangue está entre 7,35 e 7,45'. Qualquer desvio dessa faixa compromete a função celular e enzimática. O organismo enfrenta um desafio constante porque produz ácidos e CO₂ durante o metabolismo energético e ingere ácidos e bases pela dieta, tornando indispensável a existência de mecanismos de tamponamento.\n\nOs sistemas tampão são misturas de ácido fraco e sua base conjugada capazes de resistir a alterações de pH. Os principais tampões extracelulares são o bicarbonato, as proteínas (albumina) e o fosfato; intracelularmente, destacam-se as proteínas (hemoglobina nas hemácias), o fosfato e o bicarbonato. O sistema tampão bicarbonato-CO₂ é especialmente relevante por ser um 'sistema aberto': CO₂ + H₂O ⇌ H⁺ + HCO₃⁻, permitindo que pulmões e rins regulem ativamente o pH.\n\nA correção do pH sanguíneo envolve dois órgãos com velocidades distintas: os pulmões atuam 'de minutos a horas' com ação imediata porém menos potente, enquanto os rins atuam 'de horas a dias' com ação mais potente. Essa diferença de velocidade é fundamental para entender a compensação dos distúrbios ácido-básicos e distinguir respostas agudas de crônicas.\n\n### Pontos-chave\n\n- pH normal do sangue arterial: 7,35–7,45; fora dessa faixa, os sistemas enzimáticos são comprometidos.\n- Sistemas tampão extracelulares: bicarbonato (principal), albumina e fosfato; intracelulares: hemoglobina, fosfato e bicarbonato.\n- O sistema bicarbonato-CO₂ é 'aberto' porque o CO₂ pode ser eliminado pelos pulmões, ampliando sua capacidade tamponante.\n- Pulmões: compensação rápida (minutos a horas), menos potente; Rins: compensação lenta (horas a dias), mais potente.\n- O pH é medido em escala logarítmica: pH = -log₁₀[H⁺]; concentração fisiológica de H⁺ é da ordem de 40 nEq/L.\n- Um sistema tampão resiste a alterações de pH 'mesmo após a adição de pequenas quantidades de ácido ou base forte'.\n- A hemoglobina nas hemácias é o principal tampão intracelular do sangue.\n\n### Comparação\n\n| Sistema Tampão | Localização | Componentes Principais | Velocidade de Ação |\n|---|---|---|---|\n| Bicarbonato-CO₂ | Extracelular (e intracelular) | HCO₃⁻ / CO₂ | Pulmões: minutos a horas; Rins: horas a dias |\n| Proteínas (albumina) | Extracelular | Albumina | Imediata |\n| Fosfato | Extra e intracelular | H₂PO₄⁻ / HPO₄²⁻ | Imediata |\n| Hemoglobina | Intracelular (hemácias) | HbH / Hb⁻ | Imediata |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Produção de H⁺ / CO₂ pelo metabolismo] --> B[Queda do pH]\n B --> C{Sistemas Tampão}\n C --> D[Bicarbonato-CO₂]\n C --> E[Proteínas / Albumina]\n C --> F[Fosfato / Hemoglobina]\n D --> G[Pulmões: eliminam CO₂\\nMinutos a horas]\n D --> H[Rins: retêm HCO₃⁻ / eliminam H⁺\\nHoras a dias]\n G --> I[pH restaurado]\n H --> I\n```\n\n> **Mnemônico:** **'BPF nos dois lados'**: **B**icarbonato, **P**roteínas, **F**osfato — tampões Extracelulares; os mesmos (+ Hemoglobina) Intracelulares.\n\n<sub>Fontes: 2c1fb88d06450be5:0</sub>\n\n---\n\n## Distúrbios Ácido-Básicos: Classificação, Causas e Compensação\n\nOs quatro distúrbios primários do equilíbrio ácido-básico são definidos pela direção da alteração do pH e pelo componente primariamente afetado (metabólico = HCO₃⁻; respiratório = pCO₂). Na acidose metabólica, há queda do HCO₃⁻ por acúmulo de ácidos (cetoacidose diabética, hipóxia tecidual, insuficiência renal, intoxicações) ou perda de bicarbonato (diarreia, acidose tubular renal). Na alcalose metabólica, o HCO₃⁻ sobe por perda de ácido (vômitos prolongados, diuréticos) ou ganho de base. A acidose respiratória resulta de hipoventilação com retenção de CO₂ (DPOC, pneumonia, rebaixamento do nível de consciência), enquanto a alcalose respiratória decorre de hiperventilação com queda do CO₂ (hipoxemia, ansiedade, dor).\n\nCada distúrbio primário desencadeia uma resposta compensatória previsível e calculável. Na acidose metabólica, a queda do pH estimula o centro respiratório, gerando hiperventilação que reduz o pCO₂ (pCO₂ esperada = 1,5 × [HCO₃⁻] + 8 ± 2). Na alcalose metabólica, o aumento do pH deprime o centro respiratório, causando hipoventilação (pCO₂ esperado = 0,7 × HCO₃⁻ + 20 ± 5), porém 'não é possível hipoventilar muito' por risco de hipoxemia. Nos distúrbios respiratórios, a compensação renal é mais lenta: na acidose respiratória crônica, HCO₃⁻ esperado = 24 + 4 × (0,1 × ΔpCO₂); na alcalose respiratória crônica, cada 1 mmHg de queda no pCO₂ reduz o HCO₃⁻ em 0,2 mEq/L.\n\nQuando a compensação calculada não coincide com o valor observado, existe um distúrbio misto. Por exemplo, se o pCO₂ está abaixo do esperado para uma acidose metabólica, há alcalose respiratória associada; se está acima, há acidose respiratória concomitante. Reconhecer distúrbios mistos é essencial em pacientes críticos, como os internados em UTI com múltiplas comorbidades.\n\n### Pontos-chave\n\n- Acidose metabólica: ↓HCO₃⁻, ↓pH; compensação respiratória: hiperventilação → ↓pCO₂. Fórmula: pCO₂ esperada = 1,5 × [HCO₃⁻] + 8 ± 2.\n- Alcalose metabólica: ↑HCO₃⁻, ↑pH; compensação: hipoventilação → ↑pCO₂. Fórmula: pCO₂ esperado = 0,7 × HCO₃⁻ + 20 ± 5. Limitada pela hipoxemia.\n- Acidose respiratória: ↑pCO₂, ↓pH; compensação renal crônica: ↑HCO₃⁻. Fórmula: HCO₃⁻ esperado = 24 + 4 × (0,1 × ΔpCO₂).\n- Alcalose respiratória: ↓pCO₂, ↑pH; compensação renal: ↓HCO₃⁻. Fórmula crônica: ΔpCO₂ de 1 mmHg → ↓HCO₃⁻ de 0,2 mEq/L.\n- Distúrbio misto: pCO₂ ou HCO₃⁻ fora da faixa esperada pela compensação calculada.\n- Causas clássicas: cetoacidose diabética → acidose metabólica; DPOC → acidose respiratória; vômitos → alcalose metabólica; TEP/ansiedade → alcalose respiratória.\n- A compensação nunca ultrapassa o pH normal — se o pH está corrigido além do esperado, suspeitar de distúrbio misto.\n- Rins eliminam H⁺ e retêm HCO₃⁻ na acidose; eliminam HCO₃⁻ e retêm H⁺ na alcalose.\n\n### Comparação\n\n| Distúrbio | pH | HCO₃⁻ | pCO₂ | Mecanismo Primário | Compensação | Fórmula de Compensação |\n|---|---|---|---|---|---|---|\n| Acidose Metabólica | ↓ | ↓↓ | ↓ (compensação) | ↓HCO₃⁻ (perda ou consumo) | Hiperventilação (pulmão) | pCO₂ = 1,5×[HCO₃⁻] + 8 ± 2 |\n| Alcalose Metabólica | ↑ | ↑↑ | ↑ (compensação) | ↑HCO₃⁻ (ganho ou perda de H⁺) | Hipoventilação (pulmão) — limitada | pCO₂ = 0,7×HCO₃⁻ + 20 ± 5 |\n| Acidose Respiratória | ↓ | ↑ (compensação) | ↑↑ | Retenção de CO₂ (hipoventilação) | Retenção de HCO₃⁻ (rim) | HCO₃⁻ = 24 + 4×(0,1×ΔpCO₂) |\n| Alcalose Respiratória | ↑ | ↓ (compensação) | ↓↓ | Eliminação de CO₂ (hiperventilação) | Eliminação de HCO₃⁻ (rim) | ΔpCO₂ 1 mmHg → ΔHCO₃⁻ 0,2 mEq/L |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Gasometria Arterial] --> B{pH normal 7,35-7,45?}\n B -- Sim --> C[Verificar se há distúrbio misto oculto]\n B -- Não --> D{pH < 7,35?}\n D -- Sim --> E[ACIDOSE]\n D -- Não --> F[ALCALOSE]\n E --> G{HCO₃⁻ baixo?}\n G -- Sim --> H[Acidose METABÓLICA\\nCompensação: ↓pCO₂\\npCO₂ esp = 1,5×HCO₃⁻+8±2]\n G -- Não --> I[Acidose RESPIRATÓRIA\\nCompensação renal: ↑HCO₃⁻\\nHCO₃⁻ esp = 24+4×0,1×ΔpCO₂]\n F --> J{HCO₃⁻ alto?}\n J -- Sim --> K[Alcalose METABÓLICA\\nCompensação: ↑pCO₂\\npCO₂ esp = 0,7×HCO₃⁻+20±5]\n J -- Não --> L[Alcalose RESPIRATÓRIA\\nCompensação renal: ↓HCO₃⁻\\nΔpCO₂ 1mmHg → ΔHCO₃⁻ 0,2]\n H --> M{pCO₂ dentro do esperado?}\n I --> N{HCO₃⁻ dentro do esperado?}\n K --> O{pCO₂ dentro do esperado?}\n L --> P{HCO₃⁻ dentro do esperado?}\n M -- Não --> Q[DISTÚRBIO MISTO]\n N -- Não --> Q\n O -- Não --> Q\n P -- Não --> Q\n```\n\n> **Mnemônico:** **'ROME'** (adaptado): **R**espiratório **O**posto (pH e pCO₂ em direções opostas); **M**etabólico **E**qual (pH e HCO₃⁻ na mesma direção).\n\n<sub>Fontes: 2c1fb88d06450be5:0, 2c1fb88d06450be5:1, 2c1fb88d06450be5:2, 2c1fb88d06450be5:3, 2c1fb88d06450be5:4, 2c1fb88d06450be5:5</sub>\n\n---\n\n## Interpretação da Gasometria: Método Passo a Passo e Casos Clínicos\n\nA interpretação sistemática da gasometria arterial segue uma sequência lógica de quatro perguntas: (1) O exame está normal? (2) Qual o 'nome' do distúrbio? (3) Qual o distúrbio primário — o que aconteceu primeiro? (4) A compensação está adequada? Essa abordagem evita erros de interpretação, especialmente em distúrbios mistos onde o pH pode estar próximo do normal apesar de dois processos patológicos simultâneos.\n\nOs valores de referência da gasometria arterial são: pH 7,35–7,45; HCO₃⁻ 22–26 mEq/L; pCO₂ 35–45 mmHg; pO₂ 80–100 mmHg. Após identificar o distúrbio primário, aplica-se a fórmula de compensação correspondente e compara-se o valor calculado com o observado. Se o valor observado estiver dentro da faixa esperada, trata-se de distúrbio simples compensado; se estiver fora, há distúrbio misto. Por exemplo, num paciente com pneumonia e insuficiência renal (Caso 5), o pCO₂ abaixo do esperado para a acidose metabólica revela alcalose respiratória associada — 'distúrbio misto: Acidose Metabólica + Alcalose Respiratória'.\n\nCasos clínicos ilustrativos consolidam o método: cetoacidose diabética → acidose metabólica compensada (pCO₂ cai conforme fórmula); DPOC descompensada → acidose respiratória com compensação renal (HCO₃⁻ sobe conforme fórmula); vômitos prolongados → alcalose metabólica compensada; tromboembolismo pulmonar → alcalose respiratória (hiperventilação por hipoxemia). Distúrbios mistos surgem quando duas condições coexistem, como cetoacidose diabética + pneumonia (acidose metabólica + acidose respiratória) ou pneumonia + sepse (acidose metabólica + alcalose respiratória).\n\n### Pontos-chave\n\n- Sequência de interpretação: (1) normal? (2) nome do distúrbio? (3) distúrbio primário? (4) compensação adequada?\n- Valores normais: pH 7,35–7,45; HCO₃⁻ 22–26 mEq/L; pCO₂ 35–45 mmHg; pO₂ 80–100 mmHg.\n- Cetoacidose diabética: acidose metabólica — pCO₂ cai por hiperventilação (respiração de Kussmaul).\n- DPOC descompensada: acidose respiratória — HCO₃⁻ sobe por compensação renal crônica.\n- Vômitos prolongados: alcalose metabólica — perda de H⁺ gástrico eleva HCO₃⁻; compensação por hipoventilação limitada.\n- TEP/ansiedade: alcalose respiratória — hiperventilação reduz pCO₂; compensação renal reduz HCO₃⁻.\n- Distúrbio misto: pCO₂ acima do esperado na acidose metabólica → acidose respiratória associada; abaixo → alcalose respiratória associada.\n- pH normal com HCO₃⁻ e pCO₂ alterados pode indicar distúrbio misto com efeitos opostos que se cancelam.\n- A gasometria venosa também é utilizada clinicamente, mas os valores de referência diferem da arterial.\n\n### Comparação\n\n| Caso Clínico | Condição | Distúrbio | pH | HCO₃⁻ | pCO₂ | Raciocínio |\n|---|---|---|---|---|---|---|\n| Cetoacidose diabética | Sem insulina | Acidose Metabólica compensada | ↓ | ↓↓ | ↓ | pCO₂ cai conforme fórmula 1,5×HCO₃⁻+8 |\n| DPOC descompensada | Retenção de CO₂ | Acidose Respiratória compensada | ↓ | ↑ | ↑↑ | HCO₃⁻ sobe conforme fórmula renal |\n| Vômitos prolongados | Perda de H⁺ gástrico | Alcalose Metabólica compensada | ↑ | ↑↑ | ↑ | pCO₂ sobe conforme 0,7×HCO₃⁻+20 |\n| TEP / Ansiedade | Hiperventilação | Alcalose Respiratória | ↑ | ↓ | ↓↓ | HCO₃⁻ cai 0,2 mEq/L por mmHg de ↓pCO₂ |\n| Pneumonia + IRC | Dois processos | Distúrbio Misto: AM + AR | ↓ | ↓↓ | ↓ (além do esperado) | pCO₂ abaixo do esperado para AM |\n| CAD + Pneumonia | Dois processos | Distúrbio Misto: AM + AcR | ↓↓ | ↓↓ | ↑ (acima do esperado) | pCO₂ acima do esperado para AM |\n\n> **Mnemônico:** **'4 Ps da Gasometria'**: **P**H normal? → **P**rimário (nome)? → **P**rimário (causa)? → **P**revisto (c
