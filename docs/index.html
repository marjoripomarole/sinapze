<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>sinapze</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<style>
  /* ── CSS variables — dark (default) ── */
  :root {
    --bg:        #020617;
    --bg2:       #0f172a;
    --surface:   #1e293b;
    --surface2:  #334155;
    --border:    #334155;
    --text:      #e2e8f0;
    --text2:     #94a3b8;
    --text3:     #64748b;
    --accent:    #38bdf8;
    --accent2:   #0369a1;
    --head-bg:   #0f172a;
    --code-fg:   #f472b6;
    --even-row:  #0a0f1e;
    --card-back: #020617;
  }
  /* ── light overrides ── */
  .light {
    --bg:        #f8fafc;
    --bg2:       #f1f5f9;
    --surface:   #ffffff;
    --surface2:  #e2e8f0;
    --border:    #cbd5e1;
    --text:      #0f172a;
    --text2:     #475569;
    --text3:     #94a3b8;
    --accent:    #0284c7;
    --accent2:   #0369a1;
    --head-bg:   #ffffff;
    --code-fg:   #db2777;
    --even-row:  #f8fafc;
    --card-back: #f0f9ff;
  }

  [x-cloak] { display:none !important; }
  body { background:var(--bg); color:var(--text); transition:background .2s,color .2s; }

  /* header / nav */
  .app-header { background:var(--head-bg); border-bottom:1px solid var(--border); }
  .tab-btn    { color:var(--text2); }
  .tab-btn:hover { background:var(--surface); color:var(--text); }
  .tab-active { background:#0284c7; color:#fff !important; }
  .exam-select { background:var(--surface); border:1px solid var(--border); color:var(--text); }

  /* prose */
  .prose { color:var(--text); }
  .prose h1 { font-size:1.7rem; font-weight:700; margin:1.4rem 0 .5rem; border-bottom:2px solid var(--border); padding-bottom:.3rem; color:var(--text); }
  .prose h2 { font-size:1.35rem; font-weight:700; margin:1.2rem 0 .4rem; color:var(--accent); }
  .prose h3 { font-size:1.1rem; font-weight:600; margin:1rem 0 .3rem; color:var(--text2); }
  .prose p  { margin:.6rem 0; line-height:1.75; }
  .prose ul { list-style:disc; padding-left:1.5rem; margin:.5rem 0; }
  .prose ol { list-style:decimal; padding-left:1.5rem; margin:.5rem 0; }
  .prose li { margin:.25rem 0; line-height:1.65; }
  .prose table { width:100%; border-collapse:collapse; margin:1rem 0; font-size:.9rem; }
  .prose th { background:var(--surface); padding:.5rem .75rem; text-align:left; border:1px solid var(--border); color:var(--accent); }
  .prose td { padding:.45rem .75rem; border:1px solid var(--border); }
  .prose tr:nth-child(even) td { background:var(--even-row); }
  .prose code { background:var(--surface); padding:.1rem .35rem; border-radius:.25rem; font-size:.85em; color:var(--code-fg); }
  .prose pre  { background:var(--surface); padding:1rem; border-radius:.5rem; overflow-x:auto; margin:.75rem 0; }
  .prose pre code { background:none; padding:0; color:var(--text); }
  .prose blockquote { border-left:3px solid var(--accent); padding-left:1rem; color:var(--text2); margin:.75rem 0; }
  .prose hr  { border-color:var(--border); margin:1.5rem 0; }

  /* panels */
  .panel   { background:var(--surface); border:1px solid var(--border); }
  .panel2  { background:var(--surface2); }
  .muted   { color:var(--text2); }
  .dimmed  { color:var(--text3); }

  /* plan checkboxes */
  .plan-check:checked + label { text-decoration:line-through; color:var(--text3); }

  /* cards */
  .card-front { background:var(--surface);  border:1px solid var(--border); }
  .card-back  { background:var(--card-back); border:1px solid var(--accent); }
  .card-back  { transform:rotateY(180deg); backface-visibility:hidden; -webkit-backface-visibility:hidden; }
  .card-front { backface-visibility:hidden; -webkit-backface-visibility:hidden; }

  /* input */
  .app-input  { background:var(--surface); border:1px solid var(--border); color:var(--text); }
  .app-input::placeholder { color:var(--text3); }
  .app-btn    { background:var(--surface); border:1px solid var(--border); color:var(--text); }
  .app-btn:hover { background:var(--surface2); }

  /* theme toggle */
  .theme-btn { background:var(--surface); border:1px solid var(--border); color:var(--text2); border-radius:.5rem; padding:.3rem .65rem; font-size:.85rem; cursor:pointer; transition:background .15s; }
  .theme-btn:hover { background:var(--surface2); }

  /* mermaid diagrams */
  .mermaid-wrap { background:var(--surface); border:1px solid var(--border); border-radius:.75rem; padding:1.5rem; margin:1rem 0; overflow-x:auto; text-align:center; }
  .mermaid-wrap svg { max-width:100%; height:auto; }
  .mermaid-label { font-size:.7rem; color:var(--text3); text-align:right; margin-top:.5rem; letter-spacing:.03em; }

  /* KaTeX — inherit theme colors */
  .katex { color:var(--text); font-size:1.05em; }
  .katex-display { overflow-x:auto; overflow-y:hidden; padding:.75rem 0; margin:.5rem 0; }
  .katex-display > .katex { background:var(--surface); border:1px solid var(--border); border-radius:.5rem; padding:.6rem 1.2rem; display:inline-block; }
  .katex .mord { color:var(--text); }
  .katex .mop, .katex .mrel { color:var(--accent); }
  .katex .mopen, .katex .mclose { color:var(--text2); }
</style>
</head>
<body class="min-h-screen font-sans" x-data="app()" x-init="init()" :class="light ? 'light' : ''" x-cloak>

<!-- Header -->
<header class="app-header px-6 py-3 flex items-center gap-4 sticky top-0 z-50">
  <span class="font-bold text-sky-500 text-lg tracking-tight">sinapze</span>

  <select x-model="currentExam" @change="switchExam()" class="exam-select text-sm rounded px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-sky-500">
    <template x-for="e in exams" :key="e.name">
      <option :value="e.name" x-text="e.display_name || e.name"></option>
    </template>
  </select>

  <nav class="flex gap-1 ml-4">
    <template x-for="tab in tabs" :key="tab.id">
      <button @click="activeTab = tab.id"
        :class="activeTab === tab.id ? 'tab-active' : 'tab-btn'"
        class="px-4 py-1.5 rounded text-sm font-medium transition-colors">
        <span x-text="tab.label"></span>
        <span x-show="tab.id === 'cards' && exam?.card_count"
          class="ml-1 text-xs bg-sky-100 text-sky-700 px-1.5 py-0.5 rounded-full"
          x-text="exam?.card_count"></span>
      </button>
    </template>
  </nav>

  <div class="ml-auto flex items-center gap-3">
    <span class="text-xs dimmed" x-text="statusMsg"></span>
    <!-- Theme toggle -->
    <button class="theme-btn" @click="toggleTheme()" :title="light ? 'Modo escuro' : 'Modo claro'">
      <span x-text="light ? 'Escuro' : 'Claro'"></span>
    </button>
  </div>
</header>

<!-- Main -->
<main class="max-w-5xl mx-auto px-6 py-8">

  <!-- ── GUIDE ── -->
  <div x-show="activeTab === 'guide'">
    <div x-show="guideLoading" class="muted text-center py-20"><p class="text-lg">Carregando guia…</p></div>
    <div x-show="guideError" class="panel rounded-xl p-8 text-center muted">
      <p x-text="guideError"></p>
      <p class="text-sm mt-3 dimmed">O guia está sendo gerado. Atualize a página em alguns minutos.</p>
    </div>
    <div x-show="!guideLoading && !guideError" class="prose" x-html="guideHtml"></div>
  </div>

  <!-- ── CARDS ── -->
  <div x-show="activeTab === 'cards'">
    <div x-show="!exam || !exam.has_cards" class="panel rounded-xl p-10 text-center muted">
      <p class="text-lg mb-2">Os cartões ainda não foram gerados.</p>
      <code class="text-sm panel2 px-3 py-1.5 rounded text-sky-600">
        sinapze cards --exam <span x-text="currentExam"></span> --output ./out/<span x-text="currentExam"></span>.apkg
      </code>
    </div>

    <div x-show="exam && exam.has_cards">
      <div class="flex justify-end mb-4">
        <a :href="apkgUrl" download
          class="app-btn text-sm px-4 py-2 rounded-lg transition-colors"
          style="border-color:var(--accent); color:var(--accent)">
          Baixar baralho Anki (.apkg)
        </a>
      </div>
      <div class="flex items-center gap-4 mb-6">
        <input x-model="cardSearch" type="search" placeholder="Buscar cartões…"
          class="app-input flex-1 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-sky-500">
        <span class="text-sm muted"><span x-text="filteredCards.length"></span> cartões</span>
        <button @click="shuffleCards()" class="app-btn text-sm px-3 py-2 rounded-lg transition-colors">Embaralhar</button>
        <button @click="resetProgress()" class="text-sm dimmed hover:text-sky-500 transition-colors">Reiniciar</button>
      </div>

      <div class="mb-6">
        <div class="flex justify-between text-xs dimmed mb-1">
          <span>Progresso da sessão</span>
          <span x-text="Math.round(sessionProgress * 100) + '%'"></span>
        </div>
        <div class="h-1.5 rounded-full overflow-hidden" style="background:var(--surface2)">
          <div class="h-full bg-sky-500 rounded-full transition-all" :style="`width:${sessionProgress*100}%`"></div>
        </div>
      </div>

      <div x-show="filteredCards.length > 0">
        <div style="perspective:1200px; min-height:280px; position:relative;">
          <template x-if="currentCard">
            <div class="cursor-pointer select-none"
              :style="{ transform: cardFlipped ? 'rotateY(180deg)' : 'none', 'transform-style': 'preserve-3d', transition: 'transform .5s', 'min-height': '280px', position: 'relative' }"
              @click="cardFlipped = !cardFlipped">

              <div class="card-front absolute inset-0 rounded-2xl p-8 flex flex-col justify-center">
                <div class="text-xs dimmed mb-4 flex gap-2 flex-wrap">
                  <template x-for="tag in currentCard.tags.slice(0,4)" :key="tag">
                    <span class="panel2 px-2 py-0.5 rounded muted" x-text="tag"></span>
                  </template>
                </div>
                <p class="text-lg leading-relaxed" x-text="currentCard.front"></p>
                <p class="text-xs dimmed mt-6 text-center">clique para revelar</p>
              </div>

              <div class="card-back absolute inset-0 rounded-2xl p-8 flex flex-col justify-center">
                <p class="text-base leading-relaxed" x-html="renderCardBack(currentCard)"></p>
                <div x-show="currentCard.explanation" class="mt-4 text-sm dimmed pt-3" style="border-top:1px solid var(--border)" x-text="currentCard.explanation"></div>
                <div x-show="currentCard.mnemonic" class="mt-3 text-sm text-amber-600 italic" x-text="'Mnemônico: ' + currentCard.mnemonic"></div>
                <p class="text-xs dimmed mt-3 pt-3" style="border-top:1px solid var(--border)" x-text="'Fonte: ' + currentCard.source_span"></p>
              </div>
            </div>
          </template>
        </div>

        <div class="flex items-center justify-center gap-6 mt-6">
          <button @click="prevCard()" :disabled="cardIndex === 0"
            class="app-btn px-5 py-2 rounded-lg transition-colors disabled:opacity-30 disabled:cursor-not-allowed">← Anterior</button>

          <div class="flex gap-3">
            <button @click="markCard('hard')"
              class="px-4 py-2 rounded-lg text-sm transition-colors"
              style="background:rgba(239,68,68,.15); color:#ef4444">Difícil</button>
            <button @click="markCard('good')"
              class="px-4 py-2 rounded-lg text-sm transition-colors"
              style="background:rgba(34,197,94,.15); color:#16a34a">Sabia</button>
          </div>

          <button @click="nextCard()" :disabled="cardIndex >= filteredCards.length - 1"
            class="app-btn px-5 py-2 rounded-lg transition-colors disabled:opacity-30 disabled:cursor-not-allowed">Próximo →</button>
        </div>

        <p class="text-center text-xs dimmed mt-3">
          <span x-text="cardIndex + 1"></span> / <span x-text="filteredCards.length"></span>
        </p>
      </div>
    </div>
  </div>

</main>

<script>window.__STATIC__ = {"exams": [{"name": "N1", "display_name": "N1 Molécula à Célula", "guide": "# N1 Molécula à Célula\n\n*Matéria: bioquímica e biologia celular · Gerado em 2026-04-27 01:00 · Idioma: pt-BR*\n\n## Resumo de alto rendimento para o dia da prova\n\n# BIOQUÍMICA & BIOLOGIA CELULAR — CHEAT SHEET N1\n\n## MACROMOLÉCULAS (Monômero → Polímero)\n| Monômero | Polímero |\n|---|---|\n| Aminoácido | Proteína |\n| Nucleotídeo | Ácido nucleico |\n| Monossacarídeo | Carboidrato |\n| Ácido graxo | Lipídeo |\n- **n monômeros → n-1 ligações peptídicas** (5 aa = 4 ligações)\n- Carbono ≈ 50% peso seco celular; Água ≈ 70% volume celular\n\n## PROCARIONTE vs EUCARIONTE\n- **Eucarionte**: núcleo definido + DNA enovelado em **histonas** ← critério determinante\n- **Procarionte**: sem núcleo delimitado, sem organelas membranosas (ex: bactérias 1–10 µm)\n- Células animais/vegetais: 10–100 µm\n\n## PROTEÍNAS — ESTRUTURA\n| Nível | Estabilizado por | Afetado pela desnaturação? |\n|---|---|---|\n| 1ª (sequência aa) | Ligações peptídicas | Não |\n| 2ª (α-hélice, β-folha) | Pontes de H | Sim |\n| 3ª (3D) | Pontes dissulfeto, hidrofóbicas | Sim |\n| 4ª (subunidades) | Forças não-covalentes | Sim |\n- **Anemia falciforme**: Glu→Val posição 6 cadeia β → HbS → falcização em hipóxia (estrutura primária)\n- **Hemoglobina**: 2α + 2β, possui os 4 níveis estruturais, transporta O₂\n- **Insulina**: 2 cadeias ligadas por pontes dissulfeto\n\n## ️ ENZIMAS — CINÉTICA E INIBIÇÃO\n- **Km baixo = alta afinidade**; Vmáx = enzima saturada\n- **Temperatura ótima humana**: 35–40°C\n- **Ribozimas**: RNA com atividade catalítica (exceção à regra proteica)\n\n| Tipo de Inibição | Reversível? | Sítio | Exemplo Clínico |\n|---|---|---|---|\n| Competitiva | Sim | Ativo | IECAs, Lovastatina |\n| Não-competitiva | Sim | Alostérico | Benzodiazepínicos, Cianeto |\n| Acompetitiva | Sim | Complexo ES | Lítio |\n| Irreversível | Não | Covalente | **AAS** (COX), **Organofosforados** (AChE) |\n\n- **Organofosforados**: inibição irreversível da acetilcolinesterase → acúmulo de ACh → hiperexcitabilidade neurológica\n- **AAS**: acetila covalentemente resíduo de **serina** no sítio ativo da COX\n- **COX-1** (constitutiva): homeostase gástrica/vascular | **COX-2** (induzível): inflamação\n\n## CARBOIDRATOS\n- **Aldose** (aldeído): glicose | **Cetose** (cetona): frutose\n- **Glicogênio hepático**: mantém glicemia sistêmica | **Glicogênio muscular**: uso local\n- **GLUT2** (fígado/pâncreas): baixa afinidade, sensor de glicemia, insulino-independente\n- **GLUT4** (músculo/adiposo): insulino-dependente → translocação para membrana pós-refeição\n- **Intolerância à lactose**: deficiência de lactase → fermentação → diarreia osmótica + gases\n- **HbA1c**: reflete 2–3 meses | **Frutosamina**: reflete 2–3 semanas\n- **Benedict positivo** (vermelho-tijolo): açúcares redutores (glicose, frutose) | Sacarose = negativo\n\n## LIPÍDEOS E LIPOPROTEÍNAS\n**Densidade crescente (tamanho decrescente):**\n> Quilomícron < VLDL < LDL < HDL\n- **LDL**: aterogênico, transporta colesterol para tecidos periféricos\n- **HDL**: antiaterogênico, transporte reverso do colesterol\n- **Células espumosas**: macrófagos carregados de LDL oxidado → base da placa aterosclerótica\n- **Gordura trans**: hidrogênios em lados opostos → cadeia reta → comportamento como saturada → ↑risco CV\n\n## EQUILÍBRIO ÁCIDO-BÁSICO\n**Valores normais:** pH 7,35–7,45 | pCO₂ 35–45 mmHg | HCO₃⁻ 22–26 mEq/L\n\n| Distúrbio | pH | pCO₂ | HCO₃⁻ | Exemplo |\n|---|---|---|---|---|\n| Acidose respiratória | ↓ | ↑↑ | ↑ (comp.) | DPOC |\n| Alcalose respiratória | ↑ | ↓↓ | ↓ (comp.) | Hiperventilação |\n| Acidose metabólica | ↓ | ↓ (comp.) | ↓↓ | CAD, diarreia |\n| Alcalose metabólica | ↑ | ↑ (comp.) | ↑↑ | Vômitos, diuréticos |\n\n**Fórmulas de compensação:**\n- Acidose metabólica: **pCO₂ esperada = (1,5 × [HCO₃⁻]) + 8 ± 2** (Winter)\n- Alcalose metabólica: **pCO₂ esperado = 0,7 × [HCO₃⁻] + 20 ± 5**\n- Acidose respiratória crônica: **HCO₃⁻ esperado = 24 + 4 × (0,1 × ΔpCO₂)**\n\n**CAD**: pH baixo + HCO₃⁻ baixo + pCO₂ baixa + respiração de Kussmaul + hálito cetônico\n\n**Tampões:** Extracelular = bicarbonato/CO₂ (principal) | Renal/intracelular = fosfato | Hemácias = Hb\n- 60–70% do tamponamento total ocorre **intracelularmente**\n- Pulmões: eficiência 50–75%, ação em minutos | Rins: mais potente, ação em horas a dias\n- pH mínimo urinário = **4,5**\n\n## MEMBRANA PLASMÁTICA E TRANSPORTE\n- **Na⁺/K⁺-ATPase**: 3 Na⁺ para fora, 2 K⁺ para dentro, 1 ATP — antiporte\n- **Digoxina**: inibe Na⁺/K⁺-ATPase → ↑Na⁺ intracelular → ↑Ca²⁺ → ↑contratilidade\n- **Fibrose cística**: defeito no canal **CFTR** (proteína) → muco espesso → obstrução pulmonar e pancreática\n- **Osmose**: passiva, sem ATP, do hipotônico para hipertônico | Soro fisiológico NaCl 0,9% = isotônico\n- **Glicocálice**: reconhecimento celular (sistema ABO, MHC em transplantes)\n\n## ️ ERROS INATOS DO METABOLISMO\n- **Fenilcetonúria (PKU)**: deficiência de fenilalanina hidroxilase (gene PAH 12q23) → ↑Phe → hipopigmentação (↓melanina), déficit cognitivo\n- **Deficiência de OTC**: ↑amônia + ↓citrulina → hiperamonemia\n- **Cistinúria**: defeito no transporte de cistina/lisina/arginina/ornitina → cálculos hexagonais\n- **Teste do Pezinho**: triagem neonatal obrigatória e gratuita no Brasil\n- Herança geralmente **autossômica recessiva**; frequência global ~1/5.000 nascidos vivos\n\n## SRAA E IECAs\n- Cascata: Renina → Angiotensinogênio → Ang I → **ECA** → **Ang II** → vasoconstrição + aldosterona\n- **IECAs** (captopril, enalapril): inibição competitiva da ECA → ↓Ang II → ↓aldosterona\n- Efeito colateral: **tosse seca** (acúmulo de bradicinina)\n- Risco: **hipercalemia** (↓aldosterona → ↓excreção de K⁺)\n- Captopril: origem no veneno da **Bothrops jararaca** (Sérgio Ferreira)\n\n## MNEMONICS\n- **4 Ps do DM**: Poliúria, Polidipsia, Polifagia, Perda de peso\n- **Aminoácidos essenciais**: não sintetizados pelo organismo → obtidos pela dieta\n- **Desnaturação**: destrói 2ª, 3ª, 4ª estrutura; **preserva** estrutura primária (ligações peptídicas intactas)\n\n---\n\n## Índice\n\n1. [Composição Química das Células e Macromoléculas](#composição-química-das-células-e-macromoléculas)\n2. [Equilíbrio Ácido-Básico, Tampões e Gasometria](#equilíbrio-ácido-básico--tampões-e-gasometria)\n3. [Aminoácidos, Proteínas, Enzimas e Proteostase](#aminoácidos--proteínas--enzimas-e-proteostase)\n4. [Carboidratos, Glicemia, Lipídios, Lipoproteínas e Membrana Plasmática](#carboidratos--glicemia--lipídios--lipoproteínas-e-membrana-plasmática)\n5. [Tipos Celulares: Conceito, Classificação e Morfologia Funcional](#tipos-celulares--conceito--classificação-e-morfologia-funcional)\n6. [Origem e Composição Química das Células](#origem-e-composição-química-das-células)\n7. [Equilíbrio Acidobásico: Transporte de Gases, pH e Distúrbios](#equilíbrio-acidobásico--transporte-de-gases--ph-e-distúrbios)\n8. [Sistemas Tampão e Manutenção do pH Corporal](#sistemas-tampão-e-manutenção-do-ph-corporal)\n9. [Regulação Respiratória e Renal do Equilíbrio Acidobásico](#regulação-respiratória-e-renal-do-equilíbrio-acidobásico)\n10. [Distúrbios do Equilíbrio Acidobásico: Identificação e Compensação](#distúrbios-do-equilíbrio-acidobásico--identificação-e-compensação)\n11. [Hemoglobina, Transporte de Gases e Oximetria](#hemoglobina--transporte-de-gases-e-oximetria)\n12. [Aminoácidos: Estrutura, Propriedades e Classificação](#aminoácidos--estrutura--propriedades-e-classificação)\n13. [Estrutura Proteica: Níveis de Organização e Relação Estrutura-Função](#estrutura-proteica--níveis-de-organização-e-relação-estrutura-função)\n14. [Desnaturação Proteica, Chaperonas e Digestão](#desnaturação-proteica--chaperonas-e-digestão)\n15. [Eletroforese de Proteínas e Proteinograma](#eletroforese-de-proteínas-e-proteinograma)\n16. [Enzimas: Conceito, Especificidade e Fatores que Afetam a Atividade](#enzimas--conceito--especificidade-e-fatores-que-afetam-a-atividade)\n17. [Inibição Enzi ão-lipídica-do-óleo-de-coco-e-classificação-dos-ácidos-graxos)\n106. [Efeitos do Óleo de Coco sobre Lipoproteínas e Risco Cardiovascular](#efeitos-do-óleo-de-coco-sobre-lipoproteínas-e-risco-cardiovascular)\n107. [Metodologia da Meta-Análise: Revisão Sistemática e Qualidade dos Ensaios](#metodologia-da-meta-análise--revisão-sistemática-e-qualidade-dos-ensaios)\n108. [Enzimas: Estrutura, Cinética e Inibição](#enzimas--estrutura--cinética-e-inibição)\n109. [mTOR, Rapamicina e Sinalização Celular](#mtor--rapamicina-e-sinalização-celular)\n110. [Lipoproteínas, Aterosclerose e Disfunção Endotelial](#lipoproteínas--aterosclerose-e-disfunção-endotelial)\n111. [Carboidratos, Glicemia, Insulina e Diabetes](#carboidratos--glicemia--insulina-e-diabetes)\n\n---\n\n## Composição Química das Células e Macromoléculas\n\nAs células são os pilares estruturais e funcionais básicos de todos os seres vivos, consistindo em compartimentos circundados por uma membrana seletiva e contendo uma solução aquosa densa em compostos químicos. A vida, em sua forma mais simples, opera como unidades individuais, enquanto organismos complexos estruturam-se como colônias celulares vastas originadas de uma única célula progenitora. A distinção fundamental entre procariontes e eucariontes reside na organização interna: procariontes possuem estrutura simplificada sem núcleo delimitado, enquanto eucariontes apresentam núcleo definido que segrega o material genético e organelas especializadas como mitocôndrias.\n\nAs quatro grandes macromoléculas — carboidratos, lipídios, proteínas e ácidos nucleicos — são todas moléculas orgânicas baseadas em cadeias de carbono, responsáveis por dotar a matéria com as propriedades da vida. Cada classe possui monômeros específicos: monossacarídeos formam carboidratos (função energética), ácidos graxos compõem lipídios (formação de membranas), nucleotídeos constituem ácidos nucleicos (informação genética) e aminoácidos formam proteínas (defesa, catálise, estrutura). A multicelularidade traz vantagens como divisão de trabalho celular e desenvolvimento de tecidos e órgãos, mas exige sistemas de sinalização extremamente complexos para coordenar bilhões de células individuais.\n\n### Pontos-chave\n\n- Células são 'pequenos compartimentos circundados por uma membrana seletiva, contendo em seu interior uma solução aquosa densa em compostos químicos'\n- Procariontes: sem núcleo delimitado e ausência de organelas membranosas; Eucariontes: núcleo definido com DNA enovelado em proteínas histonas\n- O corpo humano abriga tanto células eucariontes próprias quanto trilhões de organismos procariontes (microbiota) e pode hospedar patógenos como o Trypanosoma cruzi\n- Monômero → Polímero: monossacarídeo → carboidrato; ácido graxo → lipídio; nucleotídeo → ácido nucleico; aminoácido → proteína\n- Critério determinante para identificar célula eucarionte: presença de núcleo definido e DNA enovelado em proteínas histonas\n- Microscopia óptica não possui resolução suficiente para diferenciar quimicamente DNA de RNA — requer colorações específicas ou microscopia eletrônica\n- Desvantagem da multicelularidade: 'qualquer falha na comunicação pode comprometer a sobrevivência do organismo'\n\n### Comparação\n\n| Monômero | Macromolécula | Função Principal |\n|---|---|---|\n| Monossacarídeos | Carboidratos (açúcares) | Energética |\n| Ácidos graxos | Lipídios (gorduras) | Formação de membranas |\n| Nucleotídeos | Ácidos nucleicos (DNA/RNA) | Informação genética |\n| Aminoácidos | Proteínas | Defesa, catálise, estrutura |\n\n| Característica | Procariontes | Eucariontes |\n|---|---|---|\n| Núcleo | Ausente (nucleoide) | Presente, delimitado por membrana |\n| Organelas membranosas | Ausentes | Presentes (mitocôndrias, etc.) |\n| Exemplos | Bactérias (microbiota, patógenos) | Células humanas, protozoários |\n| DNA | Livre no citoplasma | Enovelado em histonas |\n\n> **Mnemônico:** CLAN = Carboidratos (monossacarídeos), Lipídios (ácidos graxos), Ácidos nucleicos (nucleotídeos), proteíNas (aminoácidos)\n\n<sub>Fontes: a0a5120f3ea20a07:0, a0a5120f3ea20a07:1</sub>\n\n---\n\n## Equilíbrio Ácido-Básico, Tampões e Gasometria\n\nO pH sanguíneo é regulado principalmente pela respiração, que controla a concentração de CO₂. A maior parte do CO₂ reage com água via anidrase carbônica, formando ácido carbônico que se dissocia e libera H⁺ — e é o H⁺ que determina o pH. Pela equação de Henderson-Hasselbalch, aumentar a PCO₂ reduz o pH (acidose respiratória) e diminuir a PCO₂ eleva o pH (alcalose respiratória). Os pulmões ajustam isso mudando a ventilação, enquanto os rins compensam alterando a excreção de HCO₃⁻ e H⁺ em um prazo mais longo.\n\nOs tampões são substâncias capazes de se ligar reversivelmente ao H⁺, reduzindo oscilações de pH. O sistema mais importante no extracelular é o bicarbonato/CO₂; o tampão fosfato é especialmente relevante no túbulo renal e no meio intracelular. Na prática clínica, a gasometria arterial permite identificar distúrbios primários (respiratórios ou metabólicos) e suas compensações. A cetoacidose diabética (CAD) é um exemplo clássico de acidose metabólica com compensação respiratória (respiração de Kussmaul), resultante da deficiência de insulina que leva o organismo a utilizar gorduras como fonte de energia, produzindo corpos cetônicos em excesso.\n\n### Pontos-chave\n\n- CO₂ + H₂O → H₂CO₃ → H⁺ + HCO₃⁻ (via anidrase carbônica): PCO₂ elevada = acidose; PCO₂ baixa = alcalose\n- Sistema tampão mais importante no extracelular: bicarbonato/CO₂; tampão fosfato predomina no túbulo renal e intracelular\n- CAD: 'complicação aguda por deficiência de insulina, levando o corpo a usar gorduras como fonte de energia' → corpos cetônicos → acidose metabólica\n- Cetonúria na CAD ocorre porque o excesso de corpos cetônicos é filtrado e eliminado na urina\n- Alcalose respiratória aguda: pH alto + PCO₂ baixa + HCO₃⁻ normal (ex: hiperventilação)\n- Acidose respiratória com compensação metabólica: pH baixo + PCO₂ alta + HCO₃⁻ elevado (ex: agudização de DPOC)\n- Distúrbio misto: CO₂ alto + HCO₃⁻ baixo simultaneamente indica acidose respiratória + acidose metabólica\n- IECAs reduzem angiotensina II → menor aldosterona → menor secreção renal de H⁺ → favorece acidose metabólica e hipercalemia\n\n### Comparação\n\n| Distúrbio | pH | PCO₂ | HCO₃⁻ | Exemplo Clínico |\n|---|---|---|---|---|\n| Alcalose respiratória aguda | ↑ | ↓ | Normal | Hiperventilação, VM |\n| Acidose respiratória + compensação metabólica | ↓ | ↑ | ↑ | Agudização DPOC |\n| Alcalose metabólica + compensação respiratória | ↑ | ↑ | ↑ | Vômitos, tiazídico |\n| Acidose metabólica + compensação respiratória (Kussmaul) | ↓ | ↓ | ↓ | CAD |\n| Distúrbio misto (resp + metab) | ↓↓ | ↑ | ↓ | Sepse grave + hipoventilação |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Aumento de CO₂ no sangue] --> B[CO₂ + H₂O → H₂CO₃\\nvia anidrase carbônica]\n B --> C[H₂CO₃ → H⁺ + HCO₃⁻]\n C --> D[↑ H⁺ = ↓ pH = Acidose]\n E[Hiperventilação pulmonar] --> F[↓ PCO₂]\n F --> G[↓ H⁺ = ↑ pH = Alcalose]\n H[Rins] --> I[Compensação lenta:\\nexcreção de H⁺ e reabsorção de HCO₃⁻]\n```\n\n> **Mnemônico:** ROME = Respiratório Oposto, Metabólico Equal (no distúrbio respiratório, pH e PCO₂ vão em direções opostas; no metabólico, pH e HCO₃⁻ vão na mesma direção)\n\n<sub>Fontes: a7c82af51c33f892:0, e6cfa19711e27d73:0</sub>\n\n---\n\n## Aminoácidos, Proteínas, Enzimas e Proteostase\n\nOs aminoácidos são as unidades estruturais das proteínas, compostos por grupo amino (–NH₂), grupo carboxila (–COOH) e radical variável (R) ligados ao carbono alfa. As proteínas exercem funções estruturais (colágeno, queratina), de transporte (hemoglobina), enzimáticas, hormonais (insulina), de defesa (anticorpos) e de contração muscular (actina e miosina). A estrutura proteica organiza-se em quatro níveis: primária (sequência de aminoácidos), secundária (alfa-hélice e folha beta), terciária (conformação tridimensional global) e quaternária (associação entre múltiplas cadeias polipeptídicas). A desnaturação afeta as estruturas secundária, terciária e quaternária, mas não rompe as ligações peptídicas da estrutura primária.\n\nAs enzimas são catalisadores biológicos que formam o complexo enzima-substrato (ES), catalisam a reação e liberam o produto permanecendo inalteradas. Cada enzima possui alta especificidade pelo seu sítio ativo, o que explica por que outra proteína não consegue substituir uma enzima ausente ou defeituosa. A inibição pode ser competitiva (como a lovastatina na HMG-CoA redutase) ou irreversível (como organofosforados na acetilcolinesterase). A proteostase é mantida por chaperonas e pela resposta a proteínas mal dobradas (UPR — Unfolded Protein Response), que reduz temporariamente a tradução para evitar sobrecarga proteica; se a UPR falhar, a célula pode ativar apoptose. Modificações pós-traducionais (como fosforilação por quinases) auxiliam no direcionamento correto das proteínas.\n\n### Pontos-chave\n\n- Estrutura primária = sequência de aminoácidos; é a única não afetada pela desnaturação (ligações peptídicas permanecem intactas)\n- 5 aminoácidos → 4 ligações peptídicas (n monômeros → n-1 ligações)\n- Aminoácidos essenciais: 'o organismo não consegue produzir, ou não consegue produzir em quantidade suficiente, e por isso precisam ser obtidos pela alimentação'\n- Proteínas alimentares são digeridas em aminoácidos/dipeptídeos/tripeptídeos antes da absorção — não há incorporação direta de proteínas intactas\n- Hemoglobina: proteína intracelular nas hemácias, responsável pelo transporte de oxigênio, possui os quatro níveis estruturais\n- UPR responde ao acúmulo de proteínas mal dobradas no retículo endoplasmático; redução de chaperonas → ativação precoce da UPR\n- Organofosforados: inibidores irreversíveis da acetilcolinesterase → acúmulo de acetilcolina na fenda sináptica → hiperexcitabilidade neurológica\n- Lovastatina: inibição competitiva da HMG-CoA redutase (liga-se de forma transitória, não covalente, no sítio ativo)\n- Deficiência de OTC (ornitina transcarbamilase): bloqueio mitocondrial do ciclo da ureia → amônia elevada + citrulina diminuída → hiperamonemia\n- Eletroforese sérica (proteinograma): albumina reduzida na cirrose; transferrina (beta) aumentada na anemia ferropriva; pico M estreito na gamopatia monoclonal\n\n### Comparação\n\n| Nível Estrutural | Descrição | Estabilizado por | Afetado pela desnaturação? |\n|---|---|---|---|\n| Primária | Sequência de aminoácidos | Ligações peptídicas (covalentes) | Não |\n| Secundária | Alfa-hélice e folha beta | Pontes de hidrogênio | Sim |\n| Terciária | Conformação 3D global | Interações hidrofóbicas, pontes dissulfeto, etc. | Sim |\n| Quaternária | Associação de múltiplas cadeias | Interações não covalentes | Sim |\n\n| Tipo de Inibição | Exemplo | Mecanismo | Reversibilidade |\n|---|---|---|---|\n| Competitiva | Lovastatina / HMG-CoA redutase | Liga-se ao sítio ativo, compete com substrato | Reversível |\n| Irreversível | Organofosforados / acetilcolinesterase | Liga-se covalentemente, bloqueia permanentemente | Irreversível |\n\n| Banda Eletroforética | Proteínas Principais | Alteração Clínica Relevante |\n|---|---|---|\n| Albumina | Albumina | ↓ na cirrose, síndrome nefrótica, queimaduras |\n| Alfa-1 globulinas | Alfa-1 antitripsina, alfa-1 glicoproteína ácida | ↑ em inflamação aguda |\n| Alfa-2 globulinas | Haptoglobina, ceruloplasmina | ↑ em inflamação |\n| Beta globulinas | Transferrina, complemento C3 | ↑ transferrina na anemia ferropriva |\n| Gama globulinas | IgG, IgA, IgM | Pico M estreito = monoclonal; alargamento difuso = policlonal |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Proteína mal dobrada no RE] --> B[Ativação da UPR]\n B --> C[Redução temporária da tradução]\n B --> D[Aumento de chaperonas]\n C --> E{UPR bem-sucedida?}\n D --> E\n E -- Sim --> F[Proteostase restaurada]\n E -- Não --> G[Ativação de apoptose]\n```\n\n> **Mnemônico:** SETH-DC = Estrutural, Enzimática, Transporte, Hormonal, Defesa, Contração muscular (funções das proteínas)\n\n<sub>Fontes: 4039b509b4eccea3:0, 4039b509b4eccea3:1, aeda9a3a37981ef0:0, aeda9a3a37981ef0:1, e6cfa19711e27d73:0</sub>\n\n---\n\n## Carboidratos, Glicemia, Lipídios, Lipoproteínas e Membrana Plasmática\n\nOs carboidratos classificam-se pelo número de carbonos (trioses, pentoses, hexoses), pelo número de monômeros (monossacarídeos, dissacarídeos, oligossacarídeos, polissacarídeos) e pelo grupo funcional (aldoses como glicose; cetoses como frutose). O glicogênio é a forma de reserva de glicose nos humanos, armazenado principalmente no fígado (manutenção da glicemia sistêmica) e no músculo esquelético (reserva energética local). A digestão dos carboidratos inicia-se na boca pela amilase salivar, que quebra o amido. O transporte de glicose para células musculares e adiposas depende do GLUT4, regulado por insulina — após refeição rica em carboidratos, a insulina promove a translocação do GLUT4 para a membrana. A hemoglobina glicada (HbA1c) reflete a média glicêmica dos últimos 2-3 meses; a frutosamina reflete as últimas 2-3 semanas e é preferida quando a HbA1c não é confiável (hemólise, anemia, gestação).\n\nOs lipídios incluem gorduras saturadas (sem duplas ligações), insaturadas (mono ou poli-insaturadas) e trans (hidrogênios em lados opostos da dupla ligação, comportamento semelhante às saturadas). As lipoproteínas transportam lipídios no sangue: quilomícrons transportam triglicerídeos da dieta; VLDL (sintetizada nos hepatócitos) transporta triglicerídeos endógenos; LDL transporta colesterol para tecidos periféricos (aterogênica); HDL realiza transporte reverso do colesterol (antiaterogênica). A aterosclerose é uma doença inflamatória crônica que acomete a camada íntima de artérias, com células espumosas derivadas principalmente de macrófagos carregados de lipídios. A membrana plasmática, formada por bicamada fosfolipídica, regula o transporte por osmose (passivo, movimento de água), difusão simples, difusão facilitada e transporte ativo (bombas, como a Na⁺/K⁺-ATPase que usa ATP). O glicocálice (carboidratos de membrana) é responsável pelo reconhecimento celular, como na tipagem sanguínea ABO.\n\n### Pontos-chave\n\n- Glicogênio hepático: mantém glicemia sistêmica; glicogênio muscular: reserva local para contração — 'o fígado pensa no corpo inteiro, o músculo pensa nele mesmo'\n- GLUT4: presente em músculo esquelético e tecido adiposo, regulado por insulina (translocação para membrana após refeição)\n- HbA1c: glicação da hemoglobina, reflete 2-3 meses; Frutosamina: glicação de proteínas plasmáticas (albumina), reflete 2-3 semanas\n- Gordura trans: hidrogênios em lados opostos da dupla ligação → cadeia mais reta → comportamento semelhante às gorduras saturadas\n- HDL: transporte reverso do colesterol, antiaterogênica, correlação inversa com risco coronariano; LDL: transporta colesterol para tecidos periféricos, aterogênica\n- Células espumosas na aterogênese derivam principalmente de 'macrófagos carregados de lipídeos'\n- Ordem crescente de densidade das lipoproteínas: quilomícron < VLDL < LDL < HDL\n- Osmose: transporte passivo de água do meio hipotônico para hipertônico; solução isotônica (NaCl 0,9%) não altera volume celular\n- Na⁺/K⁺-ATPase: bomba ativa que mantém gradientes iônicos (Na⁺ para fora, K⁺ para dentro) — inibida pela digoxina → ↑ Na⁺ intracelular → ↑ Ca²⁺ → ↑ contratilidade\n- Glicocálice (carboidratos de membrana): função de reconhecimento celular, ex: sistema ABO; glicoproteínas MHC: compatibilidade de transplantes\n- Fibrose cística: defeito no canal CFTR (proteína = monômeros são aminoácidos) → muco espesso → obstrução ductal pancreática e pulmonar\n\n### Comparação\n\n| Lipoproteína | Origem | Principal Carga | Função | Aterogênica? |\n|---|---|---|---|---|\n| Quilomícron | Enterócitos | Triglicerídeos dietéticos | Transporte de gordura da dieta aos tecidos | Não diretamente |\n| VLDL | Hepatócitos | Triglicerídeos endógenos | Transporte de TG do fígado aos tecidos adiposo e muscular | Precursor de LDL |\n| LDL | Derivada de VLDL/IDL | Colesterol | Transporte de colesterol aos tecidos periféricos | Sim |\n| HDL | Fígado e intestino | Colesterol (reverso) | Transporte reverso do colesterol ao fígado | Não (protetora) |\n\n| Exame | Molécula Avaliada | Período Refletido | Limitação Principal |\n|---|---|---|---|\n| HbA1c | Hemoglobina glicada | 2-3 meses | Alterada em hemólise, anemia, transfusão |\n| Frutosamina | Proteínas plasmáticas (albumina) glicadas | 2-3 semanas | Alterada em hipoalbuminemia, hepatopatias |\n\n| Tipo de Transporte | Gasto de ATP | Exemplo |\n|---|---|---|\n| Difusão simples | Não | O₂, CO₂, moléculas lipofílicas |\n| Osmose | Não | Movimento de água entre compartimentos |\n| Difusão facilitada | Não | GLUT (glicose), aquaporinas |\n| Transporte ativo (bombas) | Sim | Na⁺/K⁺-ATPase, CFTR |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Refeição rica em carboidratos] --> B[↑ Glicose sanguínea]\n B --> C[Pâncreas libera insulina]\n C --> D[Translocação de GLUT4 para membrana\\nem músculo e tecido adiposo]\n D --> E[Entrada de glicose nas células]\n E --> F{Destino da glicose}\n F --> G[Glicólise / Energia]\n F --> H[Síntese de glicogênio\\nFígado e músculo]\n F --> I[Lipogênese se excesso]\n```\n\n> **Mnemônico:** QDLH = Quilomícron (dieta/TG), VLDL (fígado/TG endógeno), LDL (leva colesterol/perigosa), HDL (high/protetora) — ordem crescente de densidade\n\n<sub>Fontes: e07c53735f89e95b:0, e07c53735f89e95b:1, e07c53735f89e95b:2, e07c53735f89e95b:3, 34c7cf2f0d9ce0b6:0, 34c7cf2f0d9ce0b6:1, 34c7cf2f0d9ce0b6:2, 34c7cf2f0d9ce0b6:3, 6cbe56609278c25d:0, 6cbe56609278c25d:1, 6cbe56609278c25d:2, 8d967ded073fd283:0, 8d967ded073fd283:1</sub>\n\n---\n\n## Tipos Celulares: Conceito, Classificação e Morfologia Funcional\n\nA célula é definida como a menor unidade de matéria viva, sendo descrita como 'pequenas unidades limitadas por membranas preenchidas com uma solução aquosa concentrada de compostos e dotada de uma capacidade extraordinária de criar cópias dela mesma pelo seu crescimento e pela sua divisão em duas.' Essa definição captura tanto a estrutura (membrana delimitante, conteúdo aquoso) quanto a função essencial (autorreplicação). A forma celular não é arbitrária: 'o formato depende do organismo e do órgão onde a célula é encontrada e, principalmente, depende de sua função', o que explica por que neurônios possuem longas projeções para transmissão de sinais, enquanto hemácias têm formato bicôncavo para maximizar a troca gasosa.\n\nAs células são classificadas em dois grandes grupos: procariontes (células menos complexas, como bactérias) e eucariontes (células mais complexas, como as de animais, vegetais, fungos e protozoários). A principal distinção reside na presença de núcleo definido e organelas membranosas nas células eucariontes. Do ponto de vista da organização dos seres vivos, organismos unicelulares (como protozoários e bactérias) têm uma única célula constituindo o organismo inteiro, enquanto organismos pluricelulares possuem 'muitas células agrupadas e diferenciadas em tecidos e órgãos, formando um organismo.' Células de estrutura e função semelhantes se reúnem para formar tecidos, que por sua vez se organizam em órgãos.\n\nDo ponto de vista clínico, compreender os tipos celulares é fundamental para a medicina: problemas em nível celular repercutem em todo o organismo. Um exemplo paradigmático é a doença de Chagas, causada pelo protozoário unicelular flagelado Trypanosoma cruzi, cujo 'envolvimento cardíaco é a maior causa de morbidade e mortalidade na doença de Chagas pela ocorrência de falência cardíaca nos casos mais severos.' Outro exemplo é a fibrose cística, citada como modelo de como problemas na célula prejudicam todo o organismo.\n\n### Pontos-chave\n\n- Célula = menor porção de matéria viva; delimitada por membrana, com conteúdo aquoso e capacidade de autorreplicação.\n- Sete características da célula: altamente organizada, exibe homeostase, cresce e se desenvolve, reproduz-se, transforma energia e matéria, responde a estímulos e mostra adaptação ao meio.\n- Procariontes: células menos complexas (ex.: bactérias); eucariontes: células mais complexas (ex.: animais, vegetais, fungos, protozoários).\n- A forma da célula é condizente com sua função — morfologia e fisiologia são inseparáveis.\n- Escala de tamanho: bactérias entre 1 µm e 10 µm; células animais e vegetais entre 10 µm e 100 µm; célula de pele humana ≈ 0,00002 m (20 µm).\n- Organismos unicelulares (ex.: T. cruzi) podem causar doenças graves em hospedeiros pluricelulares, demonstrando a relevância clínica da biologia celular.\n- No corpo humano coexistem células eucariontes (células do hospedeiro) e procariontes (microbiota), o que tem implicações para saúde e doença.\n- Tecidos são formados por células de estrutura e função semelhantes; grupos de tecidos formam órgãos.\n\n### Comparação\n\n| Característica | Célula Procarionte | Célula Eucarionte |\n|---|---|---|\n| Complexidade | Menor | Maior |\n| Núcleo definido | Ausente | Presente |\n| Organelas membranosas | Ausentes | Presentes |\n| Exemplos | Bactérias | Animais, vegetais, fungos, protozoários |\n| Tamanho típico | 1–10 µm | 10–100 µm |\n| Organização | Unicelular | Uni ou pluricelular |\n\n> **Mnemônico:** **OHRRETA** — as 7 características da célula: **O**rganização, **H**omeostase, **R**eprodução, **R**esposta a estímulos, **E**nergia/transformação, **T**ransformação (crescimento/desenvolvimento), **A**daptação ao meio.\n\n<sub>Fontes: fc03bff607c86d28:0, fc03bff607c86d28:1, 8643a3b1283a687f:0, 8643a3b1283a687f:1, 0b1b32d6fb0337df:0, 0b1b32d6fb0337df:1, 95445721672e0e9c:0, 95445721672e0e9c:1</sub>\n\n---\n\n## Origem e Composição Química das Células\n\nA origem das células é explicada por um processo evolutivo de quatro etapas principais, iniciado há aproximadamente 4,0 bilhões de anos. Primeiro, a atmosfera primitiva da Terra (rica em metano, amônia, vapor d'água e hidrogênio) mais energia (raios, radiação UV) permitiu a formação de moléculas orgânicas simples como aminoácidos, açúcares e nucleotídeos — demonstrado experimentalmente por Miller e Urey em 1953. Em seguida, essas pequenas moléculas se ligaram formando polímeros complexos (proteínas e RNA), possivelmente em superfícies de argila ou próximo a fontes hidrotermais. A 'Hipótese do Mundo de RNA' propõe que o RNA surgiu antes do DNA, pois 'o RNA pode armazenar informações e catalisar reações químicas (riboenzimas) — então poderia tanto se replicar como evoluir.' Por fim, protocélulas evoluíram para células verdadeiras com membranas mais complexas, vias metabólicas e genomas de DNA.\n\nQuanto à composição química, a célula é definida por seis elementos estruturais: delimitação no espaço por membrana (bicamada fosfolipídica com proteínas inseridas), citoplasma (citossol fluido com organelas em eucariontes ou enzimas dispersas em procariontes), metabolismo próprio (síntese de proteínas, degradação de nutrientes, geração de ATP), capacidade de reprodução por divisão celular, resposta a estímulos e homeostase, e material genético (DNA/RNA). A vida na Terra é baseada em carbono, que 'forma a espinha dorsal de todas as moléculas orgânicas' por suas ligações versáteis, abundância e estabilidade. As quatro macromoléculas fundamentais são: proteínas (monômero: aminoácido), ácidos nucleicos (monômero: nucleotídeo), carboidratos/açúcares (monômero: monossacarídeo) e lipídeos/gorduras (monômero: ácido graxo).\n\nA composição iônica intracelular difere marcadamente do meio extracelular: o íon em maior concentração no meio intracelular é o K⁺ (120–150 mM intracelular vs. 4–5 mM extracelular), enquanto o Na⁺ predomina no extracelular (~140 mM vs. 10–15 mM intracelular). Essa assimetria iônica é fundamental para a geração de potenciais de membrana, transporte ativo e homeostase celular.\n\n### Pontos-chave\n\n- Quatro etapas da origem celular: (1) formação de moléculas orgânicas simples, (2) formação de polímeros complexos, (3) surgimento de moléculas autorreplicantes (RNA), (4) formação de protocélulas e evolução para células verdadeiras.\n- Experimento de Miller-Urey (1953) demonstrou que aminoácidos podem ser sintetizados abioticamente a partir de gases da atmosfera primitiva e energia.\n- Hipótese do Mundo de RNA: RNA precedeu o DNA por ser capaz de armazenar informação genética E catalisar reações (riboenzimas).\n- As seis propriedades definidoras de uma célula: delimitação, citoplasma, metabolismo, reprodução, homeostase/resposta a estímulos, material genético.\n- Carbono representa aproximadamente 50% do peso seco da célula; a vida na Terra é baseada em carbono.\n- Água representa cerca de 70% da composição celular.\n- Gradiente iônico fundamental: K⁺ predomina intracelularmente; Na⁺ predomina extracelularmente.\n- As quatro macromoléculas: proteínas (defesa, estrutura), ácidos nucleicos (informação genética), carboidratos (energia), lipídeos (formação de membranas).\n- Cianobactérias foram responsáveis pela oxigenação da atmosfera terrestre há 2,7–2,4 bilhões de anos, evento crucial para a evolução da vida aeróbica.\n\n### Comparação\n\n| Macromolécula | Monômero | Função Principal |\n|---|---|---|\n| Proteína | Aminoácido | Defesa, estrutura, catálise |\n| Ácido nucleico | Nucleotídeo | Informação genética |\n| Carboidrato (açúcar) | Monossacarídeo | Energética |\n| Lipídeo (gordura) | Ácido graxo | Formação de membranas |\n\n| Íon | Intracelular (mM) | Extracelular (mM) |\n|---|---|---|\n| Na⁺ | 10–15 | ~140 |\n| K⁺ | 120–150 | 4–5 |\n| Cl⁻ | 5–20 | ~110 |\n| Ca²⁺ | ~0,0001 (livre) | 1,2–2,0 |\n| pH | 7,0–7,2 | 7,4 |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Atmosfera primitiva\\nCH₄, NH₃, H₂O, H₂ + energia UV/raios] --> B[1. Moléculas orgânicas simples\\nAminoácidos, açúcares, nucleotídeos\\nExp. Miller-Urey 1953]\n B --> C[2. Polímeros complexos\\nProteínas e RNA\\nem argilas/fontes hidrotermais]\n C --> D[3. Moléculas autorreplicantes\\nHipótese do Mundo de RNA\\nRNA armazena info E catalisa reações]\n D --> E[4. Protocélulas\\nEstruturas primitivas com membrana]\n E --> F[Células verdadeiras\\nMembranas complexas + DNA + enzimas]\n F --> G[Procariontes ~3,8 bilhões de anos]\n G --> H[Cianobactérias → O₂ atmosférico\\n2,7–2,4 bilhões de anos]\n H --> I[Eucariontes]\n```\n\n> **Mnemônico:** **PARNA** — as 4 macromoléculas: **P**roteína, **A**cido nucleico, **R**esíduo de açúcar (carboidrato), **N**o lipídeo (gordura) — ou simplesmente **PALC**: Proteína, Ácido nucleico, Lipídeo, Carboidrato.\n\n<sub>Fontes: 5cddb7aac00de0f5:0, 5cddb7aac00de0f5:1, 5cddb7aac00de0f5:2, 0b1b32d6fb0337df:1, 95445721672e0e9c:1</sub>\n\n---\n\n## Equilíbrio Acidobásico: Transporte de Gases, pH e Distúrbios\n\nO equilíbrio acidobásico do organismo depende fundamentalmente do transporte de gases respiratórios e da função renal. O oxigênio é transportado principalmente (cerca de 97%) em combinação química com a hemoglobina, e apenas 3% dissolvidos no plasma. A hemoglobina capta O₂ quando a pO₂ está elevada (nos pulmões) e o libera quando a pO₂ é baixa (nos tecidos periféricos). O CO₂ produzido pelo metabolismo celular é transportado de três formas: cerca de 70% como HCO₃⁻ (após reação com água catalisada pela anidrase carbônica), cerca de 23% em combinação com a hemoglobina, e 7% dissolvido no plasma. O H⁺ liberado na dissociação do ácido carbônico é o principal determinante do pH sanguíneo, razão pela qual 'as trocas gasosas feitas no pulmão estão intimamente ligadas ao controle do pH no organismo.' O pH arterial ideal é 7,40 (levemente alcalino).\n\nO rim exerce papel complementar e fundamental no equilíbrio acidobásico ao controlar a concentração plasmática de H⁺, excretando mais ou menos H⁺ do filtrado glomerular e formando urina mais ácida ou mais alcalina conforme a necessidade. Os distúrbios acidobásicos são classificados em quatro tipos: acidose respiratória (↑pCO₂, ↓pH), alcalose respiratória (↓pCO₂, ↑pH), acidose metabólica (↓HCO₃⁻, ↓pH) e alcalose metabólica (↑HCO₃⁻, ↑pH). A gasometria arterial é o exame que permite avaliar simultaneamente pH, pCO₂ e HCO₃⁻, sendo 'uma das formas mais comuns de investigação clínica em casos emergenciais e de cuidados críticos.'\n\nUm exemplo clínico relevante é a cetoacidose diabética (CAD), em que a deficiência de insulina leva ao acúmulo de corpos cetônicos (ácidos), resultando em acidose metabólica com pH baixo, HCO₃⁻ baixo e pCO₂ baixa (compensação respiratória — respiração de Kussmaul). O oxímetro de pulso é um instrumento não invasivo que mede a saturação da hemoglobina arterial por absorção de luz em dois comprimentos de onda, fornecendo 'um meio rápido e não invasivo de estimar o conteúdo arterial de oxigênio.'\n\n### Pontos-chave\n\n- 97% do O₂ é transportado ligado à hemoglobina; 3% dissolvido no plasma.\n- CO₂ é transportado: ~70% como HCO₃⁻ (via anidrase carbônica), ~23% ligado à hemoglobina, ~7% dissolvido.\n- A anidrase carbônica catalisa: CO₂ + H₂O → H₂CO₃ → HCO₃⁻ + H⁺; o H⁺ livre determina o pH.\n- pH arterial normal: 7,35–7,45; pCO₂ normal: 35–45 mmHg; HCO₃⁻ normal: 22–26 mEq/L.\n- Rim controla o equilíbrio acidobásico excretando mais ou menos H⁺ e reabsorvendo HCO₃⁻.\n- Acidose respiratória: ↑pCO₂ (ex.: DPOC, parada respiratória); alcalose respiratória: ↓pCO₂ (ex.: hiperventilação por ansiedade).\n- Acidose metabólica: ↓HCO₃⁻ (ex.: cetoacidose diabética, sepse); alcalose metabólica: ↑HCO₃⁻ (ex.: vômitos incoercíveis, uso de diuréticos tiazídicos).\n- Cetoacidose diabética: pH baixo + HCO₃⁻ baixo + pCO₂ baixa (compensação) + respiração de Kussmaul + hálito cetônico.\n- Oxímetro de pulso: mede saturação da Hb por absorção de luz em dois comprimentos de onda — método não invasivo.\n- Hipóxia ocorre quando a difusão de gases nos alvéolos é prejudicada ou o transporte de O₂ no sangue é inadequado.\n\n### Comparação\n\n| Distúrbio | pH | pCO₂ | HCO₃⁻ | Causa Exemplo |\n|---|---|---|---|---|\n| Acidose Respiratória | ↓ | ↑ | Normal/↑ (comp.) | DPOC, parada respiratória |\n| Alcalose Respiratória | ↑ | ↓ | Normal/↓ (comp.) | Hiperventilação por ansiedade |\n| Acidose Metabólica | ↓ | Normal/↓ (comp.) | ↓ | Cetoacidose diabética, sepse, jejum |\n| Alcalose Metabólica | ↑ | Normal/↑ (comp.) | ↑ | Vômitos incoercíveis, diuréticos tiazídicos |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[CO₂ produzido nos tecidos] --> B[Entra nos capilares]\n B --> C1[~70%: CO₂ + H₂O]\n C1 --> D1[Anidrase carbônica]\n D1 --> E1[H₂CO₃ → HCO₃⁻ + H⁺]\n E1 --> F1[H⁺ determina pH sanguíneo]\n B --> C2[~23%: Liga-se à Hemoglobina]\n B --> C3[~7%: Dissolvido no plasma]\n F1 --> G{pH fora do normal?}\n G -->|↑pCO₂ → ↓pH| H[Acidose Respiratória]\n G -->|↓pCO₂ → ↑pH| I[Alcalose Respiratória]\n G -->|↓HCO₃⁻ → ↓pH| J[Acidose Metabólica]\n G -->|↑HCO₃⁻ → ↑pH| K[Alcalose Metabólica]\n H --> L[Compensação Renal: ↑excreção H⁺]\n I --> M[Compensação Renal: ↓excreção H⁺]\n J --> N[Compensação Respiratória: hiperventilação]\n K --> O[Compensação Respiratória: hipoventilação]\n```\n\n> **Mnemônico:** **RARA** para lembrar os 4 distúrbios: **R**espiratória **A**cidose (↑CO₂), **R**espiratória **A**lcalose (↓CO₂), e os metabólicos pelo HCO₃⁻: Acidose metabólica = HCO₃⁻ cai; Alcalose metabólica = HCO₃⁻ sobe. Regra prática: 'CO₂ é ácido volátil — sobe o CO₂, cai o pH.'\n\n<sub>Fontes: 471cbf4c5c651fe2:0, 471cbf4c5c651fe2:1, 471cbf4c5c651fe2:2, 471cbf4c5c651fe2:3, 26ac9f316884920e:0, 26ac9f316884920e:1</sub>\n\n---\n\n## Sistemas Tampão e Manutenção do pH Corporal\n\nO pH sanguíneo ideal situa-se entre 7,35 e 7,45, faixa na qual quase todos os sistemas enzimáticos funcionam de maneira ótima. Para manter esse equilíbrio, o organismo lança mão de sistemas tampão, definidos como misturas compostas por um ácido fraco e sua base conjugada, capazes de resistir a alterações de pH mesmo após a adição de pequenas quantidades de ácido ou base forte. O principal sistema tampão extracelular é o bicarbonato-CO₂, representado pela equação H⁺ + HCO₃⁻ ⇄ H₂CO₃ ⇄ CO₂ + H₂O, que opera como sistema aberto graças à capacidade pulmonar de eliminar CO₂ e à capacidade renal de regular HCO₃⁻.\n\nOs sistemas tampão não eliminam nem acrescentam íons H⁺ do corpo — eles apenas mantêm o pH em faixas adequadas até que o balanço possa ser restabelecido pelos pulmões e rins. O princípio isoídrico estabelece que todos os tampões de uma solução comum estão em balanço com a mesma concentração de H⁺; portanto, qualquer condição que altere um sistema tampão altera simultaneamente todos os outros. Intracelularmente, cerca de 60% a 70% do tamponamento químico total dos líquidos corporais ocorre no interior das células, sendo as proteínas intracelulares — especialmente a hemoglobina nas hemácias — os principais responsáveis.\n\nOs tampões extracelulares incluem bicarbonato, proteínas (albumina) e fosfato, enquanto os intracelulares incluem proteínas (hemoglobina nas hemácias), fosfato e bicarbonato. A hemoglobina tampona H⁺ segundo a reação H⁺ + Hb ⇄ HHb, sendo tampão importante nas hemácias. A capacidade total de tamponamento do sistema respiratório é uma a duas vezes maior que o poder de tamponamento de todos os outros tampões químicos do líquido extracelular combinados.\n\n### Pontos-chave\n\n- Quase todos os sistemas enzimáticos funcionam de maneira ótima quando o pH do sangue está entre 7,35 e 7,45.\n- Um sistema tampão é uma mistura composta por um ácido fraco e sua base conjugada, capaz de resistir a alterações de pH.\n- O principal sistema tampão extracelular é o bicarbonato-CO₂: H⁺ + HCO₃⁻ ⇄ H₂CO₃ ⇄ CO₂ + H₂O.\n- Os sistemas tampão não eliminam H⁺ do corpo; apenas mantêm o pH em faixas adequadas até que o balanço seja restabelecido.\n- O princípio isoídrico: qualquer condição que altere o balanço de um sistema tampão também altera o balanço de todos os outros.\n- Aproximadamente 60% a 70% do tamponamento químico total dos líquidos corporais se dá no interior das células.\n- Nas hemácias, a hemoglobina é tampão importante: H⁺ + Hb ⇄ HHb.\n- Tampões extracelulares: bicarbonato, proteínas (albumina), fosfato. Tampões intracelulares: proteínas (Hb em hemácias), fosfato, bicarbonato.\n- A capacidade de tamponamento do sistema respiratório é uma a duas vezes maior que o poder de tamponamento de todos os outros tampões químicos do líquido extracelular combinados.\n\n### Comparação\n\n| Compartimento | Principais Tampões | Velocidade de Ação |\n|---|---|---|\n| Extracelular | Bicarbonato, Albumina, Fosfato | Segundos (bicarbonato) |\n| Intracelular (hemácias) | Hemoglobina (Hb) | Rápida (acesso direto ao plasma) |\n| Intracelular (outras células) | Proteínas, Fosfato, Bicarbonato | Horas (transporte lento de H⁺ e HCO₃⁻ pela membrana) |\n\n> **Mnemônico:** \"BPF Extra, HPB Intra\" — Bicarbonato, Proteínas, Fosfato (extracelular); Hemoglobina, Proteínas, Bicarbonato/Fosfato (intracelular)\n\n<sub>Fontes: 49ed06ff34adc89d:0, 49ed06ff34adc89d:9, 49ed06ff34adc89d:13</sub>\n\n---\n\n## Regulação Respiratória e Renal do Equilíbrio Acidobásico\n\nA regulação do pH corporal envolve duas linhas de defesa fisiológicas além dos tampões químicos: o sistema respiratório (ação em minutos) e o sistema renal (ação em horas a dias, mais potente). O sistema respiratório age como controlador por feedback negativo: quando a concentração de H⁺ aumenta, a ventilação alveolar é estimulada, eliminando CO₂ e reduzindo a concentração de H⁺ de volta ao normal. A ventilação alveolar pode aumentar até quatro a cinco vezes a normal quando o pH cai de 7,4 para 7,0. A eficiência desse controle é de 50% a 75%, com resposta ocorrendo dentro de 3 a 12 minutos. Importante: a compensação respiratória ao aumento do pH (alcalose) não é tão efetiva quanto a resposta à redução do pH, pois a hipoventilação compensatória reduz a pO₂, o que estimula novamente a ventilação.\n\nOs rins controlam o balanço acidobásico ao excretar urina ácida ou básica. O mecanismo central envolve a secreção tubular de H⁺ e a reabsorção de HCO₃⁻. Nos túbulos proximais, o CO₂ entra nas células epiteliais e, sob ação da anidrase carbônica, forma H₂CO₃, que se dissocia em H⁺ e HCO₃⁻. O H⁺ é secretado para o lúmen por contratransporte sódio-hidrogênio, enquanto o HCO₃⁻ retorna ao sangue. Para cada H⁺ secretado, um HCO₃⁻ é reabsorvido. Nos túbulos coletores, células intercaladas realizam secreção ativa primária de H⁺ via ATPase transportadora de hidrogênio, podendo reduzir o pH urinário até 4,5 — o limite mínimo atingível pelos rins normais.\n\nQuando há excesso de H⁺ em relação ao HCO₃⁻ (acidose), os rins reabsorvem todo o bicarbonato filtrado e excretam o H⁺ excedente tamponado por fosfato (H₂PO₄⁻) e amônia (NH₄⁺), gerando novo HCO₃⁻ para o plasma. Na alcalose, o excesso de HCO₃⁻ não reabsorvido é excretado na urina. O comprometimento da função pulmonar (ex.: enfisema grave) prejudica a compensação respiratória da acidose metabólica, tornando os rins o único mecanismo fisiológico remanescente.\n\n### Pontos-chave\n\n- Sistema respiratório: segunda linha de defesa, ação em minutos, eficiência de 50% a 75%.\n- Aumento de H⁺ estimula ventilação alveolar → elimina CO₂ → reduz H⁺ (feedback negativo).\n- A ventilação alveolar aumenta até quatro a cinco vezes a normal quando o pH cai de 7,4 para 7,0.\n- A compensação respiratória à alcalose é limitada porque a hipoventilação reduz pO₂, reestimulando a ventilação.\n- Rins: terceira linha de defesa, ação de horas a dias, mais potente.\n- Mecanismo renal: anidrase carbônica converte CO₂ + H₂O → H₂CO₃ → H⁺ (secretado) + HCO₃⁻ (reabsorvido).\n- Túbulo proximal: contratransporte Na⁺-H⁺ (secundário ativo); túbulo coletor: ATPase-H⁺ (ativo primário).\n- pH urinário mínimo atingível pelos rins normais: 4,5.\n- Tampões urinários principais: fosfato (H₂PO₄⁻) e amônia (NH₄⁺) — permitem excreção de grandes quantidades de H⁺.\n- Na acidose, os rins geram novo HCO₃⁻ ao combinar H⁺ excedente com tampões fosfato e amônia.\n\n### Comparação\n\n| Mecanismo | Velocidade de Ação | Potência | Limitações |\n|---|---|---|---|\n| Tampões químicos | Segundos | Moderada | Não eliminam H⁺ do corpo |\n| Sistema respiratório | 3–12 minutos | 1–2× tampões químicos | Eficiência 50–75%; limitado na alcalose |\n| Sistema renal | Horas a dias | Mais potente | Lento; comprometido em doenças renais |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[↑ H⁺ no líquido extracelular] --> B[Tampões químicos: ação em segundos]\n B --> C[Sistema respiratório estimulado]\n C --> D[↑ Ventilação alveolar]\n D --> E[↓ pCO₂]\n E --> F[↓ H⁺ — ação em 3–12 min]\n F --> G[Rins: ação em horas a dias]\n G --> H[↑ Secreção tubular de H⁺]\n G --> I[↑ Reabsorção de HCO₃⁻]\n G --> J[↑ Excreção de NH₄⁺ e H₂PO₄⁻]\n H & I & J --> K[Geração de novo HCO₃⁻ → pH normalizado]\n```\n\n> **Mnemônico:** \"TRP\" — Tampões (segundos), Respiração (minutos), Pulmão→Rim (horas/dias): ordem crescente de potência e tempo\n\n<sub>Fontes: 49ed06ff34adc89d:2, 49ed06ff34adc89d:3, 49ed06ff34adc89d:4, 49ed06ff34adc89d:5, 49ed06ff34adc89d:7, 49ed06ff34adc89d:9, 49ed06ff34adc89d:10, 49ed06ff34adc89d:11, 49ed06ff34adc89d:13, 49ed06ff34adc89d:15</sub>\n\n---\n\n## Distúrbios do Equilíbrio Acidobásico: Identificação e Compensação\n\nOs distúrbios acidobásicos são classificados em quatro tipos primários com base na origem (metabólica ou respiratória) e na direção da alteração do pH (acidose ou alcalose). Na acidose metabólica, ocorre queda do pH por acúmulo de H⁺ ou perda de HCO₃⁻; causas incluem cetoacidose diabética, hipóxia tecidual, insuficiência renal, diarreia e acidose tubular renal. A compensação é respiratória (hiperventilação), com fórmula: pCO₂ esperada = (1,5 × [HCO₃⁻]) + 8 ± 2. Na alcalose metabólica, há elevação do pH por perda de H⁺ (vômitos, diuréticos) ou ganho de HCO₃⁻; a compensação é hipoventilação, com fórmula: pCO₂ esperado = 0,7 × (HCO₃⁻) + 20 mmHg ± 5 — porém essa compensação é limitada porque a hipoventilação afeta a oxigenação.\n\nNa acidose respiratória, a retenção de CO₂ por hipoventilação reduz o pH; causas incluem DPOC, asma grave, pneumonia, ARDS, rebaixamento do nível de consciência e obesidade. A compensação renal aumenta a reabsorção de HCO₃⁻ e a secreção de H⁺. Na alcalose respiratória, a hiperventilação elimina CO₂ em excesso, elevando o pH; causas incluem ansiedade, hipoxemia, dor e crises de pânico. A compensação renal reduz a reabsorção de HCO₃⁻ e a produção de NH₄⁺. Os valores de referência para gasometria arterial são: pH 7,35–7,45; pCO₂ 35–45 mmHg; HCO₃⁻ 22–26 mEq/L.\n\nA interpretação sistemática da gasometria segue quatro passos: (1) o exame está normal?; (2) qual o nome do distúrbio?; (3) qual o distúrbio primário?; (4) a compensação está adequada? É possível haver dois distúrbios primários simultaneamente (ex.: acidose metabólica + acidose respiratória em sepse grave com pneumonia), situação em que o pH cai acentuadamente sem compensação eficaz. Verificar se a compensação está dentro do esperado pela fórmula é essencial para identificar distúrbios mistos.\n\n### Pontos-chave\n\n- Valores de referência: pH 7,35–7,45; pCO₂ 35–45 mmHg; HCO₃⁻ 22–26 mEq/L.\n- Acidose metabólica: ↓pH, ↓HCO₃⁻, ↓pCO₂ (compensação respiratória). Fórmula: pCO₂ esperada = (1,5 × [HCO₃⁻]) + 8 ± 2.\n- Alcalose metabólica: ↑pH, ↑HCO₃⁻, ↑pCO₂ (compensação por hipoventilação). Fórmula: pCO₂ esperado = 0,7 × (HCO₃⁻) + 20 ± 5.\n- Acidose respiratória: ↓pH, ↑pCO₂, ↑HCO₃⁻ (compensação renal). Fórmula crônica: HCO₃⁻ esperado = 24 + 4 × (0,1 × ΔpCO₂).\n- Alcalose respiratória: ↑pH, ↓pCO₂, ↓HCO₃⁻ (compensação renal). Fórmula crônica: ΔpaCO₂ = 1 mmHg → ΔHCO₃⁻ = 0,2 mEq/L.\n- Causas de acidose metabólica: cetoacidose diabética, hipóxia tecidual, insuficiência renal, diarreia, intoxicações exógenas.\n- Causas de alcalose metabólica: vômitos prolongados, aspiração nasogástrica, uso de diuréticos, hipocalemia, hiperaldosteronismo.\n- Causas de acidose respiratória: DPOC, asma grave, pneumonia, ARDS, rebaixamento do nível de consciência, obesidade.\n- Causas de alcalose respiratória: ansiedade, hipoxemia, dor, crises de pânico, diminuição da fração de O₂ inspirado.\n- Distúrbios mistos são possíveis: ex. acidose metabólica + acidose respiratória em sepse com pneumonia.\n\n### Comparação\n\n| Distúrbio | pH | pCO₂ | HCO₃⁻ | Mecanismo Primário | Compensação | Fórmula de Compensação |\n|---|---|---|---|---|---|---|\n| Acidose Metabólica | ↓ | ↓ | ↓ | ↑H⁺ ou ↓HCO₃⁻ | Hiperventilação (pulmão) | pCO₂ = (1,5 × HCO₃⁻) + 8 ± 2 |\n| Alcalose Metabólica | ↑ | ↑ | ↑ | ↓H⁺ ou ↑HCO₃⁻ | Hipoventilação (pulmão) — limitada | pCO₂ = 0,7 × HCO₃⁻ + 20 ± 5 |\n| Acidose Respiratória | ↓ | ↑ | ↑ | Retenção de CO₂ | ↑Reabsorção HCO₃⁻ (rim) | HCO₃⁻ = 24 + 4 × (0,1 × ΔpCO₂) |\n| Alcalose Respiratória | ↑ | ↓ | ↓ | Eliminação de CO₂ | ↓Reabsorção HCO₃⁻ (rim) | ΔpaCO₂ 1 mmHg → ΔHCO₃⁻ 0,2 mEq/L |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Gasometria Arterial] --> B{pH normal?}\n B -- Sim --> C[Exame Normal ou Distúrbio Misto Compensado]\n B -- Não --> D{pH < 7,35?}\n D -- Sim --> E[ACIDOSE]\n D -- Não --> F[ALCALOSE]\n E --> G{pCO₂ ↑?}\n G -- Sim --> H[Acidose RESPIRATÓRIA\\nCausa: retenção CO₂]\n G -- Não --> I[Acidose METABÓLICA\\nCausa: ↑H⁺ ou ↓HCO₃⁻]\n F --> J{pCO₂ ↓?}\n J -- Sim --> K[Alcalose RESPIRATÓRIA\\nCausa: hiperventilação]\n J -- Não --> L[Alcalose METABÓLICA\\nCausa: ↓H⁺ ou ↑HCO₃⁻]\n H --> M[Verificar compensação renal:\\nHCO₃⁻ esperado = 24 + 4×0,1×ΔpCO₂]\n I --> N[Verificar compensação respiratória:\\npCO₂ esperada = 1,5×HCO₃⁻ + 8 ± 2]\n K --> O[Verificar compensação renal:\\nΔHCO₃⁻ = 0,2 × ΔpaCO₂]\n L --> P[Verificar compensação respiratória:\\npCO₂ = 0,7×HCO₃⁻ + 20 ± 5]\n```\n\n> **Mnemônico:** \"MAR-AR\" com direção do pCO₂: Metabólica Acidose → pCO₂ cai (Respiração compensa); Metabólica Alcalose → pCO₂ sobe; Acidose Respiratória → pCO₂ sobe; Alcalose Respiratória → pCO₂ cai. Regra: na compensação, pCO₂ e HCO₃⁻ sempre se movem na MESMA direção que o distúrbio primário.\n\n<sub>Fontes: 49ed06ff34adc89d:0, 49ed06ff34adc89d:1, 49ed06ff34adc89d:6, 49ed06ff34adc89d:8, 49ed06ff34adc89d:10, 49ed06ff34adc89d:12, 49ed06ff34adc89d:14, 49ed06ff34adc89d:16, 49ed06ff34adc89d:17, 49ed06ff34adc89d:18, 49ed06ff34adc89d:19, 8f0954aa2c6a919c:1, 8f0954aa2c6a919c:2</sub>\n\n---\n\n## Hemoglobina, Transporte de Gases e Oximetria\n\nO oxigênio é essencial para o metabolismo humano e é transportado principalmente em combinação química com a hemoglobina (Hb). Cerca de 97% do O₂ são transportados para os tecidos em combinação química com a hemoglobina; os 3% restantes são transportados dissolvidos na água do plasma e das células. A hemoglobina capta grandes quantidades de O₂ quando a pO₂ está elevada (nos pulmões) e libera O₂ quando a pO₂ é baixa (nos capilares teciduais), permitindo a difusão para as células. O CO₂, produzido pelo metabolismo energético, é transportado de três formas: cerca de 70% como HCO₃⁻ (após reação com água catalisada pela anidrase carbônica), cerca de 23% em combinação com a hemoglobina, e 7% dissolvido no plasma.\n\nA conversão de CO₂ em HCO₃⁻ é central para o equilíbrio acidobásico: CO₂ + H₂O ⇄ H₂CO₃ ⇄ H⁺ + HCO₃⁻. O H⁺ livre resultante determina o pH sanguíneo, evidenciando a íntima ligação entre trocas gasosas pulmonares e controle do pH. O sangue arterial tem pH ideal em 7,40, levemente alcalino. A saturação da hemoglobina é medida clinicamente pelo oxímetro de pulso, que mede a absorção de luz da hemoglobina tecidual em dois comprimentos de onda, diferenciando o componente pulsátil (sangue arterial) do componente contínuo (outros tecidos), fornecendo leitura rápida e não invasiva do conteúdo arterial de oxigênio.\n\nA gasometria arterial é o exame padrão para avaliação da condição respiratória e metabólica, sendo uma das formas mais comuns de investigação clínica em casos emergenciais e de cuidados críticos. Ela permite avaliar a efetividade da hematose, determinar a necessidade de tratamento para desequilíbrios acidobásicos e monitorar doenças respiratórias, renais, cardíacas, infecções graves, choque e overdoses.\n\n### Pontos-chave\n\n- Cerca de 97% do O₂ são transportados para os tecidos em combinação química com a hemoglobina.\n- Os 3% restantes de O₂ são transportados dissolvidos na água do plasma e das células.\n- CO₂ é transportado: ~70% como HCO₃⁻, ~23% combinado com hemoglobina, ~7% dissolvido no plasma.\n- A reação CO₂ + H₂O → H₂CO₃ → H⁺ + HCO₃⁻ é catalisada pela anidrase carbônica.\n- O H⁺ livre na solução sanguínea determina o pH; sangue arterial tem pH ideal em 7,40.\n- O oxímetro de pulso mede a saturação da hemoglobina arterial de forma rápida e não invasiva, usando dois LEDs.\n- A gasometria arterial avalia condição respiratória e metabólica; é exame central em emergências e UTI.\n- Hipóxia ocorre quando a difusão dos gases nos alvéolos ou o transporte de O₂ no sangue é inadequado.\n- A hemoglobina também atua como tampão intracelular nas hemácias: H⁺ + Hb ⇄ HHb.\n\n### Comparação\n\n| Forma de Transporte | O₂ (%) | CO₂ (%) |\n|---|---|---|\n| Combinado com hemoglobina | ~97% | ~23% |\n| Dissolvido no plasma/células | ~3% | ~7% |\n| Como HCO₃⁻ (bicarbonato) | — | ~70% |\n\n> **Mnemônico:** \"97-3 para O₂; 70-23-7 para CO₂\" — O₂: 97% Hb, 3% dissolvido; CO₂: 70% bicarbonato, 23% Hb, 7% dissolvido\n\n<sub>Fontes: 8f0954aa2c6a919c:0, 8f0954aa2c6a919c:1, 49ed06ff34adc89d:9, 49ed06ff34adc89d:13</sub>\n\n---\n\n## Aminoácidos: Estrutura, Propriedades e Classificação\n\nOs aminoácidos são as unidades monoméricas das proteínas. Cada aminoácido possui um grupo carboxila, um grupo amino e um grupo R característico ligado ao carbono alfa — a única exceção é a glicina, cujo grupo R é apenas um hidrogênio, tornando-a o único aminoácido sem centro quiral. São 20 aminoácidos biologicamente ativos que compõem todas as proteínas, e as diferenças entre eles residem na estrutura, polaridade, tamanho e carga elétrica do grupo R (cadeia lateral). Em pH neutro, os aminoácidos existem predominantemente como íons dipolares: o grupo amino está protonado (–NH₃⁺) e o grupo carboxila está desprotonado (–COO⁻).\n\nO ponto isoelétrico (pI) é o valor de pH em que a molécula possui carga elétrica líquida igual a zero. O estado de ionização varia com o pH, e o fato de aminoácidos e proteínas terem valores diferentes de pKa origina a possibilidade de que eles podem ter cargas diferentes em um determinado pH — essa é a base para a eletroforese. Aminoácidos essenciais são aqueles que não são produzidos pelo corpo e, portanto, devem ser obtidos pela alimentação. Um exemplo clinicamente relevante é o triptofano (Trp, W), aminoácido essencial que contribui para a síntese proteica e para a síntese do neurotransmissor serotonina.\n\nA cistinúria ilustra a importância clínica do transporte de aminoácidos: trata-se de um erro inato do metabolismo de transmissão autossômica recessiva com alteração no transporte intestinal e tubular renal dos aminoácidos cistina, lisina, arginina e ornitina, resultando em aumento da excreção urinária desses quatro aminoácidos e formação de cálculos renais.\n\n### Pontos-chave\n\n- Existem 20 aminoácidos biologicamente ativos que compõem todas as proteínas; diferem pela cadeia lateral (grupo R).\n- O carbono alfa é um centro quiral com quatro ligantes diferentes; a glicina é a única exceção (cadeia lateral = H).\n- Em pH neutro, aminoácidos existem como íons dipolares: –NH₃⁺ (protonado) e –COO⁻ (desprotonado).\n- Ponto isoelétrico (pI): pH em que a carga elétrica líquida do aminoácido ou proteína é zero — base da eletroforese.\n- Aminoácidos essenciais não são sintetizados pelo organismo e devem ser obtidos pela dieta.\n- Triptofano (Trp, W) é essencial e precursor da serotonina.\n- Cistinúria: defeito no transporte de cistina, lisina, arginina e ornitina → nefrolitíase (cálculos hexagonais).\n- A ligação peptídica forma-se quando o grupo carboxila de um aminoácido reage com o grupo amina de outro, liberando água.\n\n### Comparação\n\n| Característica | Aminoácido Essencial | Aminoácido Não Essencial |\n|---|---|---|\n| Síntese pelo organismo | Não | Sim |\n| Fonte obrigatória | Alimentação | Metabolismo próprio |\n| Exemplo relevante | Triptofano (precursor da serotonina) | Glutamato (carga negativa em pH fisiológico) |\n| Relevância clínica | Deficiência dietética → carência | Mutação na HbS: Glu→Val causa anemia falciforme |\n\n> **Mnemônico:** Para lembrar os aminoácidos alterados na cistinúria: **CLAO** — Cistina, Lisina, Arginina, Ornitina\n\n<sub>Fontes: 3f5f409b556f5f85:0, fb11fbdf33477d7a:0, 3f5f409b556f5f85:1, fb11fbdf33477d7a:1, 2c7a6c02c6525261:0, 30a0c307d98d50fe:0</sub>\n\n---\n\n## Estrutura Proteica: Níveis de Organização e Relação Estrutura-Função\n\nAs proteínas são macromoléculas formadas pela polimerização de aminoácidos por meio de ligações peptídicas — ligações covalentes que ocorrem quando o grupo carboxila de um aminoácido reage com o grupo amina de outro, liberando uma molécula de água. A sequência de aminoácidos constitui a estrutura primária, que determina todas as estruturas subsequentes. A estrutura secundária é dada pelo arranjo espacial de aminoácidos próximos entre si, mantida por pontes de hidrogênio, e se manifesta principalmente como alfa-hélice ou beta-folha. A estrutura terciária resulta do enrolamento da alfa-hélice ou da beta-folha, mantida por várias forças, incluindo pontes dissulfeto formadas por dois resíduos de cisteína. A estrutura quaternária é a organização tridimensional de proteínas com duas ou mais cadeias polipeptídicas (oligômeros).\n\nA relação entre estrutura e função é fundamental: diferenças na função de proteínas resultam de diferenças na composição e na sequência de aminoácidos, e a estrutura tridimensional é fundamental para a ação biológica proteica. O exemplo mais didático é a hemoglobina (HbA), com duas cadeias α (141 aminoácidos cada) e duas cadeias β (146 aminoácidos cada), possuindo todos os quatro níveis estruturais. Uma única substituição pontual — glutamato por valina na posição 6 da cadeia β — origina a hemoglobina S (HbS) da anemia falciforme. O glutamato tem carga negativa em pH fisiológico e afasta moléculas de hemoglobina desoxigenadas, enquanto a valina, hidrofóbica, favorece a polimerização sob baixo teor de oxigênio.\n\nProteínas que diferem um pouco na estrutura primária e nas propriedades de um tecido para outro, mas mantêm essencialmente a mesma função, são chamadas de isoformas ou isoenzimas. Esse conceito tem aplicação clínica direta: o diagnóstico de infarto agudo do miocárdio é baseado na identificação de, ao menos, um valor de troponina acima da referência superior da normalidade, pois variações em análises seriadas desse biomarcador sugerem lesão aguda das células cardíacas.\n\n### Pontos-chave\n\n- Estrutura primária: sequência de aminoácidos unidos por ligações peptídicas — determina todas as estruturas superiores.\n- Estrutura secundária: alfa-hélice e beta-folha, mantidas por pontes de hidrogênio.\n- Estrutura terciária: enrolamento tridimensional da cadeia; estabilizada por pontes dissulfeto (entre resíduos de cisteína), interações hidrofóbicas e outras forças.\n- Estrutura quaternária: associação de duas ou mais cadeias polipeptídicas (ex.: hemoglobina com 2α + 2β).\n- Nomenclatura de peptídeos: até 50 resíduos = oligopeptídeo; a partir de 51 = polipeptídeo.\n- Anemia falciforme: substituição Glu→Val na posição 6 da cadeia β da hemoglobina → HbS → polimerização em hipóxia → falcização.\n- Isoformas/isoenzimas: mesma função, estrutura primária ligeiramente diferente entre tecidos (ex.: troponina cardíaca como biomarcador de IAM).\n- A hemoglobina é uma proteína (não enzima) encontrada no interior das hemácias, com função de transporte de oxigênio, possuindo os quatro níveis estruturais.\n\n### Comparação\n\n| Nível Estrutural | Definição | Força de Estabilização | Exemplo |\n|---|---|---|---|\n| Primário | Sequência de aminoácidos | Ligação peptídica (covalente) | Qualquer proteína |\n| Secundário | Arranjo espacial local (α-hélice, β-folha) | Pontes de hidrogênio | Fibroína (β-folha); albumina (α-hélice) |\n| Terciário | Dobramento tridimensional da cadeia | Pontes dissulfeto, interações hidrofóbicas, iônicas, pontes de H | Insulina (pontes dissulfeto inter e intracadeia) |\n| Quaternário | Associação de múltiplas cadeias polipeptídicas | Mesmas forças do terciário entre subunidades | Hemoglobina (2α + 2β) |\n\n### Fluxo / via metabólica\n\n```mermaid\nflowchart TD\n A[Aminoácidos - 20 tipos] -->|Ligação peptídica| B[Estrutura Primária\\nSequência de aa]\n B -->|Pontes de hidrogênio| C[Estrutura Secundária\\nα-hélice / β-folha]\n C -->|Pontes dissulfeto,\\nforças hidrofóbicas,\\niônicas| D[Estrutura Terciária\\nDobramento 3D]\n D -->|Associação de\\ncadeias polipeptídicas| E[Estrutura Quaternária\\nOligômero - ex: Hemoglobina]\n```\n\n> **Mnemônico:** **P-S-T-Q** = **P**rimária (sequência) → **S**ecundária (hélice/folha) → **T**erciária (dobramento) → **Q**uaternária (oligômero)\n\n<sub>Fontes: 3f5f409b556f5f85:1, fb11fbdf33477d7a:1, 3f5f409b556f5f85:2, fb11fbdf33477d7a:2, 2c7a6c02c6525261:1, 30a0c307d98d50fe:1, 23892e9fa1ef9f11:1, 2c7a6c02c6525261:0, 30a0c307d98d50fe:0</sub>\n\n---\n\n## Desnaturação Proteica, Chaperonas e Digestão\n\nA desnaturação ocorre quando as conformações espaciais das proteínas são alteradas ou destruídas, com manutenção da estrutura primária. Isso demonstra a relação direta entre estrutura e função: ao perder a conformação tridimensional, a proteína perde sua atividade biológica. Os agentes desnaturantes são classificados em físicos (alterações de temperatura, raio X e ultrassom) e químicos (ácidos e bases, detergente, ureia e mercaptoetanol). A desnaturação reduz a solubilidade, aumenta a digestibilidade e causa perda da atividade biológica. O exemplo clássico é o cozimento do ovo: a albumina se converte de seu estado translúcido nativo para um precipitado branco. No estômago, as proteínas alimentares são desnaturadas pelo pH ácido do suco gástrico — embora esse pH não quebre ligações peptídicas, a ruptura da conformação nativa torna a proteína um substrato melhor para as enzimas digestivas.\n\nAlgumas proteínas desnaturadas podem renaturar espontaneamente in vitro, mostrando que as estruturas terciárias são determinadas pela sequência de aminoácidos. No corpo, isso não ocorre tão facilmente. Para evitar o acúmulo de proteínas mal dobradas, as células produzem chaperonas — proteínas que facilitam o enovelamento apropriado das proteínas nascentes. Uma mutação que reduza a produção de chaperonas no retículo endoplasmático levaria ao acúmulo de proteínas mal dobradas e ativação precoce da Unfolded Protein Response (UPR). A UPR responde ao acúmulo de proteínas mal dobradas no retículo endoplasmático, restaurando a homeostase; se insuficiente, a célula pode ativar vias que levam à morte celular por apoptose.\n\nAs proteínas são grandes demais para serem absorvidas pelo intestino; enzimas proteolíticas são as responsáveis pela degradação das proteínas em aminoácidos, que são então absorvidos e utilizados na síntese de novas proteínas humanas. Isso explica por que a proteína bovina sofre digestão e os aminoácidos liberados são usados na produção de proteínas humanas — e não a proteína intacta é absorvida.\n\n### Pontos-chave\n\n- Desnaturação: destruição das estruturas secundária, terciária e quaternária — a estrutura primária é mantida.\n- Agentes físicos desnaturantes: temperatura, raio X, ultrassom.\n- Agentes químicos desnaturantes: ácidos, bases, detergente, ureia, mercaptoetanol.\n- Consequências da desnaturação: redução da solubilidade, aumento da digestibilidade, perda da atividade biológica.\n- Chaperonas: proteínas que facilitam o enovelamento apropriado das proteínas nascentes, evitando acúmulo de proteínas mal dobradas.\n- UPR (Unfolded Protein Response): mecanismo que responde ao acúmulo de proteínas mal dobradas no retículo endoplasmático, restaurando a homeostase.\n- Se a UPR não restaurar a h
